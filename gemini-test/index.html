<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>RoadGuide — Gemini Tour Test</title>
<style>
  :root {
    --ink: #080c14; --gold: #c9a84c; --glo: #e8c97a;
    --pale: #eef2ff; --dim: rgba(220,228,255,.5);
    --card: rgba(255,255,255,.06); --edge: rgba(255,255,255,.1);
    --green: #50c880; --red: #e05555;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--ink); color: var(--pale);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh; padding: 20px;
  }
  h1 {
    font-size: 22px; letter-spacing: 4px; color: var(--glo);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .sub { font-size: 10px; letter-spacing: 2px; color: var(--gold); margin-bottom: 24px; }

  /* API Key input */
  .api-row {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
  }
  .api-row input {
    flex: 1; padding: 10px 14px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--edge);
    color: var(--pale); font-size: 13px; outline: none;
    font-family: monospace;
  }
  .api-row input:focus { border-color: var(--gold); }
  .api-row button {
    padding: 10px 18px; border-radius: 10px;
    background: rgba(201,168,76,.15); border: 1px solid var(--gold);
    color: var(--glo); font-size: 12px; cursor: pointer;
    letter-spacing: 1px;
  }

  /* Status bar */
  #statusBar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--edge);
    font-size: 11px; color: var(--dim); margin-bottom: 16px;
    font-family: monospace; letter-spacing: .5px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: rgba(220,228,255,.25);
  }
  .dot.active { background: var(--green); animation: blink 1.5s infinite; }
  .dot.speaking { background: var(--gold); animation: blink .8s infinite; }
  .dot.error { background: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* Narration display */
  #narrationBox {
    background: var(--card); border: 1px solid var(--edge);
    border-radius: 14px; padding: 18px; min-height: 120px;
    font-size: 15px; line-height: 1.7; color: var(--pale);
    margin-bottom: 16px; white-space: pre-wrap;
    transition: border-color .3s;
  }
  #narrationBox.speaking { border-color: rgba(201,168,76,.4); }

  /* Landmark selector */
  .section-label {
    font-size: 9px; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 8px;
  }
  #landmarkSelect {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--edge);
    color: var(--pale); font-size: 13px; margin-bottom: 16px;
    outline: none; cursor: pointer;
  }
  #landmarkSelect:focus { border-color: var(--gold); }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .btn {
    flex: 1; padding: 14px; border-radius: 14px; cursor: pointer;
    font-size: 13px; letter-spacing: 1px; border: 1.5px solid;
    transition: all .2s; min-width: 100px;
  }
  .btn:active { transform: scale(.97); }
  #listenBtn {
    background: rgba(201,168,76,.12); border-color: rgba(201,168,76,.5);
    color: var(--glo);
  }
  #listenBtn.active {
    background: rgba(80,200,128,.12); border-color: rgba(80,200,128,.5);
    color: #6ecf9c;
  }
  #continueBtn {
    background: rgba(255,255,255,.04); border-color: var(--edge);
    color: var(--dim);
  }
  #stopBtn {
    background: rgba(224,85,85,.1); border-color: rgba(224,85,85,.4);
    color: #e07777; flex: 0; padding: 14px 20px;
  }

  /* GPS coords */
  #gpsInfo {
    font-family: monospace; font-size: 10px; color: var(--dim);
    padding: 8px 12px; background: var(--card); border: 1px solid var(--edge);
    border-radius: 8px; margin-bottom: 16px;
  }

  /* Log */
  #log {
    font-family: monospace; font-size: 10px; color: var(--dim);
    padding: 10px; background: rgba(0,0,0,.3); border-radius: 8px;
    max-height: 140px; overflow-y: auto; line-height: 1.6;
  }
  .log-entry { color: rgba(201,168,76,.6); }
  .log-entry.info { color: var(--dim); }
  .log-entry.error { color: var(--red); }
</style>
</head>
<body>

<h1>RoadGuide</h1>
<div class="sub">Gemini Tour Guide — Test Harness</div>

<!-- API Key -->
<div class="api-row">
  <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key here…">
  <button onclick="saveKey()">Save Key</button>
</div>

<!-- Status -->
<div id="statusBar">
  <div class="dot" id="statusDot"></div>
  <span id="statusText">Waiting for API key…</span>
</div>

<!-- Narration output -->
<div class="section-label">Gemini is saying…</div>
<div id="narrationBox">Tap Listen to start the tour.</div>

<!-- Landmark picker -->
<div class="section-label">Pick a test landmark</div>
<select id="landmarkSelect"></select>

<!-- Controls -->
<div class="btn-row">
  <button class="btn" id="listenBtn" onclick="handleListen()">🎧 Listen</button>
  <button class="btn" id="continueBtn" onclick="handleContinue()">▶ Keep Going</button>
  <button class="btn" id="stopBtn" onclick="handleStop()">■ Stop</button>
</div>

<!-- GPS -->
<div id="gpsInfo">GPS: waiting…</div>

<!-- Log -->
<div class="section-label">Event log</div>
<div id="log"></div>

<script type="module">
import { GeminiTourGuide } from './gemini-tour-guide.js';

// ── Sample landmarks for testing (subset of your real data) ──
const TEST_LANDMARKS = [
  { name:"Mount Diablo Summit", county:"Contra Costa", cat:"Mountain",
    lat:37.8816, lon:-121.9142,
    fact:"On a clear day, you can see 35 of California's 58 counties from this 3,849-foot summit. Spanish surveyors used Mount Diablo as the origin point for all land surveys in California and Nevada, making it the baseline for millions of property lines still in use today." },
  { name:"Lafayette Reservoir", county:"Contra Costa", cat:"Reservoir",
    lat:37.8871, lon:-122.1180,
    fact:"Built in 1928 as an emergency backup water supply for Contra Costa County, the reservoir holds up to 2.7 billion gallons. The surrounding 934-acre recreation area draws over a million visitors a year to its 5-mile loop trail around the water." },
  { name:"John Muir National Historic Site", county:"Contra Costa", cat:"Historic Site",
    lat:37.9938, lon:-122.1278,
    fact:"This 17-room Victorian mansion was home to John Muir for the last 24 years of his life, and it was here that he wrote most of the books and articles that created the modern conservation movement. Muir's scribble den study on the top floor still contains his original desk, papers, and thousands of pressed botanical specimens." },
  { name:"Golden Gate Bridge", county:"San Francisco", cat:"Landmark",
    lat:37.8199, lon:-122.4783,
    fact:"When it opened in 1937, the Golden Gate Bridge was the longest suspension bridge in the world. Its distinctive International Orange color was originally just a primer coat that the architect loved so much he made it permanent." },
  { name:"Alcatraz Island", county:"San Francisco", cat:"Historic Prison",
    lat:37.8270, lon:-122.4230,
    fact:"Alcatraz held some of America's most notorious criminals including Al Capone. In 1969, Native American activists occupied Alcatraz for 19 months under the Indians of All Tribes movement — a landmark event in the American Indian rights movement." },
  { name:"Old Faithful Geyser of California", county:"Napa", cat:"Natural Feature",
    lat:38.7969, lon:-122.6064,
    fact:"The Old Faithful Geyser of Calistoga is one of only three regularly erupting geysers in the world, shooting 350-degree water 60 feet into the air roughly every 30 minutes. Its timing has been shown to predict earthquakes — its interval shortens significantly in the days before a major seismic event." },
  { name:"Jelly Belly Factory, Fairfield", county:"Solano", cat:"Industrial",
    lat:38.2786, lon:-122.0278,
    fact:"The Jelly Belly Factory in Fairfield offers free factory tours showing the complete candy-making process. The factory produces over 100 official flavors and runs continuously 24 hours a day, 5 days a week." },
  { name:"Armstrong Redwoods", county:"Sonoma", cat:"State Park",
    lat:38.7389, lon:-123.0022,
    fact:"Armstrong Redwoods preserves a grove of old-growth coast redwoods saved by lumberman Colonel James Armstrong, who logged the surrounding hills but preserved this grove for its beauty. The Colonel Armstrong Tree, at 1,400 years old, was already 400 years old when Columbus reached the Americas." },
];

// ── Build the dropdown ──────────────────────────────────────
const select = document.getElementById('landmarkSelect');
TEST_LANDMARKS.forEach((lm, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = `${lm.name} — ${lm.county}`;
  select.appendChild(opt);
});

// ── Init the guide ──────────────────────────────────────────
const guide = new GeminiTourGuide({
  apiKey: 'AIzaSyA18s-AvX9YnZECBtMMziSJt6CMwjCsjTI',
  allLandmarks: TEST_LANDMARKS,

  onToken: (token) => {
    const box = document.getElementById('narrationBox');
    if (box.textContent === 'Tap Listen to start the tour.') box.textContent = '';
    box.textContent += token;
    box.scrollTop = box.scrollHeight;
  },

  onSpeakStart: () => {
    document.getElementById('narrationBox').classList.add('speaking');
    document.getElementById('listenBtn').classList.add('active');
    document.getElementById('listenBtn').textContent = '🔊 Speaking…';
    setDot('speaking');
  },

  onSpeakEnd: () => {
    document.getElementById('narrationBox').classList.remove('speaking');
    document.getElementById('listenBtn').classList.remove('active');
    document.getElementById('listenBtn').textContent = '🎧 Listen';
    setDot('active');
  },

  onStatusChange: (status) => {
    const labels = {
      idle:       'Ready',
      narrating:  'Narrating landmark…',
      bridging:   'Bridging to next topic…',
      filling:    'Filling dead air…',
    };
    document.getElementById('statusText').textContent = labels[status] || status;
    addLog(status, 'info');
  },

  onError: (err) => {
    addLog('ERROR: ' + err, 'error');
    setDot('error');
    document.getElementById('statusText').textContent = 'Error — check log';
  },
});

// ── Button handlers ─────────────────────────────────────────
window.handleListen = () => {
  if (!guide.apiKey) { alert('Paste your Gemini API key first and tap Save Key.'); return; }
  const lm = TEST_LANDMARKS[parseInt(select.value)];
  document.getElementById('narrationBox').textContent = '';
  addLog(`Starting landmark: ${lm.name}`);
  guide.startLandmark(lm);
};

window.handleContinue = () => {
  if (!guide.apiKey) return;
  addLog('Manual: keep going');
  guide.continueNarration();
};

window.handleStop = () => {
  guide.stop();
  document.getElementById('listenBtn').classList.remove('active');
  document.getElementById('listenBtn').textContent = '🎧 Listen';
  setDot('');
  addLog('Stopped.');
};

  document.getElementById('apiKeyInput').value = '••••••••••••••••';
  document.getElementById('statusText').textContent = 'Ready — pick a landmark and tap Listen';
  setDot('active');

// ── GPS display ─────────────────────────────────────────────
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    const { latitude: lat, longitude: lon, speed } = pos.coords;
    const spd = speed != null ? `${(speed * 2.237).toFixed(1)} mph` : '—';
    document.getElementById('gpsInfo').textContent =
      `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}  |  Speed: ${spd}`;
  }, () => {
    document.getElementById('gpsInfo').textContent = 'GPS: permission denied or unavailable';
  }, { enableHighAccuracy: true });
}

// ── Helpers ─────────────────────────────────────────────────
function setDot(type) {
  const dot = document.getElementById('statusDot');
  dot.className = 'dot' + (type ? ' ' + type : '');
}

function addLog(msg, type = 'entry') {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = `log-entry ${type}`;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
