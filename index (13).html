<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoadGuide">
<meta name="theme-color" content="#080c14">
<title>RoadGuide California</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<!-- Landmark data files — order matters: core files first, film last (optional) -->
<script src="landmarks.js"></script>
<script src="landmarks_south.js"></script>
<script src="landmarks_topup.js"></script>
<script src="landmarks_valley.js"></script>

<style>
:root{
  --ink:#080c14; --gold:#c9a84c; --glo:#e8c97a; --gdim:rgba(201,168,76,.35);
  --pale:#eef2ff; --dim:rgba(220,228,255,.45); --card:rgba(255,255,255,.05);
  --edge:rgba(255,255,255,.09); --green:#50c880; --red:#e05555;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--ink);color:var(--pale);font-family:'DM Sans',sans-serif;}

/* Sky */
#sky{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(18,34,68,.9) 0%,transparent 100%),
             radial-gradient(ellipse 60% 60% at 85% 90%,rgba(10,18,38,.95) 0%,transparent 100%),var(--ink);}
#sky::before{content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 8%  12%,rgba(255,255,255,.60) 0%,transparent 100%),
    radial-gradient(1.0px 1.0px at 23% 45%,rgba(255,255,255,.30) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 52%  8%,rgba(201,168,76,.40)  0%,transparent 100%),
    radial-gradient(1.0px 1.0px at 71% 67%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1.2px 1.2px at 38% 82%,rgba(255,255,255,.40) 0%,transparent 100%),
    radial-gradient(1.0px 1.0px at 88% 28%,rgba(255,255,255,.50) 0%,transparent 100%);}

/* App shell */
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}

/* Header */
#hdr{flex-shrink:0;padding:env(safe-area-inset-top,44px) 20px 14px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;line-height:1;}
.logo-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-top:3px;}
.hd-r{text-align:right;}
.hd-r p{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.5px;}
.hd-r span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--glo);}

/* Scan bar */
#scanbar{flex-shrink:0;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;}
#scanfill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(201,168,76,.3),var(--gold));width:0%;transition:width 1s linear;}

/* Category filter bar */
#catBar{flex-shrink:0;padding:9px 14px 5px;border-bottom:1px solid rgba(255,255,255,.05);}
#catBarLabel{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2.5px;color:rgba(201,168,76,.35);text-transform:uppercase;margin-bottom:7px;}
#catScroll{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none;}
#catScroll::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.4px;color:rgba(220,228,255,.45);cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-appearance:none;}
.cat-chip:active{transform:scale(.95);}
.cat-chip.active{background:rgba(201,168,76,.16);border-color:rgba(201,168,76,.55);color:#e8c97a;}
#catCount{font-family:'DM Mono',monospace;font-size:8px;color:rgba(201,168,76,.3);margin-top:5px;letter-spacing:.5px;min-height:12px;}

/* Scrollable content */
#scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 40px;}
#scr::-webkit-scrollbar{display:none;}

/* LISTEN button */
#listenWrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 0 16px;}
#listenBtn{display:flex;align-items:center;gap:14px;padding:14px 36px;border-radius:50px;cursor:pointer;border:1.5px solid rgba(201,168,76,.45);background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));transition:all .25s;-webkit-appearance:none;}
#listenBtn.speaking{border-color:rgba(80,200,128,.55);background:linear-gradient(135deg,rgba(80,200,128,.14),rgba(80,200,128,.03));}
#listenBtn:active{transform:scale(.96);}
.lb-icon{font-size:24px;}
.lb-text{display:flex;flex-direction:column;}
.lb-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--glo);}
#listenBtn.speaking .lb-main{color:#6ecf9c;}
.lb-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--gdim);text-transform:uppercase;}
#voiceWrap{display:flex;align-items:center;gap:6px;}
#voiceWrap label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--gdim);text-transform:uppercase;}
#voiceSelect{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:var(--pale);font-family:'DM Mono',monospace;font-size:9px;padding:4px 8px;-webkit-appearance:none;appearance:none;cursor:pointer;max-width:180px;text-overflow:ellipsis;}
#voiceSelect:focus{outline:none;border-color:rgba(201,168,76,.5);}
#listenBtn.speaking .lb-sub{color:rgba(80,200,128,.55);}

/* Status bar */
#status{display:flex;align-items:center;gap:8px;padding:8px 13px;margin-bottom:14px;background:var(--card);border:1px solid var(--edge);border-radius:10px;font-family:'DM Mono',monospace;font-size:10px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.idle{background:rgba(220,228,255,.3);}
.dot.gps{background:var(--gold);animation:blink 1.2s ease-in-out infinite;}
.dot.live{background:var(--green);animation:blink 2.5s ease-in-out infinite;}
.dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
#stmsg{flex:1;color:var(--dim);}

/* Landmark cards (top 2) */
#cards{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.card{border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.card.rank-1{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 1px rgba(201,168,76,.1),0 8px 32px rgba(0,0,0,.4);}
.card.rank-2{border-color:rgba(201,168,76,.18);}
.card-img{width:100%;height:120px;object-fit:cover;display:block;}
.card-emoji{width:100%;height:120px;display:none;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.85));}
.card-body{padding:13px 15px 14px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.card-meta{flex:1;}
.card-rank{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:1px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--pale);line-height:1.05;}
.card-county{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;}
.card-dist-wrap{text-align:right;flex-shrink:0;}
.card-dist{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--glo);line-height:1;}
.card-unit{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gdim);display:block;}
.card-dir{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:1px;}
.divider{width:100%;height:1px;background:rgba(255,255,255,.06);margin-bottom:9px;}
.card-fact{font-size:13px;line-height:1.68;font-weight:300;color:rgba(220,228,255,.85);}
.card-fact em{color:var(--glo);font-style:normal;font-weight:500;}
.card-placeholder{height:120px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px;font-style:italic;padding:20px;text-align:center;}

/* Separator + list */
.sep{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.18),transparent);margin:6px 0 12px;}
#listLabel{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
#list{display:flex;flex-direction:column;gap:6px;}
.litem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.litem:active{border-color:rgba(201,168,76,.3);}
.litem-em{font-size:18px;flex-shrink:0;width:30px;text-align:center;}
.litem-info{flex:1;min-width:0;}
.litem-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.litem-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:1px;}
.litem-dist{font-family:'DM Mono',monospace;font-size:11px;color:var(--glo);flex-shrink:0;}
.litem-thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06);}
.litem-thumb-em{width:46px;height:46px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.85));display:flex;align-items:center;justify-content:center;font-size:22px;}

/* GPS coords bar */
#gpsBar{padding:8px 12px;background:var(--card);border:1px solid var(--edge);border-radius:10px;margin-top:12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap;}

/* Landmark detail overlay */
#overlay{position:fixed;inset:0;z-index:100;background:rgba(8,12,20,.92);display:none;align-items:flex-end;justify-content:stretch;padding:12px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
#overlay.open{display:flex;}
#ocard{width:100%;border-radius:20px;overflow:hidden;background:linear-gradient(160deg,#0f1829,#080c14);border:1px solid rgba(201,168,76,.4);box-shadow:0 -8px 60px rgba(0,0,0,.7);max-height:88vh;display:flex;flex-direction:column;}
#oImg{width:100%;height:160px;object-fit:cover;display:block;flex-shrink:0;}
#oEmoji{width:100%;height:160px;display:none;align-items:center;justify-content:center;font-size:70px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.9));flex-shrink:0;}
#obody{padding:16px 18px 20px;overflow-y:auto;}
#otop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
#ometa{flex:1;}
#otag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
#oname{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
#odist{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:4px;}
#odist b{color:var(--glo);font-weight:400;}
#oclose{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--dim);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;}
#ofact{font-size:14px;line-height:1.7;font-weight:300;margin-bottom:16px;}
#ofact em{color:var(--glo);font-style:normal;font-weight:500;}
/* Film entry structured format */
.film-row{display:flex;flex-direction:column;gap:3px;padding:7px 0;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.06);}
.film-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.film-val{font-size:13px;line-height:1.6;font-weight:300;color:rgba(220,228,255,.9);}
.card-fact .film-row{padding:7px 10px;margin-bottom:6px;}
.card-fact .film-label{font-size:7px;}
.card-fact .film-val{font-size:12px;}

/* Overlay listen button */
#olistenWrap{display:flex;justify-content:center;}
#olistenBtn{display:flex;align-items:center;gap:10px;padding:11px 32px;border-radius:50px;cursor:pointer;border:1.5px solid rgba(201,168,76,.5);background:linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.04));font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--glo);-webkit-appearance:none;transition:all .2s;}
#olistenBtn:active{transform:scale(.96);}
#olistenBtn.speaking{border-color:rgba(80,200,128,.55);background:linear-gradient(135deg,rgba(80,200,128,.14),rgba(80,200,128,.03));color:#6ecf9c;}
</style>
</head>
<body>

<div id="sky"></div>

<!-- Detail overlay (tap landmark to open) -->
<div id="overlay" onclick="closeOverlay(event)">
  <div id="ocard">
    <img id="oImg" src="" alt=""
      onerror="this.style.display='none';document.getElementById('oEmoji').style.display='flex'">
    <div id="oEmoji"></div>
    <div id="obody">
      <div id="otop">
        <div id="ometa">
          <div id="otag"></div>
          <div id="oname"></div>
          <div id="odist"></div>
        </div>
        <button id="oclose" onclick="closeOverlay()">✕</button>
      </div>
      <div id="ofact"></div>
      <div id="olistenWrap">
        <button id="olistenBtn" onclick="overlayListen()">🔊 Listen</button>
      </div>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app">

  <div id="hdr">
    <div>
      <div class="logo">RoadGuide</div>
      <div class="logo-tag">California</div>
    </div>
    <div class="hd-r">
      <p>LANDMARKS <span id="tc">—</span></p>
      <p>NEARBY <span id="dc">—</span></p>
    </div>
  </div>

  <div id="scanbar"><div id="scanfill"></div></div>

  <!-- Category filter chips -->
  <div id="catBar">
    <div id="catBarLabel">Filter by Category</div>
    <div id="catScroll">
      <button class="cat-chip active" onclick="setCat(null,this)">All</button>
      <button class="cat-chip" onclick="setCat('film',this)">🎬 Movie &amp; TV</button>
      <button class="cat-chip" onclick="setCat('historic',this)">🏛 Historic</button>
      <button class="cat-chip" onclick="setCat('nature',this)">🌿 Nature</button>
      <button class="cat-chip" onclick="setCat('winery',this)">🍷 Winery</button>
      <button class="cat-chip" onclick="setCat('beach',this)">🏖 Beach</button>
      <button class="cat-chip" onclick="setCat('park',this)">🌲 Parks</button>
      <button class="cat-chip" onclick="setCat('museum',this)">🔭 Museums</button>
      <button class="cat-chip" onclick="setCat('trail',this)">🥾 Trails</button>
      <button class="cat-chip" onclick="setCat('wildlife',this)">🦅 Wildlife</button>
      <button class="cat-chip" onclick="setCat('lighthouse',this)">🔦 Lighthouse</button>
      <button class="cat-chip" onclick="setCat('geological',this)">🪨 Geological</button>
      <button class="cat-chip" onclick="setCat('mission',this)">⛪ Missions</button>
    </div>
    <div id="catCount"></div>
  </div>

  <div id="scr">

    <!-- LISTEN button — always narrates #1 nearest landmark -->
    <div id="listenWrap">
      <button id="listenBtn" onclick="topListen()">
        <div class="lb-icon">🔊</div>
        <div class="lb-text">
          <div class="lb-main" id="listenLabel">LISTEN</div>
          <div class="lb-sub" id="listenSub">Tap to hear nearest landmark</div>
        </div>
      </button>
      <div id="voiceWrap">
        <label for="voiceSelect">🗣 Voice</label>
        <select id="voiceSelect" onchange="saveVoice()"></select>
      </div>
    </div>

    <!-- GPS status indicator -->
    <div id="status">
      <div class="dot gps" id="dot"></div>
      <div id="stmsg">Locating you…</div>
    </div>

    <!-- Top 2 nearest landmark cards — auto-update with GPS -->
    <div id="cards">
      <div class="card" id="card0" onclick="cardClick(0)">
        <div class="card-placeholder">Nearest landmark will appear here</div>
      </div>
      <div class="card" id="card1" onclick="cardClick(1)">
        <div class="card-placeholder">2nd nearest will appear here</div>
      </div>
    </div>

    <div class="sep"></div>
    <div id="listLabel">Next Nearest</div>
    <div id="list"></div>

    <div id="gpsBar">
      <span id="gLat">LAT —</span>
      <span id="gLon">LON —</span>
      <span id="gSpd">SPD —</span>
      <span id="gAcc">ACC —</span>
    </div>

  </div><!-- /scr -->
</div><!-- /app -->

<script>
// ─────────────────────────────────────────────────────────
// BUILD MASTER LANDMARK ARRAY FROM ALL LOADED JS FILES
// Handles: LANDMARKS, LANDMARKS_SOUTH, LANDMARKS_TOPUP
// and landmarks_bayarea_film (different schema — optional)
// ─────────────────────────────────────────────────────────

// ── Film & TV Landmarks (inlined — correct schema matching landmarks.js) ──
var FILM_LANDMARKS = [
{ name:"Mrs. Doubtfire House", county:"San Francisco", emoji:"🎬", lat:37.7939, lon:-122.4364, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Mrs._Doubtfire_house_San_Francisco.jpg/320px-Mrs._Doubtfire_house_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Mrs. Doubtfire (1993)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The iconic Victorian at 2640 Steiner St where Daniel Hillard disguised himself as a British nanny — every exterior home scene was filmed here.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The real address matches the movie address exactly. Fans still leave flowers and notes on the front steps.</span></div>" },
{ name:"The Painted Ladies", county:"San Francisco", emoji:"🎬", lat:37.7763, lon:-122.4328, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Painted_Ladies_San_Francisco_with_skyline.jpg/320px-Painted_Ladies_San_Francisco_with_skyline.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Full House (1987–1995)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>These seven Victorians on Alamo Square appeared in the Full House opening credits, with the Tanner family picnicking in the park as the skyline glittered behind them.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The actual Tanner house used for exterior shots is 1709 Broderick St — four blocks away from the Painted Ladies.</span></div>" },
{ name:"Palace of Fine Arts", county:"San Francisco", emoji:"🎬", lat:37.8029, lon:-122.4484, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Palace_of_Fine_Arts_San_Francisco.jpg/320px-Palace_of_Fine_Arts_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Rock (1996) / Vertigo (1958)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>In The Rock, Nicolas Cage and Sean Connery meet here in a tense handoff. Hitchcock filmed key Vertigo scenes in and around this rotunda.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Built as a temporary structure for the 1915 World's Fair out of plaster — San Franciscans refused to tear it down.</span></div>" },
{ name:"Lombard Street", county:"San Francisco", emoji:"🎬", lat:37.8021, lon:-122.4186, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Lombard_street_in_SF_4.jpg/320px-Lombard_street_in_SF_4.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Ant-Man (2015) / Bullitt (1968)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Crookedest Street in the World has anchored SF car chase sequences for decades. Bullitt's iconic chase wound through these streets; Ant-Man used it for a shrunken-down pursuit.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The speed limit is only 5 mph — making filmed chases here look far more dramatic than they were to shoot.</span></div>" },
{ name:"Alcatraz Island", county:"San Francisco", emoji:"🎬", lat:37.8270, lon:-122.4230, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Alcatraz_Island_as_seen_from_above.jpg/320px-Alcatraz_Island_as_seen_from_above.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Escape from Alcatraz (1979) / The Rock (1996)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Clint Eastwood's escape thriller was partially filmed on the actual island. The Rock used Alcatraz as its primary setting for the entire hostage crisis storyline.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Filming The Rock required nights on the island — crew members reported hearing unexplained sounds in the cellblock after dark.</span></div>" },
{ name:"Fort Point", county:"San Francisco", emoji:"🎬", lat:37.8103, lon:-122.4772, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Fort_Point_from_Golden_Gate_Bridge.jpg/320px-Fort_Point_from_Golden_Gate_Bridge.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Vertigo (1958) / Dawn of the Planet of the Apes (2014)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Hitchcock's most famous image: Scottie pulls Madeleine from the bay directly below the Golden Gate Bridge. Dawn of the Apes used it as a key ape territory boundary.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Bridge engineers wanted to demolish Fort Point. Strauss instead built a special arch over it — you can stand inside the fort and look straight up at the bridge.</span></div>" },
{ name:"Chinatown Gate", county:"San Francisco", emoji:"🎬", lat:37.7907, lon:-122.4056, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Dragon_Gate_San_Francisco.jpg/320px-Dragon_Gate_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Big Trouble in Little China (1986)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Jack Burton drives his big rig through this gate at the start of his adventure into the supernatural underworld of SF's Chinatown in John Carpenter's cult classic.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>This Dragon Gate is the only authentic Chinatown ceremonial gate in the US with stone guardian lions flanking both sides.</span></div>" },
{ name:"Coit Tower", county:"San Francisco", emoji:"🎬", lat:37.8024, lon:-122.4058, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Coit_Tower%2C_SF.jpg/320px-Coit_Tower%2C_SF.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Enforcer (1976) / San Andreas (2015)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Coit Tower served as a dramatic backdrop for multiple Dirty Harry films. In San Andreas, Dwayne Johnson's helicopter rescue sequence sweeps past it as the city crumbles.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The tower's Depression-era murals caused a near-scandal in 1934 — officials tried to paint over the communist imagery before public outrage stopped them.</span></div>" },
{ name:"San Francisco City Hall", county:"San Francisco", emoji:"🎬", lat:37.7793, lon:-122.4193, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/San_Francisco_City_Hall_at_night.jpg/320px-San_Francisco_City_Hall_at_night.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Raiders of the Lost Ark (1981) / Milk (2008)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The grand rotunda doubled as the U.S. Capitol for Raiders of the Lost Ark. Gus Van Sant filmed Harvey Milk's political scenes here for the 2008 biopic.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The dome is the fifth largest in the world — three feet taller than the U.S. Capitol dome in Washington D.C.</span></div>" },
{ name:"555 California Street", county:"San Francisco", emoji:"🎬", lat:37.7922, lon:-122.4038, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/555_California_Street_2.jpg/320px-555_California_Street_2.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Towering Inferno (1974)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>This skyscraper represented the fictional Glass Tower in the disaster epic, with Steve McQueen and Paul Newman racing to save survivors from a 138-story inferno.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The film so terrified the public it changed high-rise fire safety codes nationwide. It was the tallest building in SF for nearly 50 years.</span></div>" },
{ name:"The Fairmont Hotel", county:"San Francisco", emoji:"🎬", lat:37.7925, lon:-122.4103, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Fairmont_Hotel_SF.jpg/320px-Fairmont_Hotel_SF.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Rock (1996) / Shang-Chi (2021)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Rock's villain holds his hostage crisis briefing in the Fairmont's ornate ballroom. Marvel's Shang-Chi filmed its opening SF action sequences around Nob Hill.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The Fairmont is where the original United Nations Charter was drafted in 1945 — in the very ballroom used in The Rock.</span></div>" },
{ name:"Mission Dolores Park", county:"San Francisco", emoji:"🎬", lat:37.7596, lon:-122.4269, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Mission_Dolores_Basilica.jpg/320px-Mission_Dolores_Basilica.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Milk (2008)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Harvey Milk held his famous political rallies at Dolores Park — it became the symbolic heart of the Castro neighborhood's fight for equality in the film.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The park offers what cinematographers call the truest wide view of the SF skyline — it has appeared in dozens of films and TV shows.</span></div>" },
{ name:"Grace Cathedral", county:"San Francisco", emoji:"🎬", lat:37.7919, lon:-122.4128, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Grace_Cathedral_San_Francisco.jpg/320px-Grace_Cathedral_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Bullitt (1968)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Gothic towers of Grace Cathedral appear in several atmospheric sequences in Bullitt — director Peter Yates wanted the imposing stonework as a contrast to the raw action.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Grace Cathedral contains two labyrinths for walking meditation — one inside on the nave floor, and one outside in terrazzo stone.</span></div>" },
{ name:"Ferry Building", county:"San Francisco", emoji:"🎬", lat:37.7956, lon:-122.3935, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/San_Francisco_Ferry_Building.jpg/320px-San_Francisco_Ferry_Building.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Hulk (2003)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>In Ang Lee's Hulk, Bruce Banner's alter ego tears through the Embarcadero and battles military helicopters directly in front of the Ferry Building's clock tower.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The Ferry Building's clock kept running through the catastrophic 1906 earthquake — it became a symbol of SF resilience and appeared on early postcards of the rebuilt city.</span></div>" },
{ name:"Kezar Stadium", county:"San Francisco", emoji:"🎬", lat:37.7670, lon:-122.4556, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Kezar_Stadium_Aerial.jpg/320px-Kezar_Stadium_Aerial.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Dirty Harry (1971)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The stadium's empty field at night is where the Scorpio killer forces Harry Callahan on a humiliating chase — culminating in the famous Do you feel lucky, punk? confrontation.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Kezar was the original home of the San Francisco 49ers from 1946 to 1970.</span></div>" },
{ name:"Musee Mecanique", county:"San Francisco", emoji:"🎬", lat:37.8095, lon:-122.4163, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mus%C3%A9e_M%C3%A9canique_San_Francisco.jpg/320px-Mus%C3%A9e_M%C3%A9canique_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Princess Diaries (2001)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The antique penny arcade at Fisherman's Wharf is where Princess Mia has her first joyful moments in San Francisco before discovering her royal lineage.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Many of the 300+ mechanical arcade machines here are over 100 years old and still operate on quarters — one of the largest private antique arcade collections in the world.</span></div>" },
{ name:"Castro Theatre", county:"San Francisco", emoji:"🎬", lat:37.7620, lon:-122.4347, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Castro_Theatre_San_Francisco.jpg/320px-Castro_Theatre_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Milk (2008)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Castro Theatre was Harvey Milk's neighborhood cinema. Gus Van Sant filmed key scenes here capturing it as the cultural heart of the gay rights movement.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The Castro Theatre has a custom-built pipe organ that rises from below the stage before every screening — a beloved tradition that continues today.</span></div>" },
{ name:"Twin Peaks", county:"San Francisco", emoji:"🎬", lat:37.7544, lon:-122.4477, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/San_Francisco_from_Twin_Peaks.jpg/320px-San_Francisco_from_Twin_Peaks.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Memoirs of an Invisible Man (1992)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Twin Peaks is the go-to location for sweeping city-overview shots. Chevy Chase's invisible protagonist uses the hilltop sightlines to orient himself while evading government agents.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Spanish explorers named these hills Los Pechos de la Chola. The name was quietly changed to Twin Peaks during the American period.</span></div>" },
{ name:"Cable Car Turnaround", county:"San Francisco", emoji:"🎬", lat:37.7845, lon:-122.4080, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/San_Francisco_Cable_Car_at_Powell_and_Market.jpg/320px-San_Francisco_Cable_Car_at_Powell_and_Market.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Princess Diaries (2001) / Venom (2018)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Powell Street cable car turnaround is one of the most filmed transit locations in the world. Princess Mia rides it in her transformation montage; Venom's chase sequences use the surrounding streets.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>These are the last manually operated cable cars in existence anywhere in the world. Tourists are invited to help push the car around the turntable.</span></div>" },
{ name:"St. Peter and Paul Church", county:"San Francisco", emoji:"🎬", lat:37.8016, lon:-122.4102, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Saints_Peter_and_Paul_Church_San_Francisco.jpg/320px-Saints_Peter_and_Paul_Church_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Sister Act (1992)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The North Beach church's soaring twin spires provided the setting for Whoopi Goldberg's choir scenes as Sister Mary Clarence transforms the parish choir into a gospel sensation.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Marilyn Monroe and Joe DiMaggio took their wedding photographs on these steps in 1954 — though they married at City Hall, the church would not perform the ceremony.</span></div>" },
{ name:"Lafayette Park SF", county:"San Francisco", emoji:"🎬", lat:37.7914, lon:-122.4277, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Lafayette_Park_San_Francisco.jpg/320px-Lafayette_Park_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Wedding Planner (2001)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>This hilltop park in Pacific Heights is where Jennifer Lopez and Matthew McConaughey meet by chance — the meet-cute scene that sets the entire film in motion.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Lafayette Park was the site of a 40-year legal battle after a squatter built a mansion in the middle of the public park in the 1880s and refused to leave.</span></div>" },
{ name:"Pier 7 San Francisco", county:"San Francisco", emoji:"🎬", lat:37.7994, lon:-122.3970, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Embarcadero_San_Francisco.jpg/320px-Embarcadero_San_Francisco.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Ant-Man and the Wasp (2018)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The longest wooden pier on the SF waterfront was used for chase and shrinking sequences — its straight lines made it ideal for the visual effects team.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Pier 7 is perfectly aligned with the Transamerica Pyramid when viewed from the Embarcadero — a sight line that appears in countless films and photographs of the city.</span></div>" },
{ name:"Bridges Restaurant Danville", county:"Contra Costa", emoji:"🎬", lat:37.8228, lon:-122.0004, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Bridges_restaurant_Danville_California.jpg/320px-Bridges_restaurant_Danville_California.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Mrs. Doubtfire (1993)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The film's most memorable sequence — Robin Williams races back and forth to the bathroom switching between Mrs. Doubtfire and Daniel Hillard for two different tables at the same restaurant.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The restaurant is still open today and looks remarkably similar to 1993. Staff will point out the exact tables used in the scene.</span></div>" },
{ name:"Orinda Theatre Film", county:"Contra Costa", emoji:"🎬", lat:37.8824, lon:-122.1831, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Orinda_Theatre.jpg/320px-Orinda_Theatre.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>13 Reasons Why (2017)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Orinda Theatre's stunning Art Deco exterior appears as a backdrop in Netflix's 13 Reasons Why, standing in for the small-town movie house central to the show's Northern California setting.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The neon tower was declared a historic landmark after a community campaign in the 1990s saved it from demolition.</span></div>" },
{ name:"Alameda Naval Air Station", county:"Alameda", emoji:"🎬", lat:37.7554, lon:-122.2285, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/USS_Potomac_Oakland.jpg/320px-USS_Potomac_Oakland.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Matrix Reloaded (2003)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Wachowskis filmed the legendary 14-minute freeway chase on a 1.5-mile fake highway built on the decommissioned base runways — one of the most expensive single action sequences ever filmed.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The crew spent 6 months and $40 million building the fake highway. The sequence required 300 stunt performers and took 3 months to film.</span></div>" },
{ name:"UC Berkeley Sather Gate", county:"Alameda", emoji:"🎬", lat:37.8721, lon:-122.2590, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Campanile_UC_Berkeley.jpg/320px-Campanile_UC_Berkeley.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Oppenheimer (2023) / The Graduate (1967)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Sather Gate is the iconic campus entrance seen in Oppenheimer's Berkeley scenes. Dustin Hoffman's Benjamin Braddock also walks through this gate in The Graduate.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The free speech movement protests of the 1960s centered on the plaza just outside this gate — some of the most consequential student demonstrations in American history.</span></div>" },
{ name:"Grand Lake Theatre Oakland", county:"Alameda", emoji:"🎬", lat:37.8115, lon:-122.2475, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Grand_Lake_Theatre_Oakland.jpg/320px-Grand_Lake_Theatre_Oakland.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Sorry to Bother You (2018)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Grand Lake Theatre's ornate facade appears in Boots Riley's surrealist Oakland satire, grounding the film's heightened reality in a recognizable East Bay landmark.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The Grand Lake Theatre is famous for using its marquee to post political messages to the city — as well known for its commentary as for its films.</span></div>" },
{ name:"Marin Civic Center", county:"Marin", emoji:"🎬", lat:37.9984, lon:-122.5312, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Marin_County_Civic_Center_Aerial.jpg/320px-Marin_County_Civic_Center_Aerial.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Gattaca (1997) / THX 1138 (1971)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Frank Lloyd Wright's masterpiece served as the futuristic society headquarters in Gattaca — its sweeping arches needed almost no modification to read as a utopian sci-fi world.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>George Lucas used this building as his primary design reference for the city of Naboo in the Star Wars prequel trilogy.</span></div>" },
{ name:"Muir Woods", county:"Marin", emoji:"🎬", lat:37.8970, lon:-122.5811, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Muir_Woods_National_Monument.jpg/320px-Muir_Woods_National_Monument.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>Rise of the Planet of the Apes (2011)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Caesar and the liberated apes take refuge in Muir Woods' ancient redwood groves in the film's triumphant final act — the forest's cathedral-like scale made it the perfect sanctuary.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The redwoods here are between 500 and 1,200 years old. The tallest is 258 feet — taller than the Statue of Liberty from base to torch.</span></div>" },
{ name:"Point Reyes Lighthouse", county:"Marin", emoji:"🎬", lat:38.0037, lon:-123.0233, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Point_Reyes_Lighthouse_2016.jpg/320px-Point_Reyes_Lighthouse_2016.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Fog (1980)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>John Carpenter used the remote wind-battered Point Reyes Lighthouse as the primary setting — the keeper's isolation and coastal fog made it perfect for his atmospheric horror film.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>You must walk down 313 steps to reach the lighthouse. On windy days the National Park Service closes the stairs entirely.</span></div>" },
{ name:"Santa Cruz Beach Boardwalk", county:"Santa Cruz", emoji:"🎬", lat:36.9644, lon:-122.0189, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Santa_Cruz_Beach_Boardwalk_2012.jpg/320px-Santa_Cruz_Beach_Boardwalk_2012.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Lost Boys (1987) / Us (2019)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>The Boardwalk's neon-lit carousel set the tone of The Lost Boys — it's where the teenage vampires hunt. Jordan Peele returned for the eerie funhouse sequences in Us.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>The Giant Dipper wooden roller coaster opened in 1924, is a National Historic Landmark, and was still running when The Lost Boys filmed here — and still runs today.</span></div>" },
{ name:"Potter Schoolhouse", county:"Sonoma", emoji:"🎬", lat:38.3452, lon:-122.9739, cat:"Movie & TV Film", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Potter_Schoolhouse_Bodega.jpg/320px-Potter_Schoolhouse_Bodega.jpg", fact:"<div class='film-row'><span class='film-label'>🎬 Movie</span><span class='film-val'>The Birds (1963)</span></div><div class='film-row'><span class='film-label'>🎥 The Scene</span><span class='film-val'>Alfred Hitchcock chose this 1873 schoolhouse for the harrowing scene where children flee across an open field as seagulls dive-bomb them — one of the most iconic images in horror history.</span></div><div class='film-row'><span class='film-label'>⭐ Fun Fact</span><span class='film-val'>Hitchcock found the schoolhouse being used as a private residence. His crew artificially aged the building to look more weathered before filming.</span></div>" },

var ALL_LANDMARKS = (function() {
  var seen = {};
  var out  = [];

  // Normalise any landmark object to our standard schema
  function norm(lm) {
    // coords: support both flat lat/lon and nested coords:{lat,lng}
    var lat = (lm.lat != null) ? lm.lat : (lm.coords ? lm.coords.lat : null);
    var lon = (lm.lon != null) ? lm.lon
            : (lm.coords ? (lm.coords.lon != null ? lm.coords.lon : lm.coords.lng) : null);

    // photo: support both 'photo' and 'image' fields
    var photo = lm.photo || lm.image || '';

    // fact: plain landmarks use 'fact'; film entries get structured 3-part card
    var fact = lm.fact || '';
    if (!fact && lm.media) {
      fact = '<div class="film-row"><span class="film-label">🎬 Movie</span><span class="film-val">' + (lm.media || '') + '</span></div>'
           + '<div class="film-row"><span class="film-label">🎥 The Scene</span><span class="film-val">' + (lm.scene || lm.history || '') + '</span></div>'
           + '<div class="film-row"><span class="film-label">⭐ Fun Fact</span><span class="film-val">' + (lm.fun_fact || '') + '</span></div>';
    }

    // cat: film entries with no cat get assigned one
    var cat = lm.cat || '';
    if (!cat && lm.media) cat = 'Movie & TV Film';

    return {
      name:   lm.name   || '',
      county: lm.county || '',
      emoji:  lm.emoji  || '📍',
      lat:    lat,
      lon:    lon,
      cat:    cat,
      photo:  photo,
      fact:   fact
    };
  }

  // Merge an array of raw landmark objects
  function merge(arr) {
    if (!arr || !arr.length) return;
    for (var i = 0; i < arr.length; i++) {
      var n   = norm(arr[i]);
      if (!n.lat || !n.lon || !n.name) continue;   // skip invalid
      var key = n.name.toLowerCase().trim();
      if (seen[key]) continue;                      // deduplicate
      seen[key] = true;
      out.push(n);
    }
  }

  // Pull from each file — graceful if a file didn't load
  if (typeof LANDMARKS             !== 'undefined') merge(LANDMARKS);
  if (typeof LANDMARKS_SOUTH       !== 'undefined') merge(LANDMARKS_SOUTH);
  if (typeof LANDMARKS_TOPUP       !== 'undefined') merge(LANDMARKS_TOPUP);
  if (typeof LANDMARKS_VALLEY       !== 'undefined') merge(LANDMARKS_VALLEY);
  merge(FILM_LANDMARKS);

  return out;
})();

document.getElementById('tc').textContent = ALL_LANDMARKS.length;

// STATE

var userLat         = null;
var userLon         = null;
var sorted          = [];
var overlayLandmark = null;
var activeCategory  = null;

// ─────────────────────────────────────────────────────────
// CATEGORY FILTER
// ─────────────────────────────────────────────────────────
function setCat(cat, el) {
  activeCategory = cat;
  var chips = document.querySelectorAll('.cat-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  sortAndRender();
}

function getFiltered() {
  if (!activeCategory) return ALL_LANDMARKS;
  var c = activeCategory;
  return ALL_LANDMARKS.filter(function(lm) {
    var cat = (lm.cat || '').toLowerCase();
    if (c === 'historic')   return /historic|fort|ruin|memorial|cemetery|adobe|plaza|landmark|shipyard|powder|arsenal|ranch|district|neighborhood|hotel|theater|theatre|town|building|farm|ship|prison|ruins|hacienda|estate/.test(cat);
    if (c === 'nature')     return /natural|geological|wetland|marsh|lagoon|estuary|waterway|mountain|reservoir|lake|valley|open space|forest|bay|dune|canyon|wilderness|waterfall|feature|creek|river|natural area/.test(cat);
    if (c === 'winery')     return /winery|wine|vineyard|wine region/.test(cat);
    if (c === 'beach')      return /beach|shoreline|cove|coast/.test(cat);
    if (c === 'park')       return /park|preserve|recreation|garden/.test(cat);
    if (c === 'museum')     return /museum|science|planetarium|aquarium|space|zoo|observatory/.test(cat);
    if (c === 'trail')      return /trail|route|railway|parkway/.test(cat);
    if (c === 'wildlife')   return /wildlife|refuge|bird|animal|wetland|slough/.test(cat);
    if (c === 'military')   return /military|naval|army|prison|ship|fort/.test(cat);
    if (c === 'lighthouse') return /lighthouse/.test(cat);
    if (c === 'film')       return /movie|tv|film/.test(cat);
    if (c === 'geological') return /geological|fault|volcanic|geo|mine|quicksilver/.test(cat);
    if (c === 'mission')    return /mission/.test(cat);
    if (c === 'industrial') return /industrial|refinery|infrastructure|facility|airport|stadium|factory|plant|power/.test(cat);
    if (c === 'education')  return /education|university|college|campus|school/.test(cat);
    if (c === 'market')     return /market|fairground/.test(cat);
    if (c === 'energy')     return /energy|wind|power/.test(cat);
    return false;
  });
}

// ─────────────────────────────────────────────────────────
// GPS — starts automatically, re-sorts on every position fix
// ─────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    setDot('err');
    setMsg('Location not available — showing all landmarks');
    sortAndRender();
    return;
  }
  setDot('gps');
  setMsg('Acquiring GPS…');
  navigator.geolocation.watchPosition(onPos, onErr, {
    enableHighAccuracy: true,
    maximumAge: 5000,
    timeout: 20000
  });
}

function onPos(pos) {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;
  document.getElementById('gLat').textContent = 'LAT ' + userLat.toFixed(4);
  document.getElementById('gLon').textContent = 'LON ' + userLon.toFixed(4);
  document.getElementById('gSpd').textContent = (pos.coords.speed != null)
    ? 'SPD ' + (pos.coords.speed * 2.237).toFixed(1) + ' mph' : 'SPD —';
  document.getElementById('gAcc').textContent = 'ACC ±' + Math.round(pos.coords.accuracy) + 'm';
  setDot('live');
  sortAndRender();
}

function onErr(e) {
  setDot('err');
  setMsg('Location unavailable — showing all landmarks');
  sortAndRender();
}

// ─────────────────────────────────────────────────────────
// DISTANCE + BEARING MATH
// ─────────────────────────────────────────────────────────
function haversine(la1, lo1, la2, lo2) {
  var R    = 3958.8;
  var dLa  = (la2 - la1) * Math.PI / 180;
  var dLo  = (lo2 - lo1) * Math.PI / 180;
  var a    = Math.sin(dLa / 2) * Math.sin(dLa / 2)
           + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180)
           * Math.sin(dLo / 2) * Math.sin(dLo / 2);
  return R * 2 * Math.asin(Math.sqrt(a));
}

function bearing(la1, lo1, la2, lo2) {
  var dLo  = (lo2 - lo1) * Math.PI / 180;
  var y    = Math.sin(dLo) * Math.cos(la2 * Math.PI / 180);
  var x    = Math.cos(la1 * Math.PI / 180) * Math.sin(la2 * Math.PI / 180)
           - Math.sin(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.cos(dLo);
  var deg  = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  var dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ─────────────────────────────────────────────────────────
// SORT & RENDER — called every time GPS updates or filter changes
// ─────────────────────────────────────────────────────────
function sortAndRender() {
  var base = getFiltered();

  if (userLat !== null) {
    // Attach distance + bearing then sort ascending by distance
    sorted = base.map(function(lm) {
      return Object.assign({}, lm, {
        dist: haversine(userLat, userLon, lm.lat, lm.lon),
        dir:  bearing(userLat, userLon, lm.lat, lm.lon)
      });
    });
    sorted.sort(function(a, b) { return a.dist - b.dist; });

    // Scan bar fill: inverse of nearest distance (100% = right on top of it)
    var nearest = sorted[0] ? sorted[0].dist : 99;
    document.getElementById('scanfill').style.width =
      Math.min(100, Math.round(100 / (nearest + 1))) + '%';

    // "Nearby" count = within 5 miles
    var nearby = sorted.filter(function(l) { return l.dist < 5; }).length;
    document.getElementById('dc').textContent = nearby;
    setMsg(sorted.length + ' landmarks · sorted by distance');
  } else {
    // No GPS yet — show unsorted
    sorted = base.slice();
    document.getElementById('dc').textContent = '—';
    setMsg(sorted.length + ' landmarks loaded');
  }

  // Update category count label
  var countEl = document.getElementById('catCount');
  countEl.textContent = activeCategory
    ? sorted.length + ' landmark' + (sorted.length !== 1 ? 's' : '') + ' in this category'
    : '';

  renderCards();
  renderList();
}

// ─────────────────────────────────────────────────────────
// RENDER TOP 2 CARDS
// ─────────────────────────────────────────────────────────
function renderCards() {
  for (var i = 0; i < 2; i++) {
    var el = document.getElementById('card' + i);
    var lm = sorted[i];
    if (!lm) {
      el.className  = 'card';
      el.innerHTML  = '<div class="card-placeholder">No landmarks in this category</div>';
      continue;
    }
    el.className = 'card rank-' + (i + 1);
    var distStr  = (lm.dist != null) ? lm.dist.toFixed(1) : '—';
    var dirStr   = lm.dir  || '';
    var imgHTML  = lm.photo
      ? '<img class="card-img" src="' + lm.photo + '" alt="' + escHtml(lm.name) + '" '
        + 'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
      : '';
    var emojiStyle = lm.photo ? '' : 'display:flex';
    el.innerHTML = imgHTML
      + '<div class="card-emoji" style="' + emojiStyle + '">' + lm.emoji + '</div>'
      + '<div class="card-body">'
      +   '<div class="card-top">'
      +     '<div class="card-meta">'
      +       '<div class="card-rank">' + (i === 0 ? '▲ NEAREST' : '▲ 2ND NEAREST') + '</div>'
      +       '<div class="card-name">' + escHtml(lm.name) + '</div>'
      +       '<div class="card-county">' + escHtml(lm.county) + (lm.cat ? ' · ' + escHtml(lm.cat) : '') + '</div>'
      +     '</div>'
      +     '<div class="card-dist-wrap">'
      +       '<div class="card-dist">' + distStr + '</div>'
      +       '<span class="card-unit">MILES</span>'
      +       '<div class="card-dir">'  + dirStr  + '</div>'
      +     '</div>'
      +   '</div>'
      +   '<div class="divider"></div>'
      +   '<div class="card-fact">' + lm.fact + '</div>'
      + '</div>';
  }
}

// ─────────────────────────────────────────────────────────
// RENDER SCROLLABLE LIST (items 3 and beyond)
// ─────────────────────────────────────────────────────────
function renderList() {
  var list  = document.getElementById('list');
  var items = sorted.slice(2, 15);
  if (!items.length) {
    list.innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dim);padding:8px 0">No additional landmarks in this category</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var lm  = items[i];
    var idx = i + 2;   // index into sorted[]
    var distLabel = (lm.dist != null) ? lm.dist.toFixed(1) + ' mi' : '—';
    // Thumbnail: small photo if available, else emoji square
    var thumbHTML = lm.photo
      ? '<img class="litem-thumb" src="' + lm.photo + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
        + '<div class="litem-thumb-em" style="display:none">' + lm.emoji + '</div>'
      : '<div class="litem-thumb-em">' + lm.emoji + '</div>';
    html += '<div class="litem" onclick="openOverlay(' + idx + ')">'
          +   thumbHTML
          +   '<div class="litem-info">'
          +     '<div class="litem-name">' + escHtml(lm.name) + '</div>'
          +     '<div class="litem-sub">'  + escHtml(lm.county) + (lm.cat ? ' · ' + escHtml(lm.cat) : '') + '</div>'
          +   '</div>'
          +   '<div class="litem-dist">' + distLabel + '</div>'
          + '</div>';
  }
  list.innerHTML = html;
}

// ─────────────────────────────────────────────────────────
// VOICE SELECTION — populate dropdown, prefer natural male voices
// Priority: Google UK English Male > Google US Male > Daniel (Apple)
//           > any male > first available
// ─────────────────────────────────────────────────────────
var selectedVoice = null;

function populateVoices() {
  var voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  var sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  // Score each voice — higher = more preferred
  function scoreVoice(v) {
    var n = v.name.toLowerCase();
    var s = 0;
    // Strongly prefer natural-sounding named voices
    if (n === 'google us english male' || n.includes('google us english male')) s += 105;
    if (n.includes('google uk english male'))  s += 100;
    if (n.includes('google uk english'))       s += 80;
    if (n === 'daniel')                        s += 90;  // Apple UK male - very natural
    if (n === 'aaron')                         s += 70;  // Apple US male
    if (n === 'fred')                          s += 40;  // Apple classic
    if (n.includes('google') && n.includes('male'))  s += 60;
    if (n.includes('google us english'))       s += 50;
    if (n.includes('google'))                  s += 30;
    // Penalise obviously robotic voices
    if (n.includes('compact'))  s -= 20;
    if (n.includes('espeak'))   s -= 40;
    // Prefer English
    if (v.lang && v.lang.toLowerCase().startsWith('en')) s += 15;
    // Prefer male indicators
    if (n.includes('male') || n === 'daniel' || n === 'aaron' || n === 'fred' || n === 'alex') s += 10;
    return s;
  }

  var sorted_voices = voices.slice().sort(function(a, b) {
    return scoreVoice(b) - scoreVoice(a);
  });

  sorted_voices.forEach(function(v) {
    var opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(opt);
  });

  // Apply saved preference or default to top-scored voice
  var saved = localStorage.getItem('rg_voice');
  if (saved && sorted_voices.find(function(v){ return v.name === saved; })) {
    sel.value = saved;
  } else {
    sel.value = sorted_voices[0] ? sorted_voices[0].name : '';
  }
  selectedVoice = window.speechSynthesis.getVoices().find(function(v){ return v.name === sel.value; }) || null;
}

function saveVoice() {
  var sel = document.getElementById('voiceSelect');
  selectedVoice = window.speechSynthesis.getVoices().find(function(v){ return v.name === sel.value; }) || null;
  try { localStorage.setItem('rg_voice', sel.value); } catch(e) {}
}

function getVoice() {
  // Re-resolve from current voice list in case it changed
  var sel = document.getElementById('voiceSelect');
  var name = sel ? sel.value : '';
  return window.speechSynthesis.getVoices().find(function(v){ return v.name === name; }) || null;
}

// Voices load asynchronously on many browsers
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = populateVoices;
  populateVoices(); // also try immediately
}

// ─────────────────────────────────────────────────────────
// TOP LISTEN BUTTON — narrates the #1 nearest landmark
// ─────────────────────────────────────────────────────────
function topListen() {
  var lm  = sorted[0];
  if (!lm) { alert('No landmarks loaded yet.'); return; }
  var btn = document.getElementById('listenBtn');
  var lbl = document.getElementById('listenLabel');
  var sub = document.getElementById('listenSub');

  if (!window.speechSynthesis) { alert('Speech not supported in this browser.'); return; }

  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
    lbl.textContent = 'LISTEN';
    sub.textContent = 'Tap to hear nearest landmark';
    return;
  }

  var text = lm.name + '. ' + stripTags(lm.fact);
  var utt  = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  var v = getVoice(); if (v) utt.voice = v;
  utt.onstart = function() {
    btn.classList.add('speaking');
    lbl.textContent = 'STOP';
    sub.textContent = lm.name.toUpperCase().substring(0, 28);
  };
  utt.onend = utt.onerror = function() {
    btn.classList.remove('speaking');
    lbl.textContent = 'LISTEN';
    sub.textContent = 'Tap to hear nearest landmark';
  };
  window.speechSynthesis.speak(utt);
}

// ─────────────────────────────────────────────────────────
// OVERLAY — opens when a card or list item is tapped
// ─────────────────────────────────────────────────────────
function cardClick(i) {
  if (sorted[i]) openOverlay(i);
}

function openOverlay(idx) {
  var lm = sorted[idx];
  if (!lm) return;
  overlayLandmark = lm;

  // Stop any playing speech
  if (window.speechSynthesis && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    resetTopBtn();
  }

  // Image (photo first, emoji fallback)
  var oImg   = document.getElementById('oImg');
  var oEmoji = document.getElementById('oEmoji');
  if (lm.photo) {
    oImg.src             = lm.photo;
    oImg.style.display   = 'block';
    oEmoji.style.display = 'none';
  } else {
    oImg.src             = '';
    oImg.style.display   = 'none';
    oEmoji.style.display = 'flex';
    oEmoji.textContent   = lm.emoji;
  }

  document.getElementById('otag').textContent  = (lm.cat || '').toUpperCase();
  document.getElementById('oname').textContent = lm.name;

  var distHTML = (lm.dist != null)
    ? '<b>' + lm.dist.toFixed(1) + ' miles</b> ' + (lm.dir || '') : '';
  document.getElementById('odist').innerHTML = distHTML + (lm.county ? ' · ' + escHtml(lm.county) : '');
  document.getElementById('ofact').innerHTML = lm.fact;

  // Reset overlay listen button
  var obtn = document.getElementById('olistenBtn');
  obtn.textContent = '🔊 Listen';
  obtn.classList.remove('speaking');

  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(e) {
  // Only close if user tapped the dark backdrop (not the card itself)
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('olistenBtn').textContent = '🔊 Listen';
  document.getElementById('olistenBtn').classList.remove('speaking');
  overlayLandmark = null;
}

// ─────────────────────────────────────────────────────────
// OVERLAY LISTEN BUTTON — narrates the open landmark
// ─────────────────────────────────────────────────────────
function overlayListen() {
  if (!overlayLandmark) return;
  if (!window.speechSynthesis) { alert('Speech not supported in this browser.'); return; }

  var btn = document.getElementById('olistenBtn');

  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    btn.textContent = '🔊 Listen';
    btn.classList.remove('speaking');
    return;
  }

  var text = overlayLandmark.name + '. ' + stripTags(overlayLandmark.fact);
  var utt  = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  var v = getVoice(); if (v) utt.voice = v;
  utt.onstart = function() {
    btn.textContent = '⏹ Stop';
    btn.classList.add('speaking');
  };
  utt.onend = utt.onerror = function() {
    btn.textContent = '🔊 Listen';
    btn.classList.remove('speaking');
  };
  window.speechSynthesis.speak(utt);
}

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function stripTags(html) {
  return (html || '').replace(/<[^>]+>/g, '');
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setDot(cls) {
  document.getElementById('dot').className = 'dot ' + cls;
}

function setMsg(msg) {
  document.getElementById('stmsg').textContent = msg;
}

function resetTopBtn() {
  document.getElementById('listenBtn').classList.remove('speaking');
  document.getElementById('listenLabel').textContent = 'LISTEN';
  document.getElementById('listenSub').textContent   = 'Tap to hear nearest landmark';
}

// ─────────────────────────────────────────────────────────
// BOOT — render immediately, then start GPS
// ─────────────────────────────────────────────────────────
sortAndRender();
startGPS();
</script>
</body>
</html>
