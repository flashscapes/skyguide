{"name":"Sharpsteen Museum Calistoga","county":"Napa","emoji":"🏛","lat":38.5786,"lon":-122.5792,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"The Sharpsteen Museum houses a remarkable 30-foot-long <em>diorama of Calistoga in 1865</em>, hand-crafted by Walt Disney animator Ben Sharpsteen who retired to Calistoga. The diorama took Sharpsteen years to build and depicts every building in the original resort town in extraordinary detail, including Sam Brannan's original cottages."},
{"name":"Mount St. Helena Summit Trail","county":"Napa","emoji":"🏔","lat":38.6719,"lon":-122.5953,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"Mount St. Helena, at <em>4,343 feet</em>, is the highest peak in the Bay Area counties and one of the few volcanoes in the Coast Ranges — an extinct andesitic volcano whose eruptions 3.4 million years ago buried the nearby petrified forest. From the summit, visitors can see the Pacific Ocean, the Sacramento Valley, the Sierra Nevada, and the Bay Area in a single 360-degree panorama."},
{"name":"Bothe-Napa Valley State Park","county":"Napa","emoji":"🌲","lat":38.5436,"lon":-122.5364,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Bothe-Napa Valley State Park preserves the only <em>old-growth coast redwoods</em> in Napa County — a small grove that survived because the canyon they grow in was too steep and narrow for loggers to access efficiently. The park's swimming pool, fed by a natural spring, is a beloved summer destination."},
{"name":"Bale Grist Mill State Historic Park","county":"Napa","emoji":"🌾","lat":38.5411,"lon":-122.5317,"cat":"State Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"The Bale Grist Mill, built in <em>1846</em> by English surgeon Edward Bale, is the largest surviving historic grist mill in California — its 36-foot wooden waterwheel still grinds wheat and corn on weekends for visitors. The mill was a social center for the valley's early settlers, who rode for miles to grind grain and exchange news."},
{"name":"Napa Valley Vintners Heritage Site","county":"Napa","emoji":"🍇","lat":38.4978,"lon":-122.4717,"cat":"Heritage Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"The Napa Valley Appellation, designated in <em>1981</em>, was the first American Viticultural Area in California and one of the first in the United States — establishing the legal framework that protects origin claims for American wine. The appellation boundary, drawn to include the whole valley floor and its surrounding hills, is now one of the most valuable geographic designations in food and drink."},
{"name":"Pope Valley","county":"Napa","emoji":"🌾","lat":38.6153,"lon":-122.3972,"cat":"Rural Valley","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"Pope Valley is a <em>remote agricultural enclave</em> east of Napa Valley proper, separated by the Howell Mountains and virtually unknown to tourists — local ranchers raise cattle on open grassland unchanged since the 19th century. The valley's claim to fame is Litto's Hubcap Ranch, an outsider art installation of thousands of hubcaps arranged on fence posts by the late Emanuele Damonte."},
{"name":"Howell Mountain Appellation","county":"Napa","emoji":"🍷","lat":38.5658,"lon":-122.3658,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Howell Mountain's vineyards grow above the <em>valley fog line</em> at 1,400 feet elevation, producing Cabernet Sauvignon with extraordinary concentration and tannin structure unlike the warmer valley floor wines. The mountain's volcanic red soils have been growing premium wine grapes since the 1880s when it was first planted by Italian settlers."},
{"name":"Conn Valley Road Historic Estates","county":"Napa","emoji":"🍇","lat":38.5467,"lon":-122.4122,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Conn Valley is a narrow canyon east of St. Helena where <em>some of Napa's most prized estate vineyards</em> are hidden from Highway 29 — a world of old barns, stone walls, and ancient oaks surrounding small, meticulously farmed vineyard parcels. The valley's history as a farming community dates to the 1870s."},
{"name":"Calistoga Ranch Open Space","county":"Napa","emoji":"🌿","lat":38.6097,"lon":-122.5539,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"The hills around Calistoga preserve some of the last unfarmed land in the upper Napa Valley — open grassland and chaparral covering <em>volcanic ridges</em> with views of the entire wine country corridor below. Bobcats, coyotes, and deer are regularly seen on these slopes, taking advantage of the open-space corridor between developed valleys."},
{"name":"Carneros Wine Region Historic Sites","county":"Napa","emoji":"🍷","lat":38.2278,"lon":-122.3844,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Carneros region at the southern end of the valley was recognized as a <em>world-class Pinot Noir and Chardonnay</em> appellation in the 1980s, when cool bay breezes from San Pablo Bay proved to create ideal cool-climate conditions. The region straddles the Napa-Sonoma county line, making Carneros wines unique in being part of two great wine valleys."},
{"name":"Napa River Oxbow Nature Preserve","county":"Napa","emoji":"🌊","lat":38.2906,"lon":-122.2994,"cat":"Nature Preserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa River Oxbow is a <em>restored meander cut-off</em> where the river once curved dramatically before being straightened for flood control — the restoration reconnected the oxbow to the river, creating a backwater habitat for juvenile salmon, freshwater turtles, and river otters. The preserve sits adjacent to downtown Napa and is accessible from the Napa River trail."},
{"name":"Monticello Dam and Lake Berryessa","county":"Napa","emoji":"💧","lat":38.5908,"lon":-122.2333,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Lake_Berryessa_glory_hole.jpg/320px-Lake_Berryessa_glory_hole.jpg","fact":"Lake Berryessa's famous <em>'glory hole'</em> spillway — a 72-foot-diameter funnel drain that creates a spectacular vortex when the lake is full — is one of the most photographed engineering structures in California. The lake, created by Monticello Dam in 1957, drowned the entire town of Monticello, whose 300 residents were relocated when the valley was flooded."},
{"name":"Lake Berryessa","county":"Napa","emoji":"⛵","lat":38.565,"lon":-122.2183,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Lake_Berryessa_glory_hole.jpg/320px-Lake_Berryessa_glory_hole.jpg","fact":"Lake Berryessa, Napa County's largest body of water at <em>13,000 acres</em>, is popular for water skiing, bass fishing, and houseboating — activities that create a resort atmosphere in the oak woodland hills east of Napa Valley. The lake gained notoriety as the site of one of the 1969 Zodiac Killer attacks, though most visitors know it only as a warm-water playground."},
{"name":"Skyline Wilderness Park","county":"Napa","emoji":"🌄","lat":38.2697,"lon":-122.2531,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Skyline Wilderness Park preserves <em>850 acres of oak woodland and chaparral</em> on the eastern edge of the city of Napa — a wild ridge accessible on foot from urban neighborhoods. The park's trails climb to views over both Napa Valley and the San Pablo Bay, and the wildlife includes mountain lions that cross from the Vaca Mountains to the east."},
{"name":"Napa Valley Viaduct Historic Bridge","county":"Napa","emoji":"🌉","lat":38.3653,"lon":-122.3708,"cat":"Historic Infrastructure","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa Valley Railroad viaduct, built in <em>1868</em>, was the first railroad bridge across the Napa River and an engineering marvel of its era. The original wooden trestle was replaced in steel in 1900, and the current structure carries the Wine Train over the river in the same location where the original bridge stood."},
{"name":"Frank Family Vineyards Larkmead Winery","county":"Napa","emoji":"🏰","lat":38.5369,"lon":-122.4631,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Larkmead Winery, founded in <em>1895</em>, operated through Prohibition as a legal winery by selling sacramental wine to churches — one of only a handful of California wineries that managed to stay in production during the 13-year ban. The original 1906 stone winery building is still in use for barrel aging."},
{"name":"Diamond Mountain District","county":"Napa","emoji":"💎","lat":38.5806,"lon":-122.5319,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Diamond Mountain sits at the <em>volcanic heart</em> of the Mayacamas range, where red volcanic soils produce Cabernet Sauvignon of exceptional mineral intensity and longevity. The mountain's vines must compete with volcanic rock for every bit of water and nutrition, stressing the grapes into concentrating flavor compounds."},
{"name":"Napa County Courthouse Historic Square","county":"Napa","emoji":"🏛","lat":38.2975,"lon":-122.2867,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa County Courthouse, built in <em>1878</em> in the Greek Revival style, anchors a historic civic square that survived the 1906 and 2014 earthquakes despite being built of unreinforced brick. The courthouse square's surrounding blocks preserve some of the finest Victorian commercial architecture in the North Bay."},
{"name":"Atlas Peak Appellation","county":"Napa","emoji":"🏔","lat":38.3606,"lon":-122.2694,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Atlas Peak rises to <em>2,663 feet</em> on the eastern edge of Napa Valley, its volcanic soils producing Cabernet and Sangiovese with an intensity that reflects the mountain's heat and the dramatic day-to-night temperature swings. The appellation's relative isolation from valley tourism means its vineyards retain an old-fashioned farming character."},
{"name":"Silverado Trail Historic Road","county":"Napa","emoji":"🛤","lat":38.4528,"lon":-122.3667,"cat":"Historic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"The Silverado Trail, running the <em>full length of the eastern Napa Valley</em>, began as a wagon road used by miners hauling quicksilver from the Mayacamas mines to Napa's docks in the 1860s. Today the trail is the back road through wine country, lined with premier wineries and offering a less congested alternative to Highway 29."},
{"name":"Rector Reservoir Wildlife Area","county":"Napa","emoji":"🦅","lat":38.4156,"lon":-122.3244,"cat":"Wildlife Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Rector Reservoir, hidden in the hills east of Yountville, is one of the best places in Napa County to observe <em>wintering bald and golden eagles</em> — up to a dozen eagles have been counted roosting in the reservoir's oaks on a single winter morning. The reservoir's shoreline trail winds through oak woodland that also supports nesting great horned owls."},
{"name":"Napa Valley Farmstead","county":"Napa","emoji":"🌿","lat":38.5053,"lon":-122.4736,"cat":"Agricultural Heritage","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"The Hall family's Farmstead complex in St. Helena sits on land farmed continuously since the <em>1870s</em>, when Chinese laborers planted the first vines under the supervision of a German winemaker. The site's historic stone building, a former general store, has been converted to a restaurant sourcing all its ingredients from the surrounding property."},
{"name":"Regusci Winery Stags Leap","county":"Napa","emoji":"🐘","lat":38.3928,"lon":-122.3478,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Regusci Winery sits on the site of the <em>original Stags' Leap Ranch</em>, established in 1888, whose dramatic cliffs rising from the Silverado Trail gave the appellation its name. The old stone winery building, built in 1878, is one of the oldest surviving winery structures in Napa Valley."},
{"name":"Clos du Val Historic Winery","county":"Napa","emoji":"🍷","lat":38.3972,"lon":-122.3567,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Clos du Val was founded by French winemaker Bernard Portet in <em>1972</em>, the year before the Stags Leap appellation made history — his Cabernet Sauvignon competed alongside Stag's Leap Wine Cellars in the famous 1976 Paris Tasting. Portet brought strict Bordeaux winemaking principles to Napa, introducing techniques for aging Cabernet that are now standard practice."},
{"name":"Napa Valley College Historic Winery","county":"Napa","emoji":"🎓","lat":38.3058,"lon":-122.2853,"cat":"Education","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Napa Valley College's viticulture and winery technology program, founded in <em>1973</em>, has trained more winemakers working in California today than any other institution in the state. The on-campus winery produces commercial wines sold to the public, giving students hands-on experience across every harvest season."},
{"name":"Dominus Estate Historic Winery","county":"Napa","emoji":"🏛","lat":38.4514,"lon":-122.4239,"cat":"Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"The Dominus Estate winery building, designed by Swiss architects Herzog and de Meuron and completed in <em>1997</em>, was the first winery building in California to win the Pritzker Prize architects' most prestigious commission. The building's walls are made entirely of gabion baskets filled with local volcanic rock — an agricultural structure that won international architectural awards."},
{"name":"Merryvale Historic Winery St Helena","county":"Napa","emoji":"🍷","lat":38.5075,"lon":-122.4697,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Merryvale occupies the <em>oldest continuously operating winery building in St. Helena</em>, a massive stone structure built in 1933 — the year Prohibition ended — on the foundation of an 1870s winery destroyed in the 1906 earthquake. The building's cask room houses 17,000-gallon oval casks installed at opening that are still used for aging Chardonnay."},
{"name":"Christian Brothers Greystone Cellars","county":"Napa","emoji":"🏰","lat":38.5147,"lon":-122.4742,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Greystone Cellars, built in <em>1889</em>, is the largest stone winery building in the world — a massive structure of local rhyolite stone that served as the headquarters of the Christian Brothers wine operation for decades. The building is now home to the Culinary Institute of America's West Coast campus and is a National Historic Landmark."},
{"name":"Hans Fahden Vineyards Calistoga","county":"Napa","emoji":"🌿","lat":38.5844,"lon":-122.5361,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"Hans Fahden planted vineyards on the slopes above Calistoga in the <em>1890s</em>, and his descendants have farmed the same hillside property continuously for over 130 years — making it one of the longest-running family wine operations in Napa County. The winery's tasting room in the original stone cellar building is one of the most atmospheric in the valley."},
{"name":"Napa Valley Gateway Park","county":"Napa","emoji":"🌿","lat":38.2358,"lon":-122.3244,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Gateway Park at the southern entrance to Napa marks the boundary between the <em>San Pablo Bay marshes</em> and the wine country corridor — a transition from estuarine wetland to agricultural valley visible in a single view from the park's levee. The park's trail connects to the Napa River Trail, which runs 12 miles along the river into downtown Napa."},
{"name":"Chablis Historic District Napa","county":"Napa","emoji":"🏘","lat":38.3003,"lon":-122.2878,"cat":"Historic Neighborhood","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Fuller Park neighborhood of Napa preserves the finest concentration of <em>Victorian houses</em> in the county — large ornate homes built by winery owners and merchants during the 1880s and 1890s wine boom. Many homes escaped the 2014 earthquake with only cosmetic damage because of their wood-frame construction."},
{"name":"Soda Canyon Road Vineyards","county":"Napa","emoji":"🍇","lat":38.3556,"lon":-122.2931,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Soda Canyon Road winds from the Silverado Trail up through the volcanic Vaca Mountains, passing <em>vineyards perched on steep hillsides</em> that produce some of Napa's most intensely flavored Cabernet Sauvignon. The canyon's name refers to the naturally carbonated spring water that early settlers found bubbling from the volcanic rock."},
{"name":"Las Posadas State Forest","county":"Napa","emoji":"🌲","lat":38.5614,"lon":-122.4672,"cat":"State Forest","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Las Posadas State Forest, planted in the <em>1930s</em> by the California Division of Forestry as a demonstration and research forest, contains dozens of conifer species from around the world growing side by side. The forest's main use today is as a quiet hiking and camping destination for Napa Valley residents escaping the crowds of the valley floor."},
{"name":"Napa River Inn Historic Complex","county":"Napa","emoji":"🏨","lat":38.3008,"lon":-122.2853,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa River Inn occupies the <em>1884 Hatt Building</em>, a brick warehouse that stored grain and wine destined for San Francisco Bay steamers — one of the few surviving examples of Napa's riverfront commercial architecture. The building's restoration in 2002 helped anchor the revival of downtown Napa as a dining and lodging destination."},
{"name":"Tulocay Cemetery Napa Historic","county":"Napa","emoji":"⛪","lat":38.2878,"lon":-122.2764,"cat":"Historic Cemetery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Tulocay Cemetery, established in <em>1859</em>, contains the graves of Napa Valley's founding winemakers, ranchers, and civic leaders — a who's who of 19th-century California agriculture. The cemetery's name comes from the Wappo word for the place where the Tulocay tribe had their village before European settlement."},
{"name":"Stags Leap Scenic District","county":"Napa","emoji":"🌄","lat":38.3917,"lon":-122.3289,"cat":"Scenic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Stags Leap cliffs, rising 600 feet above the Silverado Trail, are volcanic rock outcroppings that channel the afternoon wind through a narrow gap — creating a <em>unique mesoclimate</em> that cools the appellation each afternoon and preserves acidity in the grapes. The cliffs are also home to a resident population of golden eagles and red-tailed hawks."},
{"name":"Oakville Cross Road Vineyards","county":"Napa","emoji":"🍇","lat":38.4394,"lon":-122.3783,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"The Oakville Cross Road connects Highway 29 to the Silverado Trail across the <em>heart of the Oakville appellation</em> — the half-mile stretch passes through vineyards belonging to Opus One, Screaming Eagle, and Harlan Estate, three of the most expensive wines produced in the United States. The cross road is flanked by rows of mature vines that have been tended by the same families for generations."},
{"name":"Napa Valley Register Historic Building","county":"Napa","emoji":"📰","lat":38.2981,"lon":-122.2869,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa Valley Register, established in <em>1863</em>, is the oldest continuously publishing newspaper in California north of San Francisco. The paper's archives, covering 160 years of valley history, are one of the most complete records of any California community's development from frontier settlement to world-famous wine destination."},
{"name":"Calistoga Speedway Site","county":"Napa","emoji":"🏎","lat":38.5903,"lon":-122.5933,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"The Calistoga Speedway, built on the flat volcanic plain at the head of the valley in <em>1935</em>, hosted dirt track racing that drew drivers from across California for over 60 years. The half-mile oval, still operating as the Calistoga Speedway, is the only remaining dirt track in the Bay Area and one of the oldest in the West."},
{"name":"Napa Valley Airport Site","county":"Napa","emoji":"✈️","lat":38.2133,"lon":-122.2806,"cat":"Transportation","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Napa County Airport, built in <em>1942</em> as a military training base for World War II pilots, now hosts the largest number of private aircraft based at any county airport in the North Bay. The airport's tiedown area on summer evenings fills with wine country visitors who fly in from the Bay Area for dinner — a 15-minute flight that avoids the valley's notoriously congested roads."},
{"name":"Milliken Creek Historic Reservoir","county":"Napa","emoji":"💧","lat":38.3847,"lon":-122.2747,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Milliken Reservoir, built in <em>1875</em> to supply Napa City's first municipal water system, was the first public water infrastructure project in Napa County. The reservoir dam, still in service, is one of the oldest operating earthen dams in California — 150 years of providing water to a valley that has grown from a small town to a global wine destination."},

// ── State ──────────────────────────────────────────────────────────────────
let watchId = null, lat = null, lon = null;
let lastSort = 0, sorted = [], discovered = new Set();
const SORT_INTERVAL = 8000;

// ── Speech State ───────────────────────────────────────────────────────────
let speakIndex = 0;   // which landmark in sorted[] we'll speak next (0 or 1, 2, 3...)
let isSpeaking = false;

// ── Geo helpers ────────────────────────────────────────────────────────────
function haversine(la1, lo1, la2, lo2) {
  const R = 3958.8, dLat = (la2-la1)*Math.PI/180, dLon = (lo2-lo1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function bearing(la1, lo1, la2, lo2) {
  const dLon = (lo2-lo1)*Math.PI/180;
  const y = Math.sin(dLon)*Math.cos(la2*Math.PI/180);
  const x = Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180) - Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dLon);
  return ((Math.atan2(y,x)*180/Math.PI)+360)%360;
}
function compassDir(b) {
  const dirs = ['north','north-northeast','northeast','east-northeast','east','east-southeast','southeast','south-southeast','south','south-southwest','southwest','west-southwest','west','west-northwest','northwest','north-northwest'];
  return dirs[Math.round(b/22.5)%16];
}
function compassShort(b) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(b/22.5)%16];
}
function fmtDist(mi) {
  if (mi < 0.1) return {val:(mi*5280).toFixed(0), unit:'ft'};
  if (mi < 10) return {val:mi.toFixed(1), unit:'mi'};
  return {val:mi.toFixed(0), unit:'mi'};
}
function fmtDistSpoken(mi) {
  if (mi < 0.1) { const ft = Math.round(mi*5280); return ft + ' feet'; }
  if (mi < 10) return mi.toFixed(1) + ' miles';
  return Math.round(mi) + ' miles';
}

// ── Strip HTML tags for speech ─────────────────────────────────────────────
function stripHtml(html) {
  return html.replace(/<[^>]*>/g, '');
}

// ── Render helpers ─────────────────────────────────────────────────────────
function renderCard(idx, lm, rank) {
  const el = document.getElementById('card'+idx);
  if (!el) return;
  el.className = 'card rank-'+(rank+1);
  const dist = haversine(lat, lon, lm.lat, lm.lon);
  const b = bearing(lat, lon, lm.lat, lm.lon);
  const d = fmtDist(dist);
  discovered.add(lm.name);
  document.getElementById('dc').textContent = discovered.size;
  el.innerHTML = `
    <img class="card-img" src="${lm.photo||''}" alt="${lm.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="card-emoji" style="display:none">${lm.emoji||'📍'}</div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-meta">
          <div class="card-rank">${rank===0?'▲ NEAREST':'▲ 2ND NEAREST'}</div>
          <div class="card-name">${lm.name}</div>
          <div class="card-county">${lm.county} · ${lm.cat||''}</div>
        </div>
        <div class="card-dist-wrap">
          <div class="card-dist">${d.val}</div>
          <span class="card-unit">${d.unit}</span>
          <div class="card-dir">${compassShort(b)}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="card-fact">${lm.fact||''}</div>
    </div>`;
}

function renderList(items) {
  const el = document.getElementById('list');
  el.innerHTML = items.slice(2, 20).map((lm) => {
    const dist = haversine(lat, lon, lm.lat, lm.lon);
    const d = fmtDist(dist);
    return `<div class="litem" onclick="openOverlay(${ALL_LANDMARKS.indexOf(lm)})">
      <div class="litem-em">${lm.emoji||'📍'}</div>
      <div class="litem-info">
        <div class="litem-name">${lm.name}</div>
        <div class="litem-sub">${lm.county} · ${lm.cat||''}</div>
      </div>
      <div class="litem-dist">${d.val} ${d.unit}</div>
    </div>`;
  }).join('');
}

function sortAndRender() {
  if (lat === null) return;
  sorted = [...ALL_LANDMARKS].sort((a,b) => haversine(lat,lon,a.lat,a.lon) - haversine(lat,lon,b.lat,b.lon));
  if (sorted.length > 0) renderCard(0, sorted[0], 0);
  if (sorted.length > 1) renderCard(1, sorted[1], 1);
  renderList(sorted);
  lastSort = Date.now();
}

// ── GPS ────────────────────────────────────────────────────────────────────
function onPos(pos) {
  lat = pos.coords.latitude;
  lon = pos.coords.longitude;
  const spd = pos.coords.speed != null ? (pos.coords.speed * 2.237).toFixed(1) + ' mph' : '—';
  const acc = pos.coords.accuracy != null ? pos.coords.accuracy.toFixed(0) + ' m' : '—';
  document.getElementById('gLat').textContent = 'LAT ' + lat.toFixed(5);
  document.getElementById('gLon').textContent = 'LON ' + lon.toFixed(5);
  document.getElementById('gSpd').textContent = 'SPD ' + spd;
  document.getElementById('gAcc').textContent = 'ACC ' + acc;
  setStatus('live', 'GPS locked — scanning landmarks');
  if (Date.now() - lastSort > SORT_INTERVAL) sortAndRender();
}

function onErr(e) {
  setStatus('err', 'GPS error: ' + (e.message || 'unknown'));
}

// ── GPS Start (auto on load) ───────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { setStatus('err', 'Geolocation not supported'); return; }
  setStatus('gps', 'Acquiring GPS signal…');
  startScanBar();
  watchId = navigator.geolocation.watchPosition(onPos, onErr, {enableHighAccuracy:true, timeout:15000, maximumAge:5000});
}

// ── UI Controls ────────────────────────────────────────────────────────────
function setStatus(type, msg) {
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + type;
  document.getElementById('stmsg').textContent = msg;
}

// ── Scan bar animation ─────────────────────────────────────────────────────
let scanRaf = null;
function startScanBar() {
  const fill = document.getElementById('scanfill');
  let pct = 0, dir = 1;
  function step() {
    pct += dir * 0.4;
    if (pct >= 100) { pct = 100; dir = -1; }
    if (pct <= 0) { pct = 0; dir = 1; }
    fill.style.width = pct + '%';
    scanRaf = requestAnimationFrame(step);
  }
  scanRaf = requestAnimationFrame(step);
}
function stopScanBar() {
  if (scanRaf) cancelAnimationFrame(scanRaf);
  document.getElementById('scanfill').style.width = '0%';
}

// ── Speech / LISTEN ────────────────────────────────────────────────────────
let selectedVoiceName = localStorage.getItem('rgVoice') || null;

function getAllVoices() {
  return window.speechSynthesis.getVoices().filter(v =>
    v.lang && (v.lang.startsWith('en-US') || v.lang.startsWith('en_US'))
  );
}

function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Use user-selected voice if set
  if (selectedVoiceName) {
    const picked = voices.find(v => v.name === selectedVoiceName);
    if (picked) return picked;
  }
  // Prefer male-sounding en-US voices by name (iOS exposes these)
  const malePref = [
    'Tom',        // iOS male, warm and clear
    'Alex',       // macOS classic male — most natural breathing/pauses
    'Fred',       // macOS fallback male
    'Google US English', // Chrome fallback
  ];
  for (const name of malePref) {
    const v = voices.find(v => v.name === name);
    if (v) return v;
  }
  // Avoid known female/accented voices as fallback
  const avoid = ['Samantha','Karen','Moira','Tessa','Victoria','Ava','Allison','Susan',
                  'Rishi','Lekha','Damayanti','Veena'];
  const enUS = voices.filter(v => v.lang && (v.lang.startsWith('en-US') || v.lang.startsWith('en_US')));
  const safe = enUS.find(v => !avoid.some(a => v.name.includes(a)));
  if (safe) return safe;
  return enUS[0] || voices.find(v => v.lang && v.lang.startsWith('en')) || null;
}

// ── Voice picker ──────────────────────────────────────────────────────────
function openVoiceModal() {
  const list = document.getElementById('voiceList');
  const voices = window.speechSynthesis.getVoices().filter(v =>
    v.lang && (v.lang.startsWith('en') || v.lang.startsWith('en_'))
  );
  if (!voices.length) {
    list.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:12px;">No voices found. Try tapping LISTEN first, then open voice picker.</div>';
  } else {
    list.innerHTML = voices.map(v => {
      const isSel = selectedVoiceName === v.name;
      return `<div class="vitem${isSel?' selected':''}" onclick="pickVoice('${v.name.replace(/'/g,"\'")}', this)">
        <div class="vitem-info">
          <div class="vitem-name">${v.name}</div>
          <div class="vitem-lang">${v.lang}${v.localService?' · on-device':' · network'}</div>
        </div>
        <div class="vitem-check">✓</div>
      </div>`;
    }).join('');
  }
  document.getElementById('voiceModal').classList.add('open');
}

function pickVoice(name, el) {
  selectedVoiceName = name;
  localStorage.setItem('rgVoice', name);
  document.querySelectorAll('.vitem').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  // Preview the voice
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance('Hello! This is ' + name + '.');
  const v = window.speechSynthesis.getVoices().find(v => v.name === name);
  if (v) utt.voice = v;
  utt.rate = 0.9; utt.pitch = 1.0; utt.volume = 1;
  window.speechSynthesis.speak(utt);
}

function closeVoiceModal() {
  window.speechSynthesis.cancel();
  document.getElementById('voiceModal').classList.remove('open');
}

function buildNarration(lm) {
  if (!lm || lat === null) return '';
  const dist = haversine(lat, lon, lm.lat, lm.lon);
  const b = bearing(lat, lon, lm.lat, lm.lon);
  const distStr = fmtDistSpoken(dist);
  const dirStr = compassDir(b);
  const factClean = stripHtml(lm.fact || '');
  return `${lm.name} is ${distStr} to your ${dirStr}. ${factClean}`;
}

function setListenBtn(state) {
  // state: 'idle' | 'speaking'
  const btn = document.getElementById('listenBtn');
  const label = document.getElementById('listenLabel');
  const sub = document.getElementById('listenSub');
  if (state === 'speaking') {
    btn.classList.add('on');
    label.textContent = 'STOP';
    sub.textContent = 'Tap to stop narration';
  } else {
    btn.classList.remove('on');
    label.textContent = 'LISTEN';
    sub.textContent = 'Tap for landmark narration';
  }
}

function speakLandmark(idx) {
  if (!sorted.length || idx >= sorted.length) {
    stopSpeech();
    return;
  }
  const lm = sorted[idx];
  const text = buildNarration(lm);
  if (!text) { stopSpeech(); return; }

  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.88;   // slightly relaxed — sounds more human
  utt.pitch = 1.0;   // natural pitch, no artificial lowering
  utt.volume = 1;
  const voice = getBestVoice();
  if (voice) utt.voice = voice;

  utt.onend = () => {
    isSpeaking = false;
    setListenBtn('idle');
    speakIndex = idx + 1; // advance so next tap speaks the next landmark
  };
  utt.onerror = () => {
    isSpeaking = false;
    setListenBtn('idle');
  };

  window.speechSynthesis.cancel();
  isSpeaking = true;
  setListenBtn('speaking');
  window.speechSynthesis.speak(utt);
}

function stopSpeech() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  setListenBtn('idle');
}

function handleListen() {
  if (!sorted.length) return;
  if (isSpeaking) {
    stopSpeech();
    return;
  }
  // Always re-sort so we reflect current position
  if (lat !== null) sortAndRender();

  // If speakIndex is out of range, reset to 0
  if (speakIndex >= sorted.length || speakIndex < 0) speakIndex = 0;

  // Promote the landmark we are about to narrate to card slot 0 (top of screen)
  // Move it to front of sorted array temporarily for display, preserving rest of order
  if (speakIndex > 0 && sorted[speakIndex]) {
    const lm = sorted[speakIndex];
    // Reorder: put spoken landmark first, keep others in distance order
    const rest = sorted.filter((_, i) => i !== speakIndex);
    sorted = [lm, ...rest];
    renderCard(0, sorted[0], 0);
    if (sorted.length > 1) renderCard(1, sorted[1], 1);
    renderList(sorted);
    speakIndex = 0; // it is now at position 0
  }

  speakLandmark(speakIndex);
}

// Voices load async — prime and restore saved preference
function initVoices() {
  window.speechSynthesis.getVoices(); // trigger load
}
window.speechSynthesis.onvoiceschanged = initVoices;
initVoices();

// ── Overlay ────────────────────────────────────────────────────────────────
function cardClick(idx) {
  if (sorted.length > idx) openOverlay(ALL_LANDMARKS.indexOf(sorted[idx]));
}
function openOverlay(lmIdx) {
  const lm = ALL_LANDMARKS[lmIdx];
  if (!lm) return;
  const oImg = document.getElementById('oImg');
  const oEmoji = document.getElementById('oEmoji');
  oImg.src = lm.photo || '';
  oImg.style.display = 'block';
  oEmoji.style.display = 'none';
  oEmoji.textContent = lm.emoji || '📍';
  document.getElementById('otag').textContent = (lm.cat||'') + ' · ' + (lm.county||'');
  document.getElementById('oname').textContent = lm.name;
  if (lat !== null) {
    const dist = haversine(lat, lon, lm.lat, lm.lon);
    const b = bearing(lat, lon, lm.lat, lm.lon);
    const d = fmtDist(dist);
    document.getElementById('odist').innerHTML = `<b>${d.val} ${d.unit}</b> · ${compassShort(b)}`;
  } else {
    document.getElementById('odist').innerHTML = '';
  }
  document.getElementById('ofact').innerHTML = lm.fact || '';
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('tc').textContent = ALL_LANDMARKS.length;
window.addEventListener('load', startGPS);
</script>
