<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoadGuide">
<meta name="theme-color" content="#080c14">
<title>RoadGuide California</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--ink:#080c14;--gold:#c9a84c;--glo:#e8c97a;--gdim:rgba(201,168,76,.35);--pale:#eef2ff;--dim:rgba(220,228,255,.45);--card:rgba(255,255,255,.05);--edge:rgba(255,255,255,.09);--green:#50c880;--red:#e05555;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--ink);color:var(--pale);font-family:'DM Sans',sans-serif;}
#sky{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(18,34,68,.9) 0%,transparent 100%),radial-gradient(ellipse 60% 60% at 85% 90%,rgba(10,18,38,.95) 0%,transparent 100%),var(--ink);}
#sky::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1.2px 1.2px at 8% 12%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 23% 45%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 52% 8%,rgba(201,168,76,.4) 0%,transparent 100%),radial-gradient(1px 1px at 71% 67%,rgba(255,255,255,.35) 0%,transparent 100%),radial-gradient(1.2px 1.2px at 38% 82%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 88% 28%,rgba(255,255,255,.5) 0%,transparent 100%);}
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
#hdr{flex-shrink:0;padding:env(safe-area-inset-top,44px) 20px 14px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;line-height:1;}
.logo-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-top:3px;}
.hd-r{text-align:right;}
.hd-r p{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.5px;}
.hd-r span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--glo);}
#scanbar{flex-shrink:0;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;}
#scanfill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(201,168,76,.3),var(--gold));width:0%;transition:width 1s linear;}
#scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 40px;}
#scr::-webkit-scrollbar{display:none;}
#startWrap{display:flex;justify-content:center;align-items:center;padding:10px 0 16px;}
#listenBtn{display:flex;align-items:center;gap:14px;padding:14px 32px;border-radius:50px;cursor:pointer;border:1.5px solid rgba(201,168,76,.45);background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));transition:all .25s;-webkit-appearance:none;}
#listenBtn.on{border-color:rgba(80,200,128,.55);background:linear-gradient(135deg,rgba(80,200,128,.14),rgba(80,200,128,.03));}
#listenBtn:active{transform:scale(.96);}
.sb-icon{font-size:24px;}
.sb-text{display:flex;flex-direction:column;}
.sb-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--glo);}
#listenBtn.on .sb-main{color:#6ecf9c;}
.sb-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--gdim);text-transform:uppercase;}
#listenBtn.on .sb-sub{color:rgba(80,200,128,.55);}
#status{display:flex;align-items:center;gap:8px;padding:8px 13px;margin-bottom:14px;background:var(--card);border:1px solid var(--edge);border-radius:10px;font-family:'DM Mono',monospace;font-size:10px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.idle{background:rgba(220,228,255,.3);}
.dot.gps{background:var(--gold);animation:blink 1.2s ease-in-out infinite;}
.dot.live{background:var(--green);animation:blink 2.5s ease-in-out infinite;}
.dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
#stmsg{flex:1;color:var(--dim);}
#sttmr{color:var(--gdim);font-size:9px;}
#cards{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.card{border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.card.rank-1{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 1px rgba(201,168,76,.1),0 8px 32px rgba(0,0,0,.4);}
.card.rank-2{border-color:rgba(201,168,76,.18);}
.card-img{width:100%;height:120px;object-fit:cover;display:block;}
.card-emoji{width:100%;height:120px;display:none;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.85));}
.card-body{padding:13px 15px 14px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.card-meta{flex:1;}
.card-rank{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:1px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--pale);line-height:1.05;}
.card-county{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;}
.card-dist-wrap{text-align:right;flex-shrink:0;}
.card-dist{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--glo);line-height:1;}
.card-unit{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gdim);display:block;}
.card-dir{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:1px;}
.divider{width:100%;height:1px;background:rgba(255,255,255,.06);margin-bottom:9px;}
.card-fact{font-size:13px;line-height:1.68;font-weight:300;color:rgba(220,228,255,.85);}
.card-fact em{color:var(--glo);font-style:normal;font-weight:500;}
.card-placeholder{height:120px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px;font-style:italic;padding:20px;text-align:center;}
.sep{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.18),transparent);margin:6px 0 12px;}
#listLabel{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
#list{display:flex;flex-direction:column;gap:6px;}
.litem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.litem:active{border-color:rgba(201,168,76,.3);}
.litem-em{font-size:18px;flex-shrink:0;width:30px;text-align:center;}
.litem-info{flex:1;min-width:0;}
.litem-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.litem-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:1px;}
.litem-dist{font-family:'DM Mono',monospace;font-size:11px;color:var(--glo);flex-shrink:0;}
#gpsBar{padding:8px 12px;background:var(--card);border:1px solid var(--edge);border-radius:10px;margin-top:12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap;}
#overlay{position:fixed;inset:0;z-index:100;background:rgba(8,12,20,.92);display:none;align-items:flex-end;justify-content:stretch;padding:12px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
#overlay.open{display:flex;}
#ocard{width:100%;border-radius:20px;overflow:hidden;background:linear-gradient(160deg,#0f1829,#080c14);border:1px solid rgba(201,168,76,.4);box-shadow:0 -8px 60px rgba(0,0,0,.7);}
#oImg{width:100%;height:160px;object-fit:cover;display:block;}
#oEmoji{width:100%;height:160px;display:none;align-items:center;justify-content:center;font-size:70px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.9));}
#obody{padding:16px 18px 20px;}
#otop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
#ometa{flex:1;}
#otag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
#oname{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
#odist{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:4px;}
#odist b{color:var(--glo);font-weight:400;}
#oclose{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--dim);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;}
#ofact{font-size:14px;line-height:1.7;font-weight:300;}
#ofact em{color:var(--glo);font-style:normal;font-weight:500;}
#voiceModal{position:fixed;inset:0;z-index:200;background:rgba(8,12,20,.96);display:none;align-items:flex-end;padding:12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
#voiceModal.open{display:flex;}
#voiceCard{width:100%;border-radius:20px;overflow:hidden;background:linear-gradient(160deg,#0f1829,#080c14);border:1px solid rgba(201,168,76,.4);padding:22px 20px 28px;}
#voiceTitle{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--glo);margin-bottom:4px;}
#voiceSubtitle{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:18px;}
#voiceList{display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto;}
.vitem{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:10px;background:var(--card);border:1px solid var(--edge);cursor:pointer;gap:10px;}
.vitem.selected{border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.08);}
.vitem:active{opacity:.7;}
.vitem-info{flex:1;min-width:0;}
.vitem-name{font-size:13px;font-weight:500;color:var(--pale);}
.vitem-lang{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;}
.vitem-check{color:var(--gold);font-size:16px;flex-shrink:0;opacity:0;}
.vitem.selected .vitem-check{opacity:1;}
#voiceClose{margin-top:14px;width:100%;padding:13px;border-radius:50px;border:1.5px solid rgba(201,168,76,.45);background:rgba(201,168,76,.08);color:var(--glo);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;}
</style>
</head>
<body>
<div id="sky"></div>
<div id="overlay" onclick="closeOverlay(event)">
  <div id="ocard">
    <img id="oImg" src="" alt="" onerror="this.style.display='none';document.getElementById('oEmoji').style.display='flex'">
    <div id="oEmoji"></div>
    <div id="obody">
      <div id="otop">
        <div id="ometa">
          <div id="otag"></div>
          <div id="oname"></div>
          <div id="odist"></div>
        </div>
        <button id="oclose" onclick="closeOverlay()">✕</button>
      </div>
      <div id="ofact"></div>
    </div>
  </div>
</div>
<div id="app">
  <div id="hdr">
    <div>
      <div class="logo">RoadGuide</div>
      <div class="logo-tag">California</div>
    </div>
    <div class="hd-r">
      <p>LANDMARKS <span id="tc">1169</span></p>
      <p>DISCOVERED <span id="dc">0</span></p>
    </div>
  </div>
  <div id="scanbar"><div id="scanfill"></div></div>
  <div id="scr">
    <div id="startWrap">
      <button id="listenBtn" onclick="handleListen()">
        <div class="sb-icon">🔊</div>
        <div class="sb-text">
          <div class="sb-main" id="listenLabel">LISTEN</div>
          <div class="sb-sub" id="listenSub">Tap for landmark narration</div>
        </div>
      </button>
      <button id="voicePickBtn" onclick="openVoiceModal()" title="Choose voice" style="margin-left:10px;padding:10px 14px;border-radius:50px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--dim);font-size:18px;cursor:pointer;-webkit-appearance:none;flex-shrink:0;">🎙</button>
    </div>
    <div id="status">
      <div class="dot gps" id="dot"></div>
      <div id="stmsg">Acquiring GPS signal…</div>
      <div id="sttmr"></div>
    </div>
    <div id="cards">
      <div class="card" id="card0" onclick="cardClick(0)">
        <div class="card-placeholder">Nearest landmark will appear here</div>
      </div>
      <div class="card" id="card1" onclick="cardClick(1)">
        <div class="card-placeholder">2nd nearest landmark will appear here</div>
      </div>
    </div>
    <div class="sep"></div>
    <div id="listLabel">Next Nearest</div>
    <div id="list"></div>
    <div id="gpsBar">
      <span id="gLat">LAT —</span>
      <span id="gLon">LON —</span>
      <span id="gSpd">SPD —</span>
      <span id="gAcc">ACC —</span>
    </div>
  </div>
</div>
<div id="voiceModal">
  <div id="voiceCard">
    <div id="voiceTitle">SELECT VOICE</div>
    <div id="voiceSubtitle">Choose the narrator for your landmarks</div>
    <div id="voiceList"></div>
    <button id="voiceClose" onclick="closeVoiceModal()">DONE</button>
  </div>
</div>
<script>
const ALL_LANDMARKS = [
{"name":"Mount Diablo Summit","county":"Contra Costa","emoji":"🏔","lat":37.8816,"lon":-121.9142,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mount_Diablo_from_summit.jpg/320px-Mount_Diablo_from_summit.jpg","fact":"On a clear day, you can see <em>35 of California's 58 counties</em> from this 3,849-foot summit — one of the widest views achievable from any single point in North America. Spanish surveyors used Mount Diablo as the origin point for all land surveys in California and Nevada, making it the baseline for millions of property lines still in use today."},
{"name":"Lafayette Reservoir","county":"Contra Costa","emoji":"💧","lat":37.8871,"lon":-122.118,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Lafayette_Reservoir.jpg/320px-Lafayette_Reservoir.jpg","fact":"Built in <em>1928</em> as an emergency backup water supply for Contra Costa County, the reservoir holds up to 2.7 billion gallons. The surrounding 934-acre recreation area draws over a million visitors a year to its 5-mile loop trail around the water."},
{"name":"Black Diamond Mines Regional Preserve","county":"Contra Costa","emoji":"⛏","lat":37.9688,"lon":-121.8677,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Black_Diamond_Mines.jpg/320px-Black_Diamond_Mines.jpg","fact":"Beneath these hills lies the largest known <em>bat hibernation site</em> in the Bay Area, inside tunnels left from 19th-century coal mines. From the 1860s to 1902, five boomtowns thrived here — all now completely vanished, with only scattered foundations remaining."},
{"name":"Briones Regional Park","county":"Contra Costa","emoji":"🌿","lat":37.9274,"lon":-122.1519,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Briones is one of the few places in the East Bay where you can still see <em>tule elk</em> roaming free in their native grassland habitat. The park's 6,255 acres of rolling oak woodland and open ridge were once a vast cattle rancho granted to Felipe Briones in 1829."},
{"name":"John Muir National Historic Site","county":"Contra Costa","emoji":"🏡","lat":37.9938,"lon":-122.1278,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/John_Muir_House_-_panoramio.jpg/320px-John_Muir_House_-_panoramio.jpg","fact":"This 17-room Victorian mansion was home to John Muir for the last <em>24 years of his life</em>, and it was here that he wrote most of the books and articles that created the modern conservation movement. Muir's 'scribble den' study on the top floor still contains his original desk, papers, and thousands of pressed botanical specimens."},
{"name":"Carquinez Strait","county":"Contra Costa","emoji":"🌊","lat":38.0574,"lon":-122.2254,"cat":"Waterway","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Carquinez_Strait_aerial.jpg/320px-Carquinez_Strait_aerial.jpg","fact":"The Carquinez Strait is the only sea-level gap in the Coast Ranges, making it the <em>sole outlet for all water</em> from California's vast Central Valley to reach San Francisco Bay. During the Gold Rush, every ship carrying miners to California had to pass through this narrow channel — over 800 vessels in 1849 alone."},
{"name":"Port Costa","county":"Contra Costa","emoji":"⚓","lat":38.0538,"lon":-122.1792,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Port_Costa_CA.jpg/320px-Port_Costa_CA.jpg","fact":"In the 1880s, Port Costa was the <em>largest grain shipping port on the Pacific Coast</em>, loading wheat from Central Valley ranches onto clipper ships bound for England. Today fewer than 200 people live in the town, but its Victorian warehouses and saloons survive almost completely intact."},
{"name":"Benicia Capitol State Historic Park","county":"Contra Costa","emoji":"🏛","lat":38.0499,"lon":-122.1594,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Benicia_Capitol.jpg/320px-Benicia_Capitol.jpg","fact":"Benicia served as California's state capital for just <em>13 months</em> — from February 1853 to February 1854 — before Sacramento became permanent. The original capitol building still stands and is the oldest public building in California still in its original location."},
{"name":"C&H Sugar Plant Crockett","county":"Contra Costa","emoji":"🏭","lat":38.0524,"lon":-122.2199,"cat":"Industrial Historic","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/C%26H_Sugar_Factory_Crockett.jpg/320px-C%26H_Sugar_Factory_Crockett.jpg","fact":"The C&H Sugar refinery in Crockett has been processing <em>Hawaiian sugarcane</em> continuously since 1897 — the name stands for California and Hawaii. At its peak it was the largest cane sugar refinery in the world, and the sweet smell of processing days still drifts through the town."},
{"name":"Concord Naval Weapons Station","county":"Contra Costa","emoji":"⚓","lat":38.0285,"lon":-122.0202,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Todos_Santos_Plaza_Concord.jpg/320px-Todos_Santos_Plaza_Concord.jpg","fact":"The Concord Naval Weapons Station loaded <em>every major naval operation</em> in the Pacific from World War II through the Vietnam War, handling millions of tons of ammunition. In 1944, a catastrophic munitions explosion here killed 320 people — one of the deadliest home-front disasters of the war."},
{"name":"Todos Santos Plaza Concord","county":"Contra Costa","emoji":"🌳","lat":37.9776,"lon":-122.0297,"cat":"Historic Plaza","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Todos_Santos_Plaza_Concord.jpg/320px-Todos_Santos_Plaza_Concord.jpg","fact":"Todos Santos Plaza has been the civic heart of Concord since the town was founded as <em>Todos Santos</em> by Don Salvio Pacheco in 1869. The plaza's farmers market, running every Tuesday and Thursday, is one of the longest-running in the East Bay and a direct link to the town's agricultural roots."},
{"name":"East Brother Light Station","county":"Contra Costa","emoji":"🔦","lat":37.9635,"lon":-122.3769,"cat":"Historic Lighthouse","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/East_Brother_Light_Station.jpg/320px-East_Brother_Light_Station.jpg","fact":"East Brother Light Station has guided ships through the <em>dangerous San Pablo Strait</em> since 1874, and its Victorian fog signal building is one of only five remaining in the country. The lighthouse is now a four-room bed and breakfast — guests arrive by boat and spend the night in the completely restored keeper's quarters."},
{"name":"Rosie the Riveter Memorial","county":"Contra Costa","emoji":"✊","lat":37.9057,"lon":-122.3596,"cat":"Memorial","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Rosie_the_Riveter_Memorial.jpg/320px-Rosie_the_Riveter_Memorial.jpg","fact":"This waterfront memorial honors the <em>women war workers</em> who transformed American manufacturing during World War II, many of them African American women who migrated from the South to find work in the Richmond shipyards. The memorial's design incorporates the actual keel plate of a Liberty Ship into the landscape."},
{"name":"Vasco Caves Regional Preserve","county":"Contra Costa","emoji":"🦅","lat":37.835,"lon":-121.73,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Vasco_Caves_Regional_Preserve.jpg/320px-Vasco_Caves_Regional_Preserve.jpg","fact":"Vasco Caves contains the largest concentration of <em>Yokuts rock art</em> in the Bay Area, with pictographs painted in red and black ochre estimated to be over 2,000 years old. The caves were formed by volcanic activity and their constant cool temperature made them important ceremonial sites for generations of Native Californians."},
{"name":"Danville Eugene O'Neill Historic Site","county":"Contra Costa","emoji":"🎭","lat":37.8247,"lon":-121.9894,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Tao_House_Eugene_O%27Neill.jpg/320px-Tao_House_Eugene_O%27Neill.jpg","fact":"Playwright Eugene O'Neill built Tao House in Danville in <em>1937</em> specifically for its isolation, and here wrote his greatest late masterpieces including Long Day's Journey into Night and The Iceman Cometh. O'Neill's study preserves his rocking chair, his hand-written manuscripts, and a bar he called 'Rosie.'"},
{"name":"Blackhawk Museum","county":"Contra Costa","emoji":"🚗","lat":37.8219,"lon":-121.9136,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Walnut_Creek_California_downtown.jpg/320px-Walnut_Creek_California_downtown.jpg","fact":"The Blackhawk Museum houses one of the finest collections of <em>vintage automobiles</em> in the world, including cars owned by Al Capone, Frank Sinatra, and Howard Hughes. The collection spans a century of automotive design and includes one of only two surviving 1931 Bugatti Royales."},
{"name":"Morgan Territory Regional Preserve","county":"Contra Costa","emoji":"🌾","lat":37.8319,"lon":-121.8044,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Morgan_Territory_Regional_Preserve.jpg/320px-Morgan_Territory_Regional_Preserve.jpg","fact":"Morgan Territory sits atop the <em>most isolated ridge</em> in the Bay Area, with views stretching from the Sierra Nevada to the Pacific — visible simultaneously on clear winter days. The preserve's rare blue oak woodland is one of the southernmost examples of this tree, which dominates the Sierra Nevada foothills."},
{"name":"Los Vaqueros Reservoir","county":"Contra Costa","emoji":"💧","lat":37.81,"lon":-121.76,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Los_Vaqueros_Reservoir.jpg/320px-Los_Vaqueros_Reservoir.jpg","fact":"Los Vaqueros Reservoir was completed in <em>1998</em> as the first new major reservoir built in California in decades, and its watershed is managed as a wildlife sanctuary with no public recreation on the water itself. The surrounding hills are among the best places in the county to see the rare Swainson's hawk during its spring migration."},
{"name":"Antioch Dunes National Wildlife Refuge","county":"Contra Costa","emoji":"🦋","lat":38.0033,"lon":-121.8003,"cat":"Wildlife Refuge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_Break_Regional_Shoreline.jpg/320px-Big_Break_Regional_Shoreline.jpg","fact":"The Antioch Dunes are the only place on Earth where the <em>Lange's metalmark butterfly</em> still survives — fewer than 200 remain, making it one of the rarest butterflies in North America. The dunes are ancient river sediments deposited when the San Joaquin River flowed much closer to the coast, 10,000 years ago."},
{"name":"Clifton Court Forebay","county":"Contra Costa","emoji":"💧","lat":37.83,"lon":-121.56,"cat":"Water Infrastructure","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Clifton_Court_Forebay.jpg/320px-Clifton_Court_Forebay.jpg","fact":"Clifton Court Forebay is the <em>starting point of the California Aqueduct</em> — the 444-mile concrete river that carries water from the Delta to Southern California. The forebay's giant pumps lift over 6 billion gallons per day, making it one of the largest water-moving facilities in the world."},
{"name":"Oakland City Hall","county":"Alameda","emoji":"🏛","lat":37.8044,"lon":-122.2711,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Oakland_City_Hall.jpg/320px-Oakland_City_Hall.jpg","fact":"Oakland City Hall, completed in <em>1914</em>, was the first skyscraper built west of the Mississippi River — a 320-foot tower clad in granite and terracotta. The building was badly damaged in the 1989 Loma Prieta earthquake and was seismically retrofitted in the 1990s by mounting it on 111 lead-rubber isolation bearings."},
{"name":"Lake Merritt","county":"Alameda","emoji":"🦆","lat":37.8044,"lon":-122.2574,"cat":"Lake","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Lake_Merritt_aerial.jpg/320px-Lake_Merritt_aerial.jpg","fact":"Lake Merritt is the <em>first official wildlife refuge in North America</em>, designated by the California Legislature in 1870 — predating Yellowstone National Park by two years. The 3.4-mile tidal lagoon was originally a tidal estuary connected to the bay, converted to a lake by a dam in the 1860s."},
{"name":"Jack London Square","county":"Alameda","emoji":"✍","lat":37.7947,"lon":-122.2758,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Jack_London_Square_Oakland.jpg/320px-Jack_London_Square_Oakland.jpg","fact":"Jack London grew up on the Oakland waterfront and worked as an <em>oyster pirate</em> on the bay as a teenager — stealing oysters from privately owned beds and selling them to saloons. The preserved First and Last Chance Saloon, built in 1880, was London's regular drinking spot and looks exactly as it did when he was alive."},
{"name":"Paramount Theatre Oakland","county":"Alameda","emoji":"🎭","lat":37.8072,"lon":-122.2689,"cat":"Historic Theater","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Paramount_Theatre_Oakland.jpg/320px-Paramount_Theatre_Oakland.jpg","fact":"The Paramount Theatre is one of the finest surviving examples of <em>Art Deco architecture</em> in the United States, opened in 1931 with a facade of mosaic tile and glazed terracotta that shimmers gold in afternoon light. The theater seats 3,000 people and was restored to its original glory in 1973 after a decade of abandonment."},
{"name":"Chabot Space and Science Center","county":"Alameda","emoji":"🔭","lat":37.8178,"lon":-122.1817,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Chabot_Space_and_Science_Center.jpg/320px-Chabot_Space_and_Science_Center.jpg","fact":"The Chabot Space Center sits atop the Oakland hills with the <em>darkest skies accessible by public transit</em> in the Bay Area, and its three telescopes are open to the public on Friday and Saturday nights year-round. The center's 70-foot planetarium dome is the largest in Northern California."},
{"name":"Redwood Regional Park","county":"Alameda","emoji":"🌲","lat":37.8094,"lon":-122.1619,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Redwood_Regional_Park_Oakland.jpg/320px-Redwood_Regional_Park_Oakland.jpg","fact":"Redwood Regional Park protects a grove of <em>second-growth coast redwoods</em> that grew back after the original old-growth forest was logged in the 1850s to build San Francisco — the trees are now 150 feet tall. The park's East Ridge Trail offers views of both the Golden Gate and the Sierra Nevada simultaneously on clear winter days."},
{"name":"USS Hornet Sea Air and Space Museum","county":"Alameda","emoji":"🚀","lat":37.7736,"lon":-122.3025,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/USS_Hornet_museum_Alameda.jpg/320px-USS_Hornet_museum_Alameda.jpg","fact":"The USS Hornet recovered the <em>Apollo 11 and Apollo 12 astronauts</em> from the Pacific Ocean after their moon missions — the quarantine facility where Neil Armstrong was kept after returning from the moon is still aboard the ship. The carrier also served in three wars and launched the first jet aircraft to fly off a carrier deck."},
{"name":"Mission San Jose","county":"Alameda","emoji":"⛪","lat":37.538,"lon":-121.9194,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Mission_San_Jose_California.jpg/320px-Mission_San_Jose_California.jpg","fact":"Mission San Jose, founded in <em>1797</em>, was one of the most prosperous missions in California — its orchards, vineyards, and cattle herds supplied food to missions as far away as Santa Barbara. The mission's Ohlone converts revolted in 1828 in one of the largest Native uprisings against the mission system, under a warrior named Estanislao."},
{"name":"Ardenwood Historic Farm","county":"Alameda","emoji":"🌾","lat":37.5561,"lon":-122.0336,"cat":"Historic Farm","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Ardenwood_Historic_Farm.jpg/320px-Ardenwood_Historic_Farm.jpg","fact":"Ardenwood was the model farm estate of George Patterson, one of California's most innovative <em>19th-century agriculturalists</em>, who built a Victorian mansion overlooking his 6,000 acres of wheat. The farm now operates as a living history museum with working draft horses, heirloom crops, and costumed interpreters."},
{"name":"Coyote Hills Regional Park","county":"Alameda","emoji":"🦟","lat":37.555,"lon":-122.0811,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Coyote_Hills_Regional_Park.jpg/320px-Coyote_Hills_Regional_Park.jpg","fact":"Coyote Hills contains <em>shell mounds</em> built by Ohlone people over 2,500 years — refuse heaps of clamshells, fish bones, and artifacts that grew into permanent hills rising 30 feet above the bay shore. The mounds are among the best-preserved archaeological sites in the Bay Area, offering an unbroken record of bay ecology stretching back millennia."},
{"name":"Don Edwards San Francisco Bay National Wildlife Refuge","county":"Alameda","emoji":"🦅","lat":37.505,"lon":-122.045,"cat":"Wildlife Refuge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Don_Edwards_NWR.jpg/320px-Don_Edwards_NWR.jpg","fact":"At 30,000 acres, Don Edwards is the <em>largest urban wildlife refuge in the United States</em>, protecting the last major areas of salt marsh and tidal flat on the south end of San Francisco Bay. The refuge's salt ponds — former industrial evaporation ponds turned pink by salt-loving algae — are a surreal landscape visible from commercial flights."},
{"name":"Sunol Regional Wilderness","county":"Alameda","emoji":"🦁","lat":37.5133,"lon":-121.8297,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Sunol_Regional_Wilderness.jpg/320px-Sunol_Regional_Wilderness.jpg","fact":"Sunol is the only regional park in the East Bay where <em>cattle still graze</em> as part of active rangeland management — a practice that actually improves habitat for native wildflowers and ground-nesting birds. The wilderness area's Alameda Creek contains one of the last viable steelhead trout runs in the San Francisco Bay watershed."},
{"name":"Lawrence Livermore National Laboratory","county":"Alameda","emoji":"⚛","lat":37.6892,"lon":-121.7058,"cat":"Research Facility","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Altamont_Pass_Wind_Farm.jpg/320px-Altamont_Pass_Wind_Farm.jpg","fact":"Lawrence Livermore Lab has been designing <em>every American nuclear weapon</em> since 1952, and its National Ignition Facility achieved fusion ignition in 2022 — the first time in history that a controlled fusion reaction produced more energy than it consumed. The lab's 800-acre campus employs 8,000 scientists and is the largest employer in the Tri-Valley."},
{"name":"Altamont Pass Wind Farm","county":"Alameda","emoji":"💨","lat":37.73,"lon":-121.65,"cat":"Energy","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Altamont_Pass_Wind_Farm.jpg/320px-Altamont_Pass_Wind_Farm.jpg","fact":"The Altamont Pass Wind Farm, established in <em>1981</em>, was the first large-scale wind energy project in the United States and helped establish California as the world leader in renewable energy. The 5,000 turbines generate enough electricity to power 120,000 homes."},
{"name":"UC Berkeley Sather Tower","county":"Alameda","emoji":"🏛","lat":37.8724,"lon":-122.2595,"cat":"University Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Campanile_UC_Berkeley.jpg/320px-Campanile_UC_Berkeley.jpg","fact":"Sather Tower, modeled after the <em>Campanile di San Marco</em> in Venice and completed in 1914, stands 307 feet tall and houses a 61-bell carillon played by students three times daily. The tower's observation deck offers a 360-degree view that on clear days extends from the Farallon Islands to the Sierra Nevada — a 200-mile panorama."},
{"name":"Tilden Regional Park","county":"Alameda","emoji":"🌿","lat":37.8944,"lon":-122.2428,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Tilden_Regional_Park_merry_go_round.jpg/320px-Tilden_Regional_Park_merry_go_round.jpg","fact":"Tilden Park's <em>steam train, antique carousel, and botanical garden</em> were built during the Depression by unemployed workers through the Civil Conservation Corps — and all three still operate today. The park's Brazilian Room, a redwood pavilion built in 1938, was a gift from Brazil to California and has hosted dances, weddings, and concerts for 85 years."},
{"name":"Golden Gate Bridge","county":"San Francisco","emoji":"🌉","lat":37.8199,"lon":-122.4783,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"When it opened in <em>1937</em>, the Golden Gate Bridge was the longest suspension bridge in the world, and its distinctive International Orange color was originally just a primer coat that the architect loved so much he made it permanent. The bridge's towers flex up to 16 feet in high winds, and the entire bridge expands and contracts nearly a foot with temperature changes."},
{"name":"Alcatraz Island","county":"San Francisco","emoji":"🏝","lat":37.827,"lon":-122.423,"cat":"Historic Prison","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Alcatraz_Island_as_seen_from_above.jpg/320px-Alcatraz_Island_as_seen_from_above.jpg","fact":"Alcatraz held some of America's most notorious criminals including Al Capone and Machine Gun Kelly, but the <em>27-year federal prison era</em> is relatively recent — the island served as a military fort and prison for 80 years before that. In 1969, Native American activists occupied Alcatraz for 19 months, a landmark event in the American Indian rights movement."},
{"name":"Fisherman's Wharf","county":"San Francisco","emoji":"🦀","lat":37.808,"lon":-122.4177,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Fishermans_Wharf_SF.jpg/320px-Fishermans_Wharf_SF.jpg","fact":"Fisherman's Wharf developed in the <em>1850s</em> when Italian immigrant fishermen, primarily from Genoa and Sicily, established a crab and shrimp fishing community along the northern waterfront. The Dungeness crab, still central to the wharf's identity, has been harvested in San Francisco Bay since the Gold Rush."},
{"name":"Coit Tower","county":"San Francisco","emoji":"🗼","lat":37.8024,"lon":-122.4058,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Coit_Tower%2C_SF.jpg/320px-Coit_Tower%2C_SF.jpg","fact":"Coit Tower was built in <em>1933</em> with a bequest from eccentric socialite Lillie Hitchcock Coit, who was obsessed with San Francisco's fire department and left money specifically for a monument to firefighters. The tower's interior murals, painted by 25 artists during the Depression, caused a near-scandal for their communist imagery."},
{"name":"Painted Ladies Alamo Square","county":"San Francisco","emoji":"🏘","lat":37.7762,"lon":-122.433,"cat":"Historic Buildings","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Painted_Ladies_San_Francisco_with_skyline.jpg/320px-Painted_Ladies_San_Francisco_with_skyline.jpg","fact":"The 'Painted Ladies' Victorian row houses facing Alamo Square were built in the <em>1890s</em> as middle-class housing and survived the 1906 earthquake because the fire never reached this neighborhood. The houses' elaborate paint schemes are a modern innovation — Victorian San Franciscans actually considered bright paint in poor taste."},
{"name":"Haight-Ashbury Historic District","county":"San Francisco","emoji":"☮","lat":37.7692,"lon":-122.4481,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Haight-Ashbury_street_sign.jpg/320px-Haight-Ashbury_street_sign.jpg","fact":"The Haight-Ashbury district became the epicenter of the <em>1967 Summer of Love</em>, when an estimated 100,000 young people converged on the neighborhood — overwhelming the city's infrastructure and establishing the hippie counterculture as a national phenomenon. The intersection of Haight and Ashbury Streets still draws tourists, though the neighborhood is now among San Francisco's most expensive."},
{"name":"Castro District","county":"San Francisco","emoji":"🏳️‍🌈","lat":37.7609,"lon":-122.435,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Castro_district_san_francisco.jpg/320px-Castro_district_san_francisco.jpg","fact":"The Castro became the <em>world's first openly gay neighborhood</em> in the early 1970s, when Harvey Milk established his camera shop and political base on Castro Street. Milk's 1978 assassination and the subsequent lenient manslaughter verdict sparked the White Night Riots, galvanizing the modern LGBT rights movement."},
{"name":"Mission Dolores","county":"San Francisco","emoji":"⛪","lat":37.7651,"lon":-122.4269,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Mission_Dolores_Basilica.jpg/320px-Mission_Dolores_Basilica.jpg","fact":"Mission Dolores, founded in <em>1776</em> — just five days before the signing of the Declaration of Independence — is the oldest intact building in San Francisco and survived the 1906 earthquake while the adjacent basilica was destroyed. The mission cemetery contains the graves of over 5,000 Ohlone people who died of disease after conversion."},
{"name":"Sutro Baths Ruins","county":"San Francisco","emoji":"🌊","lat":37.78,"lon":-122.5133,"cat":"Historic Ruins","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Sutro_Baths.jpg/320px-Sutro_Baths.jpg","fact":"Sutro Baths, opened in <em>1896</em>, was the world's largest indoor swimming complex — six glass-enclosed saltwater pools holding nearly 2 million gallons. The baths could accommodate 10,000 visitors simultaneously, but burned in 1966 while being demolished for apartments, and their concrete ruins now sit in Golden Gate National Recreation Area."},
{"name":"Fort Point National Historic Site","county":"San Francisco","emoji":"🏰","lat":37.8103,"lon":-122.4772,"cat":"Historic Fort","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Fort_Point_from_Golden_Gate_Bridge.jpg/320px-Fort_Point_from_Golden_Gate_Bridge.jpg","fact":"Fort Point, completed in <em>1861</em>, was a masterpiece of pre-Civil War military engineering — its 5-foot-thick brick walls were designed to withstand cannon fire and house 500 soldiers. When Strauss designed the Golden Gate Bridge, he built an arch over the fort to preserve it rather than demolish it, allowing visitors to stand beneath the bridge's south anchorage."},
{"name":"Presidio of San Francisco","county":"San Francisco","emoji":"🌲","lat":37.7983,"lon":-122.4544,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Presidio_of_San_Francisco.jpg/320px-Presidio_of_San_Francisco.jpg","fact":"The Presidio has been continuously operated as a military base since <em>1776</em> — first by Spain, then Mexico, then the United States — making it the oldest military installation in the American West by over 70 years. When the army left in 1994, it became a national park within a city, with residents paying market-rate rent to live inside."},
{"name":"Palace of Fine Arts","county":"San Francisco","emoji":"🏛","lat":37.8031,"lon":-122.4483,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Palace_of_Fine_Arts_San_Francisco.jpg/320px-Palace_of_Fine_Arts_San_Francisco.jpg","fact":"The Palace of Fine Arts was built as a <em>temporary structure</em> for the 1915 Panama-Pacific International Exposition out of plaster and burlap — and was never demolished because San Franciscans loved it too much. The building slowly crumbled for 50 years until a complete reconstruction in concrete in the 1960s, and again in the 2000s."},
{"name":"Ferry Building San Francisco","county":"San Francisco","emoji":"⛴","lat":37.7956,"lon":-122.3935,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/San_Francisco_Ferry_Building.jpg/320px-San_Francisco_Ferry_Building.jpg","fact":"The Ferry Building, opened in <em>1898</em>, processed 50 million passengers a year at its peak — the second busiest transit terminal in the world after Charing Cross in London. After the Bay Bridge opened in 1936, ferry use collapsed and the building's famous clock tower was hidden behind a freeway for 50 years."},
{"name":"Transamerica Pyramid","county":"San Francisco","emoji":"🏢","lat":37.7952,"lon":-122.4028,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Transamerica_Pyramid_San_Francisco.jpg/320px-Transamerica_Pyramid_San_Francisco.jpg","fact":"The Transamerica Pyramid, completed in <em>1972</em>, was deeply controversial when proposed — San Franciscans called it a 'dunce cap' and fought its construction for years. The building's unusual tapered form reduces wind load at upper floors by 40% compared to a conventional skyscraper, making it more earthquake-resistant."},
{"name":"Ghirardelli Square","county":"San Francisco","emoji":"🍫","lat":37.8058,"lon":-122.4228,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Ghirardelli_Square_SF.jpg/320px-Ghirardelli_Square_SF.jpg","fact":"Ghirardelli Square was the first major <em>adaptive reuse of an industrial building</em> in American history — a defunct chocolate factory transformed into a retail complex in 1964, pioneering a form of urban development that is now common worldwide. Domingo Ghirardelli started making chocolate in the building in 1852, and the factory produced chocolate continuously until 1962."},
{"name":"Muir Woods National Monument","county":"Marin","emoji":"🌲","lat":37.8912,"lon":-122.5808,"cat":"National Monument","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Muir_Woods_cathedral_grove.jpg/320px-Muir_Woods_cathedral_grove.jpg","fact":"Muir Woods preserves the <em>last old-growth coast redwood forest</em> accessible by public transit in the San Francisco Bay Area, with trees up to 1,000 years old and 258 feet tall. The monument was saved from a dam project in 1908 when Congressman William Kent donated the land to the federal government and insisted it be named after John Muir."},
{"name":"Point Reyes National Seashore","county":"Marin","emoji":"🌊","lat":38.0596,"lon":-122.8756,"cat":"National Seashore","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Point Reyes sits on a <em>separate tectonic plate</em> from the rest of California — the Pacific Plate — and has moved 25 miles northwest relative to the continent over the last million years. The Point Reyes Lighthouse, perched at the windiest and foggiest point on the Pacific Coast, logged 2,702 hours of fog in a single year."},
{"name":"Point Reyes Lighthouse","county":"Marin","emoji":"🔦","lat":37.9997,"lon":-122.9989,"cat":"Historic Lighthouse","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"The Point Reyes Lighthouse required <em>308 steps</em> descending a cliff face to reach its lens platform — keeper William McMahon reportedly climbed those steps 14,000 times over his 27-year tenure. The lighthouse's Fresnel lens, installed in 1870, was so powerful it could be seen 24 miles out to sea in clear conditions."},
{"name":"Mount Tamalpais State Park","county":"Marin","emoji":"🏔","lat":37.9235,"lon":-122.5965,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Mount Tamalpais — known locally as <em>'Mount Tam'</em> — gave birth to mountain biking in the 1970s when local cyclists began racing homemade bikes down its fire roads, inventing a sport now practiced by 100 million people worldwide. From the 2,571-foot summit on a clear day, you can see the entire Bay Area, the Farallon Islands, and the Sierra Nevada."},
{"name":"Tennessee Valley Trail","county":"Marin","emoji":"🥾","lat":37.8644,"lon":-122.5344,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"Tennessee Valley is named for the <em>steamship Tennessee</em>, which wrecked here in 1853 during its maiden voyage from New York to San Francisco — 551 passengers were saved, but the ship was a total loss. The valley's broad, flat trail to a small hidden beach is one of the most popular hikes in the Golden Gate National Recreation Area."},
{"name":"Stinson Beach","county":"Marin","emoji":"🏖","lat":37.9025,"lon":-122.6469,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Stinson_Beach_California.jpg/320px-Stinson_Beach_California.jpg","fact":"Stinson Beach's 3.5-mile strand is the <em>largest public beach</em> on Marin's coast and one of the few swimming beaches in the region where ocean temperatures are safe for recreational swimming. The town of Stinson Beach sits on an active fault zone that geologists warn would be subject to tsunami inundation in a major earthquake."},
{"name":"Bolinas Lagoon","county":"Marin","emoji":"🦭","lat":37.9083,"lon":-122.6808,"cat":"Lagoon","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Bolinas_Lagoon_harbor_seals.jpg/320px-Bolinas_Lagoon_harbor_seals.jpg","fact":"Bolinas Lagoon supports one of the largest <em>harbor seal pupping colonies</em> in Central California, with up to 200 seals hauling out on the tidal flats each spring. The lagoon is so beloved by its residents that locals famously remove highway signs directing tourists to Bolinas — replacing them becomes a regular task for Caltrans workers."},
{"name":"Audubon Canyon Ranch","county":"Marin","emoji":"🦢","lat":37.9258,"lon":-122.6397,"cat":"Wildlife Sanctuary","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Bolinas_Lagoon_harbor_seals.jpg/320px-Bolinas_Lagoon_harbor_seals.jpg","fact":"Audubon Canyon Ranch hosts the <em>most studied great blue heron and great egret rookery</em> in North America, where researchers have tracked nesting success continuously since 1962. Visitors can observe nesting birds in the redwood canopy through telescopes from a hillside overlook, from February through July each year."},
{"name":"Sausalito Waterfront","county":"Marin","emoji":"⛵","lat":37.8591,"lon":-122.4852,"cat":"Historic Waterfront","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Sausalito_waterfront.jpg/320px-Sausalito_waterfront.jpg","fact":"Sausalito's houseboat community, home to roughly <em>400 floating residences</em>, grew out of abandoned military barges left after World War II and became an artists' and bohemian haven in the 1960s and 70s. The town's name comes from the Spanish 'saucito,' meaning 'little willow grove' — the willows that once lined the cove are long gone."},
{"name":"Sausalito — Bay Model Visitor Center","county":"Marin","emoji":"🌊","lat":37.8722,"lon":-122.5028,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Sausalito_waterfront.jpg/320px-Sausalito_waterfront.jpg","fact":"The Bay Model is a <em>1.5-acre hydraulic scale model</em> of San Francisco Bay and the Sacramento-San Joaquin Delta, built by the Army Corps of Engineers to study tidal flows and was once used to evaluate whether a plan to fill most of San Francisco Bay should be approved. The model is still operational and represents every slough and channel in the bay system at 1:1000 scale."},
{"name":"Mill Valley Downtown","county":"Marin","emoji":"🌳","lat":37.9063,"lon":-122.5447,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Mill Valley's Depot Bookstore, occupying the 1929 train depot at the center of town, is one of the most beloved independent bookstores in California and the social heart of the community. The town was built to serve the <em>Mount Tamalpais and Muir Woods Railway</em> — the 'Crookedest Railroad in the World' — which carried tourists to the mountain from 1896 to 1930."},
{"name":"Tiburon Audubon Center","county":"Marin","emoji":"🦅","lat":37.8883,"lon":-122.4569,"cat":"Wildlife Center","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Sausalito_waterfront.jpg/320px-Sausalito_waterfront.jpg","fact":"The Tiburon Peninsula's Richardson Bay Audubon Center sits on the largest <em>eelgrass meadow</em> in San Francisco Bay, a critical nursery for fish and foraging habitat for migratory diving ducks. The center's shoreline provides one of the best views of San Francisco's skyline from water level, looking directly across the bay."},
{"name":"Angel Island State Park","county":"Marin","emoji":"🏝","lat":37.8608,"lon":-122.4311,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Angel_Island_SP.jpg/320px-Angel_Island_SP.jpg","fact":"Angel Island served as the <em>'Ellis Island of the West'</em> — a federal immigration station where over one million people, mostly from Asia, were processed between 1910 and 1940. During World War II, the island was converted to an internment camp and a missile defense installation, and Chinese immigrants carved poetry into the detention barracks walls that was only rediscovered in 1970."},
{"name":"Ring Mountain Open Space Preserve","county":"Marin","emoji":"🪨","lat":37.9228,"lon":-122.4875,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Ring Mountain's serpentine grasslands support <em>Tiburon mariposa lily</em> and other plant species found nowhere else on Earth — endemic species that evolved specifically to survive the heavy-metal toxic soils. The rocky outcroppings at the summit bear petroglyphs carved by Coast Miwok people thousands of years before European contact."},
{"name":"China Camp State Park","county":"Marin","emoji":"🎣","lat":38.0033,"lon":-122.4781,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"China Camp preserves one of the last surviving Chinese shrimp fishing villages in California, established in the <em>1870s</em> by immigrants who developed the hand-thrown casting net technique still used today. At its peak, the village supported 500 people and shipped millions of pounds of bay shrimp annually to markets as far as China."},
{"name":"McNears Beach County Park","county":"Marin","emoji":"🌊","lat":37.9878,"lon":-122.4742,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"McNears Beach's concrete pool, fed by <em>San Pablo Bay water</em> pumped directly from the shoreline, was once the largest saltwater swimming pool in the United States when it opened in the 1920s. The beach is named for John McNear, a 19th-century grain merchant whose schooners loaded wheat at the dock that still stands at the park."},
{"name":"San Quentin State Prison","county":"Marin","emoji":"🏛","lat":37.9416,"lon":-122.4831,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/San_Quentin_State_Prison.jpg/320px-San_Quentin_State_Prison.jpg","fact":"San Quentin, opened in <em>1852</em>, is California's oldest prison and sits on some of the most valuable real estate in America — a 432-acre waterfront peninsula with views of San Francisco Bay. The prison's death row once held Johnny Cash, who filmed his famous 1969 concert there featuring the song 'San Quentin' written and performed in front of the inmates."},
{"name":"Larkspur Landing Ferry Terminal","county":"Marin","emoji":"⛴","lat":37.9478,"lon":-122.5106,"cat":"Transit Hub","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"The Larkspur Ferry Terminal connects Marin to San Francisco via a <em>30-minute high-speed catamaran</em> crossing that has operated continuously since 1976, giving Marin commuters an alternative to the congested Richmond-San Rafael Bridge. The ferry runs through a restored tidal marsh that is now home to the endangered California black rail."},
{"name":"Marin Civic Center","county":"Marin","emoji":"🏛","lat":37.9833,"lon":-122.5317,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"The Marin Civic Center was Frank Lloyd Wright's <em>last major commission</em> and the only government building he ever designed — construction began the year he died in 1959 and was completed in 1962. The building's arches, blue-green roof, and central spire are among the most photographed examples of organic architecture in the United States."},
{"name":"Olompali State Historic Park","county":"Marin","emoji":"🏚","lat":38.1497,"lon":-122.5706,"cat":"State Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Olompali was the site of a major <em>Coast Miwok village</em> occupied continuously for over 5,000 years — the longest known occupation of a single site in the North Bay. In 1579, English explorer Sir Francis Drake likely encountered Miwok people at or near this site, making it potentially the earliest documented European contact in Northern California."},
{"name":"Point Reyes Bird Observatory","county":"Marin","emoji":"🦉","lat":37.994,"lon":-122.9781,"cat":"Research Station","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"The Point Reyes Bird Observatory, founded in 1965, has been banding and releasing birds at its Palomarin Field Station <em>every single day for over 50 years</em> — one of the longest continuous wildlife monitoring programs in North America. Researchers here discovered that certain migrating songbirds can fly nonstop from Alaska to Hawaii in under 3 days."},
{"name":"Kehoe Beach","county":"Marin","emoji":"🏖","lat":38.1553,"lon":-122.9583,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Kehoe Beach is one of the most <em>remote and undeveloped</em> strands on the California coast accessible by a short hike, backed by towering white sand dunes and a freshwater lagoon. The beach's isolation has made it a critical nesting area for snowy plovers, a threatened shorebird whose eggs blend perfectly with the pale sand."},
{"name":"Tomales Bay State Park","county":"Marin","emoji":"🦦","lat":38.1583,"lon":-122.8783,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Tomales Bay follows the <em>San Andreas Fault</em> almost exactly — it is a long, narrow water body that formed directly in the fault zone between the Pacific and North American plates. The bay's oyster farms produce some of the best shellfish in California, fed by nutrient-rich cold water that wells up from the deep Pacific just offshore."},
{"name":"Drakes Beach","county":"Marin","emoji":"⛵","lat":38.0308,"lon":-122.9494,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Drakes Beach is believed to be where English privateer Sir Francis Drake landed in <em>1579</em> for a five-week layover to repair his ship — making it potentially the first English foothold in what is now the continental United States. The beach's dramatic white chalk cliffs reminded Drake's crew so strongly of the White Cliffs of Dover that he claimed the land for England."},
{"name":"Limantour Beach","county":"Marin","emoji":"🌊","lat":38.0167,"lon":-122.8917,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Limantour Beach stretches for three unbroken miles at the edge of the <em>Point Reyes Wilderness</em>, backed by a lagoon where tule elk wade in the mornings and great egrets stalk the shallows. The beach is named for Jose Limantour, a French merchant who survived a shipwreck here in 1841 and later caused a San Francisco land title crisis with disputed property claims."},
{"name":"Tule Elk Reserve Point Reyes","county":"Marin","emoji":"🦌","lat":38.1317,"lon":-122.9483,"cat":"Wildlife Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"The Tomales Point Tule Elk Reserve protects a herd of over <em>400 tule elk</em> — California's native deer-sized elk species that was nearly hunted to extinction in the 1870s and reduced to a single small herd. The reserve occupies the narrow Tomales Point peninsula, where elk are visible from the trailhead within minutes of beginning the hike."},
{"name":"Abbott's Lagoon","county":"Marin","emoji":"🦢","lat":38.0817,"lon":-122.9583,"cat":"Lagoon","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Abbott's Lagoon is separated from the Pacific Ocean by just a narrow sandbar, creating a <em>warm, sheltered freshwater habitat</em> within earshot of the crashing surf. The lagoon attracts enormous numbers of diving ducks in winter — scaup, buffleheads, and canvasbacks by the thousands — that feed on the aquatic vegetation."},
{"name":"Bear Valley Visitor Center Point Reyes","county":"Marin","emoji":"🐻","lat":38.0383,"lon":-122.7994,"cat":"Visitor Center","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Bear Valley was the heart of a <em>working dairy ranching district</em> continuously farmed since the 1850s — some of the original ranch buildings still stand, and several ranches within Point Reyes continue operating under federal lease agreements. The 1906 earthquake ruptured the San Andreas Fault directly across the Bear Valley Trail, and the offset fence post marking the ground displacement is still visible."},
{"name":"Bolinas Town","county":"Marin","emoji":"🌊","lat":37.9083,"lon":-122.6808,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Bolinas_Lagoon_harbor_seals.jpg/320px-Bolinas_Lagoon_harbor_seals.jpg","fact":"Bolinas was a major <em>lumber shipping port</em> in the 1860s, sending redwood timber cut from the coastal hills by ship to San Francisco — so much timber that the hills above town were completely stripped within a decade. Today the town is known for its fiercely private character and its residents' decades-long campaign to keep it off tourist maps."},
{"name":"Palomarin Trailhead GGNRA","county":"Marin","emoji":"🥾","lat":37.9283,"lon":-122.7439,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Bolinas_Lagoon_harbor_seals.jpg/320px-Bolinas_Lagoon_harbor_seals.jpg","fact":"The Palomarin Trail leads to Bass Lake, a <em>crystal-clear freshwater lake</em> hidden in a coastal scrub valley just half a mile from the Pacific Ocean — a juxtaposition found almost nowhere else on the California coast. The trail passes through coastal prairie where gray foxes are frequently seen in daylight hours."},
{"name":"Muir Beach","county":"Marin","emoji":"🏖","lat":37.8644,"lon":-122.5736,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"Muir Beach sits at the mouth of Redwood Creek, where coho salmon return each winter to spawn — a <em>rare occurrence</em> this close to a major metropolitan area. The beach is one of the few places on Marin's coast where visitors can walk directly from old-growth redwood forest to ocean beach in under five minutes."},
{"name":"Pantoll Ranger Station Mount Tamalpais","county":"Marin","emoji":"🏔","lat":37.9058,"lon":-122.5981,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Pantoll sits at the hub of <em>200 miles of trails</em> radiating across Mount Tamalpais State Park, the Golden Gate National Recreation Area, and Muir Woods — the densest trail network of any mountain in the Bay Area. The open-air Mountain Theater above Pantoll has hosted outdoor performances since 1913, making it one of the oldest continuously operating outdoor theaters in California."},
{"name":"Cascade Canyon Open Space Preserve","county":"Marin","emoji":"💧","lat":37.9294,"lon":-122.5656,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Cascade Creek drops over <em>20 waterfalls</em> in its short descent through a forested canyon just minutes from downtown Fairfax — one of the most dramatic waterfall sequences in Marin County. The canyon's north-facing slopes stay damp year-round, supporting lush fern grottos and rare California bay laurel forests."},
{"name":"Roy's Redwoods Open Space Preserve","county":"Marin","emoji":"🌲","lat":37.9658,"lon":-122.5972,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Roy's Redwoods preserves a grove of second-growth coast redwoods in the <em>San Geronimo Valley</em> that includes several trees over 200 feet tall — giants by any standard outside of the old-growth forests of the North Coast. The preserve is an important wildlife corridor connecting the coastal hills to the interior valleys of Marin."},
{"name":"Samuel P. Taylor State Park","county":"Marin","emoji":"🌲","lat":38.0014,"lon":-122.7278,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Samuel P. Taylor State Park sits in the canyon of Papermill Creek, named for <em>California's first paper mill</em> built by Taylor in 1856 to supply the booming newspaper industry of Gold Rush San Francisco. The park's cool, shaded canyon floor supports one of the last substantial runs of coho salmon in Marin County."},
{"name":"Nicasio Reservoir","county":"Marin","emoji":"💧","lat":38.0611,"lon":-122.6889,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Nicasio Reservoir was built in <em>1960</em> in the heart of Marin's dairy ranching country, flooding a valley that contained a Miwok village site, a historic stagecoach stop, and the original town of Nicasio. The reservoir now provides about a third of Marin County's water supply."},
{"name":"Marin Headlands","county":"Marin","emoji":"🌉","lat":37.8308,"lon":-122.5003,"cat":"National Recreation Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"The Marin Headlands offer the most photographed view of the <em>Golden Gate Bridge</em> in the world — the angle from Hawk Hill is on the cover of more guidebooks than any other vantage point. The headlands were saved from massive residential development in 1972 when protesters physically blocked bulldozers that had already begun grading lots."},
{"name":"Hawk Hill Marin Headlands","county":"Marin","emoji":"🦅","lat":37.8317,"lon":-122.4989,"cat":"Wildlife Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"Hawk Hill is one of the <em>premier raptor migration watchpoints</em> in North America — during peak fall migration, over 2,000 raptors pass the hill in a single day, including sharp-shinned hawks, Cooper's hawks, golden eagles, merlins, and peregrine falcons. Volunteers have counted migrating raptors here every September through December since 1972."},
{"name":"Rodeo Beach Marin Headlands","county":"Marin","emoji":"🪨","lat":37.8286,"lon":-122.5344,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"Rodeo Beach is one of the most <em>geologically complex beaches</em> in California — its pebbles represent at least a dozen different rock types from different geological periods, including chert, serpentine, basalt, and greenstone. The beach's distinctive green and red pebbles are so unusual that geologists use it as a teaching site."},
{"name":"Battery Spencer Marin Headlands","county":"Marin","emoji":"🏰","lat":37.8333,"lon":-122.4878,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"Battery Spencer's massive concrete gun emplacements were built in <em>1897</em> to hold 12-inch disappearing guns that could fire a 1,000-pound shell across the Golden Gate entrance. The battery was obsolete before it fired a shot in anger, but its ruins now provide the most dramatic foreground view of the Golden Gate Bridge available to visitors."},
{"name":"Fort Baker Marin Headlands","county":"Marin","emoji":"🏛","lat":37.8311,"lon":-122.4769,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"Fort Baker was established in <em>1897</em> as the Bay Area's primary coastal artillery defense and its Spanish Colonial Revival buildings now house the Golden Gate National Recreation Area's administrative headquarters. The fort's semicircular parade ground, overlooking the bay and bridge, is considered one of the most beautiful military compounds in the western United States."},
{"name":"Muir Beach Overlook","county":"Marin","emoji":"🌊","lat":37.8581,"lon":-122.5583,"cat":"Scenic Overlook","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"The Muir Beach Overlook sits directly above the <em>submarine cables</em> connecting California to Japan and Hawaii — the concrete pillboxes visible on the headland were built in World War II to guard these critical communications lines. On clear days, the Farallon Islands are visible 27 miles offshore, rising from the Pacific like distant sleeping whales."},
{"name":"Inverness Ridge","county":"Marin","emoji":"🌲","lat":38.0961,"lon":-122.8661,"cat":"Ridge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Inverness Ridge is home to one of the southernmost stands of <em>Bishop pine forest</em> in California — trees that grow almost exclusively on ancient marine terraces along the coast and depend on fire to open their cones and release seeds. The ridge's Douglas fir and bishop pine forest is so dense that fog drip from the canopy doubles the annual rainfall measured at rain gauges."},
{"name":"Drake's Estero","county":"Marin","emoji":"🦦","lat":38.0333,"lon":-122.8917,"cat":"Estuary","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Drake's Estero is one of the most productive <em>eelgrass estuaries</em> on the Pacific Coast, sheltering Pacific harbor seals that haul out by the hundreds on sandbars to nurse their pups in spring. The estero was designated wilderness in 2012, ending commercial oyster farming that had operated under federal lease for over a century."},
{"name":"Point Reyes National Seashore Headquarters","county":"Marin","emoji":"🌾","lat":38.0383,"lon":-122.7994,"cat":"Historic Ranch","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"The Bear Valley headquarters area preserves the original buildings of a <em>1850s dairy ranch</em> that supplied fresh milk and butter to Gold Rush San Francisco — the peninsula's cool, foggy climate was ideal for dairy cattle. When the National Park Service acquired the land in the 1960s, it allowed ranching families to continue operating under 25-year lease agreements."},
{"name":"Papermill Creek Salmon Viewing Area","county":"Marin","emoji":"🐟","lat":38.008,"lon":-122.7347,"cat":"Wildlife Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Each November through February, <em>coho salmon</em> return to Papermill Creek to spawn — one of the last wild coho runs south of San Francisco and a remarkable survivor amid urban and agricultural pressure. The salmon can be watched from bridges in Samuel P. Taylor State Park, where interpretive signs explain the lifecycle of a fish that inspired California conservation law."},
{"name":"Mount Tamalpais East Peak","county":"Marin","emoji":"🏔","lat":37.9236,"lon":-122.5806,"cat":"Mountain Peak","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"The East Peak fire lookout tower atop Mount Tamalpais has been <em>continuously staffed during fire season</em> since 1918, making it one of the longest-operating fire lookouts in California. The summit's East Peak parking area sits at 2,571 feet — the highest point reachable by paved road in Marin County."},
{"name":"Bolinas Ridge Trail","county":"Marin","emoji":"🥾","lat":37.9611,"lon":-122.7281,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Bolinas_Lagoon_harbor_seals.jpg/320px-Bolinas_Lagoon_harbor_seals.jpg","fact":"The Bolinas Ridge Trail runs for <em>11 miles along an unbroken ridgeline</em> that divides the fog-drenched coast from the warm inland valleys — the temperature difference between the two sides can be 30 degrees on the same day. The ridge offers views from the Point Reyes peninsula to the Golden Gate in one unobstructed sweep."},
{"name":"Duxbury Reef","county":"Marin","emoji":"🦀","lat":37.9103,"lon":-122.7161,"cat":"Marine Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Bolinas_Lagoon_harbor_seals.jpg/320px-Bolinas_Lagoon_harbor_seals.jpg","fact":"Duxbury Reef is the largest <em>exposed shale reef</em> on the Pacific Coast of North America, a vast rocky platform revealed at low tide that supports one of the richest intertidal communities in California. The reef is a state marine reserve where collecting is prohibited, and its diverse sea stars, urchins, anemones, and nudibranchs draw marine biologists from around the world."},
{"name":"Olema Valley Trail","county":"Marin","emoji":"🌾","lat":38.0394,"lon":-122.7783,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"The Olema Valley sits directly on the <em>San Andreas Fault</em>, and the 1906 earthquake offset fences and roads across the valley by up to 20 feet — some of the largest surface rupture recorded in that disaster. The valley's dairy ranches have operated continuously for over 150 years, making it one of the longest continuously farmed landscapes in California."},
{"name":"Drakes Estero Canoe Launch","county":"Marin","emoji":"🚣","lat":38.0206,"lon":-122.9069,"cat":"Recreation","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"Kayaking Drake's Estero offers views of <em>harbor seals nursing pups</em> in spring at close range — encounters that occur naturally without human disturbance because the seals are unafraid of quiet vessels. The estero's shallow channels wind through eelgrass beds that harbor sevengill sharks, leopard sharks, and bat rays."},
{"name":"Green Gulch Farm Zen Center","county":"Marin","emoji":"☯","lat":37.8681,"lon":-122.5564,"cat":"Spiritual Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"Green Gulch Farm has been operating as a <em>Zen Buddhist monastery and organic farm</em> since 1972, growing produce for the Greens Restaurant in San Francisco that helped create the Bay Area farm-to-table movement. The farm sits in a narrow coastal valley where Pacific fog funnels inland each morning, creating a microclimate ideal for growing vegetables year-round."},
{"name":"Slide Ranch","county":"Marin","emoji":"🌿","lat":37.8861,"lon":-122.5919,"cat":"Education Farm","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"Slide Ranch perches on dramatic coastal bluffs above tidepools that teem with <em>sea stars, crabs, and anemones</em>, offering educational farm visits where children from urban schools experience farm animals and wild coastline simultaneously. The ranch operates inside the Golden Gate National Recreation Area under a special use permit that dates to the 1970s."},
{"name":"Fairfax — Sir Francis Drake Boulevard","county":"Marin","emoji":"🌳","lat":37.9872,"lon":-122.5886,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Fairfax is often called the <em>most liberal small town in America</em> — it was the first city in the United States to vote in favor of medical marijuana in 1996, and the first to pass an anti-Patriot Act resolution. The town's downtown, centered on a single block of restaurants and vintage shops, draws visitors from across the Bay Area for its bohemian character."},
{"name":"San Pedro Mountain Open Space Preserve","county":"Marin","emoji":"🦁","lat":37.9247,"lon":-122.4933,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"San Pedro Mountain's serpentine grasslands are a <em>biodiversity hotspot</em> supporting over 50 rare plant species, including several that grow nowhere else on Earth. The preserve's ridgetop trail offers a 180-degree view sweeping from San Pablo Bay to the Golden Gate — a panorama taken in by Coast Miwok people for thousands of years."},
{"name":"Corte Madera Ecological Reserve","county":"Marin","emoji":"🦩","lat":37.9197,"lon":-122.5094,"cat":"Ecological Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"The Corte Madera salt marsh is one of the few <em>restored tidal wetlands</em> in Marin County, re-connected to the bay after decades as industrial fill and allowing the return of salt marsh harvest mice and Ridgway's rails. The reserve provides critical wildlife habitat in the middle of a densely developed commercial corridor."},
{"name":"Rodeo Lagoon Marin Headlands","county":"Marin","emoji":"🦭","lat":37.8286,"lon":-122.5261,"cat":"Lagoon","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"Rodeo Lagoon hosts the Marine Mammal Center, which treats more <em>sick and injured marine mammals</em> than any other facility in the world — over 900 animals per year, including elephant seals, sea lions, and harbor seals. The lagoon itself is a stopover for thousands of migrating shorebirds and waterfowl each fall."},
{"name":"Point Reyes Elk Prairie Campground","county":"Marin","emoji":"🦌","lat":38.0725,"lon":-122.9694,"cat":"Campground","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"The Elk Prairie campground at Point Reyes sits within a herd territory of <em>free-roaming tule elk</em> — campers regularly wake to bulls bugling outside their tents during the fall rut. The campground is accessible only by trail, making it one of the most remote camping experiences available within 75 miles of San Francisco."},
{"name":"Marin Municipal Water District Watershed","county":"Marin","emoji":"💧","lat":37.9442,"lon":-122.5836,"cat":"Watershed","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"The Marin Municipal Water District watershed encompasses <em>21,000 acres</em> on the slopes of Mount Tamalpais — closed to the public except for designated trails, the watershed forests are some of the largest undisturbed redwood and Douglas fir stands in the Bay Area. Seven reservoirs in the watershed collect winter rainfall to supply water to 185,000 Marin residents."},
{"name":"Tiburon Peninsula Historical Museum","county":"Marin","emoji":"🏛","lat":37.8869,"lon":-122.4561,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Sausalito_waterfront.jpg/320px-Sausalito_waterfront.jpg","fact":"The Tiburon Railroad and Ferry Depot, built in <em>1884</em>, was the western terminus of the transcontinental railroad's connection to San Francisco — passengers arrived by train and boarded ferries across the bay. The restored Victorian depot is now a local history museum and one of the oldest surviving railroad stations in California."},
{"name":"San Rafael Downtown Historic District","county":"Marin","emoji":"🏘","lat":37.9735,"lon":-122.5311,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"San Rafael's Mission San Rafael Arcángel, founded in <em>1817</em>, was originally established as an asistencia — a branch clinic of Mission Dolores — to treat Native Californians suffering from respiratory diseases in San Francisco's cold, foggy climate. The current mission chapel is a reconstruction, but the original site where Father Juan Amorós ministered is preserved."},
