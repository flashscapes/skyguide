{"name":"China Cove Point Reyes","county":"Marin","emoji":"🌊","lat":37.9956,"lon":-122.9731,"cat":"Scenic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"China Cove is a hidden pocket beach accessible only by steep stairs cut into a <em>dramatically eroded sandstone cliff</em> that glows gold in afternoon light. The cove is sheltered enough to swim safely in summer and attracts harbor seals that haul out on offshore rocks just yards from the beach."},
{"name":"Stinson Beach Lagoon","county":"Marin","emoji":"🦆","lat":37.8933,"lon":-122.6531,"cat":"Lagoon","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Stinson_Beach_California.jpg/320px-Stinson_Beach_California.jpg","fact":"Bolinas Lagoon at the south end of Stinson Beach is one of the most <em>important wintering grounds</em> for Pacific Flyway shorebirds in the Bay Area, hosting tens of thousands of dunlin, dowitchers, and sandpipers. The lagoon is slowly filling with sediment washed from the eroding cliffs above — scientists estimate it will be completely filled within 200 years."},
{"name":"Gallinas Creek Wetlands","county":"Marin","emoji":"🦩","lat":38.0119,"lon":-122.5353,"cat":"Wetlands","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"Gallinas Creek wetlands protect one of the last remnants of the extensive <em>tidal marsh ecosystem</em> that once fringed the entire northern end of San Francisco Bay. The wetlands were nearly developed for housing in the 1970s before a citizen campaign saved them — today they are a model restoration project and home to the endangered salt marsh harvest mouse."},
{"name":"Kent Lake","county":"Marin","emoji":"💧","lat":37.965,"lon":-122.6494,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Kent Lake, built in <em>1953</em> in the Lagunitas Creek watershed, holds over 33 billion gallons — the largest reservoir in Marin County. The lake's surrounding watershed forests are so protected that they support one of the largest populations of pileated woodpeckers in the Bay Area."},
{"name":"Novato — Miwok Archaeological Preserve","county":"Marin","emoji":"🏺","lat":38.1072,"lon":-122.5717,"cat":"Archaeological Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"The Miwok Archaeological Preserve of Marin protects a <em>Coast Miwok village site</em> at Olompali that has been continuously occupied for at least 5,000 years — among the longest in California. Archaeological digs here have uncovered evidence of trade with peoples from as far as the Great Basin, 500 miles away."},
{"name":"Tomales Bay — Marshall Oyster Farm","county":"Marin","emoji":"🦪","lat":38.1769,"lon":-122.8911,"cat":"Historic Farm","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Tomales Bay oyster farming began in the <em>1870s</em> when Chinese entrepreneurs discovered that the bay's cold, nutrient-rich water produced exceptionally sweet Pacific oysters. Today the bay produces over a million oysters per year and is considered one of the finest oyster-growing regions in the United States."},
{"name":"Black Sands Beach Marin Headlands","county":"Marin","emoji":"🖤","lat":37.8369,"lon":-122.4806,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"Black Sands Beach gets its dramatic dark color from <em>crushed serpentinite rock</em> — the California state rock — ground to sand by centuries of wave action against the headlands cliffs. The beach is only accessible via a steep, unmaintained trail that deters most visitors, leaving it quiet even on crowded summer weekends."},
{"name":"Audubon Society Cypress Grove Preserve","county":"Marin","emoji":"🌲","lat":38.1814,"lon":-122.8978,"cat":"Nature Preserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"The Cypress Grove Preserve at Marshall hosts a <em>great blue heron rookery</em> of nearly 100 nesting pairs in a stand of introduced Monterey cypress — the largest heron colony in Marin County. The preserve's boardwalk trail crosses tidal marsh at the edge of Tomales Bay, where harbor seals regularly surface within arm's reach of visitors."},
{"name":"Chicken Ranch Beach","county":"Marin","emoji":"🌊","lat":38.1786,"lon":-122.8889,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Chicken Ranch Beach is one of the only <em>warm-water swimming spots</em> in Marin County — Tomales Bay's shallow, enclosed waters heat up significantly in summer compared to the frigid open Pacific. The beach is beloved by kayakers who use it as a put-in for exploring the narrow bay between the Point Reyes Peninsula and the Marin mainland."},
{"name":"Point San Pedro","county":"Marin","emoji":"🌊","lat":37.9989,"lon":-122.4508,"cat":"Scenic Point","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"Point San Pedro juts into <em>San Pablo Bay</em> and marks the boundary between the bay's salt and freshwater zones — a transition zone that supports an unusual mix of marine, estuarine, and freshwater species. The point's rocky shoreline has been used as a fishing spot by humans for at least 3,000 years."},
{"name":"Woodacre — San Geronimo Valley","county":"Marin","emoji":"🌿","lat":38.0008,"lon":-122.6869,"cat":"Rural Valley","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"The San Geronimo Valley was a major <em>summer resort destination</em> for San Francisco families in the 1890s and early 1900s, when the North Pacific Coast Railroad ran excursion trains to the valley's redwood groves each weekend. Today the valley is an artistic and alternative community, fighting to preserve agricultural open space against development pressure."},
{"name":"Mount Tamalpais Watershed — Alpine Lake","county":"Marin","emoji":"💧","lat":37.9378,"lon":-122.6097,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Alpine Lake, dammed in <em>1918</em>, flooded a canyon that previously held one of the most spectacular redwood groves in Marin — old photographs show trees rivaling those in Muir Woods, all now submerged. The reservoir is a popular launching point for kayakers exploring the forested shoreline that still supports nesting osprey and great blue herons."},
{"name":"Bolinas Mesa","county":"Marin","emoji":"🌾","lat":37.9156,"lon":-122.7178,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Bolinas_Lagoon_harbor_seals.jpg/320px-Bolinas_Lagoon_harbor_seals.jpg","fact":"The Bolinas Mesa agricultural district has been farmed for <em>150 years</em>, with dairy ranches and vegetable farms that help supply Marin's robust local food economy. The mesa sits atop a 300-foot marine terrace above the Pacific — a flat-topped bench formed when this land was underwater 100,000 years ago."},
{"name":"White House Pool Lagunitas Creek","county":"Marin","emoji":"🐟","lat":38.0331,"lon":-122.7461,"cat":"Wildlife Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"White House Pool is the primary <em>adult coho salmon holding pool</em> on Lagunitas Creek — the most productive wild coho stream south of the Russian River — where fish rest before their final migration to upstream spawning gravels. Wildlife biologists have counted salmon here every year since 1946, creating one of the longest continuous salmon population records in California."},
{"name":"Rush Creek Open Space Preserve","county":"Marin","emoji":"🌿","lat":38.0717,"lon":-122.5508,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"Rush Creek Preserve protects a mosaic of <em>tidal marsh, seasonal wetland, and upland grassland</em> at the northern end of San Francisco Bay that is critical habitat for the endangered Ridgway's rail and salt marsh harvest mouse. The preserve's trail system is accessible from the Novato transit center."},
{"name":"Agate Beach County Park","county":"Marin","emoji":"💎","lat":38.0528,"lon":-122.7469,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Agate Beach is named for the semiprecious <em>agate and jade pebbles</em> that wash ashore from offshore rock deposits — gem hunters search the cobble beach after winter storms when fresh stones are exposed. The beach faces directly across Tomales Bay toward Point Reyes, offering an unusual view of the peninsula's forested ridge from the water side."},
{"name":"Lagunitas Creek Watershed","county":"Marin","emoji":"🌊","lat":38.02,"lon":-122.78,"cat":"Watershed","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Lagunitas Creek supports the <em>southernmost wild coho salmon run</em> in the Western Hemisphere, a population that survived despite urbanization, drought, and disease. Conservation efforts including fish ladders and streambank restoration have increased returns from fewer than 100 adults in 1995 to over 1,000 in recent years."},
{"name":"Point Reyes Hostel","county":"Marin","emoji":"🏕","lat":37.9997,"lon":-122.9564,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"The Point Reyes Hostel occupies an <em>1880s dairy ranch</em> within the National Seashore, where guests sleep in converted farmworker bunkhouses surrounded by pasture and coastal scrub. The ranch's original milk house, cooling room, and hay barn still stand, giving visitors a sense of how coastal Marin farms operated in the 19th century."},
{"name":"Marin County Civic Center Lagoon","county":"Marin","emoji":"🦢","lat":37.9781,"lon":-122.5286,"cat":"Wetland Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"The lagoon adjacent to the Frank Lloyd Wright Civic Center was part of the architect's <em>original landscape design</em>, meant to reflect the building's arching roof in the water below. The restored wetlands now support nesting Canada geese, great egrets, and black-crowned night herons visible from the Civic Center's walkways."},
{"name":"Corte Madera Town Green","county":"Marin","emoji":"🌳","lat":37.9256,"lon":-122.5239,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"Corte Madera means <em>'cut wood'</em> in Spanish — the town was named for the logging operations that stripped the coastal hills of their redwood forests to supply lumber to early San Francisco. The town green preserves a slice of the original creek flood plain amid the commercial development that followed the 1956 opening of Highway 101."},
{"name":"Stafford Lake County Park","county":"Marin","emoji":"💧","lat":38.0819,"lon":-122.5728,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"Stafford Lake was created in <em>1921</em> by damming Novato Creek to supply water to the growing town — it remains the only reservoir in Marin County that allows swimming and non-motorized boating. The lake's grassy shores are one of the best picnicking spots in the North Bay."},
{"name":"Indian Valley Open Space Preserve","county":"Marin","emoji":"🌿","lat":38.0617,"lon":-122.5728,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"Indian Valley Preserve takes its name from the <em>Coast Miwok settlements</em> that occupied this oak woodland valley for thousands of years before Spanish contact. The preserve's seasonal wetlands are an important breeding site for California tiger salamanders, a threatened species that relies on pools that dry up completely in summer."},
{"name":"Pacheco Pond","county":"Marin","emoji":"🦅","lat":38.095,"lon":-122.5847,"cat":"Wildlife Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"Pacheco Pond's seasonal wetland attracts <em>wintering waterfowl and shorebirds</em> in numbers that can reach into the thousands during wet winters — it is one of the few accessible water bodies in Marin's agricultural interior. Great horned owls nest in the surrounding oaks and can be heard calling at dusk year-round."},
{"name":"Point Bonita Lighthouse","county":"Marin","emoji":"🔦","lat":37.8153,"lon":-122.5283,"cat":"Historic Lighthouse","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"Point Bonita Lighthouse, first lit in <em>1855</em>, stands on a rocky peninsula reached by a cliffside tunnel and a suspension footbridge — one of the most dramatic approaches to any lighthouse in America. The lighthouse's original keepers hammered a cannon on the rocks below to warn ships during thick fog, before the foghorn was installed."},
{"name":"Gerbode Valley","county":"Marin","emoji":"🌾","lat":37.8492,"lon":-122.4928,"cat":"Valley","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"The Gerbode Valley was slated for a <em>2,100-unit housing development</em> in the 1960s before being saved by citizen activism and donated to the Golden Gate National Recreation Area. Today the valley's grasslands are managed to support native bunchgrasses and wildflowers, including the rare Marin dwarf flax."},
{"name":"Wolfback Ridge","county":"Marin","emoji":"🌉","lat":37.8569,"lon":-122.4969,"cat":"Scenic Ridge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"Wolfback Ridge offers the most <em>dramatic aerial-perspective view</em> of the Golden Gate Bridge available on foot — the bridge stretches out below like a model, with San Francisco on one side and the Marin Headlands on the other. The ridge's name refers to the wolf pack that early American settlers reported living in the headlands in the 1840s."},
{"name":"Stinson Beach Community","county":"Marin","emoji":"🌊","lat":37.8958,"lon":-122.6408,"cat":"Historic Community","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Stinson_Beach_California.jpg/320px-Stinson_Beach_California.jpg","fact":"Stinson Beach was developed as a summer colony by San Francisco families who arrived by <em>ferry and stagecoach</em> beginning in the 1890s, building small cottages along the beach that were accessed by a winding coastal road. The town's 600 year-round residents deal regularly with road closures — Highway 1 through the Marin headlands is frequently blocked by landslides each winter."},
{"name":"Muir Woods — Cathedral Grove","county":"Marin","emoji":"🌲","lat":37.8917,"lon":-122.5833,"cat":"National Monument","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Muir_Woods_cathedral_grove.jpg/320px-Muir_Woods_cathedral_grove.jpg","fact":"Cathedral Grove contains the oldest trees in Muir Woods, with several coast redwoods estimated at <em>800 to 1,000 years old</em> — meaning they were saplings when the Crusades were beginning in Europe. In 1945, delegates who had just created the United Nations gathered here for a memorial service honoring Franklin D. Roosevelt."},
{"name":"Tennessee Valley Beach","county":"Marin","emoji":"🏖","lat":37.8519,"lon":-122.5428,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Tennessee_Valley_GGNRA.jpg/320px-Tennessee_Valley_GGNRA.jpg","fact":"Tennessee Valley Beach is one of the <em>most sheltered ocean beaches</em> in the Marin Headlands, flanked by dramatic cliffs that protect it from the prevailing northwest wind. The beach is accessible only via a 3.5-mile round-trip trail, keeping it quieter than nearby Stinson Beach despite being just 10 miles from the Golden Gate Bridge."},
{"name":"Big Rock Ridge Open Space","county":"Marin","emoji":"🪨","lat":38.0458,"lon":-122.5281,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"Big Rock Ridge reaches <em>1,887 feet</em> — the highest point in Novato — and its summit fire road offers sweeping views across San Pablo Bay to Mount Diablo and the East Bay hills. The ridge's grasslands and oak woodlands are home to one of Marin County's healthiest mountain lion populations."},
{"name":"Bothin Marsh Open Space Preserve","county":"Marin","emoji":"🌿","lat":37.9347,"lon":-122.5194,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"Bothin Marsh preserves a remnant of the tidal wetland that once lined the <em>entire western shore of Corte Madera Creek</em>, providing critical stopover habitat for shorebirds on the Pacific Flyway. The preserve's trail runs along a levee between the marsh and Highway 101, and at high tide the wetland pools fill with avocets, stilts, and dowitchers."},
{"name":"Loma Alta Open Space Preserve","county":"Marin","emoji":"🌄","lat":37.9906,"lon":-122.5728,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Loma Alta Preserve occupies a <em>ridgeline between San Rafael and Fairfax</em> that serves as a wildlife corridor connecting the forested slopes of Mount Tamalpais to the rangelands of inland Marin. The serpentine outcroppings along the ridge support rare wildflowers including the Marin dwarf flax and Tiburon buckwheat."},
{"name":"White Hill Open Space Preserve","county":"Marin","emoji":"🌿","lat":37.9925,"lon":-122.6417,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"White Hill's loop trail passes through a <em>mosaic of grassland, chaparral, and oak woodland</em> that supports deer, foxes, and bobcats visible from the trail in early morning. The preserve connects to the San Geronimo Valley below, where Lagunitas Creek supports its famous salmon run."},
{"name":"Almonte Historic District","county":"Marin","emoji":"🏘","lat":37.8819,"lon":-122.5228,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Almonte is an unincorporated community established in the <em>1890s</em> as a working-class neighborhood for employees of the Mill Valley railroad and the ferry docks at the edge of Richardson Bay. The district's small cottages and bungalows remain largely intact and are an affordable enclave in the otherwise expensive Marin County housing market."},
{"name":"Novato — Hamilton Air Field Historic District","county":"Marin","emoji":"✈️","lat":38.0631,"lon":-122.4861,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"Hamilton Army Air Field, established in <em>1932</em>, was the primary staging base for American air defenses of the Pacific Coast after Pearl Harbor. The base's Art Deco hangars and officer housing are now a national historic landmark district and a residential neighborhood."},
{"name":"Marin Art and Garden Center Ross","county":"Marin","emoji":"🌸","lat":37.9589,"lon":-122.5556,"cat":"Cultural Center","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"The Marin Art and Garden Center occupies a <em>Victorian estate</em> in the town of Ross, with gardens designed in 1905 by John McLaren — the same landscape architect who transformed Golden Gate Park into San Francisco's green heart. The center's century-old trees include one of the largest coast live oaks in Marin County."},
{"name":"Phoenix Lake","county":"Marin","emoji":"💧","lat":37.9583,"lon":-122.5858,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Phoenix Lake, dammed in <em>1905</em> within the Mount Tamalpais watershed, is surrounded by a loop trail that is one of the most beloved walks in Marin County — 5 miles through redwood, oak, and mixed forest with views of the water. The lake's shore is an excellent place to observe river otters, which den in streambank burrows and raise pups in spring."},
{"name":"Cascade Falls Fairfax","county":"Marin","emoji":"💧","lat":37.9883,"lon":-122.6019,"cat":"Waterfall","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Cascade Falls drops <em>30 feet</em> into a mossy grotto just a 10-minute walk from downtown Fairfax — one of the most accessible waterfalls in the Bay Area. The falls flow year-round from springs in the surrounding serpentine rock, and the pool below is a traditional swimming hole for Fairfax residents."},
{"name":"Lucas Valley Road Marin","county":"Marin","emoji":"🎬","lat":38.0228,"lon":-122.5928,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"Lucas Valley Road leads to Skywalker Ranch, the <em>creative headquarters of George Lucas</em> that he built in 1985 after the success of Star Wars — the 4,700-acre property includes a Victorian main house, technical facilities, a winery, and an organic farm. The scenic road itself, winding through Marin's oak-studded hills, appeared in car commercials and film shoots throughout the 1970s and 80s."},
{"name":"Steep Ravine","county":"Marin","emoji":"🌊","lat":37.8978,"lon":-122.6225,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Stinson_Beach_California.jpg/320px-Stinson_Beach_California.jpg","fact":"Steep Ravine Environmental Campground consists of <em>10 rustic cabins perched on a cliff</em> above a rocky Pacific cove — among the most sought-after camping reservations in California, often booked months in advance. The trail down the ravine descends through a cathedral of second-growth redwoods and crosses Webb Creek on a series of wooden ladders bolted to the canyon wall."},
{"name":"Bald Hill Open Space Preserve","county":"Marin","emoji":"🌄","lat":37.9828,"lon":-122.5483,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Mount_Tamalpais.jpg/320px-Mount_Tamalpais.jpg","fact":"Bald Hill's <em>360-degree summit view</em> encompasses the entire San Rafael valley, San Pablo Bay, the Richmond-San Rafael Bridge, and the peaks of the East Bay — all visible from a grassy hilltop above the suburban edge of San Rafael. The hill is one of the most visible landmarks in Marin, its treeless summit standing out against the forested ridges around it."},
{"name":"McClure's Beach","county":"Marin","emoji":"🏖","lat":38.1764,"lon":-122.9642,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Point_Reyes_Lighthouse.jpg/320px-Point_Reyes_Lighthouse.jpg","fact":"McClure's Beach lies at the very tip of the <em>Point Reyes Peninsula</em>, surrounded by some of the most dramatic sea cliffs on the Northern California coast — vertical walls of gray sandstone carved into arches and sea stacks by the Pacific. The beach is swept by powerful rip currents and is strictly for scenery rather than swimming."},
{"name":"Marin County Fair Grounds","county":"Marin","emoji":"🎡","lat":37.9736,"lon":-122.5389,"cat":"Historic Fairgrounds","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/MarinCivicCenter.jpg/320px-MarinCivicCenter.jpg","fact":"The Marin County Fair, held every July since <em>1945</em>, is considered one of the best county fairs in California — famous for its eclectic mix of livestock competitions, fine arts exhibitions, and live music. The fairgrounds sit adjacent to the Frank Lloyd Wright Civic Center, creating an unusual juxtaposition of architectural landmarks."},
{"name":"Armstrong Redwoods State Natural Reserve","county":"Sonoma","emoji":"🌲","lat":38.5347,"lon":-123.0089,"cat":"State Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Armstrong_Redwoods_SNR.jpg/320px-Armstrong_Redwoods_SNR.jpg","fact":"Armstrong Redwoods preserves a grove of coast redwoods including the <em>Parson Jones Tree</em>, standing 310 feet tall and estimated to be 1,400 years old — one of the tallest trees in Sonoma County. The grove was saved from logging by Colonel James Armstrong in the 1870s, who donated it to Sonoma County as a park, one of the earliest conservation acts in California history."},
{"name":"Bodega Bay","county":"Sonoma","emoji":"🌊","lat":38.3333,"lon":-123.0522,"cat":"Coastal Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Bodega Bay was the filming location for Alfred Hitchcock's <em>The Birds</em> in 1963, and the Potter Schoolhouse used in the film still stands in the nearby town of Bodega. The bay is one of the most productive fishing grounds on the Northern California coast, supporting a commercial fleet that harvests Dungeness crab, salmon, and black cod."},
{"name":"Sonoma Coast State Park","county":"Sonoma","emoji":"🌊","lat":38.4167,"lon":-123.1167,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The Sonoma Coast's 17-mile string of beaches is separated by dramatic rocky headlands where the Pacific crashes into <em>sea caves and blow holes</em> with extraordinary force. The park includes some of the most dangerous surf in California — 'Sneaker Waves' at Goat Rock Beach have claimed over 100 lives since the park was established."},
{"name":"Goat Rock Beach","county":"Sonoma","emoji":"🦭","lat":38.4478,"lon":-123.1281,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Goat Rock Beach hosts one of the most accessible <em>harbor seal pupping colonies</em> in California — visitors can observe newborn seals nursing on the sand bar at the mouth of the Russian River each spring from March through August. The beach's dramatic sea stack, Goat Rock itself, rises 100 feet from the surf just offshore."},
{"name":"Sonoma Plaza","county":"Sonoma","emoji":"🏛","lat":38.2919,"lon":-122.4583,"cat":"Historic Plaza","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"Sonoma Plaza is the largest <em>historic plaza</em> in California and the site of the Bear Flag Revolt of 1846, where American settlers raised a makeshift flag and declared California an independent republic — a republic that lasted exactly 25 days before the U.S. Army arrived. The flagpole on the plaza marks the exact spot where the Bear Flag was first raised."},
{"name":"Mission San Francisco Solano","county":"Sonoma","emoji":"⛪","lat":38.2919,"lon":-122.4575,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"Mission San Francisco Solano, founded in <em>1823</em>, was the last and northernmost of California's 21 missions — built partly to counter Russian expansion southward from Fort Ross. The mission was secularized in 1834 by Mexican Governor Figueroa, who converted it to a parish church and distributed its lands in one of the first acts of the Rancho era."},
{"name":"Petaluma Adobe State Historic Park","county":"Sonoma","emoji":"🏚","lat":38.2361,"lon":-122.6394,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Petaluma_Adobe.jpg/320px-Petaluma_Adobe.jpg","fact":"General Mariano Vallejo's Petaluma Adobe, completed in <em>1850</em>, was the largest privately owned adobe building in California — a two-story, U-shaped rancho headquarters that managed 66,000 acres and thousands of cattle. The adobe's production facilities included a soap factory, tannery, weaving room, and granary that made it essentially self-sufficient."},
{"name":"Jack London State Historic Park","county":"Sonoma","emoji":"✍","lat":38.3556,"lon":-122.5608,"cat":"State Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Jack London spent the last years of his life building <em>Beauty Ranch</em> in Glen Ellen, experimenting with sustainable agriculture a century before it was fashionable — terracing hillsides, building a model pig palace, and planning an innovative irrigation system. The Wolf House, the massive stone mansion he built but never occupied, burned mysteriously before its completion in 1913."},
{"name":"Sugarloaf Ridge State Park","county":"Sonoma","emoji":"🌄","lat":38.4344,"lon":-122.5156,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Sugarloaf Ridge's 2,729-foot summit, Bald Mountain, offers one of the <em>most panoramic views in the Bay Area</em> — on clear winter days the Sierra Nevada is visible 100 miles east, and the Pacific glitters 40 miles to the west. The park's Robert Ferguson Observatory, open to the public on weekend nights, operates the largest public telescope in the Bay Area."},
{"name":"Fort Ross State Historic Park","county":"Sonoma","emoji":"🏰","lat":38.5122,"lon":-123.2458,"cat":"State Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"Fort Ross was established in <em>1812</em> by the Russian-American Company as its southernmost outpost in North America — a fortified colony that produced agricultural goods to supply Russian settlements in Alaska. The Russians sold the fort to John Sutter in 1841 and left California forever, ending Russia's colonial ambitions in the Americas."},
{"name":"Salt Point State Park","county":"Sonoma","emoji":"🪨","lat":38.5694,"lon":-123.3253,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"Salt Point State Park protects 6,000 acres of rugged Sonoma Coast featuring <em>tafoni sandstone formations</em> — honeycomb erosion patterns that create otherworldly sculptured rock surfaces unlike anything else on the California coast. The park's underwater park is a premier abalone diving destination."},
{"name":"Russian River","county":"Sonoma","emoji":"🌊","lat":38.5086,"lon":-123.0167,"cat":"River","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The Russian River winds <em>110 miles</em> from its headwaters in Mendocino County to the Pacific, carving a valley through redwood forests and vineyard-covered hills that make it one of the most scenic river corridors in Northern California. The river's estuary at Jenner supports one of California's largest harbor seal colonies, and its lower reaches are critical habitat for coho salmon and steelhead trout."},
{"name":"Healdsburg Plaza","county":"Sonoma","emoji":"🍷","lat":38.6107,"lon":-122.8694,"cat":"Historic Plaza","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Healdsburg's tree-shaded plaza, established in <em>1857</em>, is surrounded by tasting rooms for over 100 wineries — a density that makes it the epicenter of California's premium wine tourism. The town sits at the confluence of three distinctive wine appellations: Dry Creek Valley, Alexander Valley, and Russian River Valley."},
{"name":"Dry Creek Valley","county":"Sonoma","emoji":"🍇","lat":38.6281,"lon":-122.9178,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Dry Creek Valley is considered the finest region in the world for <em>old-vine Zinfandel</em> — many of the valley's Zinfandel vines were planted in the 1880s and 1890s by Italian immigrants, and their twisted, gnarly trunks still produce some of California's most sought-after wine. The valley floor is so narrow that vineyards on opposite sides can be within shouting distance of each other."},
{"name":"Russian River Valley Wine Region","county":"Sonoma","emoji":"🍷","lat":38.4711,"lon":-122.9456,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The Russian River Valley's persistent morning fog and cool afternoons create ideal conditions for growing <em>Pinot Noir and Chardonnay</em>, producing wines that regularly outscore Burgundy in blind tastings. The region's unique 'petaluma gap' — a break in the Coast Ranges — funnels cold Pacific air directly into the valley, sometimes dropping temperatures 30 degrees within a mile."},
{"name":"Sebastopol Historic Downtown","county":"Sonoma","emoji":"🍎","lat":38.4024,"lon":-122.8236,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Sebastopol was the <em>Gravenstein apple capital of the world</em> from the 1890s through the 1970s, shipping millions of pounds of the tart, early-ripening apple to canneries and markets across the country. The Gravenstein is now endangered — most orchards have been replaced by vineyards — and Sebastopol hosts an annual festival to save the heirloom variety."},
{"name":"Luther Burbank Home and Gardens","county":"Sonoma","emoji":"🌸","lat":38.4396,"lon":-122.7136,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Luther_Burbank_home.jpg/320px-Luther_Burbank_home.jpg","fact":"Luther Burbank, the <em>'Plant Wizard'</em> who developed the Russet potato, the Shasta daisy, and hundreds of other new plant varieties, lived and worked in Santa Rosa for 50 years. His greenhouse and gardens are preserved exactly as he left them, including specimens of his most famous creations — the Plumcot, the spineless cactus, and the Santa Rosa plum."},
{"name":"Charles M. Schulz Museum","county":"Sonoma","emoji":"🐶","lat":38.4425,"lon":-122.7108,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Luther_Burbank_home.jpg/320px-Luther_Burbank_home.jpg","fact":"Charles Schulz, creator of <em>Peanuts</em>, lived in Santa Rosa from 1969 until his death in 2000 and built the Snoopy Ice Arena, the Warm Puppy Café, and his studio — all of which still operate. The museum, built beside his studio, contains his original drafting table exactly as he left it, along with 7,000 strips of original Peanuts artwork."},
{"name":"Sonoma Barracks","county":"Sonoma","emoji":"🏛","lat":38.2922,"lon":-122.4581,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"The Sonoma Barracks, built by General Vallejo in <em>1836</em>, quartered his Mexican soldiers and later became the prison where American Bear Flag rebels were held captive after the revolt. The two-story adobe building facing the plaza is one of the best-preserved military buildings from the Mexican period in California."},
{"name":"Bodega Head","county":"Sonoma","emoji":"🌊","lat":38.3053,"lon":-123.0678,"cat":"Headland","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Bodega Head was the site of the controversial <em>Pacific Gas and Electric nuclear power plant</em> that was planned in the early 1960s — halted when it was discovered the plant would have been built directly on the San Andreas Fault. The abandoned excavation, 'The Hole in the Head,' is still visible, and the headland became a state park instead."},
{"name":"Sonoma County Museum","county":"Sonoma","emoji":"🏛","lat":38.4394,"lon":-122.7147,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Luther_Burbank_home.jpg/320px-Luther_Burbank_home.jpg","fact":"The Sonoma County Museum occupies the <em>1909 Federal Post Office Building</em> — one of the finest examples of Beaux-Arts architecture in the North Bay, built of locally quarried sandstone. The museum's collection chronicles the full arc of Sonoma County history from Coast Miwok settlements through the Russian period, Mexican rancho era, and industrial wine industry."},
{"name":"Annadel State Park","county":"Sonoma","emoji":"🌿","lat":38.4553,"lon":-122.6153,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Annadel State Park's basalt rock was quarried in the <em>1870s–1890s</em> as 'cobblestones' that paved San Francisco's streets — thousands of tons were extracted from these hills and shipped by rail. Today the abandoned quarries have become rock gardens, and the park's 40 miles of trails wind through oak woodland, meadow, and around Lake Ilsanjo."},
{"name":"Hood Mountain Regional Park","county":"Sonoma","emoji":"🏔","lat":38.4819,"lon":-122.5786,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Hood Mountain's 2,730-foot summit offers <em>360-degree views</em> of the Sonoma Coast, Bay Area, and Central Valley that are often described as the finest in the North Bay. The park encompasses a diverse range of habitats from chaparral to Douglas fir forest, and its isolation makes it a good place to observe raptors, deer, and occasionally mountain lions."},
{"name":"Taylor Mountain Regional Park","county":"Sonoma","emoji":"🌄","lat":38.3994,"lon":-122.6933,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Taylor Mountain's open grassland summit provides <em>panoramic views of Santa Rosa</em> and the surrounding wine country from a hilltop accessible in under an hour from downtown. The park protects several Gravenstein apple orchards that are being restored as agricultural history — some trees still produce fruit harvested at the fall festival."},
{"name":"Crane Creek Regional Park","county":"Sonoma","emoji":"🦅","lat":38.4406,"lon":-122.5492,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Crane Creek's oak woodland and open grassland are home to one of the highest densities of <em>nesting white-tailed kites</em> in the Bay Area — a ghostly white raptor that hovers over meadows hunting voles. The park's creek corridor provides important wildlife habitat connecting Sugarloaf Ridge State Park to the urban parks of Rohnert Park."},
{"name":"Foothill Regional Park","county":"Sonoma","emoji":"🌿","lat":38.3678,"lon":-122.6856,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Foothill Regional Park's rolling oak woodland is a <em>quiet escape from suburban Windsor</em> that preserves the character of the Sonoma County rangelands that covered this area before subdivisions arrived in the 1980s. The park's pond attracts nesting wood ducks and white-tailed kites, and its hillside trails provide views across the Alexander Valley wine country."},
{"name":"Occidental Historic Village","county":"Sonoma","emoji":"🌲","lat":38.4061,"lon":-122.9564,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Occidental grew up as a logging town in the <em>1870s</em> when redwood timber from the surrounding hills was loaded onto the narrow-gauge North Pacific Coast Railroad for shipment to San Francisco. The town's four Italian restaurants in a single block — a legacy of the Italian families who cleared the forests — have been a dining destination since the 1950s."},
{"name":"Monte Rio Beach","county":"Sonoma","emoji":"🏖","lat":38.4686,"lon":-123.0058,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Monte Rio is home to the <em>Bohemian Grove</em>, the secretive 2,700-acre redwood retreat where America's most powerful businessmen and politicians have gathered privately each summer since 1878. The town's public beach on the Russian River is a beloved summer swimming hole and the site of one of the most consistently sunny microclimates in foggy Sonoma County."},
{"name":"Guerneville Downtown","county":"Sonoma","emoji":"🌊","lat":38.5022,"lon":-122.9994,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Guerneville has been a Russian River resort community since the <em>1880s</em>, when San Francisco families arrived by train to rent summer cabins under the redwoods. The town was nearly destroyed by floods in 1986 and again in 2019 — residents have developed an entire culture around flood preparation, with businesses on high ground and elaborate sandbag protocols."},
{"name":"Jenner — Russian River Estuary","county":"Sonoma","emoji":"🦭","lat":38.4539,"lon":-123.1183,"cat":"Wildlife Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Jenner's Russian River estuary supports a <em>harbor seal colony of up to 300 animals</em> — the largest in Sonoma County — that can be observed from the bluffs above the river mouth. Whether the river opens to the sea or is blocked by a sandbar depends on rainfall, and the seal colony shifts accordingly, a natural process managed by state wildlife biologists."},
{"name":"Ragle Ranch Regional Park","county":"Sonoma","emoji":"🌿","lat":38.3939,"lon":-122.8456,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Ragle Ranch in Sebastopol preserves the character of the Gravenstein apple farming landscape that dominated <em>West Sonoma County for over a century</em>. The park's orchards still produce fruit each summer, available at a farmstand, and the surrounding trails pass through the wetlands and oak woodland that sustained Coast Miwok people for thousands of years."},
{"name":"Shiloh Ranch Regional Park","county":"Sonoma","emoji":"🦅","lat":38.5069,"lon":-122.7825,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Shiloh Ranch's ridgeline trail crosses four distinct habitat zones in a single mile — <em>chaparral, mixed woodland, oak savanna, and riparian forest</em> — a biodiversity gradient that supports an unusually rich variety of birds, including woodpeckers, warblers, and raptors. The park's highest point at 1,200 feet overlooks the Alexander Valley vineyard corridor."},
{"name":"Cloverdale Historic Downtown","county":"Sonoma","emoji":"🍇","lat":38.8025,"lon":-123.0175,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Cloverdale sits at the northern tip of the Alexander Valley and has been an agricultural market town since the <em>1850s</em>, originally serving gold miners working the Russian River gravels. The town's position at the convergence of three valleys makes it a crossroads for vineyards producing Zinfandel, Cabernet, and Petite Sirah."},
{"name":"Geysers Geothermal Area","county":"Sonoma","emoji":"♨️","lat":38.7811,"lon":-122.7483,"cat":"Geothermal","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"The Geysers is the world's largest operating <em>geothermal power complex</em>, generating enough electricity to power 725,000 homes from 18 power plants drawing steam from hundreds of wells drilled into volcanic rock. The site has been producing power since 1960, and geologists believe the underground heat resource will last for centuries."},
{"name":"Gualala Point Regional Park","county":"Sonoma","emoji":"🌊","lat":38.7617,"lon":-123.5256,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"Gualala Point sits where the Gualala River meets the Pacific, creating a <em>lagoon that fills in summer</em> when the sandbar closes the river mouth — a warm, sheltered swimming hole in the shadow of dramatic coastal bluffs. The park is the southernmost unit of the Mendocino Coast State Parks system and offers camping amid bishop pines and coastal scrub."},
{"name":"Sea Ranch","county":"Sonoma","emoji":"🌾","lat":38.7167,"lon":-123.4667,"cat":"Planned Community","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"Sea Ranch, designed in 1965, pioneered the concept of <em>architecture integrated into coastal landscape</em> — its weathered wood buildings were required to blend with the natural terrain rather than stand apart from it. The development sparked a landmark legal battle over coastal access that led directly to the creation of the California Coastal Commission in 1976."},
{"name":"Stillwater Cove Regional Park","county":"Sonoma","emoji":"🌊","lat":38.5661,"lon":-123.3217,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"Stillwater Cove is one of the few <em>protected anchorages</em> on the rugged Sonoma-Mendocino coast, sheltered by a rocky headland from the prevailing northwest swell. The park's underwater kelp forest is a popular diving destination, and abalone, urchins, and rockfish are visible through the clear water even from shore."},
{"name":"Austin Creek State Recreation Area","county":"Sonoma","emoji":"🌿","lat":38.5436,"lon":-123.0408,"cat":"State Recreation Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Armstrong_Redwoods_SNR.jpg/320px-Armstrong_Redwoods_SNR.jpg","fact":"Austin Creek's <em>6,000 acres of rugged wilderness</em> adjoin Armstrong Redwoods, creating a combined reserve of meadows, chaparral, and mixed forest accessible only by a steep, narrow dirt road. The creek supports a small but significant steelhead trout run, and the area's isolation makes it excellent habitat for black-tailed deer, wild turkey, and mountain lions."},
{"name":"Petaluma River","county":"Sonoma","emoji":"🚢","lat":38.2314,"lon":-122.6364,"cat":"Historic Waterway","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Petaluma_Adobe.jpg/320px-Petaluma_Adobe.jpg","fact":"The Petaluma River was the <em>most navigable inland waterway in Northern California</em> during the 19th century, with steamships connecting the city to San Francisco Bay and carrying dairy products, chickens, and eggs to market. Petaluma's historic downtown, built along the riverfront, preserves ornate Victorian commercial buildings from the town's egg-capital era."},
{"name":"Petaluma Historic Downtown","county":"Sonoma","emoji":"🏘","lat":38.2322,"lon":-122.6367,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Petaluma_Adobe.jpg/320px-Petaluma_Adobe.jpg","fact":"Petaluma was called the <em>'Egg Basket of the World'</em> — by the 1920s, the city produced more eggs per capita than any other place on Earth, with thousands of chicken farms covering the surrounding hills. The downtown's cast-iron building facades, nearly all surviving from the 1880s, represent the largest collection of intact Victorian commercial architecture in California."},
{"name":"Sonoma Raceway","county":"Sonoma","emoji":"🏎","lat":38.1619,"lon":-122.4544,"cat":"Raceway","photo":"https://upload.wikimedia.org/wikipedia/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"Sonoma Raceway, carved from the Sonoma Mountains in <em>1968</em>, is considered one of the most technically demanding road courses in North America — its 12 turns include a 95-foot elevation change and blind crests that require drivers to memorize every inch. The track hosts both NASCAR and IndyCar events, making it one of the few venues where both series compete at the same circuit."},
{"name":"Petaluma Marsh Wildlife Area","county":"Sonoma","emoji":"🦩","lat":38.165,"lon":-122.5989,"cat":"Wildlife Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Petaluma_Adobe.jpg/320px-Petaluma_Adobe.jpg","fact":"The Petaluma Marsh is the <em>largest tidal marsh remaining in San Francisco Bay</em> — a 5,000-acre expanse of cordgrass, pickleweed, and tidal channels that once extended across tens of thousands of acres before diking for agriculture. The marsh supports the endangered Ridgway's rail and the salt marsh harvest mouse."},
{"name":"Tolay Lake Regional Park","county":"Sonoma","emoji":"💧","lat":38.2325,"lon":-122.5314,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Petaluma_Adobe.jpg/320px-Petaluma_Adobe.jpg","fact":"Tolay Lake was a sacred site for the Coast Miwok people for thousands of years — the lake and its surrounding volcanic hills were considered <em>a portal between the human and spirit worlds</em>. The park, opened in 2012, is one of the newest regional parks in Sonoma County and is still being developed with trails and cultural interpretation."},
{"name":"Warm Springs Dam — Lake Sonoma","county":"Sonoma","emoji":"💧","lat":38.7181,"lon":-123.0144,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Lake Sonoma, created when Warm Springs Dam was completed in <em>1983</em>, drowned the ancestral homeland of the Dry Creek Pomo people — an irreversible loss that led to major reforms in how federal water projects consult with tribal nations. The lake now provides flood control and water storage for Sonoma County and is a popular recreation area for boating and fishing."},
{"name":"Bodega Marine Laboratory","county":"Sonoma","emoji":"🔬","lat":38.3183,"lon":-123.0722,"cat":"Research Station","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The UC Davis Bodega Marine Laboratory, established in <em>1966</em>, is one of the premier marine research facilities on the Pacific Coast, studying everything from sea urchin reproduction to climate change impacts on nearshore ecosystems. The lab's rocky intertidal preserve has been monitored continuously for 50 years, creating one of the longest datasets on coastal ecosystem change in the world."},
{"name":"Spring Lake Regional Park","county":"Sonoma","emoji":"💧","lat":38.4394,"lon":-122.6617,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Spring Lake is the only <em>warm-water swimming lake</em> in Sonoma County open to the public, with a lifeguarded beach that draws thousands of swimmers on summer weekends. The lake was created in 1967 as a flood control reservoir for Santa Rosa Creek, and the park connects directly to Annadel State Park via a trail through oak woodland."},
{"name":"Sonoma Valley Regional Park","county":"Sonoma","emoji":"🌿","lat":38.3061,"lon":-122.5175,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"Sonoma Valley Regional Park protects the oak woodland <em>corridor between Sonoma Valley floor and the Mayacamas Mountains</em>, providing habitat connectivity for deer, mountain lions, and bobcats moving between the valley and the ridge. The park's trails offer views across the vineyard landscape that surrounds the Sonoma-Carneros wine appellation."},
{"name":"Doran Regional Park","county":"Sonoma","emoji":"🌊","lat":38.3228,"lon":-123.0494,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Doran Regional Park's spit of land separates Bodega Harbor from the Pacific, with calm harbor waters on one side and <em>pounding surf and tidepools</em> on the other within a 10-minute walk. The park's campground, just steps from the beach, is one of the most popular in Sonoma County."},
{"name":"Piner Road Wineries Historic Corridor","county":"Sonoma","emoji":"🍷","lat":38.4172,"lon":-122.7719,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"The Piner Road wine corridor west of Santa Rosa preserves some of the oldest family-owned vineyards in Sonoma County, with <em>Zinfandel vines planted as early as 1896</em> still in commercial production. This stretch of road gave rise to some of the founding wineries of the California wine renaissance of the 1970s."},
{"name":"Odiyan Buddhist Retreat Center","county":"Sonoma","emoji":"☯","lat":38.7314,"lon":-123.2556,"cat":"Spiritual Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"Odiyan is a <em>Tibetan Buddhist retreat center</em> built over four decades starting in 1975 on 1,000 acres of remote Sonoma coast — its golden stupa is visible from Highway 1 gleaming in the coastal fog. The center's 108-foot-diameter temple houses intricate painted murals and bronze statues created entirely by resident monks and craftspeople."},
{"name":"Cloverdale River Park","county":"Sonoma","emoji":"🌊","lat":38.7908,"lon":-122.9906,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Cloverdale River Park sits on the Russian River at the northern edge of Sonoma County, where steelhead trout are counted by state biologists <em>every winter</em> as they migrate past a monitoring station. The park's sandy beach and swimming hole make it a favorite of Alexander Valley families during summer months."},
{"name":"Laguna de Santa Rosa","county":"Sonoma","emoji":"🦆","lat":38.4108,"lon":-122.8261,"cat":"Wetland","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The Laguna de Santa Rosa is the <em>largest freshwater wetland in the North Bay</em> — a 10,000-acre seasonal floodplain that fills with water each winter and becomes one of the most important waterfowl staging areas in the Pacific Flyway. The laguna's vast stands of tule, willow, and sedge support rare bitterns, black rails, and giant garter snakes."},
{"name":"Sonoma Mountain Regional Park","county":"Sonoma","emoji":"🏔","lat":38.3281,"lon":-122.5661,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"Sonoma Mountain's 2,463-foot summit offers one of the <em>best views in the Bay Area</em> — from the top, Petaluma, San Francisco Bay, the Marin headlands, and Mount Tamalpais are all visible simultaneously. Jack London lived at the base of this mountain and called it the source of the fog and the wind that defined his landscape."},
{"name":"Glen Ellen Village","county":"Sonoma","emoji":"🍷","lat":38.3625,"lon":-122.5272,"cat":"Historic Village","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Glen Ellen, a tiny village in the <em>heart of the Sonoma Valley</em>, attracted Jack London, Ambrose Bierce, and other Bay Area writers in the late 19th century who came for the springs, the vineyards, and the redwood forests. The village's Benziger Family Winery operates the most visited biodynamic estate winery in the country."},
{"name":"Gundlach Bundschu Winery","county":"Sonoma","emoji":"🍇","lat":38.2794,"lon":-122.4358,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"Gundlach Bundschu, founded in <em>1858</em>, is the oldest family-owned winery in California — it has been continuously operated by the same family for over 165 years through Prohibition, earthquakes, and two World Wars. The winery's original stone cellars, hand-carved from local rock by German immigrant workers, are still in use today."},
{"name":"Preston Farm and Winery","county":"Sonoma","emoji":"🌿","lat":38.7142,"lon":-123.0103,"cat":"Historic Farm","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Preston Farm in Dry Creek Valley is known as one of the most <em>authentic farmsteads</em> in Sonoma County wine country, where Lou Preston bakes bread in a wood-fired oven, sells produce from the garden, and raises goats alongside the winery operations. The farm's dry-farmed Zinfandel vines, planted in 1920, produce concentrated fruit without irrigation."},
{"name":"Sonoma Coast State Beach — Shell Beach","county":"Sonoma","emoji":"🐚","lat":38.4381,"lon":-123.1244,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"Shell Beach is one of the most productive <em>tidepool habitats</em> on the Sonoma Coast, with exposed rocky platforms at low tide revealing ochre sea stars, acorn barnacles, aggregating anemones, and owl limpets. The beach is small and hidden below the coastal bluff, requiring a short scramble down a path that deters casual visitors."},
{"name":"Washoe House","county":"Sonoma","emoji":"🏚","lat":38.2575,"lon":-122.6978,"cat":"Historic Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Petaluma_Adobe.jpg/320px-Petaluma_Adobe.jpg","fact":"The Washoe House, built in <em>1859</em>, is the oldest roadhouse in continuous operation in California — 165 years of serving meals and drinks to travelers on the road between Petaluma and Santa Rosa. Presidents Ulysses S. Grant and Rutherford B. Hayes are said to have stopped here, and the building's original bar and floors survive intact."},
{"name":"Sonoma Overlook Trail","county":"Sonoma","emoji":"🌄","lat":38.3028,"lon":-122.4589,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"The Sonoma Overlook Trail climbs from the edge of Sonoma Plaza to a hilltop meadow offering <em>panoramic views of the Sonoma Valley wine country</em> — vineyards, redwood-clad ridges, and the distant blue line of San Pablo Bay. The trail passes through rare native bunchgrass prairie maintained by a local volunteer land trust."},
{"name":"Cliffside Winery Historic Ruins","county":"Sonoma","emoji":"🍷","lat":38.5778,"lon":-122.8783,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"The stone walls of the Cliffside Winery near Geyserville, built in <em>1888</em>, survive as roofless ruins in a vineyard because the winery was never rebuilt after Prohibition destroyed the wine industry. The ruins are a reminder that Alexander Valley was producing premium wine long before the modern California wine renaissance."},
{"name":"Pinnacles at Salt Point","county":"Sonoma","emoji":"🪨","lat":38.5725,"lon":-123.3258,"cat":"Natural Feature","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"The sea stacks and <em>wave-carved pinnacles</em> at Salt Point rise 60 feet from the surf — ghostly white sandstone columns eroded into fantastical shapes by thousands of years of Pacific storm waves. The formations are accessible at low tide and are designated as a snorkeling and diving destination within the broader Salt Point State Park."},
{"name":"Stewarts Point Store","county":"Sonoma","emoji":"🏪","lat":38.6458,"lon":-123.3953,"cat":"Historic Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"The Stewarts Point Store, operating since <em>1868</em> at a remote coastal bend, served as the supply depot for isolated ranches along the Sonoma Coast for over a century. The original wooden building with its porch facing the Pacific still sells basic goods and gas to the handful of ranchers and travelers who pass through."},
{"name":"Guerneville Regional Park","county":"Sonoma","emoji":"🌲","lat":38.5047,"lon":-122.9967,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The Guerneville Regional Park protects a <em>second-growth redwood grove</em> adjacent to the town's commercial strip — a reminder that the Russian River canyon was entirely forested with old-growth redwoods before the logging era. Swimming beaches along the Russian River here attract 100,000 visitors annually."},
{"name":"Bloodletter Vineyard Historic Site","county":"Sonoma","emoji":"🍇","lat":38.7631,"lon":-122.9908,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"The Alexander Valley's oldest documented vineyard was planted in <em>1846</em> by Cyrus Alexander, the American trapper for whom the valley is named — making it one of the first vineyards planted in Northern California by a non-mission settler. Some of the ancient Zinfandel vines in the Alexander Valley trace their origin to cuttings from this original planting."},
{"name":"Bodega Harbor Jetty","county":"Sonoma","emoji":"🚢","lat":38.3283,"lon":-123.0578,"cat":"Fishing Harbor","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The Bodega Bay commercial fishing fleet, operating from the harbor since the <em>1940s</em>, is one of the last working fishing communities on the North Coast, landing Dungeness crab, salmon, rockfish, and albacore tuna. The harbor's fish wharf sells directly to the public from fishing boats — a practice that has become increasingly rare as most catch is now sold through brokers."},
{"name":"Fort Ross Cove","county":"Sonoma","emoji":"🌊","lat":38.5131,"lon":-123.2483,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Fort_Ross_SHP.jpg/320px-Fort_Ross_SHP.jpg","fact":"Fort Ross Cove is the most <em>sheltered beach on the Sonoma Coast</em>, protected from the dominant northwest swell by the rocky headland above the fort. The cove's clear water and bull kelp forest make it one of the best snorkeling spots on the coast, and harbor seals haul out on the rocks above the beach."},
{"name":"Sonoma Botanical Garden","county":"Sonoma","emoji":"🌸","lat":38.3814,"lon":-122.5158,"cat":"Botanical Garden","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"The Sonoma Botanical Garden, established in <em>1981</em>, specializes in Asian plants collected by founder Eric Muller on expeditions to Japan, China, and Korea — plants that thrive in Sonoma Valley's Mediterranean climate. The garden's Japanese-style paths wind through 25 acres of rhododendrons, maples, and flowering cherries."},
{"name":"Crane Canyon Regional Park","county":"Sonoma","emoji":"🌿","lat":38.3981,"lon":-122.6381,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Beauty_Ranch_Jack_London.jpg/320px-Beauty_Ranch_Jack_London.jpg","fact":"Crane Canyon's oak woodland and grassland corridor connects the open space lands east of Santa Rosa to the <em>Mayacamas Mountains ridge</em>, allowing mountain lions, coyotes, and deer to move between large wildland blocks. The park's trail passes through vineyards planted right up to the preserve boundary — wine country and wildland side by side."},
{"name":"Pomo Canyon Trail","county":"Sonoma","emoji":"🌲","lat":38.4225,"lon":-123.0983,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bodega_Bay_CA.jpg/320px-Bodega_Bay_CA.jpg","fact":"The Pomo Canyon Trail crosses <em>second-growth redwood forest, open meadow, and coastal prairie</em> between the Russian River valley and the Sonoma Coast — a 12-mile traverse through some of the most varied scenery in the county. The trail's upper section runs along a ridge with simultaneous views of the Pacific and the interior wine country valleys."},
{"name":"Nelli Farm Historic Ranch","county":"Sonoma","emoji":"🐄","lat":38.5289,"lon":-122.8189,"cat":"Historic Ranch","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"The Alexander Valley's dairy and sheep ranching heritage dates to Italian immigrants who settled the valley in the <em>1870s and 1880s</em>, clearing the valley oak woodland for pasture. Many family ranches have converted to vineyards over the past 40 years, but the original barn complexes and farmhouses of the dairy era still stand on several properties."},
{"name":"Redwood Empire Ice Arena","county":"Sonoma","emoji":"⛸","lat":38.4411,"lon":-122.7136,"cat":"Cultural Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Luther_Burbank_home.jpg/320px-Luther_Burbank_home.jpg","fact":"The Redwood Empire Ice Arena in Santa Rosa was built by <em>Charles Schulz</em> in 1969 — the Peanuts creator built the rink because he loved skating and wanted a place to practice. Schulz skated here nearly every day until his final illness, and the adjacent Warm Puppy Café, where he often sat for breakfast, continues to serve as a community gathering place."},
{"name":"Napa Valley Wine Train","county":"Napa","emoji":"🚂","lat":38.2975,"lon":-122.2864,"cat":"Historic Railroad","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa Valley Wine Train has operated along the <em>original 1868 railroad corridor</em> between Napa and St. Helena since 1989, running antique Pullman dining cars through the heart of wine country. The same rail line once carried bottles from valley wineries to San Francisco Bay ferries, and the wine train revived that tradition as a tourist experience."},
{"name":"Stag's Leap Wine Cellars","county":"Napa","emoji":"🍷","lat":38.4031,"lon":-122.3567,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Stag's Leap Wine Cellars became world-famous when its <em>1973 Cabernet Sauvignon defeated top Bordeaux châteaux</em> in the 1976 Paris Tasting — a blind competition judged by French experts that shocked the wine world. The victory is considered the moment that established Napa Valley as a great wine region on equal footing with France."},
{"name":"Castello di Amorosa","county":"Napa","emoji":"🏰","lat":38.5633,"lon":-122.5281,"cat":"Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Castello_di_Amorosa.jpg/320px-Castello_di_Amorosa.jpg","fact":"Castello di Amorosa is a <em>13th-century-style Tuscan castle</em> built from scratch between 1994 and 2007 by winemaker Dario Sattui using 8,000 tons of hand-chiseled stone imported from Europe. The castle's 121 rooms include a torture chamber, a drawbridge, and wine cellars carved 35 feet into the Calistoga hillside."},
{"name":"Old Faithful Geyser of California","county":"Napa","emoji":"♨️","lat":38.7997,"lon":-122.5953,"cat":"Geological","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"Calistoga's Old Faithful is one of only <em>three regularly erupting geysers</em> in the world open to the public, shooting boiling water 60 feet into the air every 25 to 30 minutes. The geyser sits above a volcanic hotspot connected to the same geothermal system that heats Calistoga's famous mud bath spas."},
{"name":"Calistoga Petrified Forest","county":"Napa","emoji":"🪵","lat":38.5994,"lon":-122.6064,"cat":"Geological","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"The Petrified Forest near Calistoga contains ancient redwood trees turned to stone <em>3.4 million years ago</em> when a massive volcanic eruption from what is now Mount St. Helena buried the forest under ash. The silicified logs, some 60 feet long, lie where they fell when the volcano erupted, preserved in extraordinary detail."},
{"name":"Robert Louis Stevenson State Park","county":"Napa","emoji":"✍","lat":38.6567,"lon":-122.5994,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"Robert Louis Stevenson honeymooned in an abandoned bunkhouse on the slopes of Mount St. Helena in <em>1880</em> while suffering from tuberculosis, writing about the experience in his book The Silverado Squatters — the book that first made Napa Valley's wine country famous to the outside world. The 4,300-foot summit of Mount St. Helena, the highest point in the Bay Area counties, is the park's main attraction."},
{"name":"Napa Downtown Historic District","county":"Napa","emoji":"🏘","lat":38.2975,"lon":-122.2864,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Napa's downtown was <em>severely damaged by a magnitude 6.0 earthquake</em> in August 2014 — the largest earthquake to hit the Bay Area since 1989 — causing $1 billion in damage and accelerating the city's redevelopment. The rebuilt waterfront along the Napa River is now a culinary destination, with the city transformed from a service town to a dining and arts hub."},
{"name":"Oxbow Public Market Napa","county":"Napa","emoji":"🛒","lat":38.302,"lon":-122.2819,"cat":"Market","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Oxbow Public Market opened in <em>2007</em> in a former lumber yard on the Napa River, modeled on Seattle's Pike Place Market, and is now considered the premier food market in wine country. The market's vendors include specialty cheesemakers, butchers, ice cream makers, and a tea merchant — all sourcing locally within the wine country corridor."},
{"name":"Napa River Ecological Reserve","county":"Napa","emoji":"🌿","lat":38.2514,"lon":-122.2983,"cat":"Ecological Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa River Ecological Reserve protects one of the last stretches of <em>unleveed riparian forest</em> along the river — willow, cottonwood, and tule marsh that floods naturally every winter and supports breeding songbirds in summer. The reserve is a critical piece of the Napa River flood management system, absorbing water that previously flooded downtown Napa."},
{"name":"Beringer Vineyards","county":"Napa","emoji":"🍷","lat":38.5069,"lon":-122.4736,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Beringer Vineyards, founded in <em>1876</em> by German immigrant brothers Jacob and Frederick Beringer, is the oldest continuously operating winery in Napa Valley. The winery's Rhine House, a 17-room Victorian mansion modeled after the Beringer family home in Germany, is one of the most recognizable landmarks in wine country."},
{"name":"Charles Krug Winery","county":"Napa","emoji":"🍇","lat":38.4978,"lon":-122.4717,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Charles Krug founded Napa's <em>first commercial winery</em> in 1861, establishing the template that dozens of valley wineries would follow over the next century. Krug's original stone winery building, constructed in 1874, still stands and is one of the oldest surviving winery structures in California."},
{"name":"St. Helena Historic Downtown","county":"Napa","emoji":"🏘","lat":38.5053,"lon":-122.4706,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"St. Helena's Main Street, lined with stone buildings from the <em>1880s</em>, preserves the architecture of Napa Valley's wine-boom era — many buildings were constructed using local sandstone quarried from the hills above town. The town's position at the geographic center of the valley makes it a hub for both viticulture and the culinary industry that has grown around it."},
{"name":"Yountville — Domaine Chandon","county":"Napa","emoji":"🥂","lat":38.4025,"lon":-122.3608,"cat":"Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Domaine Chandon, opened in <em>1977</em>, was the first major French investment in Napa Valley — Moët & Chandon established the sparkling wine facility that proved European wine dynasties took California wine seriously. The winery's opening within a year of the 1976 Paris Tasting was widely seen as France's acknowledgment of Napa's world-class potential."},
{"name":"Yountville Historic Town","county":"Napa","emoji":"🍴","lat":38.4028,"lon":-122.3606,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Yountville has the highest concentration of <em>Michelin-starred restaurants per capita</em> of any city in the United States — a remarkable distinction for a town of fewer than 3,000 people. The transformation from a sleepy cow town to a culinary destination began when Thomas Keller opened The French Laundry in 1994."},
{"name":"Napa Valley Museum","county":"Napa","emoji":"🏛","lat":38.3994,"lon":-122.3647,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Napa Valley Museum in Yountville tells the complete story of the valley from its <em>Wappo Native American origins</em> through the mission and rancho periods to the modern wine industry. The museum's wine-making exhibit includes a working model of a traditional grape press, and its art gallery showcases California landscape painting from the 19th century."},
{"name":"Rutherford Dust Historic Vineyards","county":"Napa","emoji":"🍇","lat":38.4592,"lon":-122.4178,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"The phrase <em>'Rutherford Dust'</em> describes the unique mineral quality of Cabernet Sauvignon grown in the middle Napa Valley — an earthy, dusty quality attributed to the well-drained alluvial fan soils deposited by Conn Creek over millennia. André Tchelistcheff, Napa's most influential winemaker, coined the term in the 1940s."},
{"name":"Inglenook Winery Rutherford","county":"Napa","emoji":"🏰","lat":38.4556,"lon":-122.4211,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Inglenook, founded in <em>1879</em> by Finnish sea captain Gustave Niebaum, was the first winery in California to pursue absolute quality rather than maximum production — Niebaum imported French oak barrels and hired trained winemakers at a time when most wineries just dumped grapes in open vats. The estate was purchased by Francis Ford Coppola in 1975 and restored to its original vision."},
{"name":"Opus One Winery","county":"Napa","emoji":"🎵","lat":38.4133,"lon":-122.4069,"cat":"Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"Opus One was created as a <em>joint venture between Robert Mondavi and Baron Philippe de Rothschild</em> of Bordeaux's Château Mouton Rothschild — the first collaboration between a California and a French wine dynasty. When the 1979 vintage was released in 1984 at $50 per bottle — double the price of any American wine — it established Napa Valley as producing wines worthy of luxury pricing."},
{"name":"Oakville Grocery Historic Store","county":"Napa","emoji":"🛒","lat":38.4317,"lon":-122.4092,"cat":"Historic Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Napa_Valley_Wine_Train.jpg/320px-Napa_Valley_Wine_Train.jpg","fact":"The Oakville Grocery has been selling provisions to Napa Valley residents and travelers since <em>1881</em> — an unbroken chain of service making it one of the oldest continuously operating general stores in California. The store became famous in the 1970s as the best place to buy artisan cheese, imported wine, and housemade charcuterie in the valley."},
{"name":"Stony Hill Vineyard Historic Site","county":"Napa","emoji":"🍷","lat":38.5292,"lon":-122.4917,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Beringer_Winery.jpg/320px-Beringer_Winery.jpg","fact":"Stony Hill, planted in <em>1948</em> by Fred and Eleanor McCrea, is credited with producing California's first world-class Chardonnay — wines of extraordinary longevity that proved Napa Valley white wines could age like great Burgundy. The winery's rocky hilltop site above the valley floor was considered too steep and difficult for viticulture by everyone who saw it."},
{"name":"Calistoga Hot Springs","county":"Napa","emoji":"♨️","lat":38.5794,"lon":-122.5797,"cat":"Spa Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Old_Faithful_Geyser_California.jpg/320px-Old_Faithful_Geyser_California.jpg","fact":"Calistoga was developed as a <em>resort spa town</em> in 1859 by Sam Brannan, California's first millionaire, who planned to build the 'Saratoga of California' on the hot volcanic springs he found at the valley's northern end. Brannan's plan failed financially, but the town's volcanic mud bath spas — the only ones in North America — have drawn visitors continuously for over 160 years."},
