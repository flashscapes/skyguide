<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080c14">
<title>Events Test — RoadGuide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:  #080c14;
  --gold: #c9a84c;
  --glo:  #e8c97a;
  --gdim: rgba(201,168,76,.35);
  --pale: #eef2ff;
  --dim:  rgba(220,228,255,.45);
  --card: rgba(255,255,255,.05);
  --edge: rgba(255,255,255,.09);
  --green:#50c880;
  --red:  #e05555;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; background:var(--ink); color:var(--pale); font-family:'DM Sans',sans-serif; overflow:hidden; }

/* ── Background ── */
#sky { position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 70% 50% at 15% 10%, rgba(18,34,68,.9) 0%, transparent 100%),
              radial-gradient(ellipse 60% 60% at 85% 90%, rgba(10,18,38,.95) 0%, transparent 100%),
              var(--ink);
}
#sky::before { content:''; position:absolute; inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 8%  12%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px   1px   at 23% 45%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 8%,  rgba(201,168,76,.4)  0%, transparent 100%),
    radial-gradient(1px   1px   at 71% 67%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1.2px 1.2px at 38% 82%, rgba(255,255,255,.4)  0%, transparent 100%),
    radial-gradient(1px   1px   at 88% 28%, rgba(255,255,255,.5)  0%, transparent 100%);
}

/* ── Layout ── */
#app { position:relative; z-index:1; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }

/* ── Header ── */
#hdr { flex-shrink:0; padding:env(safe-area-inset-top,44px) 20px 14px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,.06); }
.logo { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:5px; line-height:1; }
.logo-tag { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; margin-top:3px; }
.hd-r { text-align:right; }
.hd-r p { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:.5px; }
.hd-r span { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; color:var(--glo); }

/* ── Scan bar ── */
#scanbar { flex-shrink:0; height:2px; background:rgba(255,255,255,.05); }

/* ── Scroll area ── */
#scr { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:14px 14px 40px; }
#scr::-webkit-scrollbar { display:none; }

/* ── Events button ── */
#eventsWrap { display:flex; justify-content:center; padding:10px 0 20px; }
#eventsBtn {
  display:flex; align-items:center; gap:14px; padding:14px 32px;
  border-radius:50px; cursor:pointer;
  border:1.5px solid rgba(201,168,76,.45);
  background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));
  transition:all .25s; -webkit-appearance:none;
}
#eventsBtn.loading {
  border-color:rgba(201,168,76,.6);
  background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.06));
}
#eventsBtn:active { transform:scale(.96); }
.eb-icon { font-size:24px; }
.eb-text { display:flex; flex-direction:column; }
.eb-main { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:var(--glo); }
.eb-sub  { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--gdim); text-transform:uppercase; }

/* ── Status bar ── */
#status {
  display:flex; align-items:center; gap:8px; padding:8px 13px; margin-bottom:18px;
  background:var(--card); border:1px solid var(--edge); border-radius:10px;
  font-family:'DM Mono',monospace; font-size:10px; display:none;
}
#status.show { display:flex; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot.spin { background:var(--gold); animation:blink 1.2s ease-in-out infinite; }
.dot.ok   { background:var(--green); }
.dot.err  { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1;}50%{opacity:.25;} }
#stmsg { flex:1; color:var(--dim); }

/* ── Events list ── */
#eventsPane { display:none; }
#eventsPane.show { display:block; }

.events-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.events-title {
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:var(--glo);
}
.events-count {
  font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:1px;
}

/* ── Event card ── */
.event-card {
  display:flex; gap:12px; padding:13px 14px;
  background:var(--card); border:1px solid var(--edge);
  border-radius:14px; margin-bottom:9px; cursor:pointer;
  transition:border-color .2s;
  text-decoration:none; color:inherit;
}
.event-card:active { border-color:rgba(201,168,76,.35); }

.event-date-col {
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  flex-shrink:0; width:44px; padding-top:2px;
}
.event-month {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:2px;
  color:var(--gold); text-transform:uppercase;
}
.event-day {
  font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:1px;
  color:var(--glo); line-height:1;
}
.event-dow {
  font-family:'DM Mono',monospace; font-size:7px; color:var(--dim); letter-spacing:1px;
}

.event-divider {
  width:1px; background:rgba(255,255,255,.08); flex-shrink:0; margin:0 2px;
}

.event-info { flex:1; min-width:0; }
.event-name {
  font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:.5px;
  color:var(--pale); line-height:1.1; margin-bottom:5px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.event-venue {
  font-size:11px; font-weight:400; color:var(--dim);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:4px;
}
.event-meta {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.event-time {
  font-family:'DM Mono',monospace; font-size:9px; color:var(--gdim); letter-spacing:.5px;
}
.event-cat {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:1px;
  color:rgba(201,168,76,.6); text-transform:uppercase;
  background:rgba(201,168,76,.08); border-radius:4px; padding:1px 5px;
}
.event-dist {
  font-family:'DM Mono',monospace; font-size:9px; color:var(--green); margin-left:auto; flex-shrink:0;
}

/* ── No results ── */
.no-events {
  text-align:center; padding:40px 20px;
  font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); letter-spacing:1px;
  line-height:1.8;
}

/* ── Separator ── */
.sep { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,.18),transparent); margin:4px 0 16px; }

/* ── Location note ── */
#locNote {
  font-family:'DM Mono',monospace; font-size:9px; color:var(--dim);
  text-align:center; margin-bottom:14px; letter-spacing:.5px; display:none;
}
#locNote.show { display:block; }
</style>
</head>
<body>
<div id="sky"></div>
<div id="app">
  <div id="hdr">
    <div>
      <div class="logo">RoadGuide</div>
      <div class="logo-tag">California</div>
    </div>
    <div class="hd-r">
      <p>EVENTS TEST</p>
      <p><span id="eventCount">—</span></p>
    </div>
  </div>
  <div id="scanbar"></div>

  <div id="scr">

    <div id="eventsWrap">
      <button id="eventsBtn" onclick="fetchEvents()">
        <div class="eb-icon">🎟</div>
        <div class="eb-text">
          <div class="eb-main" id="evtLabel">Nearby Events</div>
          <div class="eb-sub" id="evtSub">Tap to find events near you</div>
        </div>
      </button>
    </div>

    <div id="status">
      <div class="dot spin" id="dot"></div>
      <div id="stmsg">Locating you…</div>
    </div>

    <div id="locNote"></div>
    <div id="eventsPane"></div>

  </div>
</div>

<script>
// ── Ticketmaster API key ──────────────────────────────────
// Get a free key at developer.ticketmaster.com (no credit card)
var TM_KEY = '';   // ← paste your Ticketmaster API key here

// ── State ─────────────────────────────────────────────────
var userLat = null;
var userLon = null;

// ── Helpers ───────────────────────────────────────────────
function setStatus(msg, dotCls) {
  var s = document.getElementById('status');
  var d = document.getElementById('dot');
  var m = document.getElementById('stmsg');
  s.className = 'show';
  d.className = 'dot ' + dotCls;
  m.textContent = msg;
}
function hideStatus() {
  document.getElementById('status').className = '';
}
function setBtn(label, sub) {
  document.getElementById('evtLabel').textContent = label;
  document.getElementById('evtSub').textContent   = sub;
}

// ── Haversine distance (miles) ────────────────────────────
function dist(lat1, lon1, lat2, lon2) {
  var R = 3958.8;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLon = (lon2-lon1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)
        + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
        * Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Format date ────────────────────────────────────────────
var MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
var DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function parseDate(str) {
  // str is like "2026-04-12" or "2026-04-12T19:30:00"
  var d = new Date(str.length === 10 ? str + 'T00:00:00' : str);
  return d;
}
function formatTime(str) {
  if (!str) return '';
  var d = parseDate(str);
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + (m ? ':' + String(m).padStart(2,'0') : '') + ' ' + ampm;
}

// ── Render events ──────────────────────────────────────────
function renderEvents(events) {
  var pane  = document.getElementById('eventsPane');
  var count = document.getElementById('eventCount');

  if (!events || !events.length) {
    pane.innerHTML = '<div class="no-events">NO EVENTS FOUND<br>WITHIN 30 MILES</div>';
    pane.className = 'show';
    count.textContent = '0';
    return;
  }

  count.textContent = events.length;

  var html = '<div class="events-header">'
           + '<div class="events-title">Upcoming Events</div>'
           + '<div class="events-count">' + events.length + ' NEAR YOU</div>'
           + '</div>';

  events.forEach(function(ev) {
    var dateStr  = (ev.dates && ev.dates.start && ev.dates.start.localDate) || '';
    var timeStr  = (ev.dates && ev.dates.start && ev.dates.start.localTime) || '';
    var d        = dateStr ? parseDate(dateStr) : null;
    var month    = d ? MONTHS[d.getMonth()] : '—';
    var day      = d ? d.getDate() : '—';
    var dow      = d ? DAYS[d.getDay()] : '';
    var time     = timeStr ? formatTime(dateStr + 'T' + timeStr) : (ev.dates && ev.dates.start && ev.dates.start.noSpecificTime ? 'All day' : '');

    var venue    = (ev._embedded && ev._embedded.venues && ev._embedded.venues[0]) || {};
    var venueName = venue.name || '';
    var vLat     = venue.location ? parseFloat(venue.location.latitude)  : null;
    var vLon     = venue.location ? parseFloat(venue.location.longitude) : null;
    var miles    = (userLat && vLat) ? dist(userLat, userLon, vLat, vLon).toFixed(1) + ' mi' : '';

    var segment  = (ev.classifications && ev.classifications[0] && ev.classifications[0].segment)
                   ? ev.classifications[0].segment.name : '';
    var genre    = (ev.classifications && ev.classifications[0] && ev.classifications[0].genre)
                   ? ev.classifications[0].genre.name : '';
    var catLabel = genre && genre !== 'Undefined' ? genre : segment;

    var url = ev.url || '#';

    html += '<a class="event-card" href="' + url + '" target="_blank" rel="noopener">'
          + '  <div class="event-date-col">'
          + '    <div class="event-month">' + month + '</div>'
          + '    <div class="event-day">'   + day   + '</div>'
          + '    <div class="event-dow">'   + dow   + '</div>'
          + '  </div>'
          + '  <div class="event-divider"></div>'
          + '  <div class="event-info">'
          + '    <div class="event-name">'  + escHtml(ev.name) + '</div>'
          + '    <div class="event-venue">' + escHtml(venueName) + '</div>'
          + '    <div class="event-meta">'
          + (time     ? '<span class="event-time">' + time + '</span>' : '')
          + (catLabel ? '<span class="event-cat">'  + escHtml(catLabel) + '</span>' : '')
          + (miles    ? '<span class="event-dist">' + miles + '</span>' : '')
          + '    </div>'
          + '  </div>'
          + '</a>';
  });

  pane.innerHTML = html;
  pane.className = 'show';
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Fetch from Ticketmaster ────────────────────────────────
function callTicketmaster(lat, lon) {
  setStatus('Finding events near you…', 'spin');
  setBtn('SEARCHING…', 'Checking Ticketmaster');

  var today = new Date().toISOString().split('T')[0] + 'T00:00:00Z';
  var url   = 'https://app.ticketmaster.com/discovery/v2/events.json'
            + '?apikey=' + TM_KEY
            + '&latlong=' + lat + ',' + lon
            + '&radius=30&unit=miles'
            + '&startDateTime=' + today
            + '&size=20'
            + '&sort=date,asc';

  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('TM API ' + r.status);
      return r.json();
    })
    .then(function(data) {
      hideStatus();
      setBtn('Nearby Events', 'Tap to refresh');
      document.getElementById('eventsBtn').classList.remove('loading');

      var events = (data._embedded && data._embedded.events) ? data._embedded.events : [];
      document.getElementById('locNote').className = 'show';
      document.getElementById('locNote').textContent =
        '📍 Within 30 miles of your location';

      renderEvents(events);
    })
    .catch(function(err) {
      hideStatus();
      setStatus('Could not load events — ' + err.message, 'err');
      setBtn('Nearby Events', 'Tap to try again');
      document.getElementById('eventsBtn').classList.remove('loading');
      // Fall back to demo data so you can see the UI
      useDemoData(lat, lon);
    });
}

// ── Demo data (shown when no API key or on error) ──────────
function useDemoData(lat, lon) {
  var demo = [
    { name:"Oakland Symphony Orchestra", url:"#",
      dates:{ start:{ localDate:"2026-03-22", localTime:"19:30:00" }},
      classifications:[{ segment:{name:"Arts & Theatre"}, genre:{name:"Classical"} }],
      _embedded:{ venues:[{ name:"Paramount Theatre Oakland", location:{ latitude:"37.8044", longitude:"-122.2712" }}]}},
    { name:"Golden State Warriors vs Lakers", url:"#",
      dates:{ start:{ localDate:"2026-03-23", localTime:"18:00:00" }},
      classifications:[{ segment:{name:"Sports"}, genre:{name:"Basketball"} }],
      _embedded:{ venues:[{ name:"Chase Center San Francisco", location:{ latitude:"37.7679", longitude:"-122.3874" }}]}},
    { name:"Dave Matthews Band", url:"#",
      dates:{ start:{ localDate:"2026-03-28", localTime:"20:00:00" }},
      classifications:[{ segment:{name:"Music"}, genre:{name:"Rock"} }],
      _embedded:{ venues:[{ name:"Shoreline Amphitheatre", location:{ latitude:"37.4267", longitude:"-122.0806" }}]}},
    { name:"SF Giants vs Dodgers", url:"#",
      dates:{ start:{ localDate:"2026-04-01", localTime:"13:05:00" }},
      classifications:[{ segment:{name:"Sports"}, genre:{name:"Baseball"} }],
      _embedded:{ venues:[{ name:"Oracle Park San Francisco", location:{ latitude:"37.7786", longitude:"-122.3893" }}]}},
    { name:"Cirque du Soleil — Corteo", url:"#",
      dates:{ start:{ localDate:"2026-04-04", localTime:"19:30:00" }},
      classifications:[{ segment:{name:"Arts & Theatre"}, genre:{name:"Circus"} }],
      _embedded:{ venues:[{ name:"SAP Center San Jose", location:{ latitude:"37.3329", longitude:"-121.9011" }}]}},
    { name:"Kendrick Lamar — Grand National Tour", url:"#",
      dates:{ start:{ localDate:"2026-04-10", localTime:"20:30:00" }},
      classifications:[{ segment:{name:"Music"}, genre:{name:"Hip-Hop/Rap"} }],
      _embedded:{ venues:[{ name:"Oracle Arena Oakland", location:{ latitude:"37.7502", longitude:"-122.2030" }}]}},
  ];

  document.getElementById('locNote').className = 'show';
  document.getElementById('locNote').textContent = '⚡ Demo mode — add Ticketmaster API key for live data';
  renderEvents(demo);
}

// ── Main entry ─────────────────────────────────────────────
function fetchEvents() {
  document.getElementById('eventsBtn').classList.add('loading');
  setBtn('LOCATING…', 'Getting your position');

  if (!navigator.geolocation) {
    // No GPS — use Lafayette, CA as fallback
    userLat = 37.8857; userLon = -122.1180;
    if (!TM_KEY) { useDemoData(userLat, userLon); return; }
    callTicketmaster(userLat, userLon);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      if (!TM_KEY) { useDemoData(userLat, userLon); return; }
      callTicketmaster(userLat, userLon);
    },
    function() {
      // GPS denied — use Lafayette fallback
      userLat = 37.8857; userLon = -122.1180;
      if (!TM_KEY) { useDemoData(userLat, userLon); return; }
      callTicketmaster(userLat, userLon);
    },
    { timeout:8000, maximumAge:60000 }
  );
}
</script>
</body>
</html>
