<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eventbrite API Test</title>
<style>
  body { font-family: monospace; background: #0a0f1a; color: #eef2ff; padding: 20px; }
  h2 { color: #c9a84c; }
  button { background: #c9a84c; color: #000; border: none; padding: 12px 24px;
           font-size: 16px; border-radius: 8px; cursor: pointer; margin: 8px 4px; }
  #output { background: #111827; border: 1px solid #333; border-radius: 8px;
            padding: 16px; margin-top: 16px; white-space: pre-wrap;
            font-size: 12px; line-height: 1.6; min-height: 100px; }
  .ok  { color: #50c880; }
  .err { color: #e05555; }
  .dim { color: #888; }
</style>
</head>
<body>
<h2>🎟 Eventbrite API Tester</h2>
<p style="color:#aaa;font-size:13px">Tests your API token using multiple proxy methods.</p>

<button onclick="testProxy1()">Try Proxy 1 (corsproxy.io)</button>
<button onclick="testProxy2()">Try Proxy 2 (allorigins)</button>
<button onclick="testDirect()">Try Direct (no proxy)</button>
<button onclick="clearOutput()">Clear</button>

<div id="output"><span class="dim">Click a button to start testing…</span></div>

<script>
var EB_TOKEN = '7FSOB4KXZTZ77ZREQ3F7';
var API_URL  = 'https://www.eventbriteapi.com/v3/users/me/?token=' + EB_TOKEN;

function log(msg, cls) {
  var el = document.getElementById('output');
  var line = document.createElement('div');
  line.className = cls || '';
  line.textContent = msg;
  el.appendChild(line);
}

function clearOutput() {
  document.getElementById('output').innerHTML = '<span class="dim">Cleared.</span>';
}

function handleData(data) {
  if (data.id) {
    log('✓ TOKEN VALID! User: ' + (data.name || data.email || data.id), 'ok');
  } else if (data.error) {
    log('✗ Token rejected: ' + data.error + ' — ' + (data.error_description || ''), 'err');
  } else {
    log('? Response: ' + JSON.stringify(data).substring(0, 200), 'dim');
  }
}

function testProxy1() {
  log('── Trying corsproxy.io…', 'dim');
  var url = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(handleData)
    .catch(function(e) { log('✗ Failed: ' + e.message, 'err'); });
}

function testProxy2() {
  log('── Trying allorigins.win…', 'dim');
  var url = 'https://api.allorigins.win/get?url=' + encodeURIComponent(API_URL);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(w) { handleData(JSON.parse(w.contents)); })
    .catch(function(e) { log('✗ Failed: ' + e.message, 'err'); });
}

function testDirect() {
  log('── Trying direct (no proxy)…', 'dim');
  fetch(API_URL, { headers: { 'Authorization': 'Bearer ' + EB_TOKEN } })
    .then(function(r) { return r.json(); })
    .then(handleData)
    .catch(function(e) { log('✗ Failed: ' + e.message, 'err'); });
}
</script>
</body>
</html>
