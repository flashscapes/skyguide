 limit for commercial citrus in California."},{"name":"Geysers Geothermal Area","county":"Sonoma","emoji":"♨️","lat":38.7833,"lon":-122.7333,"cat":"Geothermal","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Sugarloaf_Ridge_State_Park.jpg/320px-Sugarloaf_Ridge_State_Park.jpg","fact":"The Geysers is the <em>largest geothermal power complex in the world</em>, generating enough electricity to power San Francisco from naturally occurring steam vented from magma chambers miles underground. The area has been known since the 1800s when tourists came by stagecoach to see the fumaroles — the local Pomo people considered the steam vents sacred and used them for healing ceremonies."},{"name":"Lake Sonoma Recreation Area","county":"Sonoma","emoji":"💧","lat":38.7117,"lon":-123.0283,"cat":"Recreation Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Sugarloaf_Ridge_State_Park.jpg/320px-Sugarloaf_Ridge_State_Park.jpg","fact":"Lake Sonoma, created by Warm Springs Dam in <em>1983</em>, was the last federal water project built in California before environmental opposition made new dam construction effectively impossible. The reservoir flooded a valley of ranches and orchards — one ranch family held out for 40 years in legal battles before finally accepting compensation when the water rose around their property."},{"name":"Dry Creek Valley Wine Country","county":"Sonoma","emoji":"🍇","lat":38.65,"lon":-122.95,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Paso_Robles_wine_country.jpg/320px-Paso_Robles_wine_country.jpg","fact":"Dry Creek Valley's bench lands of well-drained alluvial soil, surrounded by hills that block coastal fog, create conditions <em>nearly identical to the Bordeaux wine region</em> in France — a resemblance that allowed the valley to establish Zinfandel and Cabernet Sauvignon as its signature varieties. The valley's family-owned wineries, many established by Italian immigrant families in the 1880s, have resisted corporate buyouts more successfully than any other Sonoma wine region."},{"name":"Alexander Valley Wine Country","county":"Sonoma","emoji":"🍷","lat":38.75,"lon":-122.9,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Sonoma_Valley_vineyards.jpg/320px-Sonoma_Valley_vineyards.jpg","fact":"Alexander Valley's long, warm growing season produces the <em>richest and most powerful Cabernet Sauvignons</em> in Sonoma County — wines that compete directly with Napa Valley's most prestigious bottles at a fraction of the price. The valley was settled by Cyrus Alexander in 1840, who received a land grant from General Vallejo in exchange for managing the general's rancho in the north."},{"name":"Rohnert Park — Cotati Historic Railroad Depot","county":"Sonoma","emoji":"🚂","lat":38.3394,"lon":-122.7103,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Petaluma_downtown.jpg/320px-Petaluma_downtown.jpg","fact":"The Cotati depot was a stop on the <em>Northwestern Pacific Railroad</em> that once connected San Francisco to Eureka — a 286-mile journey that took 12 hours through some of the most dramatic scenery in California. The railroad, killed by automobile competition in the 1930s and 1940s, is now being revived as a commuter rail line."},{"name":"Santa Rosa — Railroad Square Historic District","county":"Sonoma","emoji":"🏘","lat":38.4393,"lon":-122.7269,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Charles_M_Schulz_Museum.jpg/320px-Charles_M_Schulz_Museum.jpg","fact":"Railroad Square was rebuilt after the <em>1906 earthquake</em> leveled most of downtown Santa Rosa — the city suffered worse damage proportionally than San Francisco, but received far less attention and aid. The square's stone and brick buildings, constructed from local quarried stone after 1906, form one of the most complete early 20th-century commercial districts in Northern California."},{"name":"Charles M. Schulz Museum, Santa Rosa","county":"Sonoma","emoji":"🐕","lat":38.4381,"lon":-122.7175,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Charles_M_Schulz_Museum.jpg/320px-Charles_M_Schulz_Museum.jpg","fact":"Charles Schulz, creator of Peanuts, lived in Santa Rosa for the last <em>30 years of his life</em> and drew every single one of his 17,897 Peanuts strips in his studio here — working until two months before his death in 2000. The museum's highlight is a recreation of his actual studio, preserved exactly as he left it."},{"name":"Luther Burbank Home and Gardens, Santa Rosa","county":"Sonoma","emoji":"🌹","lat":38.4408,"lon":-122.7142,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Luther_Burbank_Home_Santa_Rosa.jpg/320px-Luther_Burbank_Home_Santa_Rosa.jpg","fact":"Luther Burbank developed over <em>800 new plant varieties</em> in his Santa Rosa gardens — including the Shasta daisy, the Freestone peach, the Santa Rosa plum, and the Russet Burbank potato used in McDonald's French fries. Burbank's experimental methods, crossing thousands of plants over decades, anticipated modern agricultural genetics by 50 years."},{"name":"Sonoma County Museum, Santa Rosa","county":"Sonoma","emoji":"🏛","lat":38.4383,"lon":-122.7139,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Charles_M_Schulz_Museum.jpg/320px-Charles_M_Schulz_Museum.jpg","fact":"The Sonoma County Museum occupies the <em>original 1910 Federal Building</em>, a Beaux-Arts post office and courthouse that survived the 2017 Tubbs Fire that destroyed thousands of homes around it. The building's thick stone walls and copper roof protected it from embers that consumed the surrounding neighborhood."},{"name":"Annadel State Park","county":"Sonoma","emoji":"🌿","lat":38.45,"lon":-122.64,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Annadel_State_Park.jpg/320px-Annadel_State_Park.jpg","fact":"Annadel State Park's cobblestone quarries, worked from the <em>1870s to 1950s</em>, paved the streets of San Francisco — the distinctive round stones underfoot in many historic SF neighborhoods came from this exact hillside. The quarry pits have since filled with water and now serve as swimming holes for the park's summer visitors."},{"name":"Sugarloaf Ridge State Park","county":"Sonoma","emoji":"⭐","lat":38.4333,"lon":-122.5167,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Sugarloaf_Ridge_State_Park.jpg/320px-Sugarloaf_Ridge_State_Park.jpg","fact":"Sugarloaf Ridge's astronomy program operates one of the best <em>public observatories</em> in Northern California — the Sonoma Valley Observatory, with a 40-inch telescope, on weekends when skies are clear. The park's ridgeline sits above the marine layer that obscures coastal skies, making it one of the darkest accessible sites in the Bay Area."},{"name":"Hood Mountain Regional Park","county":"Sonoma","emoji":"🏔","lat":38.4667,"lon":-122.5333,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Sugarloaf_Ridge_State_Park.jpg/320px-Sugarloaf_Ridge_State_Park.jpg","fact":"Hood Mountain's 2,730-foot summit offers the <em>highest publicly accessible viewpoint</em> in Sonoma County, with views stretching from the Pacific coast to the Sacramento Valley on clear days. The mountain's upper slopes were severely burned in the 2017 Nuns Fire, and the recovery of native chaparral species has been closely watched by botanists studying post-fire plant succession."},{"name":"Crane Creek Regional Park","county":"Sonoma","emoji":"🦅","lat":38.3978,"lon":-122.6011,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Annadel_State_Park.jpg/320px-Annadel_State_Park.jpg","fact":"Crane Creek's grassland ridges are one of the best places in Sonoma County to observe <em>white-tailed kites</em> — a hawk-like raptor that hovers in place while hunting mice — along with golden eagles and prairie falcons. The park's 128 acres are managed with cattle grazing to maintain the short-grass habitat that these open-country raptors require."},{"name":"Helen Putnam Regional Park, Petaluma","county":"Sonoma","emoji":"🌾","lat":38.2036,"lon":-122.6708,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Petaluma_downtown.jpg/320px-Petaluma_downtown.jpg","fact":"Helen Putnam Park's rolling hills were a <em>dairy farm</em> operated by the Putnam family for three generations before being donated to the county in 1975. The park's unobstructed grassland ridges offer views of both the San Pablo Bay and the Petaluma Gap — the wind channel through the Coast Ranges that is one of the windiest spots in the Bay Area."},{"name":"Tolay Lake Regional Park","county":"Sonoma","emoji":"💧","lat":38.2589,"lon":-122.5764,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Sonoma_Valley_vineyards.jpg/320px-Sonoma_Valley_vineyards.jpg","fact":"Tolay Lake was a sacred site for the <em>Coast Miwok and Southern Pomo peoples</em> for thousands of years — a seasonal lake that attracted vast concentrations of waterfowl and provided an important gathering place for trade and ceremony. The lake dried up when the surrounding ranches drained it for agriculture in the 1880s; restoration work is slowly returning seasonal water to the ancient lake bed."},{"name":"Sonoma Raceway","county":"Sonoma","emoji":"🏎","lat":38.1611,"lon":-122.4547,"cat":"Raceway","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Sonoma_Raceway.jpg/320px-Sonoma_Raceway.jpg","fact":"Sonoma Raceway's road course winds through <em>12 turns over 2.52 miles</em> on a hillside above the Sonoma Valley, creating one of the most challenging and scenic racing venues in North America. The track was built in 1968 on land that is simultaneously a working vineyard — grapevines grow right up to the track barriers, and wine is made from the grapes harvested during racing season."},{"name":"General Vallejo's Lachryma Montis, Sonoma","county":"Sonoma","emoji":"🏠","lat":38.2972,"lon":-122.465,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Lachryma_Montis_Sonoma.jpg/320px-Lachryma_Montis_Sonoma.jpg","fact":"General Mariano Vallejo, the most powerful man in Mexican California, built his New England-style Victorian home in Sonoma in <em>1852</em> — a deliberate statement about his embrace of American culture after California statehood. Vallejo named the estate 'Lachryma Montis' (Tears of the Mountain) for a natural spring on the property that he piped into his home for running water — the first private house in California to have indoor plumbing."},{"name":"Sonoma Barracks State Historic Park","county":"Sonoma","emoji":"🏛","lat":38.2919,"lon":-122.4572,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Sonoma_Barracks.jpg/320px-Sonoma_Barracks.jpg","fact":"The Sonoma Barracks, built by General Vallejo in <em>1836-1840</em>, were the northernmost military outpost of Mexico in California and housed the soldiers responsible for controlling the territory north of San Francisco Bay. It was from this barracks that American settlers took Vallejo prisoner in 1846, beginning the Bear Flag Revolt that eventually led to California statehood."},{"name":"Winchester Mystery House","county":"Santa Clara","emoji":"🏚","lat":37.3184,"lon":-121.9511,"cat":"Historic House","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Winchester_Mystery_House.jpg/320px-Winchester_Mystery_House.jpg","fact":"Sarah Winchester, heir to the Winchester rifle fortune, built this <em>160-room Victorian mansion continuously for 38 years</em> — from 1884 until her death in 1922 — believing construction would keep vengeful spirits at bay. The house contains stairs that lead into ceilings, doors that open onto walls, and a skylight built into the floor — architectural features that have never been adequately explained."},{"name":"Stanford University — Main Quad","county":"Santa Clara","emoji":"🏛","lat":37.4275,"lon":-122.1697,"cat":"University","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Stanford_University_-_Hoover_Tower.jpg/320px-Stanford_University_-_Hoover_Tower.jpg","fact":"Stanford University was founded in <em>1885</em> by Leland Stanford as a memorial to his only son, who died of typhoid at 15 — the entire university was conceived as a monument to a single child. The campus's 8,180 acres make it one of the largest university campuses in the world, built on Stanford's former Palo Alto Stock Farm where he bred racehorses."},{"name":"Hoover Tower, Stanford","county":"Santa Clara","emoji":"🗼","lat":37.4265,"lon":-122.167,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Stanford_University_-_Hoover_Tower.jpg/320px-Stanford_University_-_Hoover_Tower.jpg","fact":"The 285-foot Hoover Tower, built in <em>1941</em> to house the Hoover Institution on War, Revolution, and Peace, holds one of the most significant archives of political documents in the world — including original Nazi files and KGB documents. The tower's observation deck offers a 360-degree view of the peninsula from San Francisco Bay to the Santa Cruz Mountains."},{"name":"San Jose — Plaza de César Chávez","county":"Santa Clara","emoji":"🌳","lat":37.3361,"lon":-121.8899,"cat":"Historic Plaza","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/The_Tech_Museum_San_Jose.jpg/320px-The_Tech_Museum_San_Jose.jpg","fact":"This plaza has been the civic center of San Jose since the city's founding in <em>1777</em> — making it the oldest continuously used public space in California. San Jose was California's first state capital, and the original 1849 legislative sessions were held in a building that stood on the edge of this very plaza."},{"name":"Tech Interactive Museum, San Jose","county":"Santa Clara","emoji":"💻","lat":37.3326,"lon":-121.8894,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/The_Tech_Museum_San_Jose.jpg/320px-The_Tech_Museum_San_Jose.jpg","fact":"The Tech Interactive sits in the heart of Silicon Valley and houses exhibits explaining the technologies that <em>transformed the modern world</em> — all invented within a few miles of this building. The museum's genetics lab allows visitors to extract their own DNA, and its design lab hosts the largest concentration of amateur inventors per square foot of any building in California."},{"name":"San Jose City Hall Historic Building","county":"Santa Clara","emoji":"🏛","lat":37.3394,"lon":-121.8897,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/The_Tech_Museum_San_Jose.jpg/320px-The_Tech_Museum_San_Jose.jpg","fact":"San Jose's original 1889 City Hall, now used as a historic annex, was built during the city's first real estate boom and features a clock tower modeled after Italian Renaissance campaniles. The city's new City Hall rotunda, completed in 2005, contains the largest glass dome in California — a deliberate echo of California's State Capitol in Sacramento."},{"name":"Rosicrucian Egyptian Museum","county":"Santa Clara","emoji":"🏺","lat":37.3444,"lon":-121.9147,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Rosicrucian_Egyptian_Museum.jpg/320px-Rosicrucian_Egyptian_Museum.jpg","fact":"The Rosicrucian Egyptian Museum houses the <em>largest collection of ancient Egyptian artifacts</em> on the West Coast — over 4,000 objects including mummies, sarcophagi, and canopic jars — in a neighborhood of full-scale Egyptian Revival buildings. The collection was assembled by Harvey Spencer Lewis, who built an entire Egyptian campus in a San Jose residential neighborhood in the 1920s."},{"name":"History Park San Jose","county":"Santa Clara","emoji":"🏘","lat":37.31,"lon":-121.8533,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/History_Park_San_Jose.jpg/320px-History_Park_San_Jose.jpg","fact":"History Park is a <em>28-acre outdoor living history museum</em> containing over 27 historic structures relocated from around Santa Clara County — including a working electric streetcar, a gas station, and the original Electric Light Tower that illuminated downtown San Jose. The tower, a 237-foot gas-lit structure that bathed downtown in artificial daylight, was the first electric streetlight in a California city."},{"name":"Lick Observatory, Mount Hamilton","county":"Santa Clara","emoji":"🔭","lat":37.3414,"lon":-121.6428,"cat":"Observatory","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Lick_Observatory.jpg/320px-Lick_Observatory.jpg","fact":"Lick Observatory, opened in <em>1888</em>, was the world's first permanently occupied mountaintop astronomical observatory — a model for every major observatory built since. James Lick, the eccentric millionaire who funded it, is buried beneath the telescope pier inside the main dome, as per his specific instructions."},{"name":"Hakone Estate and Gardens, Saratoga","county":"Santa Clara","emoji":"🌸","lat":37.2533,"lon":-122.0419,"cat":"Historic Garden","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Hakone_Estate_Gardens.jpg/320px-Hakone_Estate_Gardens.jpg","fact":"Hakone Estate, established in <em>1918</em>, is the oldest Japanese garden in the Western Hemisphere — a 17-acre estate built by a San Francisco art dealer who wanted to recreate the bamboo gardens of Kyoto in the Santa Cruz foothills. During World War II, Japanese-American caretakers continued tending the garden even while their families were incarcerated in internment camps."},{"name":"Villa Montalvo, Saratoga","county":"Santa Clara","emoji":"🏰","lat":37.2564,"lon":-122.0389,"cat":"Historic Estate","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Villa_Montalvo_Saratoga.jpg/320px-Villa_Montalvo_Saratoga.jpg","fact":"Villa Montalvo was built in <em>1912</em> by James Phelan, San Francisco's reform mayor, as his country retreat and artistic salon where he hosted Jack London, Sarah Bernhardt, and Gertrude Stein. Phelan bequeathed the estate to the public as an arts center — it now hosts 250 events per year in its outdoor amphitheater carved into the hillside."},{"name":"Filoli Historic House, Woodside","county":"Santa Clara","emoji":"🌹","lat":37.4589,"lon":-122.3161,"cat":"Historic Estate","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Filoli_House_and_Formal_Garden.jpg/320px-Filoli_House_and_Formal_Garden.jpg","fact":"Filoli's 654-acre estate was built in <em>1917</em> for William Bourn II, heir to the Empire Mine gold fortune, and its 16 acres of formal gardens are considered the finest example of English Renaissance garden design in California. The house's exterior was used as the exterior of the Carrington mansion in the 1980s TV series Dynasty — viewed by 250 million people weekly at its peak."},{"name":"NASA Ames Research Center, Mountain View","county":"Santa Clara","emoji":"🚀","lat":37.4086,"lon":-122.0647,"cat":"Research Facility","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/NASA_Ames_Research_Center.jpg/320px-NASA_Ames_Research_Center.jpg","fact":"NASA Ames has been conducting aerospace research since <em>1939</em> — predating NASA itself by 19 years — and its Unitary Plan Wind Tunnel complex can simulate conditions from subsonic to Mach 3.5. The facility houses the world's largest wind tunnel, a structure large enough to fit a Boeing 737 inside and blow winds of 100 mph across it."},{"name":"Hangar One, Moffett Field","county":"Santa Clara","emoji":"✈️","lat":37.4131,"lon":-122.0483,"cat":"Historic Structure","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Hangar_One_Moffett_Field.jpg/320px-Hangar_One_Moffett_Field.jpg","fact":"Hangar One at Moffett Field is so large that <em>clouds form inside it</em> — the 1,133-foot-long structure has its own weather, with morning fog collecting near the ceiling on warm days. Built in 1931 to house the Navy's airship USS Macon, it's one of the largest wooden structures ever built and remains a landmark visible from across the entire South Bay."},{"name":"Computer History Museum, Mountain View","county":"Santa Clara","emoji":"💾","lat":37.4144,"lon":-122.0777,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Computer_History_Museum.jpg/320px-Computer_History_Museum.jpg","fact":"The Computer History Museum holds the most comprehensive collection of <em>computing artifacts in the world</em> — from the original Babbage difference engine to the Cray supercomputer — tracing 2,000 years of computing history. Many of the artifacts were rescued from Silicon Valley dumpsters by museum founder Gordon Bell, who realized in the 1970s that tech companies were discarding history."},{"name":"Shoreline Amphitheatre, Mountain View","county":"Santa Clara","emoji":"🎵","lat":37.4264,"lon":-122.0811,"cat":"Venue","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/NASA_Ames_Research_Center.jpg/320px-NASA_Ames_Research_Center.jpg","fact":"Shoreline Amphitheatre is built on a <em>former landfill</em> — 22 million tons of garbage that was capped and landscaped in 1986. The venue's unique acoustics are the result of the bowl-shaped terrain formed by the landfill mound, and methane from decomposing garbage below the stage has been captured to generate a portion of the venue's electricity since 2006."},{"name":"Google Campus, Mountain View","county":"Santa Clara","emoji":"🔍","lat":37.422,"lon":-122.0841,"cat":"Corporate Campus","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/NASA_Ames_Research_Center.jpg/320px-NASA_Ames_Research_Center.jpg","fact":"Google's Googleplex, established in <em>1999</em> in a former Silicon Graphics office park, pioneered the 'campus' model of corporate office design that is now standard in Silicon Valley — free food, bikes, volleyball courts, and sleeping pods designed to keep employees on-site as long as possible. The campus's solar panels generate 1.6 megawatts of electricity, the largest corporate solar installation in the U.S. when built."},{"name":"Intel Museum, Santa Clara","county":"Santa Clara","emoji":"⚙️","lat":37.3875,"lon":-121.9636,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Computer_History_Museum.jpg/320px-Computer_History_Museum.jpg","fact":"The Intel Museum tells the story of how a small Santa Clara company founded in <em>1968</em> created the microprocessor that made the personal computer revolution possible. Gordon Moore, Intel's co-founder, articulated 'Moore's Law' — the observation that computing power doubles every two years — a prediction so accurate that it guided the entire semiconductor industry for 50 years."},{"name":"Great America Theme Park, Santa Clara","county":"Santa Clara","emoji":"🎢","lat":37.3975,"lon":-121.9753,"cat":"Amusement Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/California%27s_Great_America.jpg/320px-California%27s_Great_America.jpg","fact":"Great America opened in <em>1976</em> on a site that was once a walnut orchard — one of the last remnants of the 'Valley of Heart's Delight' that produced more prunes, apricots, and cherries than anywhere else in the world. The park sits within a few hundred feet of the San Francisco 49ers' Levi's Stadium — two wildly different entertainment venues sharing the same neighborhood."},{"name":"Levi's Stadium, Santa Clara","county":"Santa Clara","emoji":"🏈","lat":37.4033,"lon":-121.9694,"cat":"Stadium","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Levi%27s_Stadium.jpg/320px-Levi%27s_Stadium.jpg","fact":"Levi's Stadium, opened in <em>2014</em>, was the first NFL stadium built specifically to host a Super Bowl and the first major sports venue designed with sustainability at its core — its green roof grows native California plants and generates enough solar power to offset all home game electricity use. The stadium hosts 68,500 fans on land that was an agricultural processing district as recently as the 1980s."},{"name":"Alviso — Historic Salt Marsh Town","county":"Santa Clara","emoji":"🌿","lat":37.4275,"lon":-121.9758,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Don_Edwards_NWR.jpg/320px-Don_Edwards_NWR.jpg","fact":"Alviso was a major <em>Gold Rush-era port</em> — the closest harbor to the gold fields accessible by shallow-draft steamers — before the railroads made water transport obsolete and the town sank into poverty. The town literally sank: built on peat soil that compressed as the land dried, Alviso's streets are now 10 feet below sea level, protected from the bay by earthen levees."},{"name":"Alviso Marina County Park","county":"Santa Clara","emoji":"🦩","lat":37.4294,"lon":-121.9767,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Don_Edwards_NWR.jpg/320px-Don_Edwards_NWR.jpg","fact":"The salt ponds visible from Alviso Marina are the former <em>Cargill salt evaporation ponds</em> — a 16,000-acre industrial landscape being restored to tidal marsh in the largest wetland restoration project in the history of the American West. The ponds' vivid pink and orange colors, caused by salt-loving algae at different salinity levels, create a surreal landscape visible from commercial aircraft."},{"name":"Ulistac Natural Area, Santa Clara","county":"Santa Clara","emoji":"🌾","lat":37.3919,"lon":-121.9775,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Don_Edwards_NWR.jpg/320px-Don_Edwards_NWR.jpg","fact":"Ulistac Natural Area sits on land that was a <em>Ohlone village for 5,000 years</em> before Spanish missionaries arrived — the name comes from the Ohlone word for the area, and shell middens still visible in the banks of the Guadalupe River document continuous habitation stretching back to the end of the last Ice Age. The volunteer-restored native plant garden is entirely maintained by community members without city funding."},{"name":"New Almaden Quicksilver Mine","county":"Santa Clara","emoji":"⚒️","lat":37.1775,"lon":-121.8175,"cat":"Historic Mine","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/New_Almaden_Mine.jpg/320px-New_Almaden_Mine.jpg","fact":"New Almaden was the most productive <em>mercury mine in the Western Hemisphere</em> — its cinnabar ore provided the mercury used to amalgamate gold and silver in every major western mining operation from the 1840s through the 1880s. The mine's 100 miles of tunnels still honeycomb the mountain above the preserved company town, and mercury contamination in the surrounding watershed remains a significant environmental problem today."},{"name":"Almaden Valley — Historic Orchards","county":"Santa Clara","emoji":"🍎","lat":37.235,"lon":-121.87,"cat":"Historic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Almaden_Quicksilver_County_Park.jpg/320px-Almaden_Quicksilver_County_Park.jpg","fact":"Almaden Valley was part of the <em>Valley of Heart's Delight</em> — the name given to Santa Clara Valley when it was the most productive fruit-growing region in America, with 100,000 acres of orchards producing prunes, apricots, cherries, and pears. By 1970, virtually every orchard had been replaced by suburban housing — a transformation so complete that most residents have no idea their neighborhood was once a sea of blossoming fruit trees."},{"name":"Santana Row, San Jose","county":"Santa Clara","emoji":"🏛","lat":37.3208,"lon":-121.9489,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/The_Tech_Museum_San_Jose.jpg/320px-The_Tech_Museum_San_Jose.jpg","fact":"Santana Row was built on the site of the <em>Valley Fair shopping center</em>, one of the first regional malls in California, which burned down in 2002. The new development modeled itself on European mixed-use streets — combining retail, restaurants, hotels, and residences — pioneering a form of urban development that became a national model for walkable suburban centers."},{"name":"Municipal Rose Garden, San Jose","county":"Santa Clara","emoji":"🌹","lat":37.3267,"lon":-121.9431,"cat":"Garden","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/San_Jose_Municipal_Rose_Garden.jpg/320px-San_Jose_Municipal_Rose_Garden.jpg","fact":"San Jose's Municipal Rose Garden, established in <em>1927</em>, contains 4,000 rose bushes representing 189 varieties — one of the most comprehensive collections of heritage and modern roses on the West Coast. The garden's peak bloom in May draws visitors from across the Bay Area, and its heritage varieties include roses that predate the California Gold Rush."},{"name":"Kelley Park, San Jose","county":"Santa Clara","emoji":"🌳","lat":37.31,"lon":-121.8533,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/History_Park_San_Jose.jpg/320px-History_Park_San_Jose.jpg","fact":"Kelley Park contains the <em>Japanese Friendship Garden</em> modeled after the Kokedera garden in Kyoto — a gift from San Jose's Japanese sister city that has been tended by volunteer Japanese-American gardeners since 1965. The park's Happy Hollow Zoo houses the last two captive Vancouver Island marmots outside their native island."},{"name":"Guadalupe River Park and Gardens","county":"Santa Clara","emoji":"🌊","lat":37.3344,"lon":-121.9003,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/The_Tech_Museum_San_Jose.jpg/320px-The_Tech_Museum_San_Jose.jpg","fact":"The Guadalupe River flooded downtown San Jose in <em>1995</em> causing $25 million in damage — the disaster prompted a massive flood control project that transformed a concrete drainage channel into a 3-mile linear park. The park's restoration uncovered a Ohlone village site buried under 150 years of urban fill, now one of the most significant archaeological sites ever found under a major California city."},{"name":"Pueblo de San José de Guadalupe Historic Site","county":"Santa Clara","emoji":"🏚","lat":37.3361,"lon":-121.8899,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/History_Park_San_Jose.jpg/320px-History_Park_San_Jose.jpg","fact":"San Jose was California's <em>first civilian settlement</em>, founded November 29, 1777 by Governor Felipe de Neve as an agricultural colony to feed the Spanish military garrisons at San Francisco and Monterey. The original settlers were 68 people — soldiers, their families, and Native workers — who traveled 12 days from Mission San Francisco to establish California's first non-mission town."},{"name":"Emma Prusch Farm Park","county":"Santa Clara","emoji":"🐄","lat":37.3361,"lon":-121.8417,"cat":"Historic Farm","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/History_Park_San_Jose.jpg/320px-History_Park_San_Jose.jpg","fact":"Emma Prusch Farm Park preserves a <em>turn-of-the-century dairy farm</em> in the middle of East San Jose — the last functioning remnant of the agricultural landscape that covered the Santa Clara Valley just two generations ago. Emma Prusch donated the farm to the city in 1962 on the condition it remain agricultural forever — a condition the city has honored even as development rose to its borders."},{"name":"San Jose State University — Tower Hall","county":"Santa Clara","emoji":"🏛","lat":37.3352,"lon":-121.8808,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Tower_Hall_SJSU.jpg/320px-Tower_Hall_SJSU.jpg","fact":"San Jose State, founded in <em>1857</em>, is the oldest public institution of higher learning on the West Coast — older than UC Berkeley by two years. Tower Hall's clock tower became the city's most recognizable landmark after the 1906 earthquake, when the building survived while much of downtown was destroyed."},{"name":"Peralta Adobe, San Jose","county":"Santa Clara","emoji":"🏚","lat":37.34,"lon":-121.8886,"cat":"Historic Adobe","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/History_Park_San_Jose.jpg/320px-History_Park_San_Jose.jpg","fact":"The Peralta Adobe, built around <em>1797</em>, is the oldest surviving structure in San Jose — an adobe house that has witnessed every phase of California history from Spanish colonial rule to Silicon Valley. The adobe's thick mud walls, made from clay dug from the banks of the Guadalupe River, have been continuously repaired for over 220 years."},{"name":"Fallon House Historic Site","county":"Santa Clara","emoji":"🏠","lat":37.3394,"lon":-121.8892,"cat":"Historic House","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/History_Park_San_Jose.jpg/320px-History_Park_San_Jose.jpg","fact":"The Fallon House, built in <em>1855</em> for Thomas Fallon — a veteran of the Bear Flag Revolt who married into California's most prominent rancho family — is the finest surviving example of Gothic Revival residential architecture in California. The house's garden was the social center of San Jose's emerging American community in the 1860s and 1870s."},{"name":"Overfelt Gardens, San Jose","county":"Santa Clara","emoji":"🌸","lat":37.3536,"lon":-121.8294,"cat":"Garden","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/San_Jose_Municipal_Rose_Garden.jpg/320px-San_Jose_Municipal_Rose_Garden.jpg","fact":"Overfelt Gardens contains a <em>Chinese Cultural Garden</em> donated by the city's Chinese-American community in 1975, featuring a bronze statue of Confucius that is one of only two in the continental United States. The garden's 33-acre natural area preserves one of the last remnants of the native riparian woodland that once lined every creek in the Santa Clara Valley."},{"name":"Alum Rock Park, San Jose","county":"Santa Clara","emoji":"♨️","lat":37.3897,"lon":-121.7917,"cat":"City Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Alum_Rock_Park.jpg/320px-Alum_Rock_Park.jpg","fact":"Alum Rock Park, established in <em>1872</em>, was California's first municipal park — purchased by the city specifically to preserve its mineral springs, which were believed to have healing properties. At its peak in the 1920s, the park attracted 100,000 visitors per year to bathe in 27 mineral springs whose waters ranged from sulfurous to iron-rich to chalky."},{"name":"Coyote Creek Trail","county":"Santa Clara","emoji":"🚴","lat":37.315,"lon":-121.8467,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Joseph_D_Grant_County_Park.jpg/320px-Joseph_D_Grant_County_Park.jpg","fact":"The Coyote Creek Trail follows the route of one of the <em>most significant salmon streams</em> in the Bay Area — Coyote Creek once hosted massive steelhead and Chinook salmon runs that fed thousands of Ohlone people for millennia. The 17-mile trail connects downtown San Jose to Coyote Lake, passing through neighborhoods that span the entire history of Silicon Valley."},{"name":"Metcalf Road — Coyote Valley Historic Agricultural Site","county":"Santa Clara","emoji":"🌾","lat":37.21,"lon":-121.79,"cat":"Historic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Henry_W_Coe_State_Park.jpg/320px-Henry_W_Coe_State_Park.jpg","fact":"Coyote Valley is the last large undeveloped valley floor in Santa Clara County — a 7,000-acre expanse of farmland surrounded by Silicon Valley suburbs that has been the subject of a 40-year battle between developers and conservationists. The valley's black clay soils were formed by ancient lake deposits and are among the most fertile in California."},{"name":"Henry W. Coe State Park","county":"Santa Clara","emoji":"🦁","lat":37.1886,"lon":-121.5528,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Henry_W_Coe_State_Park.jpg/320px-Henry_W_Coe_State_Park.jpg","fact":"Henry Coe is the <em>largest state park in Northern California</em> at 87,000 acres — a wilderness of oak woodland, chaparral, and pine forest that is home to mountain lions, tule elk, and over 150 species of birds. The park is so remote and trail-free in its interior that hikers have been lost for days — rangers recommend GPS devices even for experienced backcountry visitors."},{"name":"Anderson Lake County Park","county":"Santa Clara","emoji":"💧","lat":37.1889,"lon":-121.6133,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Henry_W_Coe_State_Park.jpg/320px-Henry_W_Coe_State_Park.jpg","fact":"Anderson Lake, completed in <em>1950</em>, is Santa Clara County's largest reservoir and the first built specifically for flood control rather than water supply — it captures the Coyote Creek floodwaters that used to devastate downtown San Jose every decade. The reservoir's spillway, an elegant curved concrete arc, is considered one of the finest examples of mid-century water engineering in California."},{"name":"Lexington Reservoir","county":"Santa Clara","emoji":"💧","lat":37.1975,"lon":-121.9781,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Los_Gatos_downtown.jpg/320px-Los_Gatos_downtown.jpg","fact":"Lexington Reservoir occupies a valley in the Santa Cruz Mountains that was once the site of a <em>thriving 19th-century logging town</em> — the original Lexington township, with its hotels, sawmills, and stores, is submerged beneath the reservoir. During severe droughts, the old town site partially emerges and locals drive to the reservoir to see the ghostly ruins of buildings last occupied in 1952."},{"name":"Los Gatos Creek Trail","county":"Santa Clara","emoji":"🌿","lat":37.2858,"lon":-121.9786,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Vasona_Lake_County_Park.jpg/320px-Vasona_Lake_County_Park.jpg","fact":"Los Gatos Creek was the site of the <em>first commercially recorded gold discovery</em> in Santa Clara County in 1848 — news that kicked off a small local gold rush before the much larger Sierra Nevada discoveries became known. The creek's Spanish name means 'the cats' — a reference to mountain lions that early settlers encountered along its banks."},{"name":"Old Town Los Gatos","county":"Santa Clara","emoji":"🏘","lat":37.2214,"lon":-121.9858,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Los_Gatos_downtown.jpg/320px-Los_Gatos_downtown.jpg","fact":"Los Gatos was founded as a <em>mill town in 1854</em> to process lumber from the Santa Cruz Mountains and grain from the valley floor, and its Victorian Main Street reflects the prosperity of that era. The town's resistance to chain stores and fast food — maintained through strict zoning that has been challenged in court multiple times — has preserved a downtown that feels almost unchanged from the 1980s."},{"name":"Campbell Historical Museum","county":"Santa Clara","emoji":"🏛","lat":37.2872,"lon":-121.95,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Vasona_Lake_County_Park.jpg/320px-Vasona_Lake_County_Park.jpg","fact":"Campbell was the center of the <em>fruit cannery industry</em> in the Santa Clara Valley — the Ainsley Cannery, still standing downtown, processed millions of cans of Campbell's Soup ingredients at its peak. The museum documents the transformation of a valley that fed much of America's canned food supply into the birthplace of the global technology industry."},{"name":"Sunnyvale Heritage Park Museum","county":"Santa Clara","emoji":"🏛","lat":37.3688,"lon":-122.035,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/NASA_Ames_Research_Center.jpg/320px-NASA_Ames_Research_Center.jpg","fact":"Sunnyvale was home to <em>Lockheed's Missiles and Space Division</em> from 1956 to 1996, which built nearly every major American space satellite and missile of the Cold War era in factories that occupied half the city. The museum preserves the memory of an industrial past so secret that most residents had no idea what was being built behind the fence-lines of their neighbors' workplaces."},{"name":"Cupertino Historical Museum","county":"Santa Clara","emoji":"🏛","lat":37.323,"lon":-122.0322,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Apple_Park_panoramic.jpg/320px-Apple_Park_panoramic.jpg","fact":"Cupertino was a <em>prune-growing community</em> into the 1970s — the De Anza Hotel, now Apple's headquarters entrance, sat in the middle of an orchard landscape. Apple Computer was founded in a garage three blocks from this museum in 1976, and the city that was known for dried fruit became the most valuable real estate address in American corporate history."},{"name":"Apple Park, Cupertino","county":"Santa Clara","emoji":"🍎","lat":37.3349,"lon":-122.009,"cat":"Corporate Campus","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Apple_Park_panoramic.jpg/320px-Apple_Park_panoramic.jpg","fact":"Apple Park's circular 'Spaceship' building, completed in <em>2017</em>, is the largest naturally ventilated building in the world — air conditioning is used for only a few weeks per year. The campus's 9,000 trees were chosen by Steve Jobs and Jony Ive in collaboration with a dendrologist who planted species that California's original inhabitants would have recognized."},{"name":"Rancho San Antonio County Park","county":"Santa Clara","emoji":"🦌","lat":37.3272,"lon":-122.1014,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Rancho_San_Antonio_County_Park.jpg/320px-Rancho_San_Antonio_County_Park.jpg","fact":"Rancho San Antonio is the <em>most visited county park in California</em>, drawing over 1.3 million visitors per year to its trails that offer the best views of the Silicon Valley floor from above. The park's working farm — Deer Hollow Farm — has operated continuously for over 150 years and maintains heritage breeds of farm animals for educational programs."},{"name":"Stevens Creek Reservoir","county":"Santa Clara","emoji":"💧","lat":37.3317,"lon":-122.1028,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Rancho_San_Antonio_County_Park.jpg/320px-Rancho_San_Antonio_County_Park.jpg","fact":"Stevens Creek Reservoir sits in a valley that was the site of a <em>fatal 1868 earthquake</em> measuring 7.0 on the Hayward Fault — the largest earthquake to strike the populated Bay Area before modern times. The reservoir's watershed is one of the best-preserved natural landscapes in Santa Clara County, supporting mountain lions, bobcats, and one of the last populations of foothill yellow-legged frogs."},{"name":"Monta Vista — Historic Orchard Town, Cupertino","county":"Santa Clara","emoji":"🏡","lat":37.3175,"lon":-122.0758,"cat":"Historic Neighborhood","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Apple_Park_panoramic.jpg/320px-Apple_Park_panoramic.jpg","fact":"Monta Vista was incorporated as an independent city in <em>1954</em> — just 11 years before being merged into Cupertino — as an attempt by residents to prevent annexation by San Jose. The neighborhood's street grid still follows the property lines of individual orchard parcels from the 1920s, giving it an irregular layout unlike any other Silicon Valley suburb."},{"name":"Foothills Park, Palo Alto","county":"Santa Clara","emoji":"🌿","lat":37.3156,"lon":-122.1467,"cat":"City Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Rancho_San_Antonio_County_Park.jpg/320px-Rancho_San_Antonio_County_Park.jpg","fact":"Foothills Park is one of the most <em>exclusive public parks in California</em> — access is restricted to Palo Alto residents only, a policy that has been legally challenged multiple times but upheld. The 1,400-acre wilderness park preserves the most significant natural landscape remaining in the northern Santa Clara Valley, including a serpentine rock outcrop that supports rare plant communities."},{"name":"Jasper Ridge Biological Preserve","county":"Santa Clara","emoji":"🦋","lat":37.4025,"lon":-122.2258,"cat":"Research Preserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Rancho_San_Antonio_County_Park.jpg/320px-Rancho_San_Antonio_County_Park.jpg","fact":"Jasper Ridge has been continuously studied by Stanford scientists since <em>1906</em> — the world's longest-running ecological monitoring program — and its data has documented the effects of climate change on California ecosystems decades before the phenomenon was widely understood. The preserve's serpentine grassland is a living laboratory containing plant species found nowhere else on Earth."},{"name":"Edgewood County Park, Redwood City","county":"Santa Clara","emoji":"🌸","lat":37.4719,"lon":-122.2775,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Villa_Montalvo_Saratoga.jpg/320px-Villa_Montalvo_Saratoga.jpg","fact":"Edgewood Park's serpentine grasslands bloom with <em>rare wildflowers every spring</em> — including the endangered white-rayed pentachaeta, found in only seven locations worldwide, all in the Bay Area. The park was saved from development in 1996 by a citizen campaign after the county board voted to build a golf course on the site."},{"name":"Allied Arts Guild, Menlo Park","county":"Santa Clara","emoji":"🎨","lat":37.4497,"lon":-122.1828,"cat":"Historic Arts Center","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Villa_Montalvo_Saratoga.jpg/320px-Villa_Montalvo_Saratoga.jpg","fact":"The Allied Arts Guild, established in <em>1929</em> in a Spanish Colonial complex, was the first arts and crafts collective in the Bay Area and continues to support children's hospital fundraising through artisan sales. The guild's gardens, designed by Gardener Polk, are a hidden gem of Spanish-Moorish landscape design featuring hand-painted ceramic tiles and a central fountain."},{"name":"San Antonio Hills — Historic Rancho","county":"Santa Clara","emoji":"🌾","lat":37.4089,"lon":-122.1264,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Rancho_San_Antonio_County_Park.jpg/320px-Rancho_San_Antonio_County_Park.jpg","fact":"The Los Altos Hills area was part of <em>Rancho San Antonio</em>, a 4,439-acre Mexican land grant that covered most of what is now Mountain View, Los Altos, and Cupertino. The rancho was granted to Juan Prado Mesa in 1839 and later sold to a series of American settlers who subdivided the land into the orchard parcels that defined the valley until the 1960s."},{"name":"Sunken Gardens Park, Sunnyvale","county":"Santa Clara","emoji":"🌺","lat":37.3778,"lon":-122.0258,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/NASA_Ames_Research_Center.jpg/320px-NASA_Ames_Research_Center.jpg","fact":"Sunken Gardens was created in the <em>1930s by the WPA</em> as a public works project employing hundreds of unemployed Sunnyvale residents, transforming a gravel pit into a sunken amphitheater garden. The park's rose collection, planted during the Depression, now contains heritage varieties impossible to find commercially — living relics of California's horticultural history."},{"name":"Agnews Historic State Hospital Site","county":"Santa Clara","emoji":"🏚","lat":37.3994,"lon":-121.9631,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Levi%27s_Stadium.jpg/320px-Levi%27s_Stadium.jpg","fact":"Agnews State Hospital, established in <em>1885</em>, was almost completely destroyed in the 1906 earthquake — 117 patients and staff were killed when the buildings collapsed, one of the largest single-event death tolls of the disaster. The remaining patients were housed in tents on the grounds for two years while a new earthquake-resistant hospital was built — pioneering seismic building standards that were adopted statewide."},{"name":"Mineta San Jose International Airport — Historic Terminal","county":"Santa Clara","emoji":"✈️","lat":37.3626,"lon":-121.9292,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/The_Tech_Museum_San_Jose.jpg/320px-The_Tech_Museum_San_Jose.jpg","fact":"Norman Mineta, for whom the airport is named, served as San Jose's mayor and later as U.S. Secretary of Transportation — but is perhaps most remembered for being the only Japanese-American to serve in the Cabinet during the <em>WWII internment period</em>, having been sent to an internment camp himself as a child. The airport's original 1949 art deco terminal building has been preserved within the modern complex."},{"name":"Alviso Slough Trail","county":"Santa Clara","emoji":"🦆","lat":37.4358,"lon":-121.9739,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Don_Edwards_NWR.jpg/320px-Don_Edwards_NWR.jpg","fact":"The Alviso Slough Trail traverses one of the most <em>biologically productive areas</em> of San Francisco Bay — a network of tidal channels supporting the entire food web of the bay, from microscopic plankton to great white sharks that occasionally swim this far into the South Bay. Birders record over 100 species in a single morning walk on the trail's six miles of levee paths."},{"name":"Vasona Lake County Park, Los Gatos","county":"Santa Clara","emoji":"💧","lat":37.2436,"lon":-121.9797,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Vasona_Lake_County_Park.jpg/320px-Vasona_Lake_County_Park.jpg","fact":"Vasona Lake was created in <em>1935</em> by the Santa Clara Valley Water District as a flood control reservoir, and its shore has been a park since the 1960s. The Billy Jones Wildcat Railroad that circles the lake — a narrow-gauge steam railway built by carnival ride designer Billy Jones in the 1940s — is one of the last operating miniature railroads in the Bay Area."},{"name":"The Pruneyard, Campbell","county":"Santa Clara","emoji":"🛍","lat":37.2917,"lon":-121.9275,"cat":"Historic Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Vasona_Lake_County_Park.jpg/320px-Vasona_Lake_County_Park.jpg","fact":"The Pruneyard Shopping Center was the subject of a landmark <em>1980 U.S. Supreme Court case</em> that established the right of states to require private shopping centers to permit free speech activities on their property — a ruling that remains a cornerstone of California civil liberties law. The center was built in 1969 on a former prune orchard, preserving the agricultural heritage in its name."},{"name":"Calero Reservoir","county":"Santa Clara","emoji":"💧","lat":37.1714,"lon":-121.7664,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Almaden_Quicksilver_County_Park.jpg/320px-Almaden_Quicksilver_County_Park.jpg","fact":"Calero Reservoir sits in a valley where evidence of <em>Ohlone habitation</em> dating back 4,000 years was found during dam construction — artifacts now housed in the San Jose State anthropology collection. The reservoir's clear water and surrounding oak woodland are among the most scenic in the county water district system."},{"name":"Uvas Canyon County Park","county":"Santa Clara","emoji":"💧","lat":37.09,"lon":-121.7811,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Almaden_Quicksilver_County_Park.jpg/320px-Almaden_Quicksilver_County_Park.jpg","fact":"Uvas Canyon contains the <em>highest concentration of waterfalls per mile</em> of any park in Santa Clara County — five named falls within a single mile of trail. The canyon's cool, moist climate supports a coast redwood grove far south of the main redwood belt, thriving in a fog pocket that receives moisture from both marine layer and runoff from the surrounding mountains."},{"name":"Morgan Hill — Sycamore Allée, El Toro Road","county":"Santa Clara","emoji":"🌳","lat":37.1308,"lon":-121.6536,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Henry_W_Coe_State_Park.jpg/320px-Henry_W_Coe_State_Park.jpg","fact":"The sycamore trees lining El Toro Road were planted in the <em>1890s</em> by dairy farmers who wanted shade for their cattle — the trees grew into an arching canopy that now creates a cathedral-like tunnel over half a mile of road. The allée has been declared a county heritage resource and is protected from removal even when road widening is proposed."},{"name":"Gilroy — Garlic Capital of the World","county":"Santa Clara","emoji":"🧄","lat":37.0058,"lon":-121.5683,"cat":"City","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Gilroy_Garlic_Festival.jpg/320px-Gilroy_Garlic_Festival.jpg","fact":"Gilroy's annual Garlic Festival, established in <em>1979</em>, draws over 100,000 visitors each July to sample garlic ice cream, garlic beer, and garlic-stuffed everything — making it one of the most attended food festivals in the United States. The city's claim to be the 'Garlic Capital' was disputed by Gilroy's sister city in Italy until a cook-off established American garlic supremacy."},{"name":"Gilroy Gardens Theme Park","county":"Santa Clara","emoji":"🌳","lat":37.0247,"lon":-121.5789,"cat":"Theme Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Gilroy_Gardens.jpg/320px-Gilroy_Gardens.jpg","fact":"Gilroy Gardens was originally a <em>circus tree farm</em> created by horticulturist Axel Erlandson, who trained living trees into fantastical shapes — ladders, spirals, rings — over 40 years starting in 1925. Erlandson's original 'Tree Circus' trees, now over 80 years old, are the centerpiece of the theme park and are registered California historic landmarks."},{"name":"Mount Umunhum, Sierra Azul","county":"Santa Clara","emoji":"🏔","lat":37.1578,"lon":-121.9044,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Mount_Umunhum.jpg/320px-Mount_Umunhum.jpg","fact":"Mount Umunhum's summit is crowned by a <em>Cold War-era radar installation</em> — an abandoned Air Force early warning station whose massive concrete cube, known locally as 'the Cube,' was visible from across the valley for 50 years before it was turned into a public observatory deck. The Ohlone name 'Umunhum' means 'resting place of the hummingbird.'"},{"name":"Blossom Hill Road — Historic Orchard Route","county":"Santa Clara","emoji":"🌸","lat":37.2567,"lon":-121.8728,"cat":"Historic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Gilroy_Garlic_Festival.jpg/320px-Gilroy_Garlic_Festival.jpg","fact":"Blossom Hill Road was named for the <em>annual cherry blossom season</em> when the orchards lining this road turned white and pink for two weeks each February — drawing thousands of San Franciscans by train for 'blossom tours.' The orchards are gone, replaced by housing, but the name memorializes a landscape that was once considered one of the most beautiful in California."},{"name":"Pinnacles National Park — West Entrance","county":"San Benito","emoji":"🪨","lat":36.4906,"lon":-121.1825,"cat":"National Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Pinnacles_NP_High_Peaks.jpg/320px-Pinnacles_NP_High_Peaks.jpg","fact":"Pinnacles National Park's dramatic spires are the remains of a <em>23-million-year-old volcano</em> whose original location was 195 miles south — the Pacific Plate has been carrying the rocks northward ever since. The park is one of only a handful of locations in the world where California condors — once reduced to just 27 birds — now nest freely in the wild."},{"name":"Pinnacles National Park — Bear Gulch Caves","county":"San Benito","emoji":"🦇","lat":36.49,"lon":-121.1742,"cat":"National Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Pinnacles_NP_High_Peaks.jpg/320px-Pinnacles_NP_High_Peaks.jpg","fact":"Bear Gulch Cave is a <em>talus cave</em> formed by massive boulders jamming together in a narrow canyon rather than by water erosion — one of the most accessible examples of this rare cave type in California. The cave's cool interior hosts a colony of Townsend's big-eared bats, and portions close seasonally when the bats are raising pups."},{"name":"Hollister Downtown Historic District","county":"San Benito","emoji":"🏘","lat":36.8527,"lon":-121.4016,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Hollister_California_downtown.jpg/320px-Hollister_California_downtown.jpg","fact":"Hollister sits almost exactly on the <em>Calaveras Fault</em>, and the fault's constant slow creep — about half an inch per year — has split sidewalks, offset curbs, and twisted buildings throughout downtown. The town's curb lines are used by geologists as measuring tools to calculate how far the fault has moved since they were installed."},{"name":"Hollister Hills State Vehicular Recreation Area","county":"San Benito","emoji":"🏍","lat":36.8025,"lon":-121.4239,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Hollister_Hills_SVRA.jpg/320px-Hollister_Hills_SVRA.jpg","fact":"Hollister Hills was established in <em>1971</em> as the first state park in California specifically designed for off-highway vehicles — a response to the growing dirt bike and ATV culture that had no legal places to ride. The park's 6,700 acres of rolling hills and creek drainages attract over 100,000 riders per year."},{"name":"Mission San Juan Bautista","county":"San Benito","emoji":"⛪","lat":36.8458,"lon":-121.5356,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Mission_San_Juan_Bautista.jpg/320px-Mission_San_Juan_Bautista.jpg","fact":"Mission San Juan Bautista, founded in <em>1797</em>, has the largest church of any California mission — built wide enough to have three naves, an ambitious design that the mission's small congregation never filled. Alfred Hitchcock used the mission's bell tower as the climactic setting for Vertigo in 1958, though the tower shown in the film was a studio set — the real tower had been demolished decades earlier."},{"name":"San Juan Bautista State Historic Park","county":"San Benito","emoji":"🏛","lat":36.8458,"lon":-121.535,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Mission_San_Juan_Bautista.jpg/320px-Mission_San_Juan_Bautista.jpg","fact":"San Juan Bautista's historic plaza preserves the most complete <em>Spanish colonial town center</em> surviving in California — the original 1840s Castro House, Plaza Hotel, and livery stable all face the mission across an unremodified plaza. The town's position on El Camino Real made it a major stopping point for travelers between San Francisco and Los Angeles for 150 years."},{"name":"San Andreas Fault — Fault Trace, San Juan Bautista","county":"San Benito","emoji":"⚡","lat":36.8458,"lon":-121.5403,"cat":"Geological","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/San_Andreas_Fault.jpg/320px-San_Andreas_Fault.jpg","fact":"The San Andreas Fault is visible as a <em>distinct topographic bench</em> just behind the Mission San Juan Bautista — the fault scarp is clearly visible in the landscape, and a historical marker stands at the edge of the mission garden at the exact fault trace. The 1906 earthquake offset the ground here by 15 feet in a few seconds, and the fault remains active today."},{"name":"Fremont Peak State Park","county":"San Benito","emoji":"🔭","lat":36.7592,"lon":-121.5031,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fremont_Peak_State_Park.jpg/320px-Fremont_Peak_State_Park.jpg","fact":"Fremont Peak is named for explorer John C. Frémont, who climbed the 3,169-foot summit in <em>1846</em> and raised an American flag — an act of defiance against Mexican authority that contributed to the Bear Flag Revolt. The peak's observatory, operated by an astronomy club, hosts some of the best public stargazing in Central California."},{"name":"Pacheco Pass — Historic Highway","county":"San Benito","emoji":"🛤","lat":37.0083,"lon":-121.1997,"cat":"Historic Pass","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fremont_Peak_State_Park.jpg/320px-Fremont_Peak_State_Park.jpg","fact":"Pacheco Pass has been the primary crossing point between the Bay Area and the San Joaquin Valley since <em>Native American times</em> — the Spanish called it Puerto de San Juan and the Gold Rush miners who flooded through it called it simply 'the Pass.' The dramatic views from the summit, where you can see from the coast range to the Sierra Nevada, were described by John Muir as among the finest in California."},{"name":"Bolado Park Fairgrounds, Tres Pinos","county":"San Benito","emoji":"🎡","lat":36.7894,"lon":-121.3747,"cat":"Fairgrounds","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Hollister_California_downtown.jpg/320px-Hollister_California_downtown.jpg","fact":"Bolado Park has hosted the <em>San Benito County Fair</em> continuously since 1921 — one of the last remaining classic county fairgrounds in California that still features livestock, rodeo, and agricultural competitions as its primary events. The park's Victorian grandstand, built in 1921, has been declared a county historic landmark."},{"name":"Tres Pinos Murders Site","county":"San Benito","emoji":"🏚","lat":36.79,"lon":-121.32,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Hollister_California_downtown.jpg/320px-Hollister_California_downtown.jpg","fact":"In <em>1873</em>, outlaw Tiburcio Vásquez and his gang robbed the Tres Pinos store and killed three innocent bystanders — the crime that finally turned California public opinion against Vásquez and led to his capture and execution. Vásquez had been celebrated as a social bandit by Mexican Californians who saw him as resisting Anglo economic dominance."},{"name":"Bitterwater Valley Road","county":"San Benito","emoji":"🌾","lat":36.38,"lon":-121,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/San_Andreas_Fault.jpg/320px-San_Andreas_Fault.jpg","fact":"Bitterwater Valley is one of the most <em>geologically dramatic landscapes</em> in California — the road passes through badlands carved from Miocene marine sediments full of whale bones and shark teeth, then crosses the San Andreas Fault before climbing into the Diablo Range. The valley's remoteness and sparse population have kept it almost completely undeveloped since Spanish colonial times."},{"name":"Clear Creek Management Area","county":"San Benito","emoji":"🪨","lat":36.41,"lon":-120.85,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Pinnacles_NP_High_Peaks.jpg/320px-Pinnacles_NP_High_Peaks.jpg","fact":"Clear Creek contains the <em>largest natural deposit of exposed serpentine rock</em> in California — a vast landscape of blue-green ultramafic rock that supports a unique flora found nowhere else in the world. The area was closed for a decade due to naturally occurring asbestiform minerals in the serpentine dust, and its reopening came with strict protocols for minimizing dust exposure."},{"name":"Idria — Ghost Town and New Idria Mercury Mine","county":"San Benito","emoji":"⚒️","lat":36.4167,"lon":-120.6833,"cat":"Ghost Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Benitoite_gem.jpg/320px-Benitoite_gem.jpg","fact":"New Idria was California's <em>second most productive mercury mine</em>, operating from 1854 to 1972 and producing millions of pounds of liquid mercury. The remote ghost town is one of the most contaminated sites in California — mercury levels in the creek downstream exceed safe levels by a factor of 1,000 — and it is on the EPA Superfund list for cleanup that has barely begun."},{"name":"San Benito Mountain","county":"San Benito","emoji":"🏔","lat":36.3878,"lon":-120.6178,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fremont_Peak_State_Park.jpg/320px-Fremont_Peak_State_Park.jpg","fact":"San Benito Mountain, at 5,241 feet the highest point in the county, offers views of the <em>entire San Joaquin Valley and the Sierra Nevada</em> on clear days — a panorama stretching 200 miles. The mountain's summit hosts a grove of rare McNab cypress trees — a species restricted to ultramafic soils that grows in only a dozen isolated populations across California."},{"name":"Lomerias Muertas Hills","county":"San Benito","emoji":"🌾","lat":36.65,"lon":-121.2,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fremont_Peak_State_Park.jpg/320px-Fremont_Peak_State_Park.jpg","fact":"The Spanish name 'Lomerias Muertas' means <em>'dead hills'</em> — a reference to the stark, grass-covered ridges that early travelers found devoid of the shade trees they expected. These rolling hills are among the best preserved examples of annual grassland ecosystem in Central California, supporting burrowing owls, golden eagles, and the increasingly rare tricolored blackbird."},{"name":"Paicines Reservoir","county":"San Benito","emoji":"💧","lat":36.72,"lon":-121.28,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Hollister_California_downtown.jpg/320px-Hollister_California_downtown.jpg","fact":"Paicines Reservoir sits in a valley that was a <em>productive rancho</em> operated by Mission San Juan Bautista — one of the most remote and least-visited bodies of water in the Bay Area region. The valley's climate, protected from coastal fog by the Diablo Range, produces some of the warmest and driest conditions in the Coast Ranges."},{"name":"Almaden Valley, San Benito","county":"San Benito","emoji":"🌿","lat":36.77,"lon":-121.15,"cat":"Valley","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Hollister_California_downtown.jpg/320px-Hollister_California_downtown.jpg","fact":"The eastern San Benito hills were part of the <em>vast Rancho Cañada de la Segunda</em> granted to a retired Mexican soldier in 1844 and later acquired by Henry Miller, whose cattle empire eventually covered 1.5 million acres across California, Nevada, and Oregon. Miller's cattle drives through this valley in the 1870s-1880s followed routes that Native Americans had used for thousands of years."},{"name":"Earthquake Trail — San Juan Bautista","county":"San Benito","emoji":"⚡","lat":36.8461,"lon":-121.5406,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/San_Andreas_Fault.jpg/320px-San_Andreas_Fault.jpg","fact":"The short Earthquake Trail at San Juan Bautista State Historic Park shows visitors the exact <em>trace of the San Andreas Fault</em> — a place where the ground visibly steps down and a historical photo shows how far it shifted during the 1906 earthquake. Standing at this spot, you are standing simultaneously on two tectonic plates that are moving in opposite directions."},{"name":"Hollister Peak — Carneros Peak Area","county":"San Benito","emoji":"🌄","lat":36.8,"lon":-121.55,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fremont_Peak_State_Park.jpg/320px-Fremont_Peak_State_Park.jpg","fact":"The rolling hills between Hollister and the coast represent one of the <em>best remaining examples of coastal grassland</em> in the inner Coast Ranges — a landscape of knee-high grasses and scattered oaks that resembles the African savanna more than any other California landscape. Red-tailed hawks, white-tailed kites, and golden eagles hunt these meadows year-round."},{"name":"Dunne Avenue — Historic Road to Henry Coe Park","county":"San Benito","emoji":"🛤","lat":37.0658,"lon":-121.4856,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fremont_Peak_State_Park.jpg/320px-Fremont_Peak_State_Park.jpg","fact":"Dunne Avenue climbs from the Santa Clara Valley floor to the entrance of Henry Coe State Park in a series of dramatic switchbacks that offer views of <em>the entire Diablo Range</em> and, on clear days, the San Joaquin Valley beyond. The road passes through some of the finest blue oak woodland in the Bay Area region — trees that are hundreds of years old and form a canopy over the road."},{"name":"Monterey Bay Aquarium","county":"Monterey","emoji":"🦦","lat":36.6181,"lon":-121.9019,"cat":"Aquarium","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Monterey_Bay_Aquarium.jpg/320px-Monterey_Bay_Aquarium.jpg","fact":"The Monterey Bay Aquarium, opened in <em>1984</em> in a converted sardine cannery, pioneered the concept of displaying animals in their natural habitat context rather than isolation tanks — a philosophy that transformed aquarium design worldwide. The aquarium's kelp forest exhibit, 28 feet tall and containing actual living kelp, was the first of its kind and remains one of the most copied exhibits in the world."},{"name":"Cannery Row, Monterey","county":"Monterey","emoji":"🎣","lat":36.6186,"lon":-121.9022,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Cannery_row.JPG/320px-Cannery_row.JPG","fact":"Cannery Row processed over <em>250,000 tons of sardines per year</em> at its World War II peak, making Monterey the 'Sardine Capital of the Western Hemisphere.' The sardines disappeared almost overnight in 1945 due to a combination of overfishing and an ocean temperature shift — leaving the canneries empty and leading John Steinbeck to write his famous novel about the district's colorful characters."},{"name":"Monterey State Historic Park","county":"Monterey","emoji":"🏛","lat":36.6002,"lon":-121.8947,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Monterey_Custom_House.jpg/320px-Monterey_Custom_House.jpg","fact":"Monterey served as the <em>capital of California</em> under Spanish and Mexican rule from 1777 to 1846, and its Custom House — the oldest government building on the Pacific Coast — is where Commodore Sloat raised the American flag to claim California for the United States in 1846. The park preserves over a dozen 19th-century buildings in a remarkable concentration of California colonial architecture."},{"name":"Point Pinos Lighthouse","county":"Monterey","emoji":"🔦","lat":36.6353,"lon":-121.9325,"cat":"Historic Lighthouse","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/PointPinosLighthouse.jpg/320px-PointPinosLighthouse.jpg","fact":"Point Pinos Lighthouse, first lit in <em>1855</em>, is the oldest continuously operating lighthouse on the Pacific Coast — its original Fresnel lens, still in use, has guided ships around the dangerous point for 170 years. The lighthouse keeper's quarters were home to Emily Fish, who served as keeper for 21 years starting in 1893 and was famous for hosting elegant dinner parties for naval officers."},{"name":"17 Mile Drive","county":"Monterey","emoji":"🌊","lat":36.5903,"lon":-121.9647,"cat":"Scenic Drive","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/17_Mile_Drive_CA.jpg/320px-17_Mile_Drive_CA.jpg","fact":"The 17 Mile Drive through Pebble Beach passes the <em>Lone Cypress</em> — a single Monterey cypress tree growing from a granite outcrop above the Pacific that has been an iconic symbol of the Monterey Peninsula for over a century. The road passes through Del Monte Forest, a private residential area that charges admission to non-residents — one of the only toll roads remaining in California."},{"name":"Pebble Beach Golf Links","county":"Monterey","emoji":"⛳","lat":36.5683,"lon":-121.9514,"cat":"Historic Course","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Pebble_Beach_Golf_Links.jpg/320px-Pebble_Beach_Golf_Links.jpg","fact":"Pebble Beach Golf Links, opened in <em>1919</em>, is consistently ranked the greatest golf course in America — a links course where the Pacific Ocean serves as the lateral hazard on six holes. The course has hosted more US Open Championships than any other venue, and the 7th hole, a par-3 of only 100 yards where the wind can make any club in the bag the right choice, is considered the most difficult short hole in major championship golf."},{"name":"Carmel-by-the-Sea Historic Downtown","county":"Monterey","emoji":"🎨","lat":36.5552,"lon":-121.9233,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carmel_Village.jpg/320px-Carmel_Village.jpg","fact":"Carmel was founded in <em>1902</em> as a planned arts community by a real estate developer who sold lots at a discount to artists, writers, and academics — creating a bohemian colony that attracted Jack London, Mary Austin, and Sinclair Lewis. The town famously banned chain stores, franchises, high heels on sidewalks, and ice cream eaten while walking — quirky rules that have somehow survived 120 years of legal challenges."},{"name":"Mission San Carlos Borroméo de Carmelo","county":"Monterey","emoji":"⛪","lat":36.5417,"lon":-121.9194,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Carmel_Mission.jpg/320px-Carmel_Mission.jpg","fact":"The Carmel Mission was the headquarters of the entire California mission system and the personal home of Father Junípero Serra, who <em>died and is buried here in 1784</em>. Serra's tomb beneath the mission floor became a pilgrimage site for Catholics worldwide, and his canonization as a saint in 2015 was controversial because of the missions' devastating impact on Native Californian populations."},{"name":"Point Lobos State Natural Reserve","county":"Monterey","emoji":"🦭","lat":36.5161,"lon":-121.9419,"cat":"State Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Point_Lobos.jpg/320px-Point_Lobos.jpg","fact":"Point Lobos is called the '<em>greatest meeting of land and water in the world</em>' — a description attributed to landscape photographer Edward Weston who spent decades photographing its cypress groves, harbor seals, and kelp-filled coves. The reserve's underwater park was the first designated marine reserve in California, established in 1960 before the concept of marine protected areas existed in law."},{"name":"Big Sur Coast","county":"Monterey","emoji":"🌊","lat":36.2704,"lon":-121.8081,"cat":"Coastline","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Big_Sur_scenic_highway.jpg/320px-Big_Sur_scenic_highway.jpg","fact":"Big Sur's Santa Lucia Mountains rise so steeply from the ocean that <em>90 miles of coastal road took nearly a century</em> to complete, finishing in 1937. The coastline has been the inspiration for thousands of artists and writers — Henry Miller lived here for 18 years and called it 'the face of the Earth as the Creator intended it to look.'"},{"name":"Bixby Creek Bridge","county":"Monterey","emoji":"🌉","lat":36.3714,"lon":-121.9022,"cat":"Historic Bridge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Bixby_Creek_Bridge.jpg/320px-Bixby_Creek_Bridge.jpg","fact":"Bixby Creek Bridge, completed in <em>1932</em>, is the most photographed bridge in California and one of the most recognizable in the world — its single 320-foot open-spandrel concrete arch spans a 260-foot-deep gorge above the Pacific. When it was built, it was the longest concrete arch bridge in the world, a record held for several years."},{"name":"McWay Falls, Julia Pfeiffer Burns State Park","county":"Monterey","emoji":"💧","lat":36.1572,"lon":-121.6714,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/McWay_Falls.jpg/320px-McWay_Falls.jpg","fact":"McWay Falls is one of only two <em>tidefall waterfalls in California</em> — a 80-foot waterfall that drops directly onto a beach inaccessible by land, making the turquoise pool at its base visible only from the trail above. The falls' famous beach was created by a 1983 landslide that deposited enough debris to dam the cove."},{"name":"Pfeiffer Big Sur State Park","county":"Monterey","emoji":"🌲","lat":36.2436,"lon":-121.7764,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Big_Sur_coastline.jpg/320px-Big_Sur_coastline.jpg","fact":"Pfeiffer Big Sur is the main developed hub of the Big Sur coast, where the <em>Big Sur River flows through a redwood canyon</em> just a mile from the Pacific — an unusual combination of coastal redwood and ocean that exists nowhere else in California. The park's campground, booked years in advance in summer, was completely destroyed by mudslides in 2017 and rebuilt at enormous expense."},{"name":"Hearst Castle, San Simeon","county":"Monterey","emoji":"🏰","lat":35.685,"lon":-121.1683,"cat":"Historic Estate","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Hearst_Castle_-_main_building.jpg/320px-Hearst_Castle_-_main_building.jpg","fact":"William Randolph Hearst's hilltop castle, built over 28 years starting in <em>1919</em>, contains 38 bedrooms, 42 bathrooms, and a 345,000-gallon outdoor pool lined with gold-veined marble. Hearst's private zoo — the world's largest — featured zebras, bison, and bears roaming freely on the hillside, and descendants of some animals still roam the highway between San Simeon and Cambria."},{"name":"Elkhorn Slough National Estuarine Research Reserve","county":"Monterey","emoji":"🦦","lat":36.835,"lon":-121.7394,"cat":"Wildlife Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Elkhorn_Slough.jpg/320px-Elkhorn_Slough.jpg","fact":"Elkhorn Slough supports the <em>largest concentration of sea otters</em> in the continental United States outside of the Monterey Bay — over 100 otters regularly use the estuary's protected waters. The slough's tidal wetlands are a critical nursery for Dungeness crab and the primary foraging ground for thousands of shorebirds migrating along the Pacific Flyway."},{"name":"Salinas — National Steinbeck Center","county":"Monterey","emoji":"📚","lat":36.6777,"lon":-121.6555,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/National_Steinbeck_Center.jpg/320px-National_Steinbeck_Center.jpg","fact":"The National Steinbeck Center celebrates the life of John Steinbeck, who was born in Salinas in <em>1902</em> and set most of his major works — East of Eden, Of Mice and Men, The Grapes of Wrath — in the Salinas Valley and surrounding hills. Steinbeck won the Nobel Prize for Literature in 1962, and his acceptance speech is considered one of the most eloquent ever delivered at the ceremony."},{"name":"Carmel Valley Village","county":"Monterey","emoji":"🍷","lat":36.48,"lon":-121.7303,"cat":"Village","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carmel_Village.jpg/320px-Carmel_Village.jpg","fact":"Carmel Valley is one of California's most productive wine regions, its inland position <em>10 degrees warmer</em> than the coast protecting grapes from Monterey Bay's chilling fog. The valley's wine history extends to the 1920s Prohibition era, when grape growers sold 'home winemaking kits' that were really just vineyards in a box."},{"name":"Tassajara Zen Mountain Center","county":"Monterey","emoji":"🧘","lat":36.2356,"lon":-121.5514,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Big_Sur_coastline.jpg/320px-Big_Sur_coastline.jpg","fact":"Tassajara, accessible only by a <em>14-mile dirt road through remote wilderness</em>, has been a hot springs resort since the 1880s and became America's first Zen Buddhist monastery in 1967. The springs are fed by geothermal activity deep in the Ventana Wilderness, and guests who make the arduous journey are rewarded with ba
