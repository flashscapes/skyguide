<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoadGuide">
<meta name="theme-color" content="#080c14">
<title>RoadGuide California</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<!-- Landmark data files — order matters: core files first, film last (optional) -->
<script src="landmarks.js"></script>
<script src="landmarks_south.js"></script>
<script src="landmarks_topup.js"></script>
<script src="landmarks_valley.js"></script>
<script src="film_data.js"></script>

<style>
:root{
  --ink:#080c14; --gold:#c9a84c; --glo:#e8c97a; --gdim:rgba(201,168,76,.35);
  --pale:#eef2ff; --dim:rgba(220,228,255,.45); --card:rgba(255,255,255,.05);
  --edge:rgba(255,255,255,.09); --green:#50c880; --red:#e05555;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--ink);color:var(--pale);font-family:'DM Sans',sans-serif;}

/* Sky */
#sky{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(18,34,68,.9) 0%,transparent 100%),
             radial-gradient(ellipse 60% 60% at 85% 90%,rgba(10,18,38,.95) 0%,transparent 100%),var(--ink);}
#sky::before{content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 8%  12%,rgba(255,255,255,.60) 0%,transparent 100%),
    radial-gradient(1.0px 1.0px at 23% 45%,rgba(255,255,255,.30) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 52%  8%,rgba(201,168,76,.40)  0%,transparent 100%),
    radial-gradient(1.0px 1.0px at 71% 67%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1.2px 1.2px at 38% 82%,rgba(255,255,255,.40) 0%,transparent 100%),
    radial-gradient(1.0px 1.0px at 88% 28%,rgba(255,255,255,.50) 0%,transparent 100%);}

/* App shell */
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}

/* Header */
#hdr{flex-shrink:0;padding:env(safe-area-inset-top,44px) 20px 14px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;line-height:1;}
.logo-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-top:3px;}
.hd-r{text-align:right;}
.hd-r p{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.5px;}
.hd-r span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--glo);}

/* Scan bar */
#scanbar{flex-shrink:0;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;}
#scanfill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(201,168,76,.3),var(--gold));width:0%;transition:width 1s linear;}

/* Category filter bar */
#catBar{flex-shrink:0;padding:9px 14px 5px;border-bottom:1px solid rgba(255,255,255,.05);}
#catBarLabel{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2.5px;color:rgba(201,168,76,.35);text-transform:uppercase;margin-bottom:7px;}
#catScroll{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none;}
#catScroll::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.4px;color:rgba(220,228,255,.45);cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-appearance:none;}
.cat-chip:active{transform:scale(.95);}
.cat-chip.active{background:rgba(201,168,76,.16);border-color:rgba(201,168,76,.55);color:#e8c97a;}
#catCount{font-family:'DM Mono',monospace;font-size:8px;color:rgba(201,168,76,.3);margin-top:5px;letter-spacing:.5px;min-height:12px;}

/* Scrollable content */
#scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 40px;}
#scr::-webkit-scrollbar{display:none;}

/* LISTEN button */
#listenWrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 0 16px;}
#listenBtn{display:flex;align-items:center;gap:14px;padding:14px 36px;border-radius:50px;cursor:pointer;border:1.5px solid rgba(201,168,76,.45);background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));transition:all .25s;-webkit-appearance:none;}
#listenBtn.speaking{border-color:rgba(80,200,128,.55);background:linear-gradient(135deg,rgba(80,200,128,.14),rgba(80,200,128,.03));}
#listenBtn:active{transform:scale(.96);}
.lb-icon{font-size:24px;}
.lb-text{display:flex;flex-direction:column;}
.lb-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--glo);}
#listenBtn.speaking .lb-main{color:#6ecf9c;}
.lb-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--gdim);text-transform:uppercase;}
#voiceWrap{display:flex;align-items:center;gap:6px;}
#voiceWrap label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--gdim);text-transform:uppercase;}
#voiceSelect{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:var(--pale);font-family:'DM Mono',monospace;font-size:9px;padding:4px 8px;-webkit-appearance:none;appearance:none;cursor:pointer;max-width:180px;text-overflow:ellipsis;}
#voiceSelect:focus{outline:none;border-color:rgba(201,168,76,.5);}
#listenBtn.speaking .lb-sub{color:rgba(80,200,128,.55);}

/* Status bar */
#status{display:flex;align-items:center;gap:8px;padding:8px 13px;margin-bottom:14px;background:var(--card);border:1px solid var(--edge);border-radius:10px;font-family:'DM Mono',monospace;font-size:10px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.idle{background:rgba(220,228,255,.3);}
.dot.gps{background:var(--gold);animation:blink 1.2s ease-in-out infinite;}
.dot.live{background:var(--green);animation:blink 2.5s ease-in-out infinite;}
.dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
#stmsg{flex:1;color:var(--dim);}

/* Landmark cards (top 2) */
#cards{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.card{border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.card.rank-1{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 1px rgba(201,168,76,.1),0 8px 32px rgba(0,0,0,.4);}
.card.rank-2{border-color:rgba(201,168,76,.18);}
.card-img{width:100%;height:120px;object-fit:cover;display:block;}
.card-emoji{width:100%;height:120px;display:none;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.85));}
.card-body{padding:13px 15px 14px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.card-meta{flex:1;}
.card-rank{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:1px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--pale);line-height:1.05;}
.card-county{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;}
.card-dist-wrap{text-align:right;flex-shrink:0;}
.card-dist{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--glo);line-height:1;}
.card-unit{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gdim);display:block;}
.card-dir{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:1px;}
.divider{width:100%;height:1px;background:rgba(255,255,255,.06);margin-bottom:9px;}
.card-fact{font-size:13px;line-height:1.68;font-weight:300;color:rgba(220,228,255,.85);}
.card-fact em{color:var(--glo);font-style:normal;font-weight:500;}
.card-placeholder{height:120px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px;font-style:italic;padding:20px;text-align:center;}

/* Separator + list */
.sep{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.18),transparent);margin:6px 0 12px;}
#listLabel{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
#list{display:flex;flex-direction:column;gap:6px;}
.litem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.litem:active{border-color:rgba(201,168,76,.3);}
.litem-em{font-size:18px;flex-shrink:0;width:30px;text-align:center;}
.litem-info{flex:1;min-width:0;}
.litem-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.litem-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:1px;}
.litem-dist{font-family:'DM Mono',monospace;font-size:11px;color:var(--glo);flex-shrink:0;}
.litem-thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06);}
.litem-thumb-em{width:46px;height:46px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.85));display:flex;align-items:center;justify-content:center;font-size:22px;}

/* GPS coords bar */
#gpsBar{padding:8px 12px;background:var(--card);border:1px solid var(--edge);border-radius:10px;margin-top:12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap;}

/* Landmark detail overlay */
#overlay{position:fixed;inset:0;z-index:100;background:rgba(8,12,20,.92);display:none;align-items:flex-end;justify-content:stretch;padding:12px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
#overlay.open{display:flex;}
#ocard{width:100%;border-radius:20px;overflow:hidden;background:linear-gradient(160deg,#0f1829,#080c14);border:1px solid rgba(201,168,76,.4);box-shadow:0 -8px 60px rgba(0,0,0,.7);max-height:88vh;display:flex;flex-direction:column;}
#oImg{width:100%;height:160px;object-fit:cover;display:block;flex-shrink:0;}
#oEmoji{width:100%;height:160px;display:none;align-items:center;justify-content:center;font-size:70px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.9));flex-shrink:0;}
#obody{padding:16px 18px 20px;overflow-y:auto;}
#otop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
#ometa{flex:1;}
#otag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
#oname{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
#odist{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:4px;}
#odist b{color:var(--glo);font-weight:400;}
#oclose{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--dim);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;}
#ofact{font-size:14px;line-height:1.7;font-weight:300;margin-bottom:16px;}
#ofact em{color:var(--glo);font-style:normal;font-weight:500;}
/* Film entry structured format */
.film-row{display:flex;flex-direction:column;gap:3px;padding:7px 0;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.06);}
.film-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.film-val{font-size:13px;line-height:1.6;font-weight:300;color:rgba(220,228,255,.9);}
.card-fact .film-row{padding:7px 10px;margin-bottom:6px;}
.card-fact .film-label{font-size:7px;}
.card-fact .film-val{font-size:12px;}

/* Overlay listen button */
#olistenWrap{display:flex;justify-content:center;}
#olistenBtn{display:flex;align-items:center;gap:10px;padding:11px 32px;border-radius:50px;cursor:pointer;border:1.5px solid rgba(201,168,76,.5);background:linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.04));font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--glo);-webkit-appearance:none;transition:all .2s;}
#olistenBtn:active{transform:scale(.96);}
#olistenBtn.speaking{border-color:rgba(80,200,128,.55);background:linear-gradient(135deg,rgba(80,200,128,.14),rgba(80,200,128,.03));color:#6ecf9c;}
</style>
</head>
<body>

<div id="sky"></div>

<!-- Detail overlay (tap landmark to open) -->
<div id="overlay" onclick="closeOverlay(event)">
  <div id="ocard">
    <img id="oImg" src="" alt=""
      onerror="this.style.display='none';document.getElementById('oEmoji').style.display='flex'">
    <div id="oEmoji"></div>
    <div id="obody">
      <div id="otop">
        <div id="ometa">
          <div id="otag"></div>
          <div id="oname"></div>
          <div id="odist"></div>
        </div>
        <button id="oclose" onclick="closeOverlay()">✕</button>
      </div>
      <div id="ofact"></div>
      <div id="olistenWrap">
        <button id="olistenBtn" onclick="overlayListen()">🔊 Listen</button>
      </div>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app">

  <div id="hdr">
    <div>
      <div class="logo">RoadGuide</div>
      <div class="logo-tag">California</div>
    </div>
    <div class="hd-r">
      <p>LANDMARKS <span id="tc">—</span></p>
      <p>NEARBY <span id="dc">—</span></p>
    </div>
  </div>

  <div id="scanbar"><div id="scanfill"></div></div>

  <!-- Category filter chips -->
  <div id="catBar">
    <div id="catBarLabel">Filter by Category</div>
    <div id="catScroll">
      <button class="cat-chip active" onclick="setCat(null,this)">All</button>
      <button class="cat-chip" onclick="setCat('film',this)">🎬 Movie &amp; TV</button>
      <button class="cat-chip" onclick="setCat('historic',this)">🏛 Historic</button>
      <button class="cat-chip" onclick="setCat('nature',this)">🌿 Nature</button>
      <button class="cat-chip" onclick="setCat('winery',this)">🍷 Winery</button>
      <button class="cat-chip" onclick="setCat('beach',this)">🏖 Beach</button>
      <button class="cat-chip" onclick="setCat('park',this)">🌲 Parks</button>
      <button class="cat-chip" onclick="setCat('museum',this)">🔭 Museums</button>
      <button class="cat-chip" onclick="setCat('trail',this)">🥾 Trails</button>
      <button class="cat-chip" onclick="setCat('wildlife',this)">🦅 Wildlife</button>
      <button class="cat-chip" onclick="setCat('lighthouse',this)">🔦 Lighthouse</button>
      <button class="cat-chip" onclick="setCat('geological',this)">🪨 Geological</button>
      <button class="cat-chip" onclick="setCat('mission',this)">⛪ Missions</button>
    </div>
    <div id="catCount"></div>
  </div>

  <div id="scr">

    <!-- LISTEN button — always narrates #1 nearest landmark -->
    <div id="listenWrap">
      <button id="listenBtn" onclick="topListen()">
        <div class="lb-icon">🔊</div>
        <div class="lb-text">
          <div class="lb-main" id="listenLabel">LISTEN</div>
          <div class="lb-sub" id="listenSub">Tap to hear nearest landmark</div>
        </div>
      </button>
      <div id="voiceWrap">
        <label for="voiceSelect">🗣 Voice</label>
        <select id="voiceSelect" onchange="saveVoice()"></select>
      </div>
    </div>

    <!-- GPS status indicator -->
    <div id="status">
      <div class="dot gps" id="dot"></div>
      <div id="stmsg">Locating you…</div>
    </div>

    <!-- Top 2 nearest landmark cards — auto-update with GPS -->
    <div id="cards">
      <div class="card" id="card0" onclick="cardClick(0)">
        <div class="card-placeholder">Nearest landmark will appear here</div>
      </div>
      <div class="card" id="card1" onclick="cardClick(1)">
        <div class="card-placeholder">2nd nearest will appear here</div>
      </div>
    </div>

    <div class="sep"></div>
    <div id="listLabel">Next Nearest</div>
    <div id="list"></div>

    <div id="gpsBar">
      <span id="gLat">LAT —</span>
      <span id="gLon">LON —</span>
      <span id="gSpd">SPD —</span>
      <span id="gAcc">ACC —</span>
    </div>

  </div><!-- /scr -->
</div><!-- /app -->

<script>
// ─────────────────────────────────────────────────────────
// BUILD MASTER LANDMARK ARRAY FROM ALL LOADED JS FILES
// Handles: LANDMARKS, LANDMARKS_SOUTH, LANDMARKS_TOPUP
// and landmarks_bayarea_film (different schema — optional)
// ─────────────────────────────────────────────────────────

var ALL_LANDMARKS = (function() {
  var seen = {};
  var out  = [];

  function norm(lm) {
    var lat = (lm.lat != null) ? lm.lat : (lm.coords ? lm.coords.lat : null);
    var lon = (lm.lon != null) ? lm.lon
            : (lm.coords ? (lm.coords.lon != null ? lm.coords.lon : lm.coords.lng) : null);
    var photo = lm.photo || lm.image || '';
    var fact = lm.fact || '';
    if (!fact && lm.media) {
      fact = '<div class="film-row"><span class="film-label">🎬 Movie</span><span class="film-val">' + (lm.media || '') + '</span></div>'
           + '<div class="film-row"><span class="film-label">🎥 The Scene</span><span class="film-val">' + (lm.scene || lm.history || '') + '</span></div>'
           + '<div class="film-row"><span class="film-label">⭐ Fun Fact</span><span class="film-val">' + (lm.fun_fact || '') + '</span></div>';
    }
    var cat = lm.cat || '';
    if (!cat && lm.media) cat = 'Movie & TV Film';
    return {
      name:   lm.name   || '',
      county: lm.county || '',
      emoji:  lm.emoji  || '📍',
      lat:    lat,
      lon:    lon,
      cat:    cat,
      photo:  photo,
      fact:   fact
    };
  }

  function merge(arr) {
    if (!arr || !arr.length) return;
    for (var i = 0; i < arr.length; i++) {
      var n   = norm(arr[i]);
      if (!n.lat || !n.lon || !n.name) continue;
      var key = n.name.toLowerCase().trim();
      if (seen[key]) continue;
      seen[key] = true;
      out.push(n);
    }
  }

  if (typeof LANDMARKS             !== 'undefined') merge(LANDMARKS);
  if (typeof LANDMARKS_SOUTH       !== 'undefined') merge(LANDMARKS_SOUTH);
  if (typeof LANDMARKS_TOPUP       !== 'undefined') merge(LANDMARKS_TOPUP);
  if (typeof LANDMARKS_VALLEY      !== 'undefined') merge(LANDMARKS_VALLEY);
  if (typeof FILM_LANDMARKS        !== 'undefined') merge(FILM_LANDMARKS);

  return out;
})();

document.getElementById('tc').textContent = ALL_LANDMARKS.length;

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
var userLat         = null;
var userLon         = null;
var sorted          = [];
var overlayLandmark = null;
var activeCategory  = null;

// ─────────────────────────────────────────────────────────
// CATEGORY FILTER
// ─────────────────────────────────────────────────────────
function setCat(cat, el) {
  activeCategory = cat;
  var chips = document.querySelectorAll('.cat-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  sortAndRender();
}

function getFiltered() {
  if (!activeCategory) return ALL_LANDMARKS;
  var c = activeCategory;
  return ALL_LANDMARKS.filter(function(lm) {
    var cat = (lm.cat || '').toLowerCase();
    if (c === 'historic')   return /historic|fort|ruin|memorial|cemetery|adobe|plaza|landmark|shipyard|powder|arsenal|ranch|district|neighborhood|hotel|theater|theatre|town|building|farm|ship|prison|ruins|hacienda|estate/.test(cat);
    if (c === 'nature')     return /natural|geological|wetland|marsh|lagoon|estuary|waterway|mountain|reservoir|lake|valley|open space|forest|bay|dune|canyon|wilderness|waterfall|feature|creek|river|natural area/.test(cat);
    if (c === 'winery')     return /winery|wine|vineyard|wine region/.test(cat);
    if (c === 'beach')      return /beach|shoreline|cove|coast/.test(cat);
    if (c === 'park')       return /park|preserve|recreation|garden/.test(cat);
    if (c === 'museum')     return /museum|science|planetarium|aquarium|space|zoo|observatory/.test(cat);
    if (c === 'trail')      return /trail|route|railway|parkway/.test(cat);
    if (c === 'wildlife')   return /wildlife|refuge|bird|animal|wetland|slough/.test(cat);
    if (c === 'military')   return /military|naval|army|prison|ship|fort/.test(cat);
    if (c === 'lighthouse') return /lighthouse/.test(cat);
    if (c === 'film')       return /movie|tv|film/.test(cat);
    if (c === 'geological') return /geological|fault|volcanic|geo|mine|quicksilver/.test(cat);
    if (c === 'mission')    return /mission/.test(cat);
    if (c === 'industrial') return /industrial|refinery|infrastructure|facility|airport|stadium|factory|plant|power/.test(cat);
    if (c === 'education')  return /education|university|college|campus|school/.test(cat);
    if (c === 'market')     return /market|fairground/.test(cat);
    if (c === 'energy')     return /energy|wind|power/.test(cat);
    return false;
  });
}

// ─────────────────────────────────────────────────────────
// GPS — starts automatically, re-sorts on every position fix
// ─────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    setDot('err');
    setMsg('Location not available — showing all landmarks');
    sortAndRender();
    return;
  }
  setDot('gps');
  setMsg('Acquiring GPS…');
  navigator.geolocation.watchPosition(onPos, onErr, {
    enableHighAccuracy: true,
    maximumAge: 5000,
    timeout: 20000
  });
}

function onPos(pos) {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;
  document.getElementById('gLat').textContent = 'LAT ' + userLat.toFixed(4);
  document.getElementById('gLon').textContent = 'LON ' + userLon.toFixed(4);
  document.getElementById('gSpd').textContent = (pos.coords.speed != null)
    ? 'SPD ' + (pos.coords.speed * 2.237).toFixed(1) + ' mph' : 'SPD —';
  document.getElementById('gAcc').textContent = 'ACC ±' + Math.round(pos.coords.accuracy) + 'm';
  setDot('live');
  sortAndRender();
}

function onErr(e) {
  setDot('err');
  setMsg('Location unavailable — showing all landmarks');
  sortAndRender();
}

// ─────────────────────────────────────────────────────────
// DISTANCE + BEARING MATH
// ─────────────────────────────────────────────────────────
function haversine(la1, lo1, la2, lo2) {
  var R    = 3958.8;
  var dLa  = (la2 - la1) * Math.PI / 180;
  var dLo  = (lo2 - lo1) * Math.PI / 180;
  var a    = Math.sin(dLa / 2) * Math.sin(dLa / 2)
           + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180)
           * Math.sin(dLo / 2) * Math.sin(dLo / 2);
  return R * 2 * Math.asin(Math.sqrt(a));
}

function bearing(la1, lo1, la2, lo2) {
  var dLo  = (lo2 - lo1) * Math.PI / 180;
  var y    = Math.sin(dLo) * Math.cos(la2 * Math.PI / 180);
  var x    = Math.cos(la1 * Math.PI / 180) * Math.sin(la2 * Math.PI / 180)
           - Math.sin(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.cos(dLo);
  var deg  = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  var dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ─────────────────────────────────────────────────────────
// SORT & RENDER — called every time GPS updates or filter changes
// ─────────────────────────────────────────────────────────
function sortAndRender() {
  var base = getFiltered();

  if (userLat !== null) {
    // Attach distance + bearing then sort ascending by distance
    sorted = base.map(function(lm) {
      return Object.assign({}, lm, {
        dist: haversine(userLat, userLon, lm.lat, lm.lon),
        dir:  bearing(userLat, userLon, lm.lat, lm.lon)
      });
    });
    sorted.sort(function(a, b) { return a.dist - b.dist; });

    // Scan bar fill: inverse of nearest distance (100% = right on top of it)
    var nearest = sorted[0] ? sorted[0].dist : 99;
    document.getElementById('scanfill').style.width =
      Math.min(100, Math.round(100 / (nearest + 1))) + '%';

    // "Nearby" count = within 5 miles
    var nearby = sorted.filter(function(l) { return l.dist < 5; }).length;
    document.getElementById('dc').textContent = nearby;
    setMsg(sorted.length + ' landmarks · sorted by distance');
  } else {
    // No GPS yet — show unsorted
    sorted = base.slice();
    document.getElementById('dc').textContent = '—';
    setMsg(sorted.length + ' landmarks loaded');
  }

  // Update category count label
  var countEl = document.getElementById('catCount');
  countEl.textContent = activeCategory
    ? sorted.length + ' landmark' + (sorted.length !== 1 ? 's' : '') + ' in this category'
    : '';

  renderCards();
  renderList();
}

// ─────────────────────────────────────────────────────────
// RENDER TOP 2 CARDS
// ─────────────────────────────────────────────────────────
function renderCards() {
  for (var i = 0; i < 2; i++) {
    var el = document.getElementById('card' + i);
    var lm = sorted[i];
    if (!lm) {
      el.className  = 'card';
      el.innerHTML  = '<div class="card-placeholder">No landmarks in this category</div>';
      continue;
    }
    el.className = 'card rank-' + (i + 1);
    var distStr  = (lm.dist != null) ? lm.dist.toFixed(1) : '—';
    var dirStr   = lm.dir  || '';
    var imgHTML  = lm.photo
      ? '<img class="card-img" src="' + lm.photo + '" alt="' + escHtml(lm.name) + '" '
        + 'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
      : '';
    var emojiStyle = lm.photo ? '' : 'display:flex';
    el.innerHTML = imgHTML
      + '<div class="card-emoji" style="' + emojiStyle + '">' + lm.emoji + '</div>'
      + '<div class="card-body">'
      +   '<div class="card-top">'
      +     '<div class="card-meta">'
      +       '<div class="card-rank">' + (i === 0 ? '▲ NEAREST' : '▲ 2ND NEAREST') + '</div>'
      +       '<div class="card-name">' + escHtml(lm.name) + '</div>'
      +       '<div class="card-county">' + escHtml(lm.county) + (lm.cat ? ' · ' + escHtml(lm.cat) : '') + '</div>'
      +     '</div>'
      +     '<div class="card-dist-wrap">'
      +       '<div class="card-dist">' + distStr + '</div>'
      +       '<span class="card-unit">MILES</span>'
      +       '<div class="card-dir">'  + dirStr  + '</div>'
      +     '</div>'
      +   '</div>'
      +   '<div class="divider"></div>'
      +   '<div class="card-fact">' + lm.fact + '</div>'
      + '</div>';
  }
}

// ─────────────────────────────────────────────────────────
// RENDER SCROLLABLE LIST (items 3 and beyond)
// ─────────────────────────────────────────────────────────
function renderList() {
  var list  = document.getElementById('list');
  var items = sorted.slice(2, 15);
  if (!items.length) {
    list.innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dim);padding:8px 0">No additional landmarks in this category</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var lm  = items[i];
    var idx = i + 2;   // index into sorted[]
    var distLabel = (lm.dist != null) ? lm.dist.toFixed(1) + ' mi' : '—';
    // Thumbnail: small photo if available, else emoji square
    var thumbHTML = lm.photo
      ? '<img class="litem-thumb" src="' + lm.photo + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
        + '<div class="litem-thumb-em" style="display:none">' + lm.emoji + '</div>'
      : '<div class="litem-thumb-em">' + lm.emoji + '</div>';
    html += '<div class="litem" onclick="openOverlay(' + idx + ')">'
          +   thumbHTML
          +   '<div class="litem-info">'
          +     '<div class="litem-name">' + escHtml(lm.name) + '</div>'
          +     '<div class="litem-sub">'  + escHtml(lm.county) + (lm.cat ? ' · ' + escHtml(lm.cat) : '') + '</div>'
          +   '</div>'
          +   '<div class="litem-dist">' + distLabel + '</div>'
          + '</div>';
  }
  list.innerHTML = html;
}

// ─────────────────────────────────────────────────────────
// VOICE SELECTION — populate dropdown, prefer natural male voices
// Priority: Google UK English Male > Google US Male > Daniel (Apple)
//           > any male > first available
// ─────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────
// ELEVENLABS CONFIG
// Get a free API key at elevenlabs.io (10,000 chars/month free)
// Paste your key below between the quotes.
// Leave blank ('') to use browser voice only.
// ─────────────────────────────────────────────────────────
var XI_KEY    = '';          // ← paste your ElevenLabs API key here
var XI_VOICE  = 'nPczCjzI2devNBz1zQrb';  // Brian — deep, American, narration
var XI_MODEL  = 'eleven_turbo_v2_5';      // fast, low-latency, English
var xi_audio  = null;        // current Audio object

function xiSpeak(text, onStart, onEnd) {
  if (!XI_KEY) { return false; }  // no key — fall through to browser voice
  // Stop any previous ElevenLabs audio
  if (xi_audio) { xi_audio.pause(); xi_audio = null; }

  var url = 'https://api.elevenlabs.io/v1/text-to-speech/' + XI_VOICE + '/stream';
  fetch(url, {
    method: 'POST',
    headers: {
      'xi-api-key': XI_KEY,
      'Content-Type': 'application/json',
      'Accept': 'audio/mpeg'
    },
    body: JSON.stringify({
      text: text,
      model_id: XI_MODEL,
      voice_settings: { stability: 0.55, similarity_boost: 0.75, style: 0.0, use_speaker_boost: true }
    })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('ElevenLabs ' + r.status);
    return r.blob();
  })
  .then(function(blob) {
    var audioUrl = URL.createObjectURL(blob);
    xi_audio = new Audio(audioUrl);
    xi_audio.onplay  = onStart;
    xi_audio.onended = function() { URL.revokeObjectURL(audioUrl); onEnd(); };
    xi_audio.onerror = function() { onEnd(); };
    xi_audio.play();
  })
  .catch(function(err) {
    console.warn('ElevenLabs error, falling back to browser voice:', err);
    browserSpeak(text, onStart, onEnd);
  });
  return true;  // API call initiated
}

function xiStop() {
  if (xi_audio) { xi_audio.pause(); xi_audio = null; }
  xiStop();
}

function browserSpeak(text, onStart, onEnd) {
  if (!window.speechSynthesis) { onEnd(); return; }
  var utt  = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';   // Let the OS pick its natural US voice — works great on iOS
  utt.rate = 0.92;
  // Only manually assign a voice on non-iOS (iOS ignores voice assignment anyway
  // and sounds better with its own system default via lang alone)
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (!isIOS) {
    var v = getVoice(); if (v) utt.voice = v;
  }
  utt.onstart = onStart;
  utt.onend = utt.onerror = onEnd;
  window.speechSynthesis.speak(utt);
}

function isSpeaking() {
  return (xi_audio && !xi_audio.paused) ||
         (window.speechSynthesis && window.speechSynthesis.speaking);
}

var selectedVoice = null;

function populateVoices() {
  var voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  var sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  // ── Voice priority list ──────────────────────────────────────────────────
  // iOS best males (must be downloaded in Settings > Accessibility > Spoken Content > Voices):
  //   Evan (Enhanced), Nathan (Enhanced) — warm, natural American male
  // Windows Chrome: "Google US English" (lang en-US)
  // macOS/other Chrome: "Google US English Male" or similar
  // Falls back to any en-US voice rather than a non-US voice.
  // ─────────────────────────────────────────────────────────────────────────
  function pickBestVoice(vlist) {
    var n, v;
    // Tier 1 — iOS premium/enhanced male US voices (must be pre-downloaded by user)
    var iosMalePremium = ['evan', 'nathan', 'nolan', 'aaron'];
    for (var i = 0; i < iosMalePremium.length; i++) {
      v = vlist.find(function(v){
        n = v.name.toLowerCase();
        return n === iosMalePremium[i] && v.lang === 'en-US';
      });
      if (v) return v;
    }
    // Tier 2 — Google US English (Windows/Android Chrome exact name)
    v = vlist.find(function(v){ return v.name === 'Google US English'; });
    if (v) return v;
    // Tier 3 — Any Google voice with en-US lang
    v = vlist.find(function(v){
      return v.name.toLowerCase().indexOf('google') !== -1 && v.lang === 'en-US';
    });
    if (v) return v;
    // Tier 4 — Microsoft natural US (Edge/Windows)
    v = vlist.find(function(v){
      return v.name.toLowerCase().indexOf('microsoft') !== -1 && v.lang === 'en-US'
             && v.name.toLowerCase().indexOf('online') !== -1;
    });
    if (v) return v;
    // Tier 5 — Any en-US voice (avoid non-US at all costs)
    v = vlist.find(function(v){ return v.lang === 'en-US'; });
    if (v) return v;
    // Tier 6 — Any English voice
    v = vlist.find(function(v){ return v.lang && v.lang.toLowerCase().indexOf('en') === 0; });
    if (v) return v;
    return vlist[0] || null;
  }

  // Build dropdown — en-US voices first, then everything else
  var sorted_voices = voices.slice().sort(function(a, b) {
    var aScore = (a.lang === 'en-US') ? 1 : 0;
    var bScore = (b.lang === 'en-US') ? 1 : 0;
    return bScore - aScore;
  });

  sorted_voices.forEach(function(v) {
    var opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(opt);
  });

  // Honour saved preference ONLY if it is en-US — never fall back to a UK/foreign voice
  var saved = localStorage.getItem('rg_voice');
  var savedVoice = saved ? voices.find(function(v){ return v.name === saved; }) : null;
  var chosen = (savedVoice && savedVoice.lang === 'en-US') ? savedVoice : pickBestVoice(voices);
  sel.value = chosen ? chosen.name : '';
  selectedVoice = chosen || null;
}

function saveVoice() {
  var sel = document.getElementById('voiceSelect');
  selectedVoice = window.speechSynthesis.getVoices().find(function(v){ return v.name === sel.value; }) || null;
  try { localStorage.setItem('rg_voice', sel.value); } catch(e) {}
}

function getVoice() {
  // Re-resolve from current voice list in case it changed
  var sel = document.getElementById('voiceSelect');
  var name = sel ? sel.value : '';
  return window.speechSynthesis.getVoices().find(function(v){ return v.name === name; }) || null;
}

// Voices load asynchronously on many browsers
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = populateVoices;
  populateVoices(); // also try immediately
}

// ─────────────────────────────────────────────────────────
// TOP LISTEN BUTTON — narrates the #1 nearest landmark
// ─────────────────────────────────────────────────────────
function topListen() {
  var lm  = sorted[0];
  if (!lm) { alert('No landmarks loaded yet.'); return; }
  var btn = document.getElementById('listenBtn');
  var lbl = document.getElementById('listenLabel');
  var sub = document.getElementById('listenSub');

  // Stop if already speaking
  if (isSpeaking()) {
    xiStop();
    btn.classList.remove('speaking');
    lbl.textContent = 'LISTEN';
    sub.textContent = 'Tap to hear nearest landmark';
    return;
  }

  var text = lm.name + '. ' + stripTags(lm.fact);

  var onStart = function() {
    btn.classList.add('speaking');
    lbl.textContent = 'STOP';
    sub.textContent = lm.name.toUpperCase().substring(0, 28);
  };
  var onEnd = function() {
    btn.classList.remove('speaking');
    lbl.textContent = 'LISTEN';
    sub.textContent = 'Tap to hear nearest landmark';
  };

  // Try ElevenLabs first; if no key, fall back to browser
  if (!xiSpeak(text, onStart, onEnd)) {
    browserSpeak(text, onStart, onEnd);
  }
}

// ─────────────────────────────────────────────────────────
// OVERLAY — opens when a card or list item is tapped
// ─────────────────────────────────────────────────────────
function cardClick(i) {
  if (sorted[i]) openOverlay(i);
}

function openOverlay(idx) {
  var lm = sorted[idx];
  if (!lm) return;
  overlayLandmark = lm;

  // Stop any playing speech
  if (window.speechSynthesis && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    resetTopBtn();
  }

  // Image (photo first, emoji fallback)
  var oImg   = document.getElementById('oImg');
  var oEmoji = document.getElementById('oEmoji');
  if (lm.photo) {
    oImg.src             = lm.photo;
    oImg.style.display   = 'block';
    oEmoji.style.display = 'none';
  } else {
    oImg.src             = '';
    oImg.style.display   = 'none';
    oEmoji.style.display = 'flex';
    oEmoji.textContent   = lm.emoji;
  }

  document.getElementById('otag').textContent  = (lm.cat || '').toUpperCase();
  document.getElementById('oname').textContent = lm.name;

  var distHTML = (lm.dist != null)
    ? '<b>' + lm.dist.toFixed(1) + ' miles</b> ' + (lm.dir || '') : '';
  document.getElementById('odist').innerHTML = distHTML + (lm.county ? ' · ' + escHtml(lm.county) : '');
  document.getElementById('ofact').innerHTML = lm.fact;

  // Reset overlay listen button
  var obtn = document.getElementById('olistenBtn');
  obtn.textContent = '🔊 Listen';
  obtn.classList.remove('speaking');

  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(e) {
  // Only close if user tapped the dark backdrop (not the card itself)
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  xiStop();
  document.getElementById('olistenBtn').textContent = '🔊 Listen';
  document.getElementById('olistenBtn').classList.remove('speaking');
  overlayLandmark = null;
}

// ─────────────────────────────────────────────────────────
// OVERLAY LISTEN BUTTON — narrates the open landmark
// ─────────────────────────────────────────────────────────
function overlayListen() {
  if (!overlayLandmark) return;
  var btn = document.getElementById('olistenBtn');

  if (isSpeaking()) {
    xiStop();
    btn.textContent = '🔊 Listen';
    btn.classList.remove('speaking');
    return;
  }

  var text = overlayLandmark.name + '. ' + stripTags(overlayLandmark.fact);

  var onStart = function() {
    btn.textContent = '⏹ Stop';
    btn.classList.add('speaking');
  };
  var onEnd = function() {
    btn.textContent = '🔊 Listen';
    btn.classList.remove('speaking');
  };

  if (!xiSpeak(text, onStart, onEnd)) {
    browserSpeak(text, onStart, onEnd);
  }
}

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function stripTags(html) {
  return (html || '').replace(/<[^>]+>/g, '');
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setDot(cls) {
  document.getElementById('dot').className = 'dot ' + cls;
}

function setMsg(msg) {
  document.getElementById('stmsg').textContent = msg;
}

function resetTopBtn() {
  document.getElementById('listenBtn').classList.remove('speaking');
  document.getElementById('listenLabel').textContent = 'LISTEN';
  document.getElementById('listenSub').textContent   = 'Tap to hear nearest landmark';
}

// ─────────────────────────────────────────────────────────
// BOOT — render immediately, then start GPS
// ─────────────────────────────────────────────────────────
sortAndRender();
startGPS();
</script>
