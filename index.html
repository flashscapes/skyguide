<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoadGuide">
<meta name="theme-color" content="#080c14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>RoadGuide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #080c14;
  --gold: #c9a84c;
  --glo: #e8c97a;
  --gdim: rgba(201,168,76,.35);
  --pale: #eef2ff;
  --dim: rgba(220,228,255,.45);
  --card: rgba(255,255,255,.05);
  --edge: rgba(255,255,255,.09);
  --green: #50c880;
  --red: #e05555;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%; overflow:hidden; position:fixed;
  background:var(--ink); color:var(--pale);
  font-family:'DM Sans', sans-serif;
}

/* ── BACKGROUND ─────────────────────────────────────────── */
#sky {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(18,34,68,.9) 0%, transparent 100%),
    radial-gradient(ellipse 60% 60% at 85% 90%, rgba(10,18,38,.95) 0%, transparent 100%),
    var(--ink);
}
#sky::before {
  content:''; position:absolute; inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at  8% 12%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px   1px   at 23% 45%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 52%  8%, rgba(201,168,76,.4)  0%, transparent 100%),
    radial-gradient(1px   1px   at 71% 67%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1.2px 1.2px at 38% 82%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px   1px   at 88% 28%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px   1px   at 64% 35%, rgba(201,168,76,.25) 0%, transparent 100%),
    radial-gradient(1px   1px   at 15% 75%, rgba(255,255,255,.3) 0%, transparent 100%);
}

/* ── LAYOUT ──────────────────────────────────────────────── */
#app {
  position:relative; z-index:1;
  width:100%; height:100%;
  display:flex; flex-direction:column; overflow:hidden;
}

/* ── HEADER ──────────────────────────────────────────────── */
#hdr {
  flex-shrink:0;
  padding: env(safe-area-inset-top,44px) 20px 14px;
  display:flex; align-items:flex-end; justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:5px; line-height:1; }
.logo-tag { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; margin-top:3px; }
.hd-r { text-align:right; }
.hd-r p { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:.5px; }
.hd-r span { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; color:var(--glo); }

/* ── GPS SCAN BAR ────────────────────────────────────────── */
#scanbar { flex-shrink:0; height:2px; background:rgba(255,255,255,.05); position:relative; overflow:hidden; }
#scanfill { position:absolute; left:0; top:0; height:100%; background:linear-gradient(90deg,rgba(201,168,76,.3),var(--gold)); width:0%; transition:width 1s linear; }

/* ── SCROLL AREA ────────────────────────────────────────── */
#scr { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:14px 14px 40px; }
#scr::-webkit-scrollbar { display:none; }

/* ── START BUTTON ───────────────────────────────────────── */
#startWrap { display:flex; justify-content:center; padding:10px 0 16px; }
#startBtn {
  display:flex; align-items:center; gap:14px;
  padding:14px 32px; border-radius:50px; cursor:pointer;
  border:1.5px solid rgba(201,168,76,.45);
  background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));
  transition:all .25s; -webkit-appearance:none;
}
#startBtn.on {
  border-color:rgba(80,200,128,.55);
  background:linear-gradient(135deg,rgba(80,200,128,.14),rgba(80,200,128,.03));
}
#startBtn:active { transform:scale(.96); }
.sb-icon { font-size:24px; }
.sb-text { display:flex; flex-direction:column; }
.sb-main { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:var(--glo); }
#startBtn.on .sb-main { color:#6ecf9c; }
.sb-sub { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--gdim); text-transform:uppercase; }
#startBtn.on .sb-sub { color:rgba(80,200,128,.55); }

/* ── STATUS BAR ─────────────────────────────────────────── */
#status {
  display:flex; align-items:center; gap:8px;
  padding:8px 13px; margin-bottom:14px;
  background:var(--card); border:1px solid var(--edge); border-radius:10px;
  font-family:'DM Mono',monospace; font-size:10px;
}
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot.idle  { background:rgba(220,228,255,.3); }
.dot.gps   { background:var(--gold); animation:blink 1.2s ease-in-out infinite; }
.dot.live  { background:var(--green); animation:blink 2.5s ease-in-out infinite; }
.dot.err   { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
#stmsg { flex:1; color:var(--dim); }
#sttmr { color:var(--gdim); font-size:9px; }

/* ── THE TWO LANDMARK CARDS ─────────────────────────────── */
#cards { display:flex; flex-direction:column; gap:12px; margin-bottom:14px; }

.card {
  border-radius:16px; overflow:hidden;
  background:var(--card); border:1px solid var(--edge);
  transition:border-color .3s, box-shadow .3s;
  cursor:pointer;
}
.card.rank-1 {
  border-color:rgba(201,168,76,.4);
  box-shadow:0 0 0 1px rgba(201,168,76,.1), 0 8px 32px rgba(0,0,0,.4);
}
.card.rank-2 { border-color:rgba(201,168,76,.18); }

.card-img { width:100%; height:110px; object-fit:cover; display:block; }
.card-emoji {
  width:100%; height:110px; display:none; align-items:center; justify-content:center;
  font-size:52px;
  background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.85));
}
.card-body { padding:13px 15px 14px; }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; }
.card-meta { flex:1; }
.card-rank {
  font-family:'DM Mono',monospace; font-size:7px; letter-spacing:3px;
  color:var(--gold); text-transform:uppercase; margin-bottom:1px;
}
.card-name {
  font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px;
  color:var(--pale); line-height:1.05;
}
.card-county { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); margin-top:2px; }
.card-dist-wrap { text-align:right; flex-shrink:0; }
.card-dist { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:1px; color:var(--glo); line-height:1; }
.card-unit { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--gdim); display:block; }
.card-dir  { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); margin-top:1px; }
.divider { width:100%; height:1px; background:rgba(255,255,255,.06); margin-bottom:9px; }
.card-fact { font-size:13px; line-height:1.68; font-weight:300; color:rgba(220,228,255,.85); }
.card-fact em { color:var(--glo); font-style:normal; font-weight:500; }
.card-placeholder {
  height:110px; display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:1px;
  font-style:italic;
}

/* ── DIVIDER ─────────────────────────────────────────────── */
.sep { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,.18),transparent); margin:6px 0 12px; }

/* ── NEARBY MINI LIST ───────────────────────────────────── */
#listLabel { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:8px; }
#list { display:flex; flex-direction:column; gap:6px; }
.litem {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:10px;
  background:var(--card); border:1px solid var(--edge);
  cursor:pointer; transition:border-color .2s;
}
.litem:active { border-color:rgba(201,168,76,.3); }
.litem-em { font-size:18px; flex-shrink:0; width:30px; text-align:center; }
.litem-info { flex:1; min-width:0; }
.litem-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.litem-sub  { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); margin-top:1px; }
.litem-dist { font-family:'DM Mono',monospace; font-size:11px; color:var(--glo); flex-shrink:0; }

/* ── GPS FOOTER ─────────────────────────────────────────── */
#gpsBar {
  padding:8px 12px; background:var(--card); border:1px solid var(--edge);
  border-radius:10px; margin-top:12px;
  font-family:'DM Mono',monospace; font-size:9px; color:var(--dim);
  display:flex; gap:12px; flex-wrap:wrap;
}

/* ── DETAIL OVERLAY ─────────────────────────────────────── */
#overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(8,12,20,.92);
  display:none; align-items:flex-end; justify-content:stretch;
  padding:12px;
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
}
#overlay.open { display:flex; }
#ocard {
  width:100%; border-radius:20px; overflow:hidden;
  background:linear-gradient(160deg,#0f1829,#080c14);
  border:1px solid rgba(201,168,76,.4);
  box-shadow:0 -8px 60px rgba(0,0,0,.7);
}
#oImg  { width:100%; height:160px; object-fit:cover; display:block; }
#oEmoji {
  width:100%; height:160px; display:none; align-items:center; justify-content:center;
  font-size:70px; background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.9));
}
#obody { padding:16px 18px 20px; }
#otop { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:10px; }
#ometa { flex:1; }
#otag  { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:2px; }
#oname { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:1px; line-height:1; }
#odist { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); margin-top:4px; }
#odist b { color:var(--glo); font-weight:400; }
#oclose {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:var(--dim); font-size:14px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-appearance:none;
}
#ofact { font-size:14px; line-height:1.7; font-weight:300; }
#ofact em { color:var(--glo); font-style:normal; font-weight:500; }
</style>
</head>
<body>

<div id="sky"></div>

<!-- Detail Overlay -->
<div id="overlay" onclick="closeOverlay(event)">
  <div id="ocard">
    <img id="oImg" src="" alt=""
      onerror="this.style.display='none';document.getElementById('oEmoji').style.display='flex'">
    <div id="oEmoji"></div>
    <div id="obody">
      <div id="otop">
        <div id="ometa">
          <div id="otag"></div>
          <div id="oname"></div>
          <div id="odist"></div>
        </div>
        <button id="oclose" onclick="closeOverlay()">✕</button>
      </div>
      <div id="ofact"></div>
    </div>
  </div>
</div>

<div id="app">
  <!-- Header -->
  <div id="hdr">
    <div>
      <div class="logo">RoadGuide</div>
      <div class="logo-tag">California</div>
    </div>
    <div class="hd-r">
      <p>LANDMARKS <span id="tc">—</span></p>
      <p>DISCOVERED <span id="dc">0</span></p>
    </div>
  </div>
  <div id="scanbar"><div id="scanfill"></div></div>

  <!-- Scroll body -->
  <div id="scr">

    <!-- Start button -->
    <div id="startWrap">
      <button id="startBtn" onclick="toggle()">
        <div class="sb-icon">🚗</div>
        <div class="sb-text">
          <div class="sb-main" id="btnLabel">Start Driving</div>
          <div class="sb-sub"  id="btnSub">Tap to see nearest landmarks</div>
        </div>
      </button>
    </div>

    <!-- Status -->
    <div id="status">
      <div class="dot idle" id="dot"></div>
      <div id="stmsg">Tap Start Driving to begin</div>
      <div id="sttmr"></div>
    </div>

    <!-- THE 2 MAIN CARDS -->
    <div id="cards">
      <div class="card" id="card0" onclick="cardClick(0)">
        <div class="card-placeholder" id="ph0">Nearest landmark will appear here</div>
      </div>
      <div class="card" id="card1" onclick="cardClick(1)">
        <div class="card-placeholder" id="ph1">2nd nearest landmark will appear here</div>
      </div>
    </div>

    <div class="sep"></div>

    <!-- Mini list of next 10 -->
    <div id="listLabel">Next Nearest</div>
    <div id="list"></div>

    <div id="gpsBar">
      <span id="gLat">LAT —</span>
      <span id="gLon">LON —</span>
      <span id="gSpd">SPD —</span>
      <span id="gAcc">ACC —</span>
    </div>

  </div><!-- /scr -->
</div><!-- /app -->

<!-- Data files -->
<script src="landmarks.js"></script>
<script src="landmarks_south.js"></script>
<script src="landmarks_topup.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   ROADGUIDE — core logic
   ═════════════════════════════════════════════════════════*/

// ── 1. MERGE + VALIDATE ──────────────────────────────────
var ALL = [];
(function() {
  function load(arr, label) {
    if (!Array.isArray(arr)) { console.error(label + ' not loaded!'); return; }
    var before = ALL.length;
    for (var i = 0; i < arr.length; i++) {
      var lm = arr[i];
      if (lm && lm.name && typeof lm.lat === 'number' && typeof lm.lon === 'number') {
        ALL.push(lm);
      }
    }
    console.log(label + ': added ' + (ALL.length - before) + ' landmarks');
  }
  load(typeof LANDMARKS       !== 'undefined' ? LANDMARKS       : null, 'LANDMARKS');
  load(typeof LANDMARKS_SOUTH !== 'undefined' ? LANDMARKS_SOUTH : null, 'LANDMARKS_SOUTH');
  load(typeof LANDMARKS_TOPUP !== 'undefined' ? LANDMARKS_TOPUP : null, 'LANDMARKS_TOPUP');
  console.log('TOTAL landmarks:', ALL.length);
})();

document.getElementById('tc').textContent = ALL.length;

// ── 2. STATE ─────────────────────────────────────────────
var active = false;
var watchId = null;
var scanTimer = null;
var secsLeft = 0;
var SCAN_INTERVAL = 15;

var curLat = null, curLon = null;
var discovered = new Set();
var topTwo = [null, null];   // currently displayed top-2 landmarks

// ── 3. DISTANCE + BEARING ────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  var R = 3958.8;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2)
        + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180)
        * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearing(lat1, lon1, lat2, lon2) {
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  var x = Math.cos(lat1 * Math.PI/180) * Math.sin(lat2 * Math.PI/180)
        - Math.sin(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function cardinalDir(deg) {
  var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// ── 4. GPS TOGGLE ─────────────────────────────────────────
function toggle() {
  if (active) stopDriving(); else startDriving();
}

function startDriving() {
  if (!navigator.geolocation) {
    setStatus('err', 'GPS not available in this browser');
    return;
  }
  active = true;
  document.getElementById('startBtn').classList.add('on');
  document.getElementById('btnLabel').textContent = 'Driving';
  document.getElementById('btnSub').textContent   = 'Tap to stop';
  setStatus('gps', 'Acquiring GPS signal…');

  watchId = navigator.geolocation.watchPosition(
    onPosition,
    onGpsError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 }
  );
}

function stopDriving() {
  active = false;
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  clearInterval(scanTimer); scanTimer = null;
  document.getElementById('startBtn').classList.remove('on');
  document.getElementById('btnLabel').textContent = 'Start Driving';
  document.getElementById('btnSub').textContent   = 'Tap to see nearest landmarks';
  document.getElementById('scanfill').style.width = '0%';
  document.getElementById('sttmr').textContent    = '';
  setStatus('idle', 'Stopped');
}

function onGpsError(err) {
  var msgs = {
    1: 'Location permission denied — please allow in Settings.',
    2: 'Position unavailable. Try again.',
    3: 'GPS timed out. Move to open sky.'
  };
  setStatus('err', msgs[err.code] || 'GPS error (' + err.code + ')');
}

// ── 5. POSITION HANDLER ───────────────────────────────────
function onPosition(pos) {
  curLat = pos.coords.latitude;
  curLon = pos.coords.longitude;
  var spd = pos.coords.speed;
  var acc = pos.coords.accuracy;

  document.getElementById('gLat').textContent = 'LAT ' + curLat.toFixed(5);
  document.getElementById('gLon').textContent = 'LON ' + curLon.toFixed(5);
  document.getElementById('gSpd').textContent = (spd !== null && spd !== undefined)
    ? 'SPD ' + Math.round(spd * 2.237) + ' mph'
    : 'SPD —';
  document.getElementById('gAcc').textContent = acc ? 'ACC ±' + Math.round(acc) + 'm' : 'ACC —';

  setStatus('live', 'GPS active — updating nearest landmarks');
  updateDisplay();
  startCountdown();
}

// ── 6. COUNTDOWN + PERIODIC REFRESH ──────────────────────
function startCountdown() {
  if (scanTimer !== null) return; // already running
  secsLeft = SCAN_INTERVAL;
  updateScanBar();
  scanTimer = setInterval(function() {
    secsLeft--;
    updateScanBar();
    if (secsLeft <= 0) {
      secsLeft = SCAN_INTERVAL;
      if (curLat !== null) updateDisplay();
    }
  }, 1000);
}

function updateScanBar() {
  document.getElementById('scanfill').style.width = (secsLeft / SCAN_INTERVAL * 100) + '%';
  document.getElementById('sttmr').textContent    = secsLeft + 's';
}

// ── 7. CORE: COMPUTE + RENDER TOP-2 ──────────────────────
function updateDisplay() {
  if (curLat === null || ALL.length === 0) return;

  // Sort all 719 landmarks by distance
  var sorted = ALL.map(function(lm) {
    return {
      lm:   lm,
      dist: haversine(curLat, curLon, lm.lat, lm.lon),
      brg:  bearing(curLat, curLon, lm.lat, lm.lon)
    };
  }).sort(function(a, b) { return a.dist - b.dist; });

  // Mark discoveries (first time within 5 miles)
  sorted.slice(0, 20).forEach(function(item) {
    if (item.dist <= 5) discovered.add(item.lm.name);
  });
  document.getElementById('dc').textContent = discovered.size;

  // Render top-2 cards
  topTwo[0] = sorted[0] || null;
  topTwo[1] = sorted[1] || null;
  renderCard(0, topTwo[0]);
  renderCard(1, topTwo[1]);

  // Render mini list (3–12)
  renderList(sorted.slice(2, 12));
}

// ── 8. RENDER A MAIN CARD ─────────────────────────────────
function renderCard(idx, item) {
  var card = document.getElementById('card' + idx);
  if (!item) {
    card.innerHTML = '<div class="card-placeholder">Searching…</div>';
    card.className = 'card';
    return;
  }

  var lm   = item.lm;
  var dist = item.dist.toFixed(1);
  var dir  = cardinalDir(item.brg);
  var rankLabel = idx === 0 ? '⬤ NEAREST' : '◎ 2ND NEAREST';

  card.className = 'card rank-' + (idx + 1);

  // Image or emoji header
  var imgHtml;
  if (lm.photo) {
    imgHtml = '<img class="card-img" src="' + lm.photo + '" alt="" loading="lazy" '
            + 'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
            + '<div class="card-emoji">' + lm.emoji + '</div>';
  } else {
    imgHtml = '<div class="card-emoji" style="display:flex">' + lm.emoji + '</div>';
  }

  card.innerHTML = imgHtml
    + '<div class="card-body">'
    +   '<div class="card-top">'
    +     '<div class="card-meta">'
    +       '<div class="card-rank">' + rankLabel + '</div>'
    +       '<div class="card-name">' + lm.name + '</div>'
    +       '<div class="card-county">' + lm.county + ' County · ' + lm.cat + '</div>'
    +     '</div>'
    +     '<div class="card-dist-wrap">'
    +       '<div class="card-dist">' + dist + '</div>'
    +       '<span class="card-unit">MILES</span>'
    +       '<div class="card-dir">' + dir + '</div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="divider"></div>'
    +   '<div class="card-fact">' + lm.fact + '</div>'
    + '</div>';
}

// ── 9. RENDER MINI LIST ───────────────────────────────────
function renderList(items) {
  var el = document.getElementById('list');
  el.innerHTML = '';
  items.forEach(function(item) {
    var lm   = item.lm;
    var dist = item.dist.toFixed(1);
    var dir  = cardinalDir(item.brg);
    var row  = document.createElement('div');
    row.className = 'litem';
    row.innerHTML = '<div class="litem-em">' + lm.emoji + '</div>'
      + '<div class="litem-info">'
      +   '<div class="litem-name">' + lm.name + '</div>'
      +   '<div class="litem-sub">' + lm.county + ' · ' + lm.cat + '</div>'
      + '</div>'
      + '<div class="litem-dist">' + dist + ' mi</div>';
    row.addEventListener('click', (function(i) {
      return function() { openOverlay(i); };
    })(item));
    el.appendChild(row);
  });
}

// ── 10. CARD CLICK → DETAIL OVERLAY ──────────────────────
function cardClick(idx) {
  if (topTwo[idx]) openOverlay(topTwo[idx]);
}

function openOverlay(item) {
  var lm   = item.lm;
  var dist = curLat !== null ? haversine(curLat, curLon, lm.lat, lm.lon).toFixed(1) : '?';
  var dir  = curLat !== null ? cardinalDir(bearing(curLat, curLon, lm.lat, lm.lon)) : '';

  var oi = document.getElementById('oImg');
  var oe = document.getElementById('oEmoji');
  if (lm.photo) {
    oi.style.display = 'block';
    oe.style.display = 'none';
    oi.src = lm.photo;
    oi.onerror = function() {
      oi.style.display = 'none';
      oe.style.display = 'flex';
    };
  } else {
    oi.style.display = 'none';
    oe.style.display = 'flex';
    oe.textContent = lm.emoji;
  }

  document.getElementById('otag').textContent   = lm.county + ' County · ' + lm.cat;
  document.getElementById('oname').textContent  = lm.name;
  document.getElementById('odist').innerHTML    = '<b>' + dist + ' miles</b> · ' + dir;
  document.getElementById('ofact').innerHTML    = lm.fact;

  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(event) {
  if (!event || event.target === document.getElementById('overlay') || event.currentTarget === document.getElementById('oclose')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

// ── 11. STATUS HELPER ─────────────────────────────────────
function setStatus(cls, msg) {
  document.getElementById('dot').className  = 'dot ' + cls;
  document.getElementById('stmsg').textContent = msg;
}

// ── 12. SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    console.log('SW registered, scope:', reg.scope);
  }).catch(function(err) {
    console.log('SW failed:', err);
  });
}
</script>
