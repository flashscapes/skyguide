e closest <em>free public kayak access</em> to Elkhorn Slough — the estuary that hosts the largest concentration of sea otters in California. From a kayak at water level, the otters appear enormous, and their habit of floating on their backs while cracking shellfish on stone 'anvils' resting on their chests can be observed at close range."},{"name":"Marina State Beach — Hang Gliding Launch","county":"Monterey","emoji":"🪂","lat":36.6833,"lon":-121.8003,"cat":"State Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Fort_Ord_National_Monument.jpg/320px-Fort_Ord_National_Monument.jpg","fact":"Marina State Beach's coastal dunes are a <em>premier hang gliding and paragliding launch site</em> — the reliable afternoon onshore winds and open beach below make it one of the best training grounds for beginner pilots in California. The beach's sand dunes, stabilized by invasive ice plant for decades, are now being restored to native dune scrub through an active removal program."},{"name":"Fort Ord Dunes State Park","county":"Monterey","emoji":"🌿","lat":36.6922,"lon":-121.8119,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Fort_Ord_National_Monument.jpg/320px-Fort_Ord_National_Monument.jpg","fact":"Fort Ord Dunes State Park protects <em>4 miles of beach and coastal dunes</em> that were inaccessible to the public for 60 years while the adjacent military base was in operation. The isolation unintentionally preserved the natural dune system — sand verbena, beach primrose, and other native dune plants are found here in quantities not seen elsewhere on the Monterey Bay."},{"name":"Salinas Valley Vineyards — River Road Wine Trail","county":"Monterey","emoji":"🍷","lat":36.55,"lon":-121.7,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Artichoke_field_Castroville.jpg/320px-Artichoke_field_Castroville.jpg","fact":"The River Road Wine Trail follows the Salinas River through the <em>heart of Monterey County's wine country</em> — 40,000 acres of vineyards that make Monterey one of the largest wine-producing counties in California. The region's cold, windy climate, channeled by the Salinas Valley's orientation as a funnel for Pacific Ocean air, produces some of the most age-worthy Chardonnays in the state."},{"name":"Pebble Beach — Cypress Point Club","county":"Monterey","emoji":"⛳","lat":36.575,"lon":-121.965,"cat":"Historic Course","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Pebble_Beach_Golf_Links.jpg/320px-Pebble_Beach_Golf_Links.jpg","fact":"Cypress Point Club's 16th hole — a <em>233-yard par-3 directly over the Pacific Ocean</em> — is considered the most beautiful golf hole in the world, requiring a carry of open water with no bailout. The club is so exclusive that it was dropped from the PGA Tour rotation in 1991 rather than change its membership policies — and it has never sought reinstatement."},{"name":"Del Monte Forest — Rare Monterey Cypress Grove","county":"Monterey","emoji":"🌲","lat":36.5819,"lon":-121.9617,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/17_Mile_Drive_CA.jpg/320px-17_Mile_Drive_CA.jpg","fact":"The Del Monte Forest protects the <em>largest native stand of Monterey cypress</em> in existence — this tree grows naturally in only two places in the world, both on the Monterey Peninsula. Outside their native range the trees grow straight and tall; only in their homeland, exposed to the fog and salt spray they evolved with, do they develop the windswept, tortured forms that inspired painters and photographers."},{"name":"Carmel Mission — Garden Cemetery","county":"Monterey","emoji":"⛪","lat":36.5414,"lon":-121.9197,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Carmel_Mission.jpg/320px-Carmel_Mission.jpg","fact":"The Carmel Mission cemetery contains over <em>2,000 Ohlone graves</em> — Native Californians who converted to Christianity and died under the mission system between 1771 and 1833, mostly from introduced European diseases. The cemetery's rough-hewn wooden crosses and abalone shell markers contrast with the elaborate stone monuments of the Spanish padres buried inside the mission church."},{"name":"Monterey Bay Coastal Recreation Trail","county":"Monterey","emoji":"🚴","lat":36.62,"lon":-121.89,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Cannery_row.JPG/320px-Cannery_row.JPG","fact":"The 18-mile Monterey Bay Coastal Recreation Trail follows the bay shoreline from Castroville through Monterey to Pacific Grove — passing the <em>aquarium, Cannery Row, Fisherman's Wharf, and the historic waterfront</em> in an unbroken recreational corridor. The trail's route includes segments of the former Del Monte narrow-gauge railroad that carried tourists to Pacific Grove in the 1880s."},{"name":"Toro County Park, Salinas","county":"Monterey","emoji":"🦁","lat":36.6061,"lon":-121.7553,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Artichoke_field_Castroville.jpg/320px-Artichoke_field_Castroville.jpg","fact":"Toro County Park sits at the edge of the Fort Ord wildlands, and its 4,756 acres contain remnants of the <em>Salinas Valley's original oak woodland</em> — a forest type almost completely converted to agriculture on the valley floor. The park's ridgeline trail offers one of the finest views of the Salinas Valley from above, with the valley's vineyard grid laid out like a green-and-gold quilt below."},{"name":"Punta de los Pinos — Pacific Grove","county":"Monterey","emoji":"🌲","lat":36.6342,"lon":-121.9336,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/PointPinosLighthouse.jpg/320px-PointPinosLighthouse.jpg","fact":"Point Pinos — <em>'Point of the Pines'</em> — was named by Gaspar de Portolá's expedition in 1769 for the Monterey pines growing to the water's edge, pines that have become the symbol of Pacific Grove. The natural reserve protecting the point's Monterey pine forest is one of only a handful of native Monterey pine stands remaining in the world."},{"name":"Moss Landing — Antique Row","county":"Monterey","emoji":"🏺","lat":36.8083,"lon":-121.7875,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Moss_Landing_Harbor.jpg/320px-Moss_Landing_Harbor.jpg","fact":"Moss Landing's cluster of antique warehouses developed in the <em>1960s and 1970s</em> when dealers discovered that the waterfront's former fishing supply buildings were perfect for storing and displaying large collections of vintage furniture and art. The antique district has been a destination for San Francisco and Monterey shoppers for 50 years, operating in buildings that still smell of diesel fuel and brine from their fishing industry days."},{"name":"Pacific Grove — Lover's Point","county":"Monterey","emoji":"🌊","lat":36.6269,"lon":-121.9239,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Pacific_Grove_Lovers_Point.jpg/320px-Pacific_Grove_Lovers_Point.jpg","fact":"Lover's Point was originally called <em>'Lovers of Jesus Point'</em> — a gathering place established by the Methodist summer camp that founded Pacific Grove in 1875 where revival meetings were held overlooking the bay. The Methodists created what they called 'a city for Christian people,' banning liquor sales, which continued until 1969 — the last town in California to lift Prohibition."},{"name":"Big Sur — Henry Miller Memorial Library","county":"Monterey","emoji":"📚","lat":36.2578,"lon":-121.7933,"cat":"Cultural Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Big_Sur_coastline.jpg/320px-Big_Sur_coastline.jpg","fact":"The Henry Miller Memorial Library in Big Sur is a <em>nonprofit arts center</em> in a house that was the home of Miller's friend Emil White — the library holds the most complete collection of Miller's books, paintings, and personal effects outside of New York. Miller lived in Big Sur for 18 years starting in 1944 and wrote 'Big Sur and the Oranges of Hieronymus Bosch' about the region."},{"name":"Carmel Valley Ranch Historic Site","county":"Monterey","emoji":"🌾","lat":36.485,"lon":-121.7619,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carmel_Village.jpg/320px-Carmel_Village.jpg","fact":"Carmel Valley's rancho history dates to <em>1834</em>, when Mission San Carlos Borroméo's land was secularized by the Mexican government and divided into ranchos. The valley's microclimate — ten degrees warmer than the foggy coast just 10 miles west — attracted dairy ranchers and later winemakers who recognized its exceptional growing conditions."},{"name":"Salinas — Agricultural Hall of Fame Site","county":"Monterey","emoji":"🌾","lat":36.6777,"lon":-121.6556,"cat":"Cultural Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/National_Steinbeck_Center.jpg/320px-National_Steinbeck_Center.jpg","fact":"Salinas is the administrative capital of California's <em>'Salad Bowl'</em> — the Salinas Valley that produces over $4 billion in annual agricultural revenue, more than any other county in the United States outside Fresno and Tulare. The city's National Steinbeck Center sits in a downtown whose loading docks and packing sheds tell the story of the farm labor struggles Steinbeck documented in his novels."},{"name":"Carmel — Forest Theater","county":"Monterey","emoji":"🎭","lat":36.5556,"lon":-121.9297,"cat":"Historic Theater","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carmel_Village.jpg/320px-Carmel_Village.jpg","fact":"The Carmel Forest Theater, established in <em>1910</em>, is the oldest continuously operating outdoor theater in California — its wooden stage and log-bench seating area carved from a natural pine forest hollow have hosted 115 seasons of drama, comedy, and music. The theater's opening production starred poet George Sterling and was attended by Jack London — the two literary giants of early California bohemia."},{"name":"Big Sur River Gorge","county":"Monterey","emoji":"🌊","lat":36.2639,"lon":-121.7892,"cat":"Natural Feature","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Big_Sur_coastline.jpg/320px-Big_Sur_coastline.jpg","fact":"The Big Sur River Gorge is accessible via a <em>3-mile trail through redwood forest</em> that ends at a series of swimming holes carved into granite bedrock by the river's force. The gorge is one of the few places in California where you can swim in crystal-clear mountain water surrounded by redwood trees while hearing ocean waves — the river and sea are less than a mile apart."},{"name":"Slates Hot Springs — Historic Esalen Site","county":"Monterey","emoji":"♨️","lat":36.1306,"lon":-121.6467,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Big_Sur_coastline.jpg/320px-Big_Sur_coastline.jpg","fact":"Esalen Institute, established in <em>1962</em> at the site of historic Slates Hot Springs, pioneered the human potential movement — the intellectual and therapeutic revolution that introduced meditation, encounter groups, and body therapy to American culture. The institute's cliffside hot springs, fed by a natural geothermal vent and hanging 100 feet above the Pacific, are available to overnight guests and on early-morning public access."},{"name":"Pacific Grove — Asilomar State Beach","county":"Monterey","emoji":"🌊","lat":36.6219,"lon":-121.9436,"cat":"State Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Asilomar_State_Beach.jpg/320px-Asilomar_State_Beach.jpg","fact":"Asilomar State Beach's combination of <em>white sand and Monterey cypress forest</em> — trees growing within 20 feet of the high tide line — creates one of the most distinctive beach environments in California. The beach's name, coined by YWCA founder Phoebe Apperson Hearst in 1913, combines the Spanish words for 'refuge' and 'sea.'"},{"name":"Garrapata Beach — Highway 1 Secret","county":"Monterey","emoji":"🏖","lat":36.4769,"lon":-121.9331,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Big_Sur_coastline.jpg/320px-Big_Sur_coastline.jpg","fact":"Garrapata Beach is reached through <em>unmarked gates along Highway 1</em> that have no signs pointing to the beach — a deliberate strategy that keeps it less visited than the famous named beaches north and south. The beach's isolation means on winter weekdays it's possible to have half a mile of dramatic Big Sur coastline entirely to oneself."},{"name":"Bixby Landing — Historic Kelp and Abalone Industry","county":"Monterey","emoji":"⚓","lat":36.3714,"lon":-121.9022,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Bixby_Creek_Bridge.jpg/320px-Bixby_Creek_Bridge.jpg","fact":"Bixby Landing, below the famous bridge, was a <em>kelp harvesting operation</em> from 1912 to 1918 — kelp was dried and processed into potassium fertilizer and acetone for explosives during World War I. The kelp was lowered by chute from the cliff top directly onto waiting boats — the same cliff where tourists now stop to photograph the bridge."},{"name":"Carmel Meadows Beach","county":"Monterey","emoji":"🏖","lat":36.515,"lon":-121.94,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carmel_Village.jpg/320px-Carmel_Village.jpg","fact":"Carmel Meadows is the <em>least-visited beach in Carmel</em> — a wide expanse of white sand at the southern end of Carmel Bay, separated from the main Carmel Beach by a small lagoon. The beach's dramatic backdrop of fog-shrouded Monterey pines and the distant Santa Lucia Range give it a quality that professional photographers call 'the light of the mind.'"},{"name":"Salinas River State Beach","county":"Monterey","emoji":"🌊","lat":36.7789,"lon":-121.8183,"cat":"State Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Monterey_Bay_Aquarium.jpg/320px-Monterey_Bay_Aquarium.jpg","fact":"The Salinas River mouth creates a <em>shifting bar and estuary</em> that changes shape with every significant storm — the river's discharge of freshwater creates a temperature and salinity gradient that attracts large concentrations of feeding seabirds. The beach's sand dunes, backed by agricultural fields, are home to the largest snowy plover nesting colony on Monterey Bay."},{"name":"Mission Trail Nature Preserve — Carmel","county":"Monterey","emoji":"🌲","lat":36.5503,"lon":-121.9283,"cat":"Nature Preserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Carmel_Mission.jpg/320px-Carmel_Mission.jpg","fact":"The Mission Trail Nature Preserve winds through <em>old-growth Monterey pine and coast live oak</em> forest just steps from Carmel's boutique-lined streets — a 35-acre wilderness in the middle of one of California's most expensive real estate markets. The forest's understory of flowering perennials and the sound of acorn woodpeckers hammering at storage holes give the preserve an atmosphere more like a nature sanctuary than a city park."},{"name":"Monterey Submarine Canyon Head","county":"Monterey","emoji":"🌊","lat":36.625,"lon":-121.91,"cat":"Geological","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Monterey_Bay_Aquarium.jpg/320px-Monterey_Bay_Aquarium.jpg","fact":"The head of the Monterey Submarine Canyon begins less than <em>100 yards from the beach at Moss Landing</em> — the canyon plunges immediately to 300 feet and reaches 12,740 feet deep at its mouth, making it one of the deepest ocean canyons in the Pacific. The canyon's nutrient-upwelling supports the extraordinary marine productivity of Monterey Bay, which led to its designation as the United States' largest National Marine Sanctuary."},{"name":"Castroville — Giant Artichoke Restaurant","county":"Monterey","emoji":"🥬","lat":36.7653,"lon":-121.7564,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Artichoke_field_Castroville.jpg/320px-Artichoke_field_Castroville.jpg","fact":"The Giant Artichoke Restaurant's <em>20-foot concrete artichoke sculpture</em> has been a Highway 1 roadside landmark since 1963 — one of the last surviving examples of the 'mimetic architecture' that made American roadside culture colorful before the interstate highway system eliminated it. The restaurant has served deep-fried artichoke hearts since the 1950s."},{"name":"Mission Nuestra Señora de la Soledad","county":"Monterey","emoji":"⛪","lat":36.4269,"lon":-121.3233,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Soledad_Mission.jpg/320px-Soledad_Mission.jpg","fact":"Mission Soledad, established in <em>1791</em> in a remote valley, suffered from extreme heat, flooding, and an epidemic that killed hundreds of Salinan people — earning it a reputation as the most unfortunate of the California missions. The governor of California died here in 1814, and the last padre abandoned the ruined mission in 1835, leaving it to slowly dissolve back into mud."},{"name":"Robles del Rio — Carmel Valley Ranch Historic Area","county":"Monterey","emoji":"🌿","lat":36.48,"lon":-121.74,"cat":"Historic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Carmel_Village.jpg/320px-Carmel_Village.jpg","fact":"Robles del Rio was a <em>health resort in the 1920s</em> built around the belief that Carmel Valley's warm, dry climate and artesian springs had curative properties. San Francisco socialites and literary figures came by train to convalesce, and the resort's social mix of wealth and bohemia gave early Carmel Valley its distinctive character that persists in the current wine resort culture."},{"name":"Point Sur State Historic Park — Lightstation","county":"Monterey","emoji":"🔦","lat":36.3061,"lon":-121.8994,"cat":"Historic Lighthouse","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Point_Sur_Lighthouse.jpg/320px-Point_Sur_Lighthouse.jpg","fact":"Point Sur Lightstation has been continuously staffed since <em>1889</em> — lighthouse keepers and later Coast Guard personnel lived on this isolated volcanic rock, accessible only by an unpaved road that floods in winter. The lightstation's fog signal was so powerful that sailors reported hearing it 20 miles offshore, and its activation during summer fog was the most reliable indicator that Monterey Bay was ahead."},{"name":"Loch Lomond Recreation Area, Ben Lomond","county":"Santa Cruz","emoji":"💧","lat":37.0939,"lon":-122.0636,"cat":"Recreation Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"Loch Lomond Reservoir, created in <em>1961</em> to supply water to the City of Santa Cruz, is open for fishing, boating, and hiking for just seven months of the year — an unusual arrangement that allows the undisturbed hillsides to provide cleaner water to the city's treatment plant. The reservoir's rainbow trout, stocked by the city each spring, attract anglers from across the Bay Area to one of the most scenic fishing venues in the Santa Cruz Mountains."},{"name":"Santa Cruz — West Cliff Drive","county":"Santa Cruz","emoji":"🌊","lat":36.95,"lon":-122.0319,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Natural_Bridges_State_Beach.jpg/320px-Natural_Bridges_State_Beach.jpg","fact":"West Cliff Drive follows the <em>sea cliff edge</em> for three miles from the boardwalk to Natural Bridges — a continuous spectacle of breaking waves, sea stacks, and surfers in the water below. The drive's sidewalk, transformed into a promenade by the conversion of the roadway to one-way traffic, is the most popular walking and cycling route in Santa Cruz County."},{"name":"Santa Cruz Wharf","county":"Santa Cruz","emoji":"🎣","lat":36.9614,"lon":-122.0186,"cat":"Historic Wharf","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"The Santa Cruz Wharf, built in <em>1914</em> and stretching 2,745 feet into Monterey Bay, is the longest pier open to vehicles on the West Coast. The wharf's commercial fishing operations began the same year it opened and continue to this day, with the daily catch — Dungeness crab, rockfish, and salmon — sold directly off the boats to walk-up customers."},{"name":"Neary Lagoon, Santa Cruz","county":"Santa Cruz","emoji":"🦩","lat":36.9619,"lon":-122.0378,"cat":"Wildlife Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Neary Lagoon is a <em>3-acre freshwater wetland</em> in the middle of downtown Santa Cruz — surrounded by houses and restaurants, yet supporting breeding populations of great blue herons, black-crowned night herons, and pied-billed grebes that have nested here for generations. The lagoon's survival amid urban development makes it one of the most valuable small wetlands in the county."},{"name":"Lighthouse Field State Beach","county":"Santa Cruz","emoji":"🏄","lat":36.9531,"lon":-122.025,"cat":"State Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Lighthouse Field is home to Steamer Lane — the <em>most famous surf break in Northern California</em>, where the Monterey Bay's prevailing swell wraps around the point and creates a powerful right-hand wave that has been surfed since the 1930s. The annual O'Neill Cold Water Classic surf competition at Steamer Lane has been running since 1959, making it one of the oldest professional surf contests in the world."},{"name":"Twin Lakes State Beach","county":"Santa Cruz","emoji":"🏖","lat":36.9683,"lon":-121.9958,"cat":"State Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Twin Lakes State Beach sits at the mouth of Schwan Lagoon — a <em>freshwater lagoon separated from the ocean</em> by a narrow beach that is breached by winter storms, flooding the lagoon with salt water and resetting its ecology. The beach's sheltered east-facing orientation makes it the warmest and calmest beach in Santa Cruz — the first choice for families and swimmers who find the west-facing beaches too cold and exposed."},{"name":"Seabright Beach, Santa Cruz","county":"Santa Cruz","emoji":"🏖","lat":36.9711,"lon":-121.995,"cat":"State Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Seabright Beach, at the mouth of the San Lorenzo River, was the center of the <em>19th-century Santa Cruz pleasure resort industry</em> — hotels, bathhouses, and a casino occupied the blufftop from the 1860s through the 1930s. The beach's boardwalk connection made it the summer destination for San Franciscans who came by ferry and train to escape the city's fog."},{"name":"Santa Cruz Harbor","county":"Santa Cruz","emoji":"⛵","lat":36.9619,"lon":-121.99,"cat":"Harbor","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Santa Cruz Harbor, dredged and jetted in <em>1964</em>, was the first new harbor built on the open California coast in the 20th century — a major public works project that transformed the city's relationship with the ocean from historical to recreational. The harbor is home to one of the most diverse recreational boating fleets in Central California, from outrigger canoe clubs to ocean racing yachts."},{"name":"Opal Cliffs — Famous Surf Break","county":"Santa Cruz","emoji":"🏄","lat":36.9703,"lon":-121.9767,"cat":"Surf Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Opal Cliffs and the adjacent Pleasure Point neighborhood is the heart of <em>Santa Cruz surf culture</em> — a community of longboard surfers, shapers, and surf shop owners whose devotion to the sport has made this stretch of coast the spiritual home of California surfing. Jack O'Neill, who invented the modern wetsuit in a Santa Cruz garage in 1952, lived at Pleasure Point for 50 years."},{"name":"Aptos Seascape — Aptos Creek Redwood Grove","county":"Santa Cruz","emoji":"🌲","lat":36.98,"lon":-121.88,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"The Aptos Creek redwood grove above Seascape contains <em>second-growth trees over 200 feet tall</em> that regenerated after clear-cut logging in the 1880s — now so large they're indistinguishable from old-growth to casual observers. The grove's canyon microclimate is 15 degrees cooler than the adjacent sunny hillsides, creating a natural air conditioning effect enjoyed by the creek trail's summer hikers."},{"name":"The Farm — Santa Cruz Agricultural History","county":"Santa Cruz","emoji":"🍓","lat":36.97,"lon":-121.76,"cat":"Historic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Capitola_California.jpg/320px-Capitola_California.jpg","fact":"The Pajaro Valley between Santa Cruz and Watsonville has grown <em>strawberries continuously since 1906</em>, when Japanese-American farmers introduced intensive cultivation techniques that transformed the valley into California's first major strawberry district. The valley's combination of sandy loam soil, cool coastal climate, and access to irrigation water creates conditions that produce sweeter, firmer strawberries than any other California growing region."},{"name":"Ocean Street Extension — San Lorenzo River Path","county":"Santa Cruz","emoji":"🌊","lat":36.974,"lon":-122.0178,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"The San Lorenzo River flows through downtown Santa Cruz in a <em>flood control channel that doubles as a wildlife corridor</em> — otters, harbor seals, and sea lions follow the river inland from the bay to the swimming hole at Henry Cowell State Park. The river trail through downtown connects the ocean to the redwood forest in a continuous green thread through the urban landscape."},{"name":"Santa Cruz Mountains — Skyland Ridge","county":"Santa Cruz","emoji":"🌄","lat":37.12,"lon":-122.18,"cat":"Scenic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"The Skyland ridge at the crest of the Santa Cruz Mountains offers views in two directions simultaneously — the <em>Pacific Ocean to the west and Silicon Valley to the east</em>, two worlds that couldn't be more different separated by a single ridgeline. On foggy summer days the valley below is invisible, buried in marine layer, while the ridge basks in sunshine."},{"name":"New Brighton Beach — Campfire Circle","county":"Santa Cruz","emoji":"🏕","lat":36.97,"lon":-121.9325,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Capitola_California.jpg/320px-Capitola_California.jpg","fact":"New Brighton State Beach was the site of the <em>first public campground in Santa Cruz County</em>, established in 1933 when California launched its state beach system. The campground's coastal terrace bluff, with campfires visible from offshore on summer evenings, is one of the most beloved camping experiences in the Bay Area — sites book out within minutes of reservations opening months in advance."},{"name":"Capitola Fishing Wharf","county":"Santa Cruz","emoji":"🎣","lat":36.9769,"lon":-121.953,"cat":"Historic Wharf","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Capitola_California.jpg/320px-Capitola_California.jpg","fact":"Capitola's fishing wharf, rebuilt many times after storm damage, is the <em>oldest continuously used recreational fishing pier</em> in Santa Cruz County. The wharf's bait shop, operating since 1946, is a local institution where regulars stop for coffee, tide charts, and fishing reports delivered in the unhurried style of a vanishing California fishing culture."},{"name":"Scotts Valley — San Lorenzo Valley History","county":"Santa Cruz","emoji":"🌲","lat":37.0508,"lon":-122.017,"cat":"Historic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"Scotts Valley sits at the base of the Santa Cruz Mountains in a small valley that was an <em>important stagecoach stop</em> on the route between Santa Cruz and San Jose from the 1850s through the 1890s. The valley's spring-fed creek, lined with sycamores planted by the original settlers, provided water for the relay station where fresh horses were exchanged."},{"name":"Soquel Village — Historic Commercial District","county":"Santa Cruz","emoji":"🏘","lat":36.9925,"lon":-121.9567,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Capitola_California.jpg/320px-Capitola_California.jpg","fact":"Soquel Village was the <em>commercial center of Santa Cruz County</em> in the 1850s, when the Soquel Land Company platted a town at the intersection of Creek and Porter Streets that they expected to become the county seat. The town lost the county seat to Santa Cruz in 1850 and slowly declined to a village, but its Victorian commercial district and Congregational church from 1867 still anchor the community."},{"name":"DeLaveaga Park, Santa Cruz","county":"Santa Cruz","emoji":"🌳","lat":37.0092,"lon":-122.0108,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/UCSC_campus_aerial.jpg/320px-UCSC_campus_aerial.jpg","fact":"DeLaveaga Park, occupying 510 acres of wooded hillside above Santa Cruz, was donated to the city in <em>1925</em> by Jose Vicente de Laveaga on the condition it remain a park forever. The park's disc golf course, established in 1974 as one of the first in California, now draws professional players from around the world to what is considered the finest wooded disc golf course on the West Coast."},{"name":"Harvey West Park — Historic Steam Laundry Site","county":"Santa Cruz","emoji":"🏊","lat":36.9864,"lon":-122.0481,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Harvey West Park sits on the site of a <em>19th-century steam laundry</em> that used the abundant local wood fuel and water to process linens for Santa Cruz hotels and boarding houses. The park's public pool, built in 1932 by a Works Progress Administration crew, is the oldest municipal swimming pool in continuous operation in Santa Cruz County."},{"name":"Wilder Ranch — Old Cove Landing Trail","county":"Santa Cruz","emoji":"🌊","lat":36.9875,"lon":-122.0928,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Wilder_Ranch_State_Park.jpg/320px-Wilder_Ranch_State_Park.jpg","fact":"Old Cove Landing, on Wilder Ranch's north boundary, was a <em>coastal delivery point</em> in the 1870s-1890s where small steamships would anchor offshore and row supplies to the beach — a method used before coastal roads made overland delivery practical. The landing's rocky cove, unchanged from the ranching era, now serves as a seal haul-out visible from the trail above."},{"name":"Santa Cruz — Pogonip Lime Kilns","county":"Santa Cruz","emoji":"🔥","lat":37.0011,"lon":-122.0528,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"The <em>Pogonip Lime Kiln ruins</em> are the most intact industrial ruins in the Santa Cruz Mountains — massive stone furnaces where limestone was burned with redwood fuel to produce quicklime for mortar and plaster from 1870 to 1906. The kilns were abandoned after the 1906 earthquake destroyed the San Francisco buildings they had been supplying for 30 years."},{"name":"Ohlone Bluff Trail — Wilder Ranch","county":"Santa Cruz","emoji":"🌊","lat":36.9972,"lon":-122.1028,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Wilder_Ranch_State_Park.jpg/320px-Wilder_Ranch_State_Park.jpg","fact":"The Ohlone Bluff Trail follows the <em>edge of a marine terrace</em> — a flat platform of ancient sea floor — above the crashing Pacific from Wilder Ranch toward Año Nuevo. The trail passes several sea caves whose roofs have partially collapsed, creating windows looking straight down to the ocean 40 feet below — a geological feature in active progress as wave erosion continues."},{"name":"Fall Creek — Henry Cowell Historic Lime Works","county":"Santa Cruz","emoji":"🌲","lat":37.0722,"lon":-122.0783,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"The Fall Creek lime kiln complex operated from <em>1872 to 1919</em>, producing 15 million barrels of quicklime used in building Victorian San Francisco. The ruins — three kilns, a barn, and a lime shed — are preserved in the forest that grew back after the industry closed, creating an atmospheric industrial archaeology site discovered by hikers. The ruins are listed on the National Register of Historic Places."},{"name":"Lighthouse Field — Pacific Migrations Viewpoint","county":"Santa Cruz","emoji":"🌊","lat":36.9525,"lon":-122.0261,"cat":"Wildlife Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"The cliff at Lighthouse Field is the <em>best whale-watching point on the Monterey Bay</em> from shore — gray whales pass within a quarter mile of this point during their southward migration in December-January and northward return in March-April. Experienced whale watchers also look for humpback whales in summer, when krill concentrations in the bay attract these 45-ton visitors from their breeding grounds in Mexico."},{"name":"Sunset Beach — Pajaro River Mouth","county":"Santa Cruz","emoji":"🏖","lat":36.8375,"lon":-121.8039,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Capitola_California.jpg/320px-Capitola_California.jpg","fact":"The Pajaro River mouth at Sunset Beach creates a <em>seasonal lagoon</em> that is one of the most important shorebird habitats on the Monterey Bay coast — the temporary wetland concentrates thousands of migrating shorebirds during spring and fall. The beach beyond the lagoon is one of the few undeveloped stretches of coast on the north end of Monterey Bay."},{"name":"Santa Cruz — Boardwalk Historic Casino Site","county":"Santa Cruz","emoji":"🎰","lat":36.9636,"lon":-122.0183,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"The Cocoanut Grove ballroom at the Santa Cruz Boardwalk opened in <em>1907</em> as one of the largest ballrooms on the West Coast — a 5,000-person dance hall that hosted Tommy Dorsey, Benny Goodman, and other big band stars on their California tours. The ballroom still operates for concerts and events, and its Spanish Colonial Revival architecture is considered one of the finest examples of the style in Northern California."},{"name":"Felton — Mountain Charlie Road Historic Route","county":"Santa Cruz","emoji":"🛤","lat":37.0575,"lon":-122.0483,"cat":"Historic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"Mountain Charlie Road follows the original pack trail blazed by <em>Charles McKiernan</em> — 'Mountain Charlie' — in 1850, the first improved route connecting Santa Cruz to the Silicon Valley before Summit Road was built. McKiernan was famous for surviving a grizzly bear attack that crushed his skull, wearing a silver plate in his head for the rest of his long life."},{"name":"Bonny Doon Beach — Hidden Cove","county":"Santa Cruz","emoji":"🏖","lat":37.0481,"lon":-122.1881,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Natural_Bridges_State_Beach.jpg/320px-Natural_Bridges_State_Beach.jpg","fact":"Bonny Doon Beach is reached by a <em>steep path through sandstone cliffs</em> — the half-mile scramble discourages casual visitors, making it one of the most uncrowded beaches on the Santa Cruz County coast despite being just off Highway 1. The beach's black-and-white pebble mix — dark serpentine from the mountains mixed with white quartz from the coastal terraces — creates a distinctive appearance unlike any other local beach."},{"name":"University of California Natural Reserve — Landels Hill","county":"Santa Cruz","emoji":"🌿","lat":36.89,"lon":-121.87,"cat":"Research Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Big_Sur_coastline.jpg/320px-Big_Sur_coastline.jpg","fact":"Landels-Hill Big Creek Reserve protects a <em>mile of undeveloped Big Sur coastline</em> and 3,800 acres of watershed that has been used for ecological research by UC scientists since 1972. The reserve's isolation from human disturbance makes it the baseline against which scientists measure the ecological impact of development on the surrounding coast."},{"name":"Pajaro Valley Historical Museum, Watsonville","county":"Santa Cruz","emoji":"🏛","lat":36.9102,"lon":-121.7567,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Capitola_California.jpg/320px-Capitola_California.jpg","fact":"The Pajaro Valley Historical Museum documents the history of the valley's <em>extraordinary agricultural transformation</em> — from Ohlone homeland to Spanish mission farmland to American homesteads to Japanese-American berry farms to corporate agribusiness, all within 200 years. The museum's collection of farming implements, photographs, and oral histories captures a way of life that has fundamentally changed within living memory."},{"name":"Santa Cruz Farmers Market — Downtown","county":"Santa Cruz","emoji":"🥦","lat":36.9741,"lon":-122.0297,"cat":"Market","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Santa Cruz's Wednesday downtown farmers market has been running <em>continuously since 1975</em> — one of the founding markets of the California farmers market movement that transformed American food culture. The market's combination of organic produce, street food, and live music has made it as much a social gathering as a shopping experience, and on summer Wednesdays the downtown streets fill with a crowd that reflects the full diversity of Santa Cruz County."},{"name":"Pogonip Historic Structures — Arana Gulch","county":"Santa Cruz","emoji":"🌿","lat":36.9994,"lon":-122.0411,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"Arana Gulch, on the edge of the Pogonip Open Space, was once a <em>productive truck garden</em> — small-scale market farming that supplied Santa Cruz restaurants and households with fresh vegetables from the 1870s through the 1960s. The gulch's rich alluvial soil and sheltered position produced year-round crops that made it one of the most productive small farms in the county."},{"name":"Santa Cruz — Pacific Avenue Historic Commercial District","county":"Santa Cruz","emoji":"🏘","lat":36.9741,"lon":-122.03,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"Pacific Avenue was completely rebuilt after the <em>1989 Loma Prieta earthquake</em> destroyed most of its Victorian commercial buildings — the reconstruction, a deliberate mix of new design and historic preservation, created what urban planners consider the finest small-city pedestrian commercial street built in California in the 20th century. The street's mix of independent shops, restaurants, and public art has become a model for downtown revitalization projects nationwide."},{"name":"Natural Bridges — Tidepools and Marine Terrace","county":"Santa Cruz","emoji":"🦀","lat":36.9519,"lon":-122.0583,"cat":"Natural Feature","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Natural_Bridges_State_Beach.jpg/320px-Natural_Bridges_State_Beach.jpg","fact":"The marine terrace at Natural Bridges State Beach exposes <em>5 million years of geological history</em> — sedimentary layers deposited on the ancient sea floor when sea levels were higher are now lifted to 10-15 feet above the ocean. The terrace's flat surface, carved by waves over millennia, is the same platform found at beaches throughout the Monterey Bay and is a defining feature of the Central California coastal landscape."},{"name":"Pasatiempo Golf Club — Historic Course","county":"Santa Cruz","emoji":"⛳","lat":37.0044,"lon":-122.0478,"cat":"Historic Course","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/UCSC_campus_aerial.jpg/320px-UCSC_campus_aerial.jpg","fact":"Pasatiempo Golf Club, designed by Alister MacKenzie in <em>1929</em> — the same architect who designed Augusta National — is consistently rated among the top 50 golf courses in the world. MacKenzie considered Pasatiempo his finest design, and the club's canyon holes, where balls disappear into redwood-filled ravines and reappear on greens carved from the hillside, reward only the most precise shots."},{"name":"Felton Grove — Historic Summer Cabins","county":"Santa Cruz","emoji":"🌲","lat":37.0572,"lon":-122.0731,"cat":"Historic Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Henry_Cowell_Redwoods.jpg/320px-Henry_Cowell_Redwoods.jpg","fact":"Felton Grove preserves the <em>oldest surviving vacation cabin community</em> in the Santa Cruz Mountains — wooden summer cottages built in the 1880s and 1890s by San Francisco families who came by train. The community's dense canopy of redwoods and maples creates a perpetually shaded village atmosphere unlike any other residential neighborhood in the county."},{"name":"Capitola — Monterey Bay Views from Capitola Bluff","county":"Santa Cruz","emoji":"🌊","lat":36.9769,"lon":-121.9517,"cat":"Viewpoint","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Capitola_California.jpg/320px-Capitola_California.jpg","fact":"The <em>clifftop view from Capitola's bluffs</em> extends the full arc of Monterey Bay — from Santa Cruz's lighthouse in the north to Point Pinos in the south, a 30-mile sweep of one of the most biologically productive bays in the world. Sitting on the bluff at sunset, the Monterey Peninsula's mountains are visible as a dark silhouette against the fading sky."},{"name":"Opal Creek — Pleasure Point Neighborhood","county":"Santa Cruz","emoji":"🏄","lat":36.9606,"lon":-121.975,"cat":"Historic Neighborhood","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Santa_Cruz_Beach_Boardwalk.jpg/320px-Santa_Cruz_Beach_Boardwalk.jpg","fact":"The Pleasure Point neighborhood east of Santa Cruz is the birthplace of <em>California surf culture</em> — the intersection of 41st Avenue and East Cliff Drive has been a surf gathering point since the 1930s, when the first Santa Cruz surfers began riding waves here on redwood boards. The neighborhood's mix of surf shops, rental boards, and impromptu post-surf gatherings in driveways preserves a way of life unchanged in spirit since surfing arrived."},{"name":"San Luis Obispo County Historical Museum","county":"San Luis Obispo","emoji":"🏛","lat":35.2828,"lon":-120.6597,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"San Luis Obispo's Carnegie Library, built in <em>1905</em>, houses the county's historical museum in a Neoclassical building that survived California's repeated earthquakes because its stone walls were reinforced with hidden iron rods — a prescient detail by its architect. The museum's collection includes Chumash artifacts, rancho-era tools, and oil industry equipment from every chapter of the county's diverse history."},{"name":"Edna Valley — Biddle Regional Park","county":"San Luis Obispo","emoji":"🌾","lat":35.23,"lon":-120.61,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Paso_Robles_wine_country.jpg/320px-Paso_Robles_wine_country.jpg","fact":"Biddle Regional Park sits on the edge of the <em>Edna Valley wine appellation</em>, where the transition from city to vineyard is immediate — grapevines begin at the park boundary. The park's grassland ridges offer the finest view of the Edna Valley wine country from above, with rows of vines visible stretching from the foothills to the coast."},{"name":"Islay Hill Open Space","county":"San Luis Obispo","emoji":"🌿","lat":35.2742,"lon":-120.6253,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"Islay Hill is one of the '<em>Nine Sisters</em>' — the chain of volcanic plugs that march from San Luis Obispo to Morro Bay — and its 775-foot summit is accessible by a short but steep trail from the city's edge. The hill's serpentine rock supports rare plants found nowhere else in San Luis Obispo County, and the view from the summit takes in the entire city bowl below."},{"name":"Bishop Peak — San Luis Obispo","county":"San Luis Obispo","emoji":"🏔","lat":35.3011,"lon":-120.6831,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"Bishop Peak, at 1,546 feet the highest of the Nine Sisters volcanic chain, is the <em>most popular hiking destination</em> in San Luis Obispo — thousands of people climb its rocky summit each weekend for the panoramic view of the city, the bay, and the surrounding valley. The peak's volcanic rock is so hard that it protruded above the advancing glaciers of the last Ice Age while surrounding sediments were ground to powder."},{"name":"Cerro San Luis Obispo","county":"San Luis Obispo","emoji":"🏔","lat":35.2681,"lon":-120.6714,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"Cerro San Luis — '<em>M</em>' Mountain to locals — has had a whitewashed letter 'M' on its face since <em>1906</em>, when Poly Royal students first painted it as a school spirit gesture. The mountain's rocky summit offers a 360-degree view that includes all five of the nearest Nine Sisters volcanic plugs — a panorama that explains why the Chumash considered the area sacred."},{"name":"Irish Hills Natural Reserve","county":"San Luis Obispo","emoji":"🌿","lat":35.2458,"lon":-120.7278,"cat":"Natural Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"The Irish Hills separate the city of San Luis Obispo from Avila Beach, and their <em>4,000 protected acres</em> provide the city with a natural wall against coastal development that residents have fought to preserve since the 1960s. The hills' serpentine grassland in spring is covered with rare wildflowers that bloom for just three weeks before the summer drought arrives."},{"name":"Shell Beach — North of Pismo","county":"San Luis Obispo","emoji":"🌊","lat":35.1683,"lon":-120.6714,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Pismo_Beach_California.jpg/320px-Pismo_Beach_California.jpg","fact":"Shell Beach's <em>rocky intertidal platform</em> — exposed at low tide — is one of the richest tide pool environments on the Central Coast, with ochre sea stars, purple sea urchins, and bat stars visible in nearly every pool. The beach's name reflects the abundance of shells that historically washed onto this shore from the productive shellfish beds offshore."},{"name":"Grover Beach — Oceano Lagoon","county":"San Luis Obispo","emoji":"🦩","lat":35.105,"lon":-120.6297,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Oceano_Dunes_SVRA.jpg/320px-Oceano_Dunes_SVRA.jpg","fact":"Oceano Lagoon is a <em>remnant coastal wetland</em> — one of the last tidal wetlands on the San Luis Obispo coast not converted to development or agriculture. The lagoon's cattail marsh and open water support nesting great blue herons, egrets, and a pair of black-crowned night herons that have occupied the same cottonwood tree for over 20 years."},{"name":"Price Canyon — Oil Country Drive","county":"San Luis Obispo","emoji":"⛽","lat":35.18,"lon":-120.59,"cat":"Historic Route","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Avila_Beach_California.jpg/320px-Avila_Beach_California.jpg","fact":"Price Canyon contains the most accessible <em>active oil field</em> in San Luis Obispo County — small pump jacks working the shallow Price Canyon formation that has been producing crude oil since 1904. The canyon's mix of working oil wells, cattle ranches, and coastal sage scrub creates a uniquely California landscape where the petroleum industry and agriculture have coexisted for over a century."},{"name":"Los Osos Valley — Elfin Forest","county":"San Luis Obispo","emoji":"🌳","lat":35.3,"lon":-120.87,"cat":"Natural Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Morro_Rock_California.jpg/320px-Morro_Rock_California.jpg","fact":"The Elfin Forest Preserve in Los Osos protects a <em>200-year-old Morro manzanita woodland</em> — ancient shrubs that have grown into a gnarled, waist-high forest accessible only on a boardwalk to prevent trampling. The manzanitas are the oldest known living shrubs in California, their age estimated from growth rings in cores taken from trunk bases."},{"name":"Morro Rock State Preserve","county":"San Luis Obispo","emoji":"🪨","lat":35.3658,"lon":-120.8639,"cat":"State Preserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Morro_Rock_California.jpg/320px-Morro_Rock_California.jpg","fact":"Morro Rock has been a <em>peregrine falcon nesting site</em> continuously since at least the 1970s, when peregrine populations were recovering from DDT-induced population collapse. The 576-foot volcanic monolith is closed to climbing specifically to protect the nest — falcons have successfully raised young on the same rock ledge for over 40 consecutive years."},{"name":"Atascadero Lake Park","county":"San Luis Obispo","emoji":"💧","lat":35.4894,"lon":-120.6764,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"Atascadero Lake was created in <em>1916</em> as part of E.G. Lewis's utopian city plan — a centerpiece park designed to give the planned community the civic amenity of a natural water feature. The lake's historic boathouse, built in 1918, is one of the finest surviving examples of the Craftsman architectural style in the Central Coast region."},{"name":"Paso Robles City Park — El Paso de Robles","county":"San Luis Obispo","emoji":"🌳","lat":35.6266,"lon":-120.6919,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Paso_Robles_wine_country.jpg/320px-Paso_Robles_wine_country.jpg","fact":"Paso Robles' city park was laid out around the <em>naturally hot mineral springs</em> that gave the city its original character as a health resort in the 1860s-1880s. The hot springs, which reach 100 degrees Fahrenheit, were believed to cure rheumatism, and the Hotel El Paso de Robles — built in 1891 and still operating — was the Western hotel most frequently recommended by East Coast physicians to their ailing patients."},{"name":"San Simeon Creek Road — Historic Ranch Country","county":"San Luis Obispo","emoji":"🌾","lat":35.65,"lon":-121.18,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Hearst_Castle_-_main_building.jpg/320px-Hearst_Castle_-_main_building.jpg","fact":"San Simeon Creek Road follows the <em>western edge of the Hearst Ranch</em> — 82,000 acres that William Randolph Hearst's family still owns and manages as a working cattle operation. Zebras from Hearst's former private zoo still roam the ranch, and their descendants can sometimes be seen from the road — California zebras that are as much a part of the landscape as the native mule deer."},{"name":"Templeton Community Park — Historic Depot","county":"San Luis Obispo","emoji":"🚂","lat":35.5494,"lon":-120.7067,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Paso_Robles_wine_country.jpg/320px-Paso_Robles_wine_country.jpg","fact":"Templeton's original <em>1886 railroad depot</em> still stands at the edge of the community park — a simple Victorian wood-frame building that was the commercial lifeline of the Salinas Valley agricultural community for 80 years. The depot was the shipping point for cattle, grain, and wine from the surrounding ranches, connecting this remote valley to San Francisco's markets."},{"name":"Shandon — Carrizo Plain Gateway Town","county":"San Luis Obispo","emoji":"🌾","lat":35.6525,"lon":-120.3708,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Carrizo_Plain_wildflowers.jpg/320px-Carrizo_Plain_wildflowers.jpg","fact":"Shandon sits at the eastern edge of San Luis Obispo County — the <em>last town before the Carrizo Plain</em> and the beginning of the most remote landscape in the county. The town's grain elevator, painted white and visible for miles across the flat valley, has been loading wheat and barley onto trucks since 1910 and is one of the last operating country grain elevators in the Central Coast."},{"name":"Whale Rock Reservoir Trail","county":"San Luis Obispo","emoji":"💧","lat":35.4258,"lon":-120.8981,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Morro_Rock_California.jpg/320px-Morro_Rock_California.jpg","fact":"The hiking trail around Whale Rock Reservoir offers <em>views of Morro Bay, Morro Rock, and the Pacific</em> from an elevation of 400 feet — a panorama that includes every major landmark of the North San Luis Obispo coast. The reservoir's dam, a curved concrete structure visible from the trail, is considered one of the finest examples of 1950s civil engineering in the county."},{"name":"Elfin Forest Boardwalk, Baywood","county":"San Luis Obispo","emoji":"🌿","lat":35.3036,"lon":-120.8597,"cat":"Nature Walk","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Morro_Rock_California.jpg/320px-Morro_Rock_California.jpg","fact":"The Elfin Forest boardwalk winds through a <em>pygmy coast live oak woodland</em> where mature trees are only 3-4 feet tall — the result of growing in nutrient-poor, salty, wind-blasted conditions that severely limit growth. The boardwalk's half-mile loop offers views of Morro Bay estuary and the open Pacific through oak branches gnarled into shapes that seem to belong to a fairy tale."},{"name":"Montana de Oro — Hazard Canyon Reef","county":"San Luis Obispo","emoji":"🌊","lat":35.3,"lon":-120.89,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Montana_de_Oro.jpg/320px-Montana_de_Oro.jpg","fact":"Hazard Canyon Reef at Montana de Oro is one of the most dramatic <em>surfing spots on the Central Coast</em> — a right-hand point break over shallow volcanic reef that produces powerful, fast waves in the 2-8 foot range on the right swell. The break was 'discovered' by Santa Cruz surfers in the 1960s and remains a destination for experienced surfers who prefer the remoteness of the Central Coast to Santa Cruz's crowded lineup."},{"name":"Oceano Memorial Airport — Historic Grass Strip","county":"San Luis Obispo","emoji":"✈️","lat":35.0964,"lon":-120.6208,"cat":"Airport","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Oceano_Dunes_SVRA.jpg/320px-Oceano_Dunes_SVRA.jpg","fact":"Oceano Airport, operating since <em>1926</em>, is one of the oldest continuously operating public airports in California — a grass strip that has served crop dusters, banner planes, and private pilots for nearly 100 years. The airport's proximity to the Oceano dunes means pilots must time their approaches to avoid collision with hang gliders and paramotors launching from the adjacent dunes."},{"name":"Halcyon — Temple of the People Historic Site","county":"San Luis Obispo","emoji":"🔯","lat":35.0919,"lon":-120.5836,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Pismo_Beach_California.jpg/320px-Pismo_Beach_California.jpg","fact":"Halcyon is a <em>theosophical community</em> established in 1903 around the Temple of the People — a spiritual organization whose blue temple still stands in the middle of a residential neighborhood. The community attracted artists, musicians, and intellectuals in the early 20th century and published a journal that was read worldwide, making this tiny Arroyo Grande valley community briefly famous in metaphysical circles."},{"name":"Lopez Canyon — Lopez Dam","county":"San Luis Obispo","emoji":"💧","lat":35.2008,"lon":-120.5014,"cat":"Dam","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Pismo_Beach_California.jpg/320px-Pismo_Beach_California.jpg","fact":"Lopez Dam, completed in <em>1969</em> as the county's primary flood control reservoir, impounds Arroyo Grande Creek — the most significant salmon stream on the San Luis Obispo coast. The dam's fish ladder, added in 2001, allows steelhead trout to reach spawning gravel upstream that had been inaccessible for 32 years."},{"name":"Cambria — Pine Forest East-West Road","county":"San Luis Obispo","emoji":"🌲","lat":35.5622,"lon":-121.0917,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Moonstone_Beach_Cambria.jpg/320px-Moonstone_Beach_Cambria.jpg","fact":"The roads through Cambria's pine forest pass under <em>Monterey pine canopy</em> so dense that midday light filters in as scattered patches — one of the most distinctive driving experiences on the California coast. The pines, native only to this area and two other spots on the Monterey Peninsula, represent the last wild stand of a tree species now found in gardens worldwide."},{"name":"Santa Margarita — Historic Ranch and Pass","county":"San Luis Obispo","emoji":"🐄","lat":35.3933,"lon":-120.6022,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"Santa Margarita was the last stop on El Camino Real before the difficult climb over the Santa Lucia Range — Spanish travelers and American settlers alike stopped here to rest and provision before attempting the <em>Cuesta Grade</em>. The town's 1870s hotel and general store, now private residences, were the commercial heart of the ranching country that surrounded them."},{"name":"Rinconada Mine — Talc and Silica Operations","county":"San Luis Obispo","emoji":"⛏","lat":35.48,"lon":-120.39,"cat":"Historic Mine","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Carrizo_Plain_wildflowers.jpg/320px-Carrizo_Plain_wildflowers.jpg","fact":"The Rinconada Mine in the La Panza Range has produced <em>talc and silica</em> commercially since 1875 — one of the longest continuously operating mines in California. The area's unusual geology includes soapstone outcrops that were quarried by the Chumash for hundreds of years before the commercial mine was established."},{"name":"San Luis Obispo Bay — Port San Luis to Avila","county":"San Luis Obispo","emoji":"🌊","lat":35.175,"lon":-120.74,"cat":"Bay","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Avila_Beach_California.jpg/320px-Avila_Beach_California.jpg","fact":"San Luis Obispo Bay provides the only <em>naturally sheltered anchorage</em> between Monterey and Santa Barbara — a 60-mile stretch of open coast where ships were dangerously exposed to all weather. The bay's limited protection made it the most important harbor on this stretch of coast despite being open to the south, and a dozen historic port towns competed for its commercial traffic."},{"name":"Waller Park, Santa Maria","county":"San Luis Obispo","emoji":"🌳","lat":34.9336,"lon":-120.4447,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Oceano_Dunes_SVRA.jpg/320px-Oceano_Dunes_SVRA.jpg","fact":"Waller Park's 153 acres in the Santa Maria Valley were donated to the county in <em>1930</em> by Lucius Waller, a rancher who wanted his neighbors to have a park as beautiful as those he had seen in San Francisco. The park's 50-year-old rose garden contains heritage varieties that were standard garden roses in California homes before hybridization replaced them with modern varieties."},{"name":"Nipomo Mesa — Historic Agricultural Area","county":"San Luis Obispo","emoji":"🌾","lat":35.04,"lon":-120.51,"cat":"Agricultural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Oceano_Dunes_SVRA.jpg/320px-Oceano_Dunes_SVRA.jpg","fact":"The Nipomo Mesa's <em>distinctive Manzana soil</em> — a deep, well-drained loam formed from ancient sand dunes — produces some of the finest wine grapes and strawberries in California, combining excellent drainage with moisture retention. The mesa's flatness and soil quality attracted Dorothea Lange in 1936, who photographed the migrant pea-pickers here in the image that became 'Migrant Mother,' the most reproduced photograph of the 20th century."},{"name":"Arroyo Grande Creek — Steelhead Run","county":"San Luis Obispo","emoji":"🐟","lat":35.12,"lon":-120.58,"cat":"Natural Feature","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Pismo_Beach_California.jpg/320px-Pismo_Beach_California.jpg","fact":"Arroyo Grande Creek supports the <em>last significant wild steelhead trout run</em> on the San Luis Obispo coast — a population of fish that returns from the Pacific each winter to spawn in the same gravel beds where they were born. The creek's steelhead have adapted to exceptionally warm and dry conditions that would kill fish from colder coastal streams, making them genetically unique."},{"name":"Montaña de Oro — Bluff Trail Wildflowers","county":"San Luis Obispo","emoji":"🌸","lat":35.2939,"lon":-120.8914,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Montana_de_Oro.jpg/320px-Montana_de_Oro.jpg","fact":"Montana de Oro's Bluff Trail in spring passes through one of the finest <em>coastal wildflower displays</em> in California — California poppy, blue dicks, sea rocket, and giant coreopsis covering the cliffs from the trail edge to the ocean. The 'mountain of gold' name given by the Spanish refers specifically to this annual transformation of the bluffs from gray-green to orange and yellow."},{"name":"San Luis Obispo — Thursday Farmers Market","county":"San Luis Obispo","emoji":"🍅","lat":35.2825,"lon":-120.6633,"cat":"Market","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"San Luis Obispo's Thursday evening farmers market on Higuera Street has been running <em>continuously since 1983</em> and is considered the model for the California street market revival. The market closes Higuera Street to traffic for six blocks and fills it with 70 vendors, street food, and live music — drawing an estimated 10,000 visitors on peak summer evenings to what was once a struggling downtown shopping district."},{"name":"Pacific Beach Coastal Dunes — Oceano","county":"San Luis Obispo","emoji":"🏜","lat":35.07,"lon":-120.64,"cat":"Natural Feature","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Oceano_Dunes_SVRA.jpg/320px-Oceano_Dunes_SVRA.jpg","fact":"The Oceano dunes are California's largest remaining <em>active coastal dune system</em> — sand that has been accumulating and moving since the last Ice Age when sea levels dropped and exposed vast sand deposits on the continental shelf. The dunes move inland at rates of up to 50 feet per year during strong wind events, burying and exposing successive generations of dune plants in a constantly shifting landscape."},{"name":"Tolosa — Historic Spanish Trail Crossing","county":"San Luis Obispo","emoji":"🛤","lat":35.26,"lon":-120.64,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"The Tolosa Crossing was where <em>El Camino Real</em> forded the San Luis Obispo Creek near the mission — a spot used by thousands of travelers for 60 years before the American period's bridges made fording unnecessary. The crossing site is now a neighborhood park, but the creek's alignment and depth at this point are unchanged from the Spanish colonial era."},{"name":"Diablo Canyon — Montana del Oro Views","county":"San Luis Obispo","emoji":"🌊","lat":35.22,"lon":-120.86,"cat":"Viewpoint","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Montana_de_Oro.jpg/320px-Montana_de_Oro.jpg","fact":"The coastal hills above Diablo Canyon offer <em>views of 60 miles of coastline</em> in both directions — from Morro Rock to Point Buchon — from a single viewpoint accessible by trail. The vantage point reveals the fundamental character of the Central Coast: a narrow band of flat terrace between the sea and the Santa Lucia Range, a geography that has shaped every aspect of the region's history and culture."},{"name":"Old Santa Rosa Road — Wine Country Back Route","county":"San Luis Obispo","emoji":"🍷","lat":35.59,"lon":-120.62,"cat":"Scenic Road","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Paso_Robles_wine_country.jpg/320px-Paso_Robles_wine_country.jpg","fact":"Old Santa Rosa Road winds through the <em>heart of Paso Robles wine country</em> past family-owned wineries that have been producing wine since Italian and Swiss immigrants planted the first commercial vineyards in the 1880s. The road's undulating terrain and oak-shaded wineries have more in common with the Tuscan countryside than with California's other major wine regions."},{"name":"Morro Bay Estuary — Back Bay Trail","county":"San Luis Obispo","emoji":"🦅","lat":35.34,"lon":-120.85,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Morro_Rock_California.jpg/320px-Morro_Rock_California.jpg","fact":"The Back Bay Trail circles the <em>2,300-acre Morro Bay estuary</em> — the most productive tidal wetland on the Central Coast — on a combination of boardwalk and unpaved levee path. The estuary's eel grass beds, visible at low tide, are the nursery for Dungeness crab larvae that eventually make their way to the open ocean and return as adult crabs to the fishermen's pots."},{"name":"Avila Hot Springs","county":"San Luis Obispo","emoji":"♨️","lat":35.1825,"lon":-120.7253,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Avila_Beach_California.jpg/320px-Avila_Beach_California.jpg","fact":"Avila Hot Springs has provided geothermal mineral baths to Central Coast visitors since <em>1907</em>, when the springs were first developed into a commercial bathing facility. The naturally hot water, reaching 104 degrees in the main pool, rises from a fault in the Santa Lucia Range and has been used for healing by the Chumash people for thousands of years before the modern facility was built."},{"name":"Camp San Luis Obispo — Historic Military Post","county":"San Luis Obispo","emoji":"🎖","lat":35.3267,"lon":-120.7433,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Mission_San_Luis_Obispo_de_Tolosa.jpg/320px-Mission_San_Luis_Obispo_de_Tolosa.jpg","fact":"Camp San Luis Obispo has been a <em>California National Guard training facility</em> since 1928 and served as a prisoner of war camp holding Japanese soldiers during World War II. The camp's 2,200 acres at the base of the Santa Lucia Range preserve some of the finest remaining grassland habitat in the county — land that has never been plowed because the military needed open training fields."},{"name":"Estero Bluffs State Park","county":"San Luis Obispo","emoji":"🦭","lat":35.465,"lon":-120.9033,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Morro_Rock_California.jpg/320px-Morro_Rock_California.jpg","fact":"Estero Bluffs, acquired by California State Parks in <em>2000</em> after a 30-year conservation campaign, preserves 3 miles of coastal blufftop between Morro Bay and Cayucos. The park's undeveloped grassland, grazed by cattle under a conservation grazing agreement, maintains the open character that provides habitat for nesting snowy plovers and foraging black oystercatchers."},{"name":"Cerro Cabrillo — Montana de Oro","county":"San Luis Obispo","emoji":"🏔","lat":35.325,"lon":-120.87,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Montana_de_Oro.jpg/320px-Montana_de_Oro.jpg","fact":"Cerro Cabrillo, at 911 feet, is the highest peak in Montana de Oro State Park and offers the <em>definitive view of the Central Coast</em> — Morro Rock, the estuary, the Nine Sisters volcanic chain, and 40 miles of coastline from a single vantage point. The mountain is named for Juan Rodríguez Cabrillo, the Portuguese explorer who first documented this coastline in 1542."}];
var active=false,watchId=null,scanTimer=null,secsLeft=0,SCAN=15,curLat=null,curLon=null,discovered=new Set(),topTwo=[null,null];

function haversine(a,b,c,d){var R=3958.8,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)*Math.sin(dl/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function bearing(a,b,c,d){var dl=(d-b)*Math.PI/180,y=Math.sin(dl)*Math.cos(c*Math.PI/180),x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.cos(dl);return(Math.atan2(y,x)*180/Math.PI+360)%360;}
function cardinalDir(deg){var dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return dirs[Math.round(deg/22.5)%16];}

function toggle(){if(active)stopDriving();else startDriving();}

function startDriving(){
  if(!navigator.geolocation){setStatus('err','GPS not available');return;}
  active=true;
  document.getElementById('startBtn').classList.add('on');
  document.getElementById('btnLabel').textContent='Driving';
  document.getElementById('btnSub').textContent='Tap to stop';
  setStatus('gps','Acquiring GPS signal…');
  watchId=navigator.geolocation.watchPosition(onPosition,onGpsError,{enableHighAccuracy:true,timeout:15000,maximumAge:3000});
}

function stopDriving(){
  active=false;
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(scanTimer);scanTimer=null;
  document.getElementById('startBtn').classList.remove('on');
  document.getElementById('btnLabel').textContent='Start Driving';
  document.getElementById('btnSub').textContent='Tap to see nearest landmarks';
  document.getElementById('scanfill').style.width='0%';
  document.getElementById('sttmr').textContent='';
  setStatus('idle','Stopped');
}

function onGpsError(err){
  var msgs={1:'Location permission denied — allow in Settings.',2:'Position unavailable. Try again.',3:'GPS timed out. Move outside.'};
  setStatus('err',msgs[err.code]||'GPS error');
}

function onPosition(pos){
  curLat=pos.coords.latitude;curLon=pos.coords.longitude;
  var spd=pos.coords.speed,acc=pos.coords.accuracy;
  document.getElementById('gLat').textContent='LAT '+curLat.toFixed(5);
  document.getElementById('gLon').textContent='LON '+curLon.toFixed(5);
  document.getElementById('gSpd').textContent=spd!=null?'SPD '+Math.round(spd*2.237)+' mph':'SPD —';
  document.getElementById('gAcc').textContent=acc?'ACC ±'+Math.round(acc)+'m':'ACC —';
  setStatus('live','GPS active');
  updateDisplay();
  if(!scanTimer)startCountdown();
}

function startCountdown(){
  secsLeft=SCAN;updateScanBar();
  scanTimer=setInterval(function(){
    secsLeft--;updateScanBar();
    if(secsLeft<=0){secsLeft=SCAN;if(curLat!==null)updateDisplay();}
  },1000);
}

function updateScanBar(){
  document.getElementById('scanfill').style.width=(secsLeft/SCAN*100)+'%';
  document.getElementById('sttmr').textContent=secsLeft+'s';
}

function updateDisplay(){
  if(curLat===null)return;
  var sorted=ALL_LANDMARKS.map(function(lm){
    return{lm:lm,dist:haversine(curLat,curLon,lm.lat,lm.lon),brg:bearing(curLat,curLon,lm.lat,lm.lon)};
  }).sort(function(a,b){return a.dist-b.dist;});
  sorted.slice(0,20).forEach(function(item){if(item.dist<=5)discovered.add(item.lm.name);});
  document.getElementById('dc').textContent=discovered.size;
  topTwo[0]=sorted[0]||null;topTwo[1]=sorted[1]||null;
  renderCard(0,topTwo[0]);renderCard(1,topTwo[1]);
  renderList(sorted.slice(2,12));
}

function renderCard(idx,item){
  var card=document.getElementById('card'+idx);
  if(!item){card.innerHTML='<div class="card-placeholder">Searching…</div>';card.className='card';return;}
  var lm=item.lm,dist=item.dist.toFixed(1),dir=cardinalDir(item.brg);
  var rankLabel=idx===0?'⬤ NEAREST':'◎ 2ND NEAREST';
  card.className='card rank-'+(idx+1);
  var imgHtml=lm.photo?
    '<img class="card-img" src="'+lm.photo+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
    +'<div class="card-emoji">'+lm.emoji+'</div>':
    '<div class="card-emoji" style="display:flex">'+lm.emoji+'</div>';
  card.innerHTML=imgHtml
    +'<div class="card-body">'
    +'<div class="card-top">'
    +'<div class="card-meta">'
    +'<div class="card-rank">'+rankLabel+'</div>'
    +'<div class="card-name">'+lm.name+'</div>'
    +'<div class="card-county">'+lm.county+' County · '+lm.cat+'</div>'
    +'</div>'
    +'<div class="card-dist-wrap">'
    +'<div class="card-dist">'+dist+'</div>'
    +'<span class="card-unit">MILES</span>'
    +'<div class="card-dir">'+dir+'</div>'
    +'</div>'
    +'</div>'
    +'<div class="divider"></div>'
    +'<div class="card-fact">'+lm.fact+'</div>'
    +'</div>';
}

function renderList(items){
  var el=document.getElementById('list');el.innerHTML='';
  items.forEach(function(item){
    var lm=item.lm,dist=item.dist.toFixed(1),dir=cardinalDir(item.brg);
    var row=document.createElement('div');row.className='litem';
    row.innerHTML='<div class="litem-em">'+lm.emoji+'</div>'
      +'<div class="litem-info"><div class="litem-name">'+lm.name+'</div>'
      +'<div class="litem-sub">'+lm.county+' · '+lm.cat+'</div></div>'
      +'<div class="litem-dist">'+dist+' mi</div>';
    row.addEventListener('click',(function(i){return function(){openOverlay(i);};})(item));
    el.appendChild(row);
  });
}

function cardClick(idx){if(topTwo[idx])openOverlay(topTwo[idx]);}

function openOverlay(item){
  var lm=item.lm,dist=curLat!==null?haversine(curLat,curLon,lm.lat,lm.lon).toFixed(1):'?',dir=curLat!==null?cardinalDir(bearing(curLat,curLon,lm.lat,lm.lon)):'';
  var oi=document.getElementById('oImg'),oe=document.getElementById('oEmoji');
  if(lm.photo){oi.style.display='block';oe.style.display='none';oi.src=lm.photo;oi.onerror=function(){oi.style.display='none';oe.style.display='flex';};}
  else{oi.style.display='none';oe.style.display='flex';oe.textContent=lm.emoji;}
  document.getElementById('otag').textContent=lm.county+' County · '+lm.cat;
  document.getElementById('oname').textContent=lm.name;
  document.getElementById('odist').innerHTML='<b>'+dist+' miles</b> · '+dir;
  document.getElementById('ofact').innerHTML=lm.fact;
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(event){
  if(!event||event.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('open');
  }
}

function setStatus(cls,msg){
  document.getElementById('dot').className='dot '+cls;
  document.getElementById('stmsg').textContent=msg;
}
</script>

</html>
