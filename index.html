<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoadGuide">
<meta name="theme-color" content="#080c14">
<title>RoadGuide California</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--ink:#080c14;--gold:#c9a84c;--glo:#e8c97a;--gdim:rgba(201,168,76,.35);--pale:#eef2ff;--dim:rgba(220,228,255,.45);--card:rgba(255,255,255,.05);--edge:rgba(255,255,255,.09);--green:#50c880;--red:#e05555;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--ink);color:var(--pale);font-family:'DM Sans',sans-serif;}
#sky{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(18,34,68,.9) 0%,transparent 100%),radial-gradient(ellipse 60% 60% at 85% 90%,rgba(10,18,38,.95) 0%,transparent 100%),var(--ink);}
#sky::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1.2px 1.2px at 8% 12%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 23% 45%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 52% 8%,rgba(201,168,76,.4) 0%,transparent 100%),radial-gradient(1px 1px at 71% 67%,rgba(255,255,255,.35) 0%,transparent 100%),radial-gradient(1.2px 1.2px at 38% 82%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 88% 28%,rgba(255,255,255,.5) 0%,transparent 100%);}
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
#hdr{flex-shrink:0;padding:env(safe-area-inset-top,44px) 20px 14px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;line-height:1;}
.logo-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-top:3px;}
.hd-r{text-align:right;}
.hd-r p{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.5px;}
.hd-r span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--glo);}
#scanbar{flex-shrink:0;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;}
#scanfill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(201,168,76,.3),var(--gold));width:0%;transition:width 1s linear;}
#scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 40px;}
#scr::-webkit-scrollbar{display:none;}
#startWrap{display:flex;justify-content:center;padding:10px 0 16px;}
#startBtn{display:flex;align-items:center;gap:14px;padding:14px 32px;border-radius:50px;cursor:pointer;border:1.5px solid rgba(201,168,76,.45);background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));transition:all .25s;-webkit-appearance:none;}
#startBtn.on{border-color:rgba(80,200,128,.55);background:linear-gradient(135deg,rgba(80,200,128,.14),rgba(80,200,128,.03));}
#startBtn:active{transform:scale(.96);}
.sb-icon{font-size:24px;}
.sb-text{display:flex;flex-direction:column;}
.sb-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--glo);}
#startBtn.on .sb-main{color:#6ecf9c;}
.sb-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--gdim);text-transform:uppercase;}
#startBtn.on .sb-sub{color:rgba(80,200,128,.55);}
#status{display:flex;align-items:center;gap:8px;padding:8px 13px;margin-bottom:14px;background:var(--card);border:1px solid var(--edge);border-radius:10px;font-family:'DM Mono',monospace;font-size:10px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.idle{background:rgba(220,228,255,.3);}
.dot.gps{background:var(--gold);animation:blink 1.2s ease-in-out infinite;}
.dot.live{background:var(--green);animation:blink 2.5s ease-in-out infinite;}
.dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
#stmsg{flex:1;color:var(--dim);}
#sttmr{color:var(--gdim);font-size:9px;}
#cards{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.card{border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.card.rank-1{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 1px rgba(201,168,76,.1),0 8px 32px rgba(0,0,0,.4);}
.card.rank-2{border-color:rgba(201,168,76,.18);}
.card-img{width:100%;height:120px;object-fit:cover;display:block;}
.card-emoji{width:100%;height:120px;display:none;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.85));}
.card-body{padding:13px 15px 14px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.card-meta{flex:1;}
.card-rank{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:1px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--pale);line-height:1.05;}
.card-county{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;}
.card-dist-wrap{text-align:right;flex-shrink:0;}
.card-dist{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--glo);line-height:1;}
.card-unit{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--gdim);display:block;}
.card-dir{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:1px;}
.divider{width:100%;height:1px;background:rgba(255,255,255,.06);margin-bottom:9px;}
.card-fact{font-size:13px;line-height:1.68;font-weight:300;color:rgba(220,228,255,.85);}
.card-fact em{color:var(--glo);font-style:normal;font-weight:500;}
.card-placeholder{height:120px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px;font-style:italic;padding:20px;text-align:center;}
.sep{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.18),transparent);margin:6px 0 12px;}
#listLabel{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
#list{display:flex;flex-direction:column;gap:6px;}
.litem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--card);border:1px solid var(--edge);cursor:pointer;}
.litem:active{border-color:rgba(201,168,76,.3);}
.litem-em{font-size:18px;flex-shrink:0;width:30px;text-align:center;}
.litem-info{flex:1;min-width:0;}
.litem-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.litem-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-top:1px;}
.litem-dist{font-family:'DM Mono',monospace;font-size:11px;color:var(--glo);flex-shrink:0;}
#gpsBar{padding:8px 12px;background:var(--card);border:1px solid var(--edge);border-radius:10px;margin-top:12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap;}
#overlay{position:fixed;inset:0;z-index:100;background:rgba(8,12,20,.92);display:none;align-items:flex-end;justify-content:stretch;padding:12px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
#overlay.open{display:flex;}
#ocard{width:100%;border-radius:20px;overflow:hidden;background:linear-gradient(160deg,#0f1829,#080c14);border:1px solid rgba(201,168,76,.4);box-shadow:0 -8px 60px rgba(0,0,0,.7);}
#oImg{width:100%;height:160px;object-fit:cover;display:block;}
#oEmoji{width:100%;height:160px;display:none;align-items:center;justify-content:center;font-size:70px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(10,18,38,.9));}
#obody{padding:16px 18px 20px;}
#otop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
#ometa{flex:1;}
#otag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
#oname{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
#odist{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:4px;}
#odist b{color:var(--glo);font-weight:400;}
#oclose{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--dim);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;}
#ofact{font-size:14px;line-height:1.7;font-weight:300;}
#ofact em{color:var(--glo);font-style:normal;font-weight:500;}
</style>
</head>
<body>
<div id="sky"></div>
<div id="overlay" onclick="closeOverlay(event)">
  <div id="ocard">
    <img id="oImg" src="" alt="" onerror="this.style.display='none';document.getElementById('oEmoji').style.display='flex'">
    <div id="oEmoji"></div>
    <div id="obody">
      <div id="otop">
        <div id="ometa">
          <div id="otag"></div>
          <div id="oname"></div>
          <div id="odist"></div>
        </div>
        <button id="oclose" onclick="closeOverlay()">✕</button>
      </div>
      <div id="ofact"></div>
    </div>
  </div>
</div>
<div id="app">
  <div id="hdr">
    <div>
      <div class="logo">RoadGuide</div>
      <div class="logo-tag">California</div>
    </div>
    <div class="hd-r">
      <p>LANDMARKS <span id="tc">719</span></p>
      <p>DISCOVERED <span id="dc">0</span></p>
    </div>
  </div>
  <div id="scanbar"><div id="scanfill"></div></div>
  <div id="scr">
    <div id="startWrap">
      <button id="startBtn" onclick="toggle()">
        <div class="sb-icon">🚗</div>
        <div class="sb-text">
          <div class="sb-main" id="btnLabel">Start Driving</div>
          <div class="sb-sub" id="btnSub">Tap to see nearest landmarks</div>
        </div>
      </button>
    </div>
    <div id="status">
      <div class="dot idle" id="dot"></div>
      <div id="stmsg">Tap Start Driving to begin</div>
      <div id="sttmr"></div>
    </div>
    <div id="cards">
      <div class="card" id="card0" onclick="cardClick(0)">
        <div class="card-placeholder">Nearest landmark will appear here</div>
      </div>
      <div class="card" id="card1" onclick="cardClick(1)">
        <div class="card-placeholder">2nd nearest landmark will appear here</div>
      </div>
    </div>
    <div class="sep"></div>
    <div id="listLabel">Next Nearest</div>
    <div id="list"></div>
    <div id="gpsBar">
      <span id="gLat">LAT —</span>
      <span id="gLon">LON —</span>
      <span id="gSpd">SPD —</span>
      <span id="gAcc">ACC —</span>
    </div>
  </div>
</div>
<script>
const ALL_LANDMARKS = [{"name":"Mount Diablo Summit","county":"Contra Costa","emoji":"🏔","lat":37.8816,"lon":-121.9142,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mount_Diablo_from_summit.jpg/320px-Mount_Diablo_from_summit.jpg","fact":"On a clear day, you can see <em>35 of California's 58 counties</em> from this 3,849-foot summit — one of the widest views achievable from any single point in North America. Spanish surveyors used Mount Diablo as the origin point for all land surveys in California and Nevada, making it the baseline for millions of property lines still in use today."},{"name":"Lafayette Reservoir","county":"Contra Costa","emoji":"💧","lat":37.8871,"lon":-122.118,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Lafayette_Reservoir.jpg/320px-Lafayette_Reservoir.jpg","fact":"Built in <em>1928</em> as an emergency backup water supply for Contra Costa County, the reservoir holds up to 2.7 billion gallons. The surrounding 934-acre recreation area draws over a million visitors a year to its 5-mile loop trail around the water."},{"name":"Black Diamond Mines Regional Preserve","county":"Contra Costa","emoji":"⛏","lat":37.9688,"lon":-121.8677,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Black_Diamond_Mines.jpg/320px-Black_Diamond_Mines.jpg","fact":"Beneath these hills lies the largest known <em>bat hibernation site</em> in the Bay Area, inside tunnels left from 19th-century coal mines. From the 1860s to 1902, five boomtowns thrived here — all now completely vanished, with only scattered foundations remaining."},{"name":"Briones Regional Park","county":"Contra Costa","emoji":"🌿","lat":37.9274,"lon":-122.1519,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Briones is one of the few places in the East Bay where you can still see <em>tule elk</em> roaming free in their native grassland habitat. The park's 6,255 acres of rolling oak woodland and open ridge were once a vast cattle rancho granted to Felipe Briones in 1829."},{"name":"Muir Heritage Land Trust — Alhambra Valley","county":"Contra Costa","emoji":"🌾","lat":37.9288,"lon":-122.1044,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/John_Muir_National_Historic_Site.jpg/320px-John_Muir_National_Historic_Site.jpg","fact":"Alhambra Valley was one of the most productive <em>fruit-growing regions</em> in California during the late 1800s, with pears and walnuts shipped by rail to San Francisco daily. John Muir himself lived nearby in Martinez and walked these hills regularly, calling them among the most beautiful in the state."},{"name":"John Muir National Historic Site","county":"Contra Costa","emoji":"🏡","lat":37.9938,"lon":-122.1278,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/John_Muir_House_-_panoramio.jpg/320px-John_Muir_House_-_panoramio.jpg","fact":"This 17-room Victorian mansion was home to John Muir for the last <em>24 years of his life</em>, and it was here that he wrote most of the books and articles that created the modern conservation movement. Muir's \"scribble den\" study on the top floor still contains his original desk, papers, and thousands of pressed botanical specimens."},{"name":"Carquinez Strait","county":"Contra Costa","emoji":"🌊","lat":38.0574,"lon":-122.2254,"cat":"Waterway","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Carquinez_Strait_aerial.jpg/320px-Carquinez_Strait_aerial.jpg","fact":"The Carquinez Strait is the only sea-level gap in the Coast Ranges, making it the <em>sole outlet for all water</em> from California's vast Central Valley to reach San Francisco Bay. During the Gold Rush, every ship carrying miners to California had to pass through this narrow channel — over 800 vessels in 1849 alone."},{"name":"Port Costa","county":"Contra Costa","emoji":"⚓","lat":38.0538,"lon":-122.1792,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Port_Costa_CA.jpg/320px-Port_Costa_CA.jpg","fact":"In the 1880s, Port Costa was the <em>largest grain shipping port on the Pacific Coast</em>, loading wheat from Central Valley ranches onto clipper ships bound for England. Today fewer than 200 people live in the town, but its Victorian warehouses and saloons survive almost completely intact."},{"name":"Benicia Capitol State Historic Park","county":"Contra Costa","emoji":"🏛","lat":38.0499,"lon":-122.1594,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Benicia_Capitol.jpg/320px-Benicia_Capitol.jpg","fact":"Benicia served as California's state capital for just <em>13 months</em> — from February 1853 to February 1854 — before Sacramento became permanent. The original capitol building still stands and is the oldest public building in California still in its original location."},{"name":"Benicia State Recreation Area","county":"Contra Costa","emoji":"🦅","lat":38.071,"lon":-122.1327,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Benicia_Capitol_State_Historic_Park.jpg/320px-Benicia_Capitol_State_Historic_Park.jpg","fact":"The marshlands here are one of the best places in the Bay Area to spot <em>wintering bald eagles</em>, which arrive each November from the Pacific Northwest following salmon runs. The area was also the site of the Benicia Arsenal, a major U.S. Army weapons depot from 1851 to 1964."},{"name":"Crockett — C&H Sugar Plant","county":"Contra Costa","emoji":"🏭","lat":38.0524,"lon":-122.2199,"cat":"Industrial Historic","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/C%26H_Sugar_Factory_Crockett.jpg/320px-C%26H_Sugar_Factory_Crockett.jpg","fact":"The C&H Sugar refinery in Crockett has been processing <em>Hawaiian sugarcane</em> continuously since 1897 — the name stands for California and Hawaii. At its peak it was the largest cane sugar refinery in the world, and the sweet smell of processing days still drifts through the town."},{"name":"Martinez — Downtown Historic District","county":"Contra Costa","emoji":"🏘","lat":37.9963,"lon":-122.1341,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/John_Muir_National_Historic_Site.jpg/320px-John_Muir_National_Historic_Site.jpg","fact":"Martinez was the first town in Contra Costa County and served as the county seat since <em>1850</em>, the year California achieved statehood. The town also claims to be the birthplace of the martini cocktail — a local legend says a gold miner ordered a drink before catching a ferry to Martinez and the bartender invented the cocktail on the spot."},{"name":"Alhambra Cemetery, Martinez","county":"Contra Costa","emoji":"⛪","lat":38.0012,"lon":-122.1268,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/John_Muir_National_Historic_Site.jpg/320px-John_Muir_National_Historic_Site.jpg","fact":"Established in <em>1853</em>, Alhambra Cemetery is one of the oldest non-mission cemeteries in California and contains the graves of many of Contra Costa's founding families. The cemetery's records provide an unbroken genealogical record of the county's history from the Bear Flag Republic through today."},{"name":"Concord Naval Weapons Station","county":"Contra Costa","emoji":"⚓","lat":38.0285,"lon":-122.0202,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Todos_Santos_Plaza_Concord.jpg/320px-Todos_Santos_Plaza_Concord.jpg","fact":"The Concord Naval Weapons Station loaded <em>every major naval operation</em> in the Pacific from World War II through the Vietnam War, handling millions of tons of ammunition. In 1944, a catastrophic munitions explosion here killed 320 people — one of the deadliest home-front disasters of the war, and largely forgotten today."},{"name":"Todos Santos Plaza, Concord","county":"Contra Costa","emoji":"🌳","lat":37.9776,"lon":-122.0297,"cat":"Historic Plaza","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Todos_Santos_Plaza_Concord.jpg/320px-Todos_Santos_Plaza_Concord.jpg","fact":"Todos Santos Plaza has been the civic heart of Concord since the town was founded as <em>Todos Santos</em> by Don Salvio Pacheco in 1869. The plaza's farmers market, running every Tuesday and Thursday, is one of the longest-running in the East Bay and a direct link to the town's agricultural roots."},{"name":"Lime Ridge Open Space","county":"Contra Costa","emoji":"🦎","lat":37.95,"lon":-121.995,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Lime Ridge sits directly atop the <em>Mount Diablo Thrust Fault</em> and its tilted rock layers are a textbook example of tectonic folding visible at the surface. The preserve's rare serpentine grassland supports plant species found nowhere else in the world, adapted to the naturally toxic heavy-metal soils."},{"name":"Walnut Creek Downtown","county":"Contra Costa","emoji":"🛍","lat":37.9064,"lon":-122.0652,"cat":"City Center","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Walnut_Creek_California_downtown.jpg/320px-Walnut_Creek_California_downtown.jpg","fact":"Walnut Creek's downtown transformed from a sleepy farm town to one of the <em>most affluent retail districts</em> in the Bay Area after BART arrived in 1973, adding nearly $1 billion in retail sales within a decade. The town takes its name from the black walnut trees that once lined the creek — most cut down during suburban development in the 1950s."},{"name":"Ruth Bancroft Garden, Walnut Creek","county":"Contra Costa","emoji":"🌵","lat":37.9153,"lon":-122.0436,"cat":"Garden","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Ruth_Bancroft_Garden.jpg/320px-Ruth_Bancroft_Garden.jpg","fact":"Ruth Bancroft began her world-famous dry garden in <em>1972 at age 64</em>, creating what became one of the premier collections of drought-tolerant plants in the world. The 3.5-acre garden contains over 2,000 species of succulents and was the first project ever saved by the Garden Conservancy when Ruth was in her 80s."},{"name":"Lindsay Wildlife Experience, Walnut Creek","county":"Contra Costa","emoji":"🦉","lat":37.9125,"lon":-122.0594,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Walnut_Creek_California_downtown.jpg/320px-Walnut_Creek_California_downtown.jpg","fact":"Lindsay Wildlife is the <em>first wildlife rehabilitation center</em> in the United States, founded in 1955, and has treated over a million injured wild animals. Its live animal exhibits include golden eagles, bobcats, and mountain lions — all permanent residents because their injuries prevent release."},{"name":"Castle Rock Regional Recreation Area","county":"Contra Costa","emoji":"🪨","lat":37.8717,"lon":-122.0536,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Rock_City_Mount_Diablo.jpg/320px-Rock_City_Mount_Diablo.jpg","fact":"Castle Rock's dramatic sandstone outcroppings are <em>10 million years old</em>, formed from ancient seafloor sediment uplifted by the same tectonic forces that built Mount Diablo. The rocks are pocked with tafoni — honeycomb erosion patterns caused by salt crystallization — a geological feature usually seen only on coastal cliffs."},{"name":"Shell Ridge Open Space","county":"Contra Costa","emoji":"🌄","lat":37.9264,"lon":-122.0044,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Shell Ridge sits on a geological boundary where <em>marine fossils</em> from an ancient Miocene sea are frequently found eroding out of the hillside, including ancient whale bones and shark teeth. The ridge offers some of the most dramatic views of Mount Diablo's north face and the Central Valley beyond."},{"name":"Iron Horse Regional Trail","county":"Contra Costa","emoji":"🚴","lat":37.93,"lon":-121.98,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Walnut_Creek_California_downtown.jpg/320px-Walnut_Creek_California_downtown.jpg","fact":"The Iron Horse Trail follows the exact route of the <em>Southern Pacific Railroad</em> that once connected Martinez to San Jose, abandoned after BART made it redundant. At 32 miles, it's the longest paved multi-use trail in the East Bay and passes through 11 cities without a single road crossing."},{"name":"Diablo Country Club","county":"Contra Costa","emoji":"⛳","lat":37.8583,"lon":-121.9583,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mo%C3%BCnt_Diablo_from_Oakley%2C_CA.jpg/320px-Mo%C3%BCnt_Diablo_from_Oakley%2C_CA.jpg","fact":"Diablo Country Club was founded in <em>1912</em> on land that was once the summer retreat of San Francisco's elite who came by train to escape the city's fog. The surrounding Diablo community, with its Spanish Colonial architecture and private roads, remains one of the most exclusive planned communities in California."},{"name":"Sycamore Valley Regional Open Space","county":"Contra Costa","emoji":"🌳","lat":37.8436,"lon":-121.9203,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Sycamore Valley's rare valley oak woodland is one of the <em>largest remaining stands</em> of this endangered ecosystem in the Bay Area, supporting over 300 species of wildlife. Valley oaks can live over 600 years, and several trees here predate the arrival of Spanish missionaries in California."},{"name":"Round Valley Regional Preserve","county":"Contra Costa","emoji":"🦅","lat":37.8683,"lon":-121.8261,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Morgan_Territory_Regional_Preserve.jpg/320px-Morgan_Territory_Regional_Preserve.jpg","fact":"Round Valley is one of the most <em>geologically complex</em> areas in the East Bay, where five distinct rock types meet at a single point — a phenomenon called a \"rock terrane boundary\" that geologists travel from around the world to study. The valley's grasslands support the largest population of golden eagles nesting in any county in California."},{"name":"Morgan Territory Regional Preserve","county":"Contra Costa","emoji":"🌾","lat":37.8319,"lon":-121.8044,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Morgan_Territory_Regional_Preserve.jpg/320px-Morgan_Territory_Regional_Preserve.jpg","fact":"Morgan Territory sits atop the <em>most isolated ridge</em> in the Bay Area, with views stretching from the Sierra Nevada to the Pacific — visible simultaneously on clear winter days. The preserve's rare blue oak woodland is one of the southernmost examples of this tree, which dominates the Sierra Nevada foothills but barely reaches this far west."},{"name":"Los Vaqueros Reservoir","county":"Contra Costa","emoji":"💧","lat":37.81,"lon":-121.76,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Los_Vaqueros_Reservoir.jpg/320px-Los_Vaqueros_Reservoir.jpg","fact":"Los Vaqueros Reservoir was completed in <em>1998</em> as the first new major reservoir built in California in decades, and its watershed is managed as a wildlife sanctuary with no public recreation on the water itself. The surrounding hills are among the best places in the county to see the rare Swainson's hawk during its spring migration."},{"name":"Antioch Dunes National Wildlife Refuge","county":"Contra Costa","emoji":"🦋","lat":38.0033,"lon":-121.8003,"cat":"Wildlife Refuge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_Break_Regional_Shoreline.jpg/320px-Big_Break_Regional_Shoreline.jpg","fact":"The Antioch Dunes are the only place on Earth where the <em>Lange's metalmark butterfly</em> still survives — fewer than 200 remain, making it one of the rarest butterflies in North America. The dunes are ancient river sediments deposited when the San Joaquin River flowed much closer to the coast, 10,000 years ago."},{"name":"Big Break Regional Shoreline","county":"Contra Costa","emoji":"🦆","lat":37.9886,"lon":-121.7522,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_Break_Regional_Shoreline.jpg/320px-Big_Break_Regional_Shoreline.jpg","fact":"Big Break takes its name from a levee failure in <em>1928</em> that flooded farmland and created a permanent tidal marsh — now recognized as some of the most ecologically productive habitat in the Delta. The visitor center sits on a floating barge and offers kayak launches into a waterway maze used by endangered salmon."},{"name":"Oakley — Dow Wetlands Preserve","county":"Contra Costa","emoji":"🌿","lat":37.9966,"lon":-121.7122,"cat":"Wetlands","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_Break_Regional_Shoreline.jpg/320px-Big_Break_Regional_Shoreline.jpg","fact":"These wetlands were created as mitigation for industrial development and now support <em>over 200 bird species</em>, including rare seasonal visitors from as far as Siberia and Alaska. The preserve is managed by Dow Chemical as part of a groundbreaking corporate conservation agreement signed in the 1990s."},{"name":"Brentwood — Marsh Creek Historic Site","county":"Contra Costa","emoji":"🌊","lat":37.9316,"lon":-121.7157,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Morgan_Territory_Regional_Preserve.jpg/320px-Morgan_Territory_Regional_Preserve.jpg","fact":"Marsh Creek was the site of one of the <em>last battles</em> between California Miwok people and Spanish missionaries in 1797, when a group of Miwok warriors held off a Spanish military expedition for three days. The creek still flows through orchards that make Brentwood one of the last major stone fruit growing areas in the Bay Area."},{"name":"Brentwood Farmers Market","county":"Contra Costa","emoji":"🍑","lat":37.9316,"lon":-121.6958,"cat":"Market","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Morgan_Territory_Regional_Preserve.jpg/320px-Morgan_Territory_Regional_Preserve.jpg","fact":"Brentwood's summertime corn and stone fruit are considered the <em>finest in Northern California</em> — chefs from San Francisco drive out specifically for the white corn and Brentwood peaches. The town sits at the edge of the Sacramento Delta's unique microclimate, where hot days and cold nights produce exceptional sweetness in summer produce."},{"name":"Pittsburg — Historic Downtown","county":"Contra Costa","emoji":"🏘","lat":38.028,"lon":-121.8847,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Carquinez_Strait.jpg/320px-Carquinez_Strait.jpg","fact":"Pittsburg was originally named <em>New York of the Pacific</em> when it was founded in 1849 as a speculative rival to San Francisco. The town's Italian fishing community, established in the 1880s, introduced the sardine canning industry to California — a technique that later moved south to Monterey and created Cannery Row."},{"name":"Pittsburg Power Plant Stack","county":"Contra Costa","emoji":"⚡","lat":38.0401,"lon":-121.8898,"cat":"Industrial","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Carquinez_Strait.jpg/320px-Carquinez_Strait.jpg","fact":"The twin 500-foot stacks of the Pittsburg Power Plant were for decades the <em>tallest structures</em> in Contra Costa County and a navigation landmark for Delta boaters. The plant powered much of the Bay Area from the 1950s through the 1990s, burning natural gas pumped directly from the Sacramento Delta gas fields."},{"name":"Bay Point Wetlands","county":"Contra Costa","emoji":"🦢","lat":38.0197,"lon":-121.9608,"cat":"Wetlands","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Big_Break_Regional_Shoreline.jpg/320px-Big_Break_Regional_Shoreline.jpg","fact":"Bay Point's restored wetlands were once among the most <em>heavily industrialized shorelines</em> in the East Bay, used for shipbuilding during World War II and home to a major dynamite factory. The restoration project removed 4 million tons of contaminated fill and returned tidal marsh that now hosts breeding pairs of the endangered Ridgway's rail."},{"name":"Hercules Historic Powder Works","county":"Contra Costa","emoji":"💥","lat":37.9997,"lon":-122.2792,"cat":"Historic Industrial","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/C%26H_Sugar_Factory_Crockett.jpg/320px-C%26H_Sugar_Factory_Crockett.jpg","fact":"Hercules was literally built around its <em>dynamite factory</em> — the California Powder Works employed the entire town and produced explosives used in building the Panama Canal and the tunnels of the transcontinental railroad. The company town's Victorian worker cottages still stand and are now a National Historic District."},{"name":"Pinole Valley Park","county":"Contra Costa","emoji":"🌿","lat":37.9883,"lon":-122.2819,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Pinole Valley follows one of the oldest <em>Ohlone trading routes</em> in the East Bay — the creek was a source of pinole, the ground-seed flour that was the staple food of Bay Area Native Americans for thousands of years. The town of Pinole takes its name directly from this food, through Spanish missionaries who observed its preparation."},{"name":"Giant Road, San Pablo — Historic Racetrack Site","county":"Contra Costa","emoji":"🏎","lat":37.9639,"lon":-122.3439,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Point_Richmond_CA.jpg/320px-Point_Richmond_CA.jpg","fact":"San Pablo Speedway operated here from <em>1914 to 1916</em> and was the first purpose-built automobile racetrack in Northern California, drawing crowds of 50,000 for board track races at speeds over 100 mph. The site is now a neighborhood, but Giant Road follows the exact curve of the original oval."},{"name":"Point Richmond Historic District","county":"Contra Costa","emoji":"🏘","lat":37.9169,"lon":-122.3797,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Point_Richmond_CA.jpg/320px-Point_Richmond_CA.jpg","fact":"Point Richmond was the original terminus of the <em>Santa Fe Railroad</em>'s transcontinental line, where trains from Chicago were loaded onto ferries to cross the bay. The town's perfectly preserved Victorian commercial district looks almost exactly as it did in 1900, including the original railroad hotel and saloons."},{"name":"Richmond Shipyard National Historic Site","county":"Contra Costa","emoji":"⚓","lat":37.9096,"lon":-122.3711,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Rosie_the_Riveter_WWII_Home_Front_NHP.jpg/320px-Rosie_the_Riveter_WWII_Home_Front_NHP.jpg","fact":"Richmond's Kaiser Shipyards launched a new Liberty Ship every <em>four days</em> during World War II — a production miracle achieved largely by women workers who became the inspiration for Rosie the Riveter. At its peak, the yard employed 100,000 workers and Richmond was the fastest-growing city in America."},{"name":"Rosie the Riveter Memorial","county":"Contra Costa","emoji":"✊","lat":37.9057,"lon":-122.3596,"cat":"Memorial","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Rosie_the_Riveter_Memorial.jpg/320px-Rosie_the_Riveter_Memorial.jpg","fact":"This waterfront memorial honors the <em>women war workers</em> who transformed American manufacturing during World War II, many of them African American women who migrated from the South to find work in the Richmond shipyards. The memorial's design incorporates the actual keel plate of a Liberty Ship into the landscape."},{"name":"Miller-Knox Regional Shoreline","county":"Contra Costa","emoji":"🌊","lat":37.9069,"lon":-122.3958,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Point_Richmond_CA.jpg/320px-Point_Richmond_CA.jpg","fact":"Miller-Knox Regional Shoreline sits on a narrow peninsula that offers <em>360-degree views</em> of San Francisco Bay, the Golden Gate, and Mount Tamalpais — all from a former industrial landfill transformed into parkland. The area's consistent afternoon winds have made it a favorite of windsurfers and kitesurfers."},{"name":"East Brother Light Station","county":"Contra Costa","emoji":"🔦","lat":37.9635,"lon":-122.3769,"cat":"Historic Lighthouse","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/East_Brother_Light_Station.jpg/320px-East_Brother_Light_Station.jpg","fact":"East Brother Light Station has guided ships through the <em>dangerous San Pablo Strait</em> since 1874, and its Victorian fog signal building is one of only five remaining in the country. The lighthouse is now a four-room bed and breakfast — guests arrive by boat and spend the night in the completely restored keeper's quarters."},{"name":"San Pablo Bay National Wildlife Refuge","county":"Contra Costa","emoji":"🦅","lat":38.05,"lon":-122.4,"cat":"Wildlife Refuge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Carquinez_Strait.jpg/320px-Carquinez_Strait.jpg","fact":"San Pablo Bay's shallow tidal flats are a critical stopover for <em>millions of shorebirds</em> on the Pacific Flyway — the migratory highway stretching from Alaska to Patagonia. The refuge protects the largest remaining area of tidal marsh in San Francisco Bay, providing habitat for the endangered California clapper rail and salt marsh harvest mouse."},{"name":"Franklin Canyon Golf Course — Historic Rancho Site","county":"Contra Costa","emoji":"🌿","lat":37.9533,"lon":-122.145,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/C%26H_Sugar_Factory_Crockett.jpg/320px-C%26H_Sugar_Factory_Crockett.jpg","fact":"Franklin Canyon sits on land that was part of Rancho El Sobrante, one of the original <em>Mexican land grants</em> covering most of western Contra Costa County, issued in 1841. The canyon's creek is one of the few undeveloped year-round streams remaining in the Richmond hills, supporting steelhead trout in wet years."},{"name":"Orinda Theatre","county":"Contra Costa","emoji":"🎭","lat":37.8813,"lon":-122.1803,"cat":"Historic Theater","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Orinda_Theatre.jpg/320px-Orinda_Theatre.jpg","fact":"The Orinda Theatre opened in <em>1941</em> with a spectacular Art Deco neon tower that has been a landmark of the Lamorinda area for over 80 years. The single-screen theater survived the multiplex era by showing a mix of art films and classics, and its tower was declared a historic landmark after a community campaign in the 1990s."},{"name":"Moraga Adobe — Historic Rancho Site","county":"Contra Costa","emoji":"🏚","lat":37.835,"lon":-122.13,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Orinda_Theatre.jpg/320px-Orinda_Theatre.jpg","fact":"The Moraga Adobe was the headquarters of <em>Rancho Laguna de los Palos Colorados</em>, granted to Joaquin Moraga in 1835 — grandson of the founder of San Francisco. The adobe walls, made from clay dug on site, have been continuously patched and maintained for nearly 200 years and remain structurally sound."},{"name":"Rheem Valley — Arthur Rheem Estate Site","county":"Contra Costa","emoji":"🏡","lat":37.8583,"lon":-122.12,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Orinda_Theatre.jpg/320px-Orinda_Theatre.jpg","fact":"Arthur Rheem, heir to the Rheem Manufacturing fortune, built a <em>private estate and planned community</em> here in the 1920s based on the vision of a perfectly designed California suburb. The Rheem Theatre, built in 1941, still operates as one of the last single-screen movie palaces in the Bay Area."},{"name":"San Ramon Valley Museum","county":"Contra Costa","emoji":"🏛","lat":37.7947,"lon":-121.9553,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"The San Ramon Valley Museum preserves the history of a valley that transformed from <em>cattle ranching to walnut orchards to Silicon Valley suburbs</em> in less than 150 years. The museum's collection includes photographs of the original Danville grain warehouses that once made the valley the largest wheat-shipping point in the county."},{"name":"Danville — Eugene O'Neill National Historic Site","county":"Contra Costa","emoji":"🎭","lat":37.8247,"lon":-121.9894,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Tao_House_Eugene_O%27Neill.jpg/320px-Tao_House_Eugene_O%27Neill.jpg","fact":"Playwright Eugene O'Neill built Tao House in Danville in <em>1937</em> specifically for its isolation, and here wrote his greatest late masterpieces including Long Day's Journey into Night and The Iceman Cometh. O'Neill's study, preserved exactly as he left it, contains his rocking chair, his hand-written manuscripts, and a bar he called 'Rosie.'"},{"name":"Blackhawk Museum","county":"Contra Costa","emoji":"🚗","lat":37.8219,"lon":-121.9136,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Walnut_Creek_California_downtown.jpg/320px-Walnut_Creek_California_downtown.jpg","fact":"The Blackhawk Museum houses one of the finest collections of <em>vintage automobiles</em> in the world, including cars owned by Al Capone, Frank Sinatra, and Howard Hughes — all under one roof in a stunning modern building. The collection spans a century of automotive design and includes one of only two surviving 1931 Bugatti Royales."},{"name":"Sycamore Valley Open Space","county":"Contra Costa","emoji":"🦌","lat":37.82,"lon":-121.95,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Sycamore Valley's grasslands are a remnant of the <em>vast Central Valley prairie</em> ecosystem that once covered thousands of square miles before agriculture. The open space is home to one of the East Bay's few remaining colonies of burrowing owls, which nest in ground squirrel burrows and hunt insects at dawn and dusk."},{"name":"Tassajara Creek Trail","county":"Contra Costa","emoji":"🚶","lat":37.8,"lon":-121.9,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Tassajara Creek follows a fault valley that marks the <em>eastern edge of the Coast Ranges</em>, where the geology abruptly transitions from marine sedimentary rock to ancient metamorphic basement rock. The creek's Spanish name means 'place of dried meat' — a reference to a Miwok food-drying site documented by the first Spanish explorers."},{"name":"Alamo — Dan Cook House","county":"Contra Costa","emoji":"🏠","lat":37.8483,"lon":-122.0244,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"The Dan Cook House, built in <em>1853</em>, is the oldest wood-frame house still standing in Contra Costa County and one of the oldest in the East Bay. Cook was an early settler who arrived via wagon train and established the first store in the San Ramon Valley, serving miners passing through on their way to the Gold Rush."},{"name":"Willow Pass Road — Historic Stagecoach Route","county":"Contra Costa","emoji":"🛤","lat":37.98,"lon":-121.97,"cat":"Historic Route","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Todos_Santos_Plaza_Concord.jpg/320px-Todos_Santos_Plaza_Concord.jpg","fact":"Willow Pass was the primary <em>stagecoach crossing</em> between the East Bay and the San Joaquin Valley from 1860 through the railroad era, and drivers dreaded the narrow switchbacks over the summit. The pass cuts through the Mount Diablo range at its lowest point and was used by Native Americans for thousands of years before the Spanish arrived."},{"name":"Pacheco — Historic Town Site","county":"Contra Costa","emoji":"🏚","lat":37.9878,"lon":-122.0694,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Carquinez_Strait.jpg/320px-Carquinez_Strait.jpg","fact":"Pacheco was once a thriving agricultural town and the <em>original county seat</em> of Contra Costa, before the 1868 earthquake destroyed most of its buildings and the county government moved to Martinez. Today a few street names are the only evidence of the town that once rivaled Martinez in size and importance."},{"name":"Vine Hill — Historic Winery District","county":"Contra Costa","emoji":"🍷","lat":37.98,"lon":-122.05,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/C%26H_Sugar_Factory_Crockett.jpg/320px-C%26H_Sugar_Factory_Crockett.jpg","fact":"The hills above Martinez were planted with vineyards as early as <em>1852</em>, making Contra Costa one of California's first wine-producing counties — predating Napa Valley's wine industry by two decades. Some of the old-vine Zinfandel vineyards planted in the sandy soils near Oakley date to the 1880s and still produce fruit."},{"name":"Waterbird Regional Reserve","county":"Contra Costa","emoji":"🦩","lat":38.03,"lon":-121.85,"cat":"Wildlife Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Carquinez_Strait.jpg/320px-Carquinez_Strait.jpg","fact":"Waterbird Reserve protects a mosaic of <em>tule marsh and open water</em> that supports one of the largest great egret rookeries in the Bay Area, with over 200 nesting pairs arriving each February. The reserve is named for the dozens of species of waterbirds that congregate here during winter migration — sometimes numbering in the tens of thousands."},{"name":"Mount Diablo State Park — Rock City","county":"Contra Costa","emoji":"🪨","lat":37.85,"lon":-121.93,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Rock_City_Mount_Diablo.jpg/320px-Rock_City_Mount_Diablo.jpg","fact":"Rock City's massive sandstone boulders were formed from <em>ancient sand dunes</em> that solidified 50 million years ago when this area was a coastal desert. The boulders are riddled with Native American mortar holes — grinding stones used by the Bay Miwok for thousands of years to process acorns into flour."},{"name":"Lime Ridge — Boundary Oak Golf Course Site","county":"Contra Costa","emoji":"🌳","lat":37.95,"lon":-121.98,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"The ancient valley oak at the center of Boundary Oak Golf Course is estimated to be over <em>400 years old</em>, meaning it was already a mature tree when the first Spanish missionaries arrived in California. Valley oaks of this size are increasingly rare — most were cut for firewood during the 19th century."},{"name":"Contra Costa Canal Trail","county":"Contra Costa","emoji":"💧","lat":37.96,"lon":-121.92,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"The Contra Costa Canal was built by the <em>Bureau of Reclamation in 1948</em> to bring Sacramento River water to the county's growing cities — a 48-mile concrete channel that transformed the region from a water-scarce hinterland to one of the fastest-growing counties in America. The canal trail now runs alongside it for 13 miles."},{"name":"Pleasant Hill — Gregory Gardens Historic Neighborhood","county":"Contra Costa","emoji":"🏡","lat":37.9483,"lon":-122.0628,"cat":"Historic Neighborhood","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Walnut_Creek_California_downtown.jpg/320px-Walnut_Creek_California_downtown.jpg","fact":"Gregory Gardens was built in <em>1941-1943</em> as defense worker housing for the nearby Shell Oil refinery, representing one of the first planned subdivisions in Contra Costa County. The neighborhood's identical ranch homes were considered revolutionary for their attached garages and fitted kitchens — luxuries most American families had never experienced."},{"name":"Diablo Valley College Planetarium","county":"Contra Costa","emoji":"🔭","lat":37.9619,"lon":-122.0594,"cat":"Education","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Walnut_Creek_California_downtown.jpg/320px-Walnut_Creek_California_downtown.jpg","fact":"The DVC Planetarium houses the <em>largest optical star projector</em> at any community college in California, capable of displaying 9,000 stars simultaneously. The college's astronomy program has produced more professional astronomers per capita than any other two-year institution in the state."},{"name":"Markham Vineyards, Clayton","county":"Contra Costa","emoji":"🍇","lat":37.94,"lon":-121.94,"cat":"Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mo%C3%BCnt_Diablo_from_Oakley%2C_CA.jpg/320px-Mo%C3%BCnt_Diablo_from_Oakley%2C_CA.jpg","fact":"The volcanic soils on the flanks of Mount Diablo were recognized as exceptional wine-growing terrain as early as <em>1868</em>, when the first commercial vineyard was planted near Clayton. The unique combination of decomposed volcanic rock and clay retains heat through cold nights, producing grapes with unusually concentrated flavors."},{"name":"Galindo Home, Concord","county":"Contra Costa","emoji":"🏚","lat":37.9744,"lon":-122.0208,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Todos_Santos_Plaza_Concord.jpg/320px-Todos_Santos_Plaza_Concord.jpg","fact":"The Galindo Adobe, built around <em>1856</em>, is one of the last remaining adobe structures in Contra Costa County and was the home of Juan Galindo, who received a Mexican land grant for most of what is now downtown Concord. The restored building now houses a local history museum."},{"name":"Buchanan Field Airport","county":"Contra Costa","emoji":"✈️","lat":37.9897,"lon":-122.0569,"cat":"Airport","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Todos_Santos_Plaza_Concord.jpg/320px-Todos_Santos_Plaza_Concord.jpg","fact":"Buchanan Field was built as a <em>military training airfield in 1942</em> and hosted hundreds of pilots training for the Pacific theater — including a young George H.W. Bush before he shipped out. The airport's art deco terminal building from 1944 is listed on the National Register of Historic Places."},{"name":"Vine Hill Road — Shell Oil Refinery Historic Site","county":"Contra Costa","emoji":"🏭","lat":37.99,"lon":-122.1,"cat":"Industrial Historic","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/C%26H_Sugar_Factory_Crockett.jpg/320px-C%26H_Sugar_Factory_Crockett.jpg","fact":"The Shell Martinez Refinery, opened in <em>1915</em>, was the first refinery built specifically to process California crude oil and remains one of the largest in the state. The refinery's early success proved that California's thick, sulfur-heavy crude could be economically processed — a discovery that transformed the state's oil industry."},{"name":"Franklin Canyon — Staircase Falls","county":"Contra Costa","emoji":"💧","lat":37.9533,"lon":-122.16,"cat":"Natural Feature","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Staircase Falls is one of the few <em>year-round waterfalls</em> accessible from the Richmond hills, fed by springs deep in the serpentine rock of Franklin Canyon. The waterfall's terraced pools were formed by alternating layers of hard chert and softer shale eroding at different rates over millions of years."},{"name":"Bollinger Canyon — Las Trampas Regional Wilderness","county":"Contra Costa","emoji":"🦁","lat":37.835,"lon":-122.05,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Morgan_Territory_Regional_Preserve.jpg/320px-Morgan_Territory_Regional_Preserve.jpg","fact":"Las Trampas is the last place in the East Bay where <em>mountain lions regularly hunt deer</em> on trails frequented by hikers — rangers record sightings several times per year. The wilderness area's name means 'the traps' in Spanish, referencing the steep canyons that early vaqueros used to funnel cattle during roundups."},{"name":"San Ramon — Bishop Ranch Historic Barn","county":"Contra Costa","emoji":"🐄","lat":37.78,"lon":-121.95,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Briones_Regional_Park.jpg/320px-Briones_Regional_Park.jpg","fact":"Bishop Ranch was one of the largest <em>cattle operations</em> in Contra Costa County, running thousands of head of beef cattle across the valley floor until the 1970s. The original ranch barn still stands at the edge of what is now Bishop Ranch Business Park — one of the largest suburban office parks in California."},{"name":"Camino Tassajara — Historic Road","county":"Contra Costa","emoji":"🛤","lat":37.81,"lon":-121.88,"cat":"Historic Route","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Morgan_Territory_Regional_Preserve.jpg/320px-Morgan_Territory_Regional_Preserve.jpg","fact":"Camino Tassajara follows one of the oldest <em>Native American trails</em> in the Bay Area, used by the Bay Miwok to travel between the coast and the Central Valley through a low pass in the Diablo Range. Spanish missionaries documented this route in 1772 as they explored eastward from Mission San Francisco."},{"name":"Vasco Caves Regional Preserve","county":"Contra Costa","emoji":"🦅","lat":37.835,"lon":-121.73,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Vasco_Caves_Regional_Preserve.jpg/320px-Vasco_Caves_Regional_Preserve.jpg","fact":"Vasco Caves contains the largest concentration of <em>Yokuts rock art</em> in the Bay Area, with pictographs painted in red and black ochre that are estimated to be over 2,000 years old. The caves were formed by volcanic activity and their constant cool temperature made them important ceremonial sites for generations of Native Californians."},{"name":"Byron Hot Springs — Historic Resort Site","county":"Contra Costa","emoji":"♨️","lat":37.8619,"lon":-121.6408,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Clifton_Court_Forebay.jpg/320px-Clifton_Court_Forebay.jpg","fact":"Byron Hot Springs was once the most fashionable <em>resort destination</em> in Northern California, drawing San Francisco society by train from the 1870s through the 1930s for its sulfur mineral baths. During World War II the resort was converted to a prisoner of war camp holding German and Italian officers — some of whom never left California."},{"name":"Clifton Court Forebay","county":"Contra Costa","emoji":"💧","lat":37.83,"lon":-121.56,"cat":"Water Infrastructure","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Clifton_Court_Forebay.jpg/320px-Clifton_Court_Forebay.jpg","fact":"Clifton Court Forebay is the <em>starting point of the California Aqueduct</em> — the 444-mile concrete river that carries water from the Delta to Southern California. The forebay's giant pumps lift over 6 billion gallons per day, making it the largest water-moving facility in the world."},{"name":"Discovery Bay — Historic Gold Rush Landing","county":"Contra Costa","emoji":"⚓","lat":37.9047,"lon":-121.5997,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Clifton_Court_Forebay.jpg/320px-Clifton_Court_Forebay.jpg","fact":"Discovery Bay sits at the confluence of multiple Delta channels that served as the main <em>water highway</em> for Gold Rush miners traveling from San Francisco to the Sierra Nevada foothills in 1849. Thousands of men passed through this point by steamer before the railroads made the water route obsolete."},{"name":"Oakland City Hall","county":"Alameda","emoji":"🏛","lat":37.8044,"lon":-122.2711,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Oakland_City_Hall.jpg/320px-Oakland_City_Hall.jpg","fact":"Oakland City Hall, completed in <em>1914</em>, was the first skyscraper built west of the Mississippi River — a 320-foot tower clad in granite and terracotta that survived the 1906 earthquake because it hadn't been built yet, only to be badly damaged in the 1989 Loma Prieta earthquake. The building was seismically retrofitted in the 1990s by mounting it on 111 lead-rubber isolation bearings."},{"name":"Lake Merritt","county":"Alameda","emoji":"🦆","lat":37.8044,"lon":-122.2574,"cat":"Lake","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Lake_Merritt_aerial.jpg/320px-Lake_Merritt_aerial.jpg","fact":"Lake Merritt is the <em>first official wildlife refuge in North America</em>, designated by the California Legislature in 1870 — predating Yellowstone National Park by two years. The 3.4-mile tidal lagoon was originally a tidal estuary connected to the bay, converted to a lake by a dam in the 1860s at the initiative of Dr. Samuel Merritt, Oakland's mayor."},{"name":"Oakland Museum of California","county":"Alameda","emoji":"🏛","lat":37.7986,"lon":-122.2647,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Oakland_Museum_of_California.jpg/320px-Oakland_Museum_of_California.jpg","fact":"The Oakland Museum of California, designed by Kevin Roche and opened in <em>1969</em>, was groundbreaking for its garden-roof architecture — the building is essentially invisible from street level, buried under a terraced public park. Its collection of California art, history, and natural science is the most comprehensive in the state."},{"name":"Jack London Square","county":"Alameda","emoji":"✍","lat":37.7947,"lon":-122.2758,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Jack_London_Square_Oakland.jpg/320px-Jack_London_Square_Oakland.jpg","fact":"Jack London grew up on the Oakland waterfront and worked as an <em>oyster pirate</em> on the bay as a teenager — stealing oysters from privately owned beds and selling them to saloons — before becoming one of America's most famous writers. The preserved First and Last Chance Saloon, built in 1880, was London's regular drinking spot and looks exactly as it did when he was alive."},{"name":"Paramount Theatre Oakland","county":"Alameda","emoji":"🎭","lat":37.8072,"lon":-122.2689,"cat":"Historic Theater","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Paramount_Theatre_Oakland.jpg/320px-Paramount_Theatre_Oakland.jpg","fact":"The Paramount Theatre is one of the finest surviving examples of <em>Art Deco architecture</em> in the United States, opened in 1931 with a facade of mosaic tile and glazed terracotta that shimmers gold in afternoon light. The theater seats 3,000 people and was restored to its original glory in 1973 after a decade of abandonment."},{"name":"Fox Theater Oakland","county":"Alameda","emoji":"🎬","lat":37.8083,"lon":-122.2678,"cat":"Historic Theater","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Fox_Oakland_Theatre.jpg/320px-Fox_Oakland_Theatre.jpg","fact":"The Fox Theater opened in <em>1928</em> as the largest movie palace in the Bay Area, with a Moorish-inspired interior featuring a minaret rising above Broadway. After decades of neglect, it was restored and reopened in 2009 as a concert venue — the restoration revealed original hand-painted murals hidden under decades of paint."},{"name":"Chabot Space and Science Center","county":"Alameda","emoji":"🔭","lat":37.8178,"lon":-122.1817,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Chabot_Space_and_Science_Center.jpg/320px-Chabot_Space_and_Science_Center.jpg","fact":"The Chabot Space Center sits atop the <em>Oakland hills with the darkest skies</em> accessible by public transit in the Bay Area, and its three telescopes are open to the public on Friday and Saturday nights year-round. The center's 70-foot planetarium dome is the largest in Northern California."},{"name":"Redwood Regional Park","county":"Alameda","emoji":"🌲","lat":37.8094,"lon":-122.1619,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Redwood_Regional_Park_Oakland.jpg/320px-Redwood_Regional_Park_Oakland.jpg","fact":"Redwood Regional Park protects a grove of <em>second-growth coast redwoods</em> that grew back after the original old-growth forest was logged in the 1850s to build San Francisco — the trees are now 150 feet tall. The park's East Ridge Trail offers views of both the Golden Gate and the Sierra Nevada simultaneously on clear winter days."},{"name":"Joaquin Miller Park","county":"Alameda","emoji":"🌲","lat":37.8019,"lon":-122.1969,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Redwood_Regional_Park_Oakland.jpg/320px-Redwood_Regional_Park_Oakland.jpg","fact":"Joaquin Miller, the <em>'Poet of the Sierras,'</em> built his hilltop estate here in the 1880s and planted most of the eucalyptus and Monterey pine trees that now define the Oakland hills landscape. Miller's self-designed funeral pyre — a concrete pyramid he wanted burned over his body — still stands in the park, unused since his family chose a conventional burial."},{"name":"Knowland Park and Oakland Zoo","county":"Alameda","emoji":"🦒","lat":37.7528,"lon":-122.1461,"cat":"Park and Zoo","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Redwood_Regional_Park_Oakland.jpg/320px-Redwood_Regional_Park_Oakland.jpg","fact":"The Oakland Zoo is built on land donated by Joseph Knowland, publisher of the <em>Oakland Tribune</em>, who purchased the hills specifically to prevent development and gave them to the city. The zoo's California Trail exhibit recreates California's pre-European ecosystems using animals — grizzly bears, condors, wolves — that were extirpated from the state within historical memory."},{"name":"Leona Canyon Regional Open Space","county":"Alameda","emoji":"🦋","lat":37.7711,"lon":-122.1594,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Redwood_Regional_Park_Oakland.jpg/320px-Redwood_Regional_Park_Oakland.jpg","fact":"Leona Canyon contains an <em>unusual serpentine rock outcrop</em> in the middle of Oakland's urban hills that supports a community of rare plants found nowhere else in the county, including three species of wildflowers endemic to Bay Area serpentine soils. The canyon's creek runs year-round despite being surrounded by urban development."},{"name":"Mountain View Cemetery","county":"Alameda","emoji":"⛪","lat":37.8253,"lon":-122.2344,"cat":"Historic Cemetery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Mountain_View_Cemetery_Oakland.jpg/320px-Mountain_View_Cemetery_Oakland.jpg","fact":"Mountain View Cemetery, designed by Frederick Law Olmsted — designer of Central Park — in <em>1863</em>, was the first professionally designed landscape in Oakland and remains one of the finest examples of Victorian rural cemetery design in the West. Buried here are Charles Crocker and other Central Pacific Railroad magnates whose fortunes built modern California."},{"name":"Piedmont — City of Piedmont Historic District","county":"Alameda","emoji":"🏘","lat":37.8236,"lon":-122.2319,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Mountain_View_Cemetery_Oakland.jpg/320px-Mountain_View_Cemetery_Oakland.jpg","fact":"Piedmont, incorporated in <em>1907</em> specifically to escape annexation by Oakland, is the most densely wealthy small city in California — a single square mile surrounded entirely by Oakland on all sides. The city has its own police, fire, and school district, funded by some of the highest property taxes per resident in the state."},{"name":"Dunsmuir Hellman Historic Estate","county":"Alameda","emoji":"🏰","lat":37.7758,"lon":-122.1736,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Dunsmuir_House_Oakland.jpg/320px-Dunsmuir_House_Oakland.jpg","fact":"The Dunsmuir Mansion, built in <em>1899</em> for coal baron Alexander Dunsmuir as a wedding gift to his mistress, was occupied for exactly one month before both newlyweds died — she from illness, he from shock. The 37-room Neoclassical mansion is now an event venue and its 50-acre grounds include one of the finest Italian formal gardens in California."},{"name":"Peralta Adobe, San Jose Historic Site","county":"Alameda","emoji":"🏚","lat":37.7858,"lon":-122.2161,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Oakland_Museum_of_California.jpg/320px-Oakland_Museum_of_California.jpg","fact":"The Peralta family received the largest <em>Mexican land grant</em> in the Bay Area — 44,000 acres covering all of modern Oakland, Berkeley, Alameda, and Emeryville — as a reward for military service in 1820. The grant's boundaries were established by horseback, with the patriarch riding the perimeter and his sons following behind."},{"name":"USS Potomac — Presidential Yacht","county":"Alameda","emoji":"⚓","lat":37.7947,"lon":-122.2817,"cat":"Historic Ship","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/USS_Potomac_Oakland.jpg/320px-USS_Potomac_Oakland.jpg","fact":"The USS Potomac was Franklin D. Roosevelt's <em>presidential yacht</em>, called the 'Floating White House,' where FDR held secret meetings with Winston Churchill and other world leaders during World War II. After a complex history of neglect, drug seizure, and restoration, the ship is now permanently moored at Jack London Square and open for tours."},{"name":"Alameda — Historic Naval Air Station","county":"Alameda","emoji":"✈️","lat":37.7783,"lon":-122.3097,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/USS_Potomac_Oakland.jpg/320px-USS_Potomac_Oakland.jpg","fact":"NAS Alameda was home to the <em>USS Hornet</em> aircraft carrier whose planes launched the Doolittle Raid on Tokyo in 1942 — the first American attack on the Japanese mainland. The base also recovered the Apollo 11 and Apollo 12 astronauts after their splashdowns — the Navy ships bringing them home docked here."},{"name":"USS Hornet Sea, Air and Space Museum","county":"Alameda","emoji":"🚀","lat":37.7736,"lon":-122.3025,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/USS_Hornet_museum_Alameda.jpg/320px-USS_Hornet_museum_Alameda.jpg","fact":"The USS Hornet recovered the <em>Apollo 11 and Apollo 12 astronauts</em> from the Pacific Ocean after their moon missions — the quarantine facility where Neil Armstrong was kept after returning from the moon is still aboard the ship. The carrier also served in three wars and launched the first jet aircraft to fly off a carrier deck."},{"name":"Alameda — Victorian Architecture District","county":"Alameda","emoji":"🏘","lat":37.7652,"lon":-122.2416,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/USS_Potomac_Oakland.jpg/320px-USS_Potomac_Oakland.jpg","fact":"Alameda has the highest concentration of <em>Victorian houses</em> of any city in the Bay Area — over 3,000 buildings from the 1880s and 1890s that survived because the city was bypassed by development. The island city's separation from the mainland slowed growth enough that most of its 19th-century housing stock remains intact."},{"name":"College of Alameda — Historic Site","county":"Alameda","emoji":"🏛","lat":37.7769,"lon":-122.2906,"cat":"Education","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/USS_Potomac_Oakland.jpg/320px-USS_Potomac_Oakland.jpg","fact":"The College of Alameda campus sits on land that was once the primary <em>seaplane base</em> for Pan American World Airways' transpacific flying boat service in the 1930s. Pan Am's China Clipper took off from just offshore on its inaugural flight to Manila in 1935 — the first commercial transpacific air service in history."},{"name":"Fruitvale — Historic Produce District","county":"Alameda","emoji":"🍎","lat":37.7747,"lon":-122.2244,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Fruitvale_Station_BART.jpg/320px-Fruitvale_Station_BART.jpg","fact":"Fruitvale earned its name as the <em>leading fruit-shipping district</em> in the East Bay — in the 1890s, the area's orchards produced cherries, apricots, and peaches loaded directly onto trains at the Fruitvale station. The station area is now a vibrant Latino commercial district, and its 2003 transit village was the first transit-oriented development built over a BART station."},{"name":"San Antonio Park, Oakland","county":"Alameda","emoji":"🌳","lat":37.7869,"lon":-122.2364,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Oakland_Museum_of_California.jpg/320px-Oakland_Museum_of_California.jpg","fact":"San Antonio Park sits on land that was once the <em>Mexican rancho</em> of Antonio Peralta, where longhorn cattle grazed across what is now East Oakland. The park's community garden, established in the 1970s, is one of the oldest urban community gardens in California and helped inspire the nationwide urban farming movement."},{"name":"Estuary Park, Oakland","county":"Alameda","emoji":"🌊","lat":37.7939,"lon":-122.2536,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Jack_London_Square_Oakland.jpg/320px-Jack_London_Square_Oakland.jpg","fact":"The Oakland Estuary was once one of the <em>busiest industrial waterways</em> in the Bay Area, lined with shipyards, canneries, and warehouses that employed tens of thousands during World War II. Today's restored shoreline park built on former industrial land is one of the most dramatic examples of waterfront reclamation in California."},{"name":"Hayward Area Historical Society Museum","county":"Alameda","emoji":"🏛","lat":37.6688,"lon":-122.0808,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Coyote_Hills_Regional_Park.jpg/320px-Coyote_Hills_Regional_Park.jpg","fact":"Hayward was founded in <em>1851</em> by William Hayward, who built a hotel at a crossroads that became the main supply stop for miners heading to the Sierra Nevada gold fields. The town grew as a fruit and vegetable farming center serving San Francisco — its proximity to the bay and mild climate made it the breadbasket of the East Bay for decades."},{"name":"Hayward Fault — Observation Point","county":"Alameda","emoji":"⚡","lat":37.6583,"lon":-122.0819,"cat":"Geological","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Coyote_Hills_Regional_Park.jpg/320px-Coyote_Hills_Regional_Park.jpg","fact":"The Hayward Fault runs directly under <em>densely populated cities</em> including Oakland, Berkeley, and Hayward, making it arguably the most dangerous fault in America. The fault is currently 'locked' — accumulating strain that scientists calculate will eventually release in a magnitude 7.0 earthquake that could kill over 800 people and damage 155,000 buildings."},{"name":"Mission San Jose","county":"Alameda","emoji":"⛪","lat":37.538,"lon":-121.9194,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Mission_San_Jose_California.jpg/320px-Mission_San_Jose_California.jpg","fact":"Mission San Jose, founded in <em>1797</em>, was one of the most prosperous missions in California — its orchards, vineyards, and cattle herds supplied food to missions as far away as Santa Barbara. The mission's Ohlone converts revolted in 1828 in one of the largest Native uprisings against the mission system, under a warrior named Estanislao."},{"name":"Ardenwood Historic Farm","county":"Alameda","emoji":"🌾","lat":37.5561,"lon":-122.0336,"cat":"Historic Farm","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Ardenwood_Historic_Farm.jpg/320px-Ardenwood_Historic_Farm.jpg","fact":"Ardenwood was the <em>model farm estate</em> of George Patterson, one of California's most innovative 19th-century agriculturalists, who built a Victorian mansion overlooking his 6,000 acres of wheat. The farm now operates as a living history museum with working draft horses, heirloom crops, and costumed interpreters."},{"name":"Coyote Hills Regional Park","county":"Alameda","emoji":"🦟","lat":37.555,"lon":-122.0811,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Coyote_Hills_Regional_Park.jpg/320px-Coyote_Hills_Regional_Park.jpg","fact":"Coyote Hills contains <em>shell mounds</em> built by Ohlone people over 2,500 years — refuse heaps of clamshells, fish bones, and artifacts that grew into permanent hills rising 30 feet above the bay shore. The mounds are among the best-preserved archaeological sites in the Bay Area, offering an unbroken record of bay ecology stretching back millennia."},{"name":"Don Edwards San Francisco Bay National Wildlife Refuge","county":"Alameda","emoji":"🦅","lat":37.505,"lon":-122.045,"cat":"Wildlife Refuge","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Don_Edwards_NWR.jpg/320px-Don_Edwards_NWR.jpg","fact":"At 30,000 acres, Don Edwards is the <em>largest urban wildlife refuge in the United States</em>, protecting the last major areas of salt marsh and tidal flat on the south end of San Francisco Bay. The refuge's salt ponds — former industrial evaporation ponds turned pink by salt-loving algae — are a surreal landscape visible from commercial flights."},{"name":"Niles Canyon Railway","county":"Alameda","emoji":"🚂","lat":37.5769,"lon":-121.9808,"cat":"Historic Railway","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Niles_Canyon_Railway.jpg/320px-Niles_Canyon_Railway.jpg","fact":"The Niles Canyon line was part of the first <em>transcontinental railroad route</em> into San Francisco Bay, opened in 1869, carrying trains from Sacramento through the canyon before the Dumbarton Bridge route was completed. The canyon was also the location of Charlie Chaplin's first film studio — over 50 silent films were shot in the canyon between 1912 and 1916."},{"name":"Fremont — Centerville Historic District","county":"Alameda","emoji":"🏘","lat":37.5489,"lon":-122.0522,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Ardenwood_Historic_Farm.jpg/320px-Ardenwood_Historic_Farm.jpg","fact":"Centerville was a prosperous farming community in the <em>1870s-1890s</em>, shipping fruit and vegetables by ferry to San Francisco from its own wharf on the bay. The area was consolidated into the new City of Fremont in 1956 — one of five towns merged into a single municipality in one of the most ambitious municipal consolidations in California history."},{"name":"Irvington — Mission Boulevard Historic Corridor","county":"Alameda","emoji":"🛤","lat":37.5294,"lon":-121.9669,"cat":"Historic Route","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Ardenwood_Historic_Farm.jpg/320px-Ardenwood_Historic_Farm.jpg","fact":"Mission Boulevard follows the route of El Camino Real — the <em>'Royal Road'</em> that connected all 21 California missions from San Diego to Sonoma, established between 1769 and 1823. The bell markers placed along the route in the 1900s are still visible at intervals, each casting-iron bell hung from a shepherd's crook post."},{"name":"Newark Slough Wildlife Area","county":"Alameda","emoji":"🦩","lat":37.52,"lon":-122.04,"cat":"Wildlife Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Don_Edwards_NWR.jpg/320px-Don_Edwards_NWR.jpg","fact":"Newark Slough's restored tidal wetlands are a critical nursery for <em>Dungeness crab, herring, and salmon</em> that support the commercial fishing industry of San Francisco Bay. The slough was diked and farmed for a century before restoration began in 1994 — scientists were amazed at how quickly native plants and fish returned once tidal flow was reestablished."},{"name":"Sunol Regional Wilderness","county":"Alameda","emoji":"🦁","lat":37.5133,"lon":-121.8297,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Sunol_Regional_Wilderness.jpg/320px-Sunol_Regional_Wilderness.jpg","fact":"Sunol is the only regional park in the East Bay where <em>cattle still graze</em> as part of active rangeland management — a practice that actually improves habitat for native wildflowers and ground-nesting birds compared to ungrazed grassland. The wilderness area's Alameda Creek contains one of the last viable steelhead trout runs in the San Francisco Bay watershed."},{"name":"Ohlone Wilderness Trail","county":"Alameda","emoji":"🥾","lat":37.55,"lon":-121.8,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Sunol_Regional_Wilderness.jpg/320px-Sunol_Regional_Wilderness.jpg","fact":"The 29-mile Ohlone Wilderness Trail traverses <em>four distinct ecological zones</em> — bay marsh, coastal scrub, valley grassland, and oak woodland — following ancient Native American trading paths across the Diablo Range. The trail requires a permit and a self-contained camp kit because the wilderness has no water sources for long stretches."},{"name":"Del Valle Regional Park","county":"Alameda","emoji":"💧","lat":37.6011,"lon":-121.7411,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Sunol_Regional_Wilderness.jpg/320px-Sunol_Regional_Wilderness.jpg","fact":"Lake Del Valle, created by Arroyo Valle Dam in <em>1968</em>, provides drinking water to Livermore and Pleasanton and recreation to over a million visitors a year. The reservoir's cool, clear water supports an unusual fishery for the East Bay — rainbow and brown trout stocked for year-round angling."},{"name":"Livermore Valley Wine Country","county":"Alameda","emoji":"🍷","lat":37.6819,"lon":-121.768,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Altamont_Pass_Wind_Farm.jpg/320px-Altamont_Pass_Wind_Farm.jpg","fact":"The Livermore Valley has been producing wine since <em>1883</em>, making it California's oldest continuously operating wine region — older than Napa Valley's commercial wine industry. The valley's distinctive gravelly soils were brought inland from the coast by ancient rivers, and the same soil type found here gave rise to Château Pétrus in Bordeaux, France."},{"name":"Lawrence Livermore National Laboratory","county":"Alameda","emoji":"⚛","lat":37.6892,"lon":-121.7058,"cat":"Research Facility","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Altamont_Pass_Wind_Farm.jpg/320px-Altamont_Pass_Wind_Farm.jpg","fact":"Lawrence Livermore Lab has been designing <em>every American nuclear weapon</em> since 1952, and its National Ignition Facility achieved fusion ignition in 2022 — the first time in history that a controlled fusion reaction produced more energy than it consumed. The lab's 800-acre campus employs 8,000 scientists and is the largest employer in the Tri-Valley."},{"name":"Tesla Road — Historic Vineyards","county":"Alameda","emoji":"🍇","lat":37.67,"lon":-121.8,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Altamont_Pass_Wind_Farm.jpg/320px-Altamont_Pass_Wind_Farm.jpg","fact":"Tesla Road is named for the now-vanished coal mining town of Tesla, which operated the largest <em>underground coal mine</em> in California from 1892 to 1914. The town's 2,
