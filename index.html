<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SkyGuide">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="manifest" href="manifest.json">
  <title>SkyGuide — California from Above</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky-dark: #0a0e1a;
      --sky-mid: #0f1829;
      --sky-blue: #1a2a4a;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a6030;
      --white: #f0f4ff;
      --white-dim: #8090b0;
      --red: #e05050;
      --green: #4caf80;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      width:100%; height:100%;
      background:var(--sky-dark);
      color:var(--white);
      font-family:'DM Sans',sans-serif;
      overflow:hidden; position:fixed;
    }
    #stars {
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(26,42,74,0.8) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(15,24,41,0.9) 0%, transparent 60%),
        var(--sky-dark);
    }
    #stars::before {
      content:''; position:absolute; inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 33% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 5%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 48% 35%, rgba(201,168,76,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 42%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 92%, rgba(255,255,255,0.4) 0%, transparent 100%);
    }
    #app {
      position:relative; z-index:1;
      width:100%; height:100%;
      display:flex; flex-direction:column;
      overflow:hidden;
    }
    header {
      padding:52px 24px 14px;
      display:flex; align-items:flex-end; justify-content:space-between;
      flex-shrink:0;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .logo-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:36px; letter-spacing:4px; color:var(--white); line-height:1;
    }
    .logo-sub {
      font-family:'DM Mono',monospace;
      font-size:9px; letter-spacing:3px; color:var(--gold);
      text-transform:uppercase; margin-top:2px;
    }
    .header-right { text-align:right; }
    .lm-count {
      font-family:'DM Mono',monospace; font-size:9px;
      letter-spacing:2px; color:var(--white-dim); text-transform:uppercase;
    }
    .lm-count span { display:block; font-size:22px; color:var(--gold-light); font-family:'Bebas Neue',sans-serif; letter-spacing:2px; }

    /* auto-refresh countdown */
    #refreshBar {
      height:3px; background:rgba(255,255,255,0.06);
      flex-shrink:0; position:relative; overflow:hidden;
    }
    #refreshFill {
      position:absolute; left:0; top:0; height:100%;
      background:linear-gradient(90deg, var(--gold-dim), var(--gold));
      width:100%;
      transition:width 1s linear;
    }

    #scroll {
      flex:1; overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      padding:0 18px 60px;
    }
    #scroll::-webkit-scrollbar { display:none; }

    /* status strip */
    .status-strip {
      display:flex; align-items:center; gap:8px;
      padding:9px 14px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:10px; margin:14px 0 16px;
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.5px;
    }
    .status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .status-dot.idle { background:var(--white-dim); }
    .status-dot.scanning { background:var(--gold); animation:pulse 1.2s ease-in-out infinite; }
    .status-dot.found { background:var(--green); }
    .status-dot.error { background:var(--red); }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1);}
      50%{opacity:0.4;transform:scale(0.7);}
    }
    .status-text { color:var(--white-dim); flex:1; }
    #nextScanLabel {
      font-family:'DM Mono',monospace; font-size:9px;
      color:var(--gold-dim); white-space:nowrap;
    }

    /* scan button */
    .scan-wrap { display:flex; justify-content:center; margin:4px 0 22px; }
    #scanBtn {
      position:relative; width:160px; height:160px;
      border-radius:50%; border:none; cursor:pointer; background:none; -webkit-appearance:none;
    }
    .btn-ring {
      position:absolute; inset:0; border-radius:50%;
      border:2px solid rgba(201,168,76,0.25); transition:border-color 0.3s;
    }
    .btn-ring-2 { position:absolute; inset:10px; border-radius:50%; border:1px solid rgba(201,168,76,0.12); }
    .btn-core {
      position:absolute; inset:20px; border-radius:50%;
      background:linear-gradient(145deg,rgba(201,168,76,0.12),rgba(201,168,76,0.04));
      border:1.5px solid rgba(201,168,76,0.35);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      transition:all 0.2s;
    }
    #scanBtn:active .btn-core { background:linear-gradient(145deg,rgba(201,168,76,0.28),rgba(201,168,76,0.1)); transform:scale(0.97); }
    #scanBtn.scanning .btn-ring { border-color:rgba(201,168,76,0.6); animation:spin 3s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
    .btn-icon { font-size:30px; line-height:1; }
    .btn-label { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:3px; color:var(--gold-light); }
    .btn-sub { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--gold-dim); text-transform:uppercase; }

    /* result card */
    #resultCard {
      display:none;
      border-radius:20px; overflow:hidden;
      margin-bottom:20px;
      border:1px solid rgba(201,168,76,0.25);
      animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    #resultCard.visible { display:block; }
    @keyframes cardIn {
      from{opacity:0;transform:translateY(16px) scale(0.97);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }
    .card-photo {
      width:100%; height:160px; object-fit:cover;
      display:block; background:#1a2a4a;
    }
    .card-photo-placeholder {
      width:100%; height:160px;
      display:flex; align-items:center; justify-content:center;
      font-size:60px;
      background:linear-gradient(135deg, rgba(201,168,76,0.08), rgba(26,42,74,0.8));
    }
    .card-inner {
      background:linear-gradient(135deg,rgba(201,168,76,0.07) 0%,rgba(255,255,255,0.02) 100%);
      padding:16px 18px 18px;
    }
    .card-top-row {
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
      margin-bottom:10px;
    }
    .card-title-block { flex:1; min-width:0; }
    .card-label {
      font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px;
      color:var(--gold); text-transform:uppercase; margin-bottom:3px;
    }
    .card-name {
      font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:1px;
      color:var(--white); line-height:1.05;
    }
    .card-meta {
      font-family:'DM Mono',monospace; font-size:10px;
      color:var(--white-dim); margin-top:3px;
    }
    .card-meta strong { color:var(--gold-light); font-weight:400; }

    /* compass widget */
    .compass-wrap {
      flex-shrink:0;
      display:flex; flex-direction:column; align-items:center; gap:3px;
    }
    .compass {
      width:56px; height:56px; border-radius:50%;
      border:1.5px solid rgba(201,168,76,0.3);
      background:radial-gradient(circle, rgba(201,168,76,0.06) 0%, rgba(10,14,26,0.8) 100%);
      position:relative; display:flex; align-items:center; justify-content:center;
    }
    .compass-needle {
      width:2px; height:40px;
      position:absolute; top:50%; left:50%;
      transform-origin:bottom center;
      margin-left:-1px; margin-top:-40px;
    }
    .compass-needle-north {
      width:0; height:0;
      border-left:4px solid transparent;
      border-right:4px solid transparent;
      border-bottom:20px solid var(--gold);
      position:absolute; top:0; left:50%; transform:translateX(-50%);
    }
    .compass-needle-south {
      width:0; height:0;
      border-left:4px solid transparent;
      border-right:4px solid transparent;
      border-top:20px solid rgba(255,255,255,0.2);
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    }
    .compass-dir {
      font-family:'Bebas Neue',sans-serif; font-size:18px;
      color:var(--gold-light); letter-spacing:1px;
    }
    .compass-deg {
      font-family:'DM Mono',monospace; font-size:8px;
      color:var(--white-dim);
    }

    .card-fact {
      font-size:14px; line-height:1.7; font-weight:300;
      color:var(--white); border-top:1px solid rgba(255,255,255,0.06);
      padding-top:12px;
    }
    .card-fact em { color:var(--gold-light); font-style:normal; font-weight:500; }

    /* nearby list */
    .section-label {
      font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px;
      color:var(--white-dim); text-transform:uppercase; margin-bottom:10px;
    }
    #nearbyList { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
    .nearby-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 14px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:12px; cursor:pointer; transition:all 0.2s;
    }
    .nearby-item:active { background:rgba(201,168,76,0.08); border-color:rgba(201,168,76,0.2); }
    .nearby-thumb {
      width:44px; height:44px; border-radius:8px;
      object-fit:cover; flex-shrink:0;
      background:rgba(201,168,76,0.08);
    }
    .nearby-thumb-emoji {
      width:44px; height:44px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:22px; flex-shrink:0;
      background:rgba(201,168,76,0.06);
    }
    .nearby-info { flex:1; min-width:0; }
    .nearby-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nearby-meta {
      font-family:'DM Mono',monospace; font-size:10px;
      color:var(--white-dim); margin-top:2px;
    }
    .nearby-bearing {
      font-family:'DM Mono',monospace; font-size:11px;
      color:var(--gold-dim); flex-shrink:0; text-align:right;
    }

    /* offline / install */
    #offlineBanner {
      display:none; margin:10px 0;
      padding:9px 14px;
      background:rgba(76,175,128,0.1);
      border:1px solid rgba(76,175,128,0.3);
      border-radius:10px;
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.5px; color:var(--green);
    }
    #offlineBanner.show { display:flex; align-items:center; gap:8px; }

    #installPrompt {
      display:none; margin:10px 0;
      padding:14px 16px;
      background:rgba(201,168,76,0.05);
      border:1px solid rgba(201,168,76,0.18);
      border-radius:14px;
    }
    #installPrompt.show { display:block; }
    .install-title { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; color:var(--gold-light); margin-bottom:4px; }
    .install-body { font-size:12px; font-weight:300; color:var(--white-dim); line-height:1.5; }
    #installBtn {
      margin-top:8px; padding:7px 16px;
      background:rgba(201,168,76,0.12);
      border:1px solid rgba(201,168,76,0.35);
      border-radius:8px; color:var(--gold-light);
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px; cursor:pointer;
    }

    /* GPS readout */
    #gpsReadout {
      padding:9px 14px;
      background:var(--card-bg); border:1px solid var(--card-border);
      border-radius:10px; margin-top:4px;
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.5px;
      color:var(--white-dim); display:flex; gap:10px; flex-wrap:wrap;
    }
    .horizon-line {
      width:100%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(201,168,76,0.2),transparent);
      margin:16px 0;
    }

    /* ── Flight Panel ── */
    #flightPanel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius:16px; padding:14px 16px;
      margin-bottom:16px;
    }
    .fp-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:12px;
    }
    .fp-title {
      font-family:'DM Mono',monospace; font-size:9px;
      letter-spacing:3px; color:var(--gold); text-transform:uppercase;
    }
    .fp-toggle {
      font-family:'DM Mono',monospace; font-size:9px;
      color:var(--white-dim); cursor:pointer; letter-spacing:1px;
      background:none; border:none; color:var(--white-dim);
      padding:2px 6px;
    }
    .fp-row {
      display:grid; grid-template-columns:1fr 1fr; gap:10px;
      margin-bottom:10px;
    }
    .fp-field { display:flex; flex-direction:column; gap:4px; }
    .fp-label {
      font-family:'DM Mono',monospace; font-size:9px;
      letter-spacing:1px; color:var(--white-dim); text-transform:uppercase;
    }
    .fp-input-wrap {
      display:flex; align-items:center; gap:6px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; padding:0 10px; height:38px;
    }
    .fp-input-wrap:focus-within {
      border-color:rgba(201,168,76,0.4);
    }
    .fp-input {
      background:none; border:none; outline:none;
      color:var(--white); font-family:'DM Mono',monospace;
      font-size:16px; width:100%; text-align:center;
      -webkit-appearance:none;
    }
    .fp-unit {
      font-family:'DM Mono',monospace; font-size:10px;
      color:var(--gold-dim); flex-shrink:0;
    }

    /* heading dial */
    .fp-heading-wrap {
      display:flex; align-items:center; gap:14px;
    }
    .fp-dial-container { position:relative; flex-shrink:0; }
    .fp-dial {
      width:72px; height:72px; border-radius:50%;
      border:1.5px solid rgba(201,168,76,0.25);
      background:radial-gradient(circle, rgba(201,168,76,0.05) 0%, rgba(10,14,26,0.9) 100%);
      position:relative; cursor:pointer;
      touch-action:none;
    }
    .fp-dial-plane {
      position:absolute; top:50%; left:50%;
      width:24px; height:24px;
      transform:translate(-50%,-50%);
      font-size:22px; line-height:1;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      transition:transform 0.15s ease;
    }
    .fp-dial-tick {
      position:absolute; top:3px; left:50%; width:2px; height:8px;
      background:var(--gold); border-radius:1px;
      transform-origin:bottom center;
      margin-left:-1px;
    }
    .fp-dial-n {
      position:absolute; top:5px; left:50%;
      transform:translateX(-50%);
      font-family:'Bebas Neue',sans-serif; font-size:10px;
      color:var(--gold); pointer-events:none;
    }
    .fp-heading-info { flex:1; }
    .fp-heading-big {
      font-family:'Bebas Neue',sans-serif; font-size:36px;
      letter-spacing:2px; color:var(--white); line-height:1;
    }
    .fp-heading-dir {
      font-family:'DM Mono',monospace; font-size:11px;
      color:var(--gold-light); margin-top:2px;
    }
    .fp-heading-hint {
      font-family:'DM Mono',monospace; font-size:9px;
      color:var(--white-dim); margin-top:4px; line-height:1.4;
    }

    /* ETA ribbon on card */
    .card-eta {
      display:none;
      margin: 0 -18px;
      padding:10px 18px;
      background:linear-gradient(90deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
      border-top:1px solid rgba(201,168,76,0.2);
      border-bottom:1px solid rgba(201,168,76,0.1);
    }
    .card-eta.show { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .eta-block { display:flex; flex-direction:column; }
    .eta-label {
      font-family:'DM Mono',monospace; font-size:8px;
      letter-spacing:2px; color:var(--gold-dim); text-transform:uppercase;
    }
    .eta-value {
      font-family:'Bebas Neue',sans-serif; font-size:24px;
      letter-spacing:1px; color:var(--gold-light); line-height:1.1;
    }
    .eta-sep {
      width:1px; height:36px; background:rgba(201,168,76,0.2);
      flex-shrink:0; margin:0 2px;
    }
    .eta-approach {
      font-family:'DM Mono',monospace; font-size:10px;
      color:var(--white-dim); flex:1; line-height:1.5;
    }
    .eta-approach strong { color:var(--white); }

    /* nearby ETA badge */
    .nearby-eta {
      font-family:'DM Mono',monospace; font-size:9px;
      color:var(--gold); margin-top:1px;
    }
    /* ETA ribbon on card */
    .card-eta {
      display:none;
      margin: 12px -18px -18px;
      padding:12px 18px;
      background:linear-gradient(90deg, rgba(201,168,76,0.1), rgba(201,168,76,0.03));
      border-top:1px solid rgba(201,168,76,0.2);
      border-radius:0 0 0 0;
      gap:10px; flex-wrap:wrap; align-items:center;
    }
    .card-eta.show { display:flex; }
    .eta-block { display:flex; flex-direction:column; }
    .eta-label {
      font-family:'DM Mono',monospace; font-size:8px;
      letter-spacing:2px; color:var(--gold-dim); text-transform:uppercase;
    }
    .eta-value {
      font-family:'Bebas Neue',sans-serif; font-size:26px;
      letter-spacing:1px; color:var(--gold-light); line-height:1.1;
    }
    .eta-sep { width:1px; height:36px; background:rgba(201,168,76,0.2); flex-shrink:0; }
    .eta-approach {
      font-family:'DM Mono',monospace; font-size:10px;
      color:var(--white-dim); flex:1; line-height:1.6; min-width:100px;
    }
    .eta-approach strong { color:var(--white); }
  </style>
</head>
<body>
<div id="stars"></div>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-title">SkyGuide</div>
      <div class="logo-sub">California from Above</div>
    </div>
    <div class="header-right">
      <div class="lm-count">Landmarks<span id="landmarkCount">—</span></div>
    </div>
  </header>

  <div id="refreshBar"><div id="refreshFill"></div></div>

  <div id="scroll">

    <div id="offlineBanner"><span>●</span> OFFLINE MODE — GPS still active</div>
    <div id="installPrompt">
      <div class="install-title">✈ Add to Home Screen</div>
      <div class="install-body">Install SkyGuide once on WiFi before your flight. Opens fully offline in Airplane Mode — no internet needed.</div>
      <button id="installBtn">INSTALL APP</button>
    </div>

    <div class="status-strip">
      <div class="status-dot idle" id="statusDot"></div>
      <div class="status-text" id="statusText">Tap to find what's beneath you</div>
      <div id="nextScanLabel"></div>
    </div>

    <div class="scan-wrap">
      <button id="scanBtn" onclick="startScan()">
        <div class="btn-ring"></div>
        <div class="btn-ring-2"></div>
        <div class="btn-core">
          <div class="btn-icon">✈️</div>
          <div class="btn-label">What's Below</div>
          <div class="btn-sub">Tap to scan</div>
        </div>
      </button>
    </div>

    <div id="resultCard">
      <div id="cardPhotoWrap"></div>
      <div class="card-inner">
        <div class="card-top-row">
          <div class="card-title-block">
            <div class="card-label">Nearest Landmark</div>
            <div class="card-name" id="cardName">—</div>
            <div class="card-meta" id="cardMeta">—</div>
          </div>
          <div class="compass-wrap">
            <div class="compass">
              <div class="compass-needle" id="compassNeedle">
                <div class="compass-needle-north"></div>
                <div class="compass-needle-south"></div>
              </div>

    fact:"Anza-Borrego is the <em>largest state park in the contiguous US</em> at 600,000 acres — bigger than Los Angeles County — and contains fossils of camels, horses, and mammoths that roamed here just 10,000 years ago. The park's dark skies are so pristine it was designated an International Dark Sky Community, and on clear nights the Milky Way casts shadows."
  },
  {
    name:"San Joaquin River",
    emoji:"🌊",
    lat:37.3382, lon:-121.2768,
    cat:"River",
    photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/San_Joaquin_River_Gorge.jpg/320px-San_Joaquin_River_Gorge.jpg",
    fact:"The San Joaquin River once ran freely for <em>350 miles from the Sierra Nevada to San Francisco Bay</em>, but by 1942 so much water had been diverted that a 60-mile stretch completely dried up — the only major river in the continental US to go entirely dry from human use. A landmark 2006 settlement began restoring flows, and salmon swam its waters again for the first time in 60 years."
  }
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let userLat = null, userLon = null;
let userHeading = null, userSpeed = null;
let autoTimer = null, countdownTimer = null;
let refreshSeconds = 20 * 60; // 20 minutes
let secondsLeft = refreshSeconds;
let deferredInstall = null;
let isScanning = false;

// ═══════════════════════════════════════════════════════════════
//  MATH HELPERS
// ═══════════════════════════════════════════════════════════════
function distanceMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearingDeg(lat1, lon1, lat2, lon2) {
  const dLon = (lon2-lon1)*Math.PI/180;
  const y = Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)
    - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function bearingLabel(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5)%16];
}

function fmtCountdown(s) {
  const m = Math.floor(s/60), sec = s%60;
  return m+'m '+(sec<10?'0':'')+sec+'s';
}

// ═══════════════════════════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════════════════════════
function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot '+state;
  document.getElementById('statusText').textContent = text;
}

// ═══════════════════════════════════════════════════════════════
//  AUTO REFRESH
// ═══════════════════════════════════════════════════════════════
function startAutoRefresh() {
  clearInterval(autoTimer);
  clearInterval(countdownTimer);
  secondsLeft = refreshSeconds;
  updateRefreshBar();

  countdownTimer = setInterval(() => {
    secondsLeft--;
    updateRefreshBar();
    if (secondsLeft <= 0) {
      secondsLeft = refreshSeconds;
      startScan(true);
    }
  }, 1000);
}

function updateRefreshBar() {
  const pct = (secondsLeft / refreshSeconds) * 100;
  document.getElementById('refreshFill').style.width = pct + '%';
  const lbl = document.getElementById('nextScanLabel');
  if (secondsLeft < refreshSeconds) {
    lbl.textContent = 'rescan in ' + fmtCountdown(secondsLeft);
  }
}

// ═══════════════════════════════════════════════════════════════
//  MAIN SCAN
// ═══════════════════════════════════════════════════════════════
function startScan(isAuto) {
  if (isScanning) return;
  if (!navigator.geolocation) {
    setStatus('error','Geolocation not available on this device'); return;
  }
  isScanning = true;
  const btn = document.getElementById('scanBtn');
  btn.classList.add('scanning');
  setStatus('scanning', isAuto ? 'Auto-refreshing location…' : 'Acquiring GPS signal…');

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      isScanning = false;
      btn.classList.remove('scanning');
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      userHeading = pos.coords.heading;   // degrees true, null if stationary
      userSpeed = pos.coords.speed;       // m/s, null if stationary
      const acc = pos.coords.accuracy;
      document.getElementById('gpsLat').textContent = 'LAT '+userLat.toFixed(4);
      document.getElementById('gpsLon').textContent = 'LON '+userLon.toFixed(4);
      document.getElementById('gpsAcc').textContent = userHeading !== null
        ? 'HDG '+Math.round(userHeading)+'° · '+Math.round(userSpeed*2.237)+' mph'
        : 'ACC ±'+Math.round(acc)+'m';
      showResults(userLat, userLon);
      if (!isAuto) startAutoRefresh();
    },
    (err) => {
      isScanning = false;
      btn.classList.remove('scanning');
      let msg = 'GPS error — ';
      if (err.code===1) msg += 'location permission denied.';
      else if (err.code===2) msg += 'position unavailable.';
      else if (err.code===3) msg += 'timed out. Tap to retry.';
      setStatus('error', msg);
    },
    { enableHighAccuracy:true, timeout:15000, maximumAge:60000 }
  );
}

// ═══════════════════════════════════════════════════════════════
//  SHOW RESULTS
// ═══════════════════════════════════════════════════════════════
function showResults(lat, lon) {
  const sorted = LANDMARKS.map(lm => ({
    ...lm,
    distance: distanceMiles(lat, lon, lm.lat, lm.lon),
    bearing: bearingDeg(lat, lon, lm.lat, lm.lon)
  })).sort((a,b) => a.distance - b.distance);

  const n = sorted[0];
  setStatus('found', n.name + ' · ' + n.distance.toFixed(1) + ' mi ' + bearingLabel(n.bearing));
  renderCard(n);

  // nearby
  const list = document.getElementById('nearbyList');
  list.innerHTML = '';
  sorted.slice(1,6).forEach(lm => {
    const row = document.createElement('div');
    row.className = 'nearby-item';
    const thumbHtml = lm.photo
      ? `<img class="nearby-thumb" src="${lm.photo}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="${lm.name}"><div class="nearby-thumb-emoji" style="display:none">${lm.emoji}</div>`
      : `<div class="nearby-thumb-emoji">${lm.emoji}</div>`;
    row.innerHTML = `
      ${thumbHtml}
      <div class="nearby-info">
        <div class="nearby-name">${lm.name}</div>
        <div class="nearby-meta">${lm.distance.toFixed(1)} mi · ${lm.cat}</div>
      </div>
      <div class="nearby-bearing">${bearingLabel(lm.bearing)}<br><span style="font-size:9px">${Math.round(lm.bearing)}°</span></div>
    `;
    row.onclick = () => { renderCard(lm); document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'}); };
    list.appendChild(row);
  });
  document.getElementById('nearbySection').style.display = 'block';

  setTimeout(() => {
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'});
  }, 120);
}

function renderCard(lm) {
  // photo
  const wrap = document.getElementById('cardPhotoWrap');
  if (lm.photo) {
    wrap.innerHTML = `<img class="card-photo" src="${lm.photo}" alt="${lm.name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="card-photo-placeholder" style="display:none">${lm.emoji}</div>`;
  } else {
    wrap.innerHTML = `<div class="card-photo-placeholder">${lm.emoji}</div>`;
  }

  document.getElementById('cardName').textContent = lm.name;
  document.getElementById('cardMeta').innerHTML =
    '<strong>'+(lm.distance?lm.distance.toFixed(1):'?')+' miles</strong> · '+lm.cat;
  document.getElementById('cardFact').innerHTML = lm.fact;

  // compass
  if (lm.bearing !== undefined) {
    document.getElementById('compassNeedle').style.transform = `rotate(${lm.bearing}deg)`;
    document.getElementById('compassDir').textContent = bearingLabel(lm.bearing);
    document.getElementById('compassDeg').textContent = Math.round(lm.bearing)+'°';
  }

  // ETA ribbon — only if we have heading + speed from GPS
  renderETA(lm);

  const card = document.getElementById('resultCard');
  card.classList.remove('visible');
  void card.offsetWidth;
  card.classList.add('visible');
}

// ── ETA calculation using GPS-provided heading & speed (no user input) ──
// Uses closest point of approach along flight path vector.
// heading: degrees true, speed: m/s from GPS
function renderETA(lm) {
  const etaEl = document.getElementById('cardETA');
  if (!etaEl) return;

  if (userHeading === null || userSpeed === null || userSpeed < 10) {
    // Speed < 10 m/s (~22 mph) = not airborne or stationary — hide ribbon
    etaEl.className = 'card-eta';
    etaEl.innerHTML = '';
    return;
  }

  const speedMph = userSpeed * 2.23694;
  const hdgRad = userHeading * Math.PI / 180;

  // Unit vector of flight path
  const dx = Math.sin(hdgRad);
  const dy = Math.cos(hdgRad);

  // Vector from plane to landmark (in rough miles, flat-earth ok for short distances)
  const milesPerDegLat = 69.0;
  const milesPerDegLon = 69.0 * Math.cos(userLat * Math.PI / 180);
  const vx = (lm.lon - userLon) * milesPerDegLon;
  const vy = (lm.lat - userLat) * milesPerDegLat;

  // Project landmark onto flight path: t = dot(v, d)
  const t = vx * dx + vy * dy;

  if (t < 0) {
    // Landmark is behind the plane
    etaEl.className = 'card-eta show';
    etaEl.innerHTML = `
      <div class="eta-block">
        <div class="eta-label">Direction</div>
        <div class="eta-value" style="font-size:18px;color:var(--white-dim)">Behind</div>
      </div>
      <div class="eta-approach">This landmark is <strong>behind your current heading</strong>. You've already passed over or are flying away from it.</div>
    `;
    return;
  }

  // Closest approach point
  const closestX = dx * t;
  const closestY = dy * t;
  const offsetMiles = Math.sqrt((vx - closestX)**2 + (vy - closestY)**2);
  const etaMinutes = t / speedMph * 60;

  const hh = Math.floor(etaMinutes / 60);
  const mm = Math.round(etaMinutes % 60);
  const etaStr = hh > 0 ? `${hh}h ${mm}m` : `${mm} min`;
  const sideStr = offsetMiles < 2 ? 'Directly overhead' :
    ((vx * dy - vy * dx) > 0 ? `${offsetMiles.toFixed(0)} mi to your right` : `${offsetMiles.toFixed(0)} mi to your left`);

  etaEl.className = 'card-eta show';
  etaEl.innerHTML = `
    <div class="eta-block">
      <div class="eta-label">ETA</div>
      <div class="eta-value">${etaStr}</div>
    </div>
    <div class="eta-sep"></div>
    <div class="eta-block">
      <div class="eta-label">At ${Math.round(speedMph)} mph</div>
      <div class="eta-value" style="font-size:16px">${t.toFixed(0)} mi</div>
    </div>
    <div class="eta-sep"></div>
    <div class="eta-approach"><strong>${sideStr}</strong> — ${offsetMiles < 1 ? 'look straight down!' : 'look out your window'}</div>
  `;
}

// ═══════════════════════════════════════════════════════════════
//  PWA
// ═══════════════════════════════════════════════════════════════
window.addEventListener('online', () => document.getElementById('offlineBanner').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('show'));
if (!navigator.onLine) document.getElementById('offlineBanner').classList.add('show');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstall = e;
  document.getElementById('installPrompt').classList.add('show');
});
document.getElementById('installBtn').onclick = async () => {
  if (deferredInstall) {
    deferredInstall.prompt();
    const r = await deferredInstall.userChoice;
    if (r.outcome==='accepted') document.getElementById('installPrompt').classList.remove('show');
    deferredInstall = null;
  }
};

document.getElementById('landmarkCount').textContent = LANDMARKS.length;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
