000 residents evaporated overnight when the mine closed, and today the only evidence is a few depressions in the ground and a cemetery hidden in the oak woodland."},{"name":"Pleasanton Downtown Historic District","county":"Alameda","emoji":"🏘","lat":37.6624,"lon":-121.8747,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Sunol_Regional_Wilderness.jpg/320px-Sunol_Regional_Wilderness.jpg","fact":"Pleasanton's Main Street has been continuously commercial since the <em>1860s</em> and retains the scale and character of a 19th-century California market town. The town earned the nickname 'Most Desperate Town in the West' during the 1890s for its tolerance of gambling halls and outlaws — a reputation locals now celebrate at an annual festival."},{"name":"Shadow Cliffs Regional Recreation Area","county":"Alameda","emoji":"💧","lat":37.6567,"lon":-121.8603,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Sunol_Regional_Wilderness.jpg/320px-Sunol_Regional_Wilderness.jpg","fact":"Shadow Cliffs was created by <em>gravel dredging operations</em> that extracted sand and gravel for Bay Area construction from the 1950s through the 1980s — the excavated pits filled with groundwater to create the lake. The swimming area and waterslide are among the most popular summer recreation spots in the East Bay."},{"name":"Altamont Pass Wind Farm","county":"Alameda","emoji":"💨","lat":37.73,"lon":-121.65,"cat":"Energy","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Altamont_Pass_Wind_Farm.jpg/320px-Altamont_Pass_Wind_Farm.jpg","fact":"The Altamont Pass Wind Farm, established in <em>1981</em>, was the first large-scale wind energy project in the United States and helped establish California as the world leader in renewable energy. The 5,000 turbines generate enough electricity to power 120,000 homes — though the older-style turbines have been controversial for killing raptors, and newer designs are replacing them."},{"name":"Berkeley Marina and Aquatic Park","county":"Alameda","emoji":"⛵","lat":37.8636,"lon":-122.3172,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Lawrence_Hall_of_Science.jpg/320px-Lawrence_Hall_of_Science.jpg","fact":"The Berkeley Marina was built on <em>900 acres of landfill</em> created from the city's garbage over 40 years — the mounds of the former landfill are still visible as hills in Cesar Chavez Park. The marina's constant afternoon winds have made it one of the best locations in the Bay Area for kite flying, with the Berkeley Kite Festival drawing 50,000 people each year."},{"name":"UC Berkeley — Sather Tower (Campanile)","county":"Alameda","emoji":"🏛","lat":37.8724,"lon":-122.2595,"cat":"University Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Campanile_UC_Berkeley.jpg/320px-Campanile_UC_Berkeley.jpg","fact":"Sather Tower, modeled after the <em>Campanile di San Marco</em> in Venice and completed in 1914, stands 307 feet tall and houses a 61-bell carillon played by students three times daily. The tower's observation deck offers a 360-degree view that on clear days extends from the Farallon Islands to the Sierra Nevada — a 200-mile panorama."},{"name":"UC Berkeley — Lawrence Hall of Science","county":"Alameda","emoji":"🔬","lat":37.8795,"lon":-122.2472,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Lawrence_Hall_of_Science.jpg/320px-Lawrence_Hall_of_Science.jpg","fact":"Lawrence Hall of Science sits on the Berkeley hills above campus and was the first science museum in the United States designed as a <em>public learning laboratory</em> rather than a display institution — visitors are encouraged to conduct real experiments. The building's rooftop terrace offers one of the best views of the Bay Area available to the public."},{"name":"Tilden Regional Park","county":"Alameda","emoji":"🌿","lat":37.8944,"lon":-122.2428,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Tilden_Regional_Park_merry_go_round.jpg/320px-Tilden_Regional_Park_merry_go_round.jpg","fact":"Tilden Park's <em>steam train, antique carousel, and botanical garden</em> were built during the Depression by unemployed workers through the Civil Conservation Corps — and all three still operate today. The park's Brazilian Room, a redwood pavilion built in 1938, was a gift from Brazil to California and has hosted dances, weddings, and concerts for 85 years."},{"name":"Claremont Hotel and Spa","county":"Alameda","emoji":"🏨","lat":37.8589,"lon":-122.2428,"cat":"Historic Hotel","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Claremont_Resort_Berkeley_Hills.jpg/320px-Claremont_Resort_Berkeley_Hills.jpg","fact":"The Claremont Hotel, opened in <em>1915</em>, is one of the most recognizable landmarks on the Bay Area skyline — its white towers visible from San Francisco across the bay. The hotel sits exactly on the Hayward Fault; the fault line runs under the tennis courts, and a painted stripe on the court marks where the two sides have moved relative to each other over decades."},{"name":"Emeryville Shellmound Site","county":"Alameda","emoji":"🏺","lat":37.8333,"lon":-122.2906,"cat":"Archaeological Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Oakland_Museum_of_California.jpg/320px-Oakland_Museum_of_California.jpg","fact":"The Emeryville Shellmound was the <em>largest and oldest shell mound</em> in the Bay Area — a 60-foot-high mound of oyster shells, human burials, and artifacts accumulated by Ohlone people over 3,500 years. The mound was completely destroyed in 1924 to build a paint factory, and the area is now a shopping mall — one of the most significant archaeological sites in California lost to development."},{"name":"Oakland Chinatown","county":"Alameda","emoji":"🏮","lat":37.7969,"lon":-122.2697,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Oakland_Chinatown.jpg/320px-Oakland_Chinatown.jpg","fact":"Oakland Chinatown, established in <em>1852</em>, is older than San Francisco's Chinatown and has been continuously inhabited by Chinese Americans for over 170 years. When San Francisco's Chinatown was destroyed in the 1906 earthquake and fire, thousands of refugees moved to Oakland — tripling the district's size almost overnight."},{"name":"Fruitvale Station Memorial","county":"Alameda","emoji":"🕯","lat":37.7747,"lon":-122.2244,"cat":"Memorial","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Fruitvale_Station_BART.jpg/320px-Fruitvale_Station_BART.jpg","fact":"Fruitvale BART Station was the site of the <em>2009 shooting of Oscar Grant</em> by a transit police officer, an event that sparked international protests about police violence against Black Americans and inspired the film Fruitvale Station. The station's plaza is now a community gathering place with murals memorializing Grant and others lost to police violence."},{"name":"San Leandro Bay Regional Shoreline","county":"Alameda","emoji":"🌊","lat":37.7381,"lon":-122.205,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Fruitvale_Station_BART.jpg/320px-Fruitvale_Station_BART.jpg","fact":"San Leandro Bay was once the most <em>productive shellfish habitat</em> in the East Bay, with oyster beds covering hundreds of acres that fed thousands of Ohlone people for millennia. The bay was filled with industrial waste and garbage through the mid-20th century; today restored wetlands at the shoreline park support hundreds of thousands of shorebirds."},{"name":"San Leandro Heritage Park","county":"Alameda","emoji":"🏚","lat":37.7219,"lon":-122.1561,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Fruitvale_Station_BART.jpg/320px-Fruitvale_Station_BART.jpg","fact":"San Leandro Heritage Park contains the <em>1878 Estudillo House</em>, built by the family who received one of the original Mexican land grants covering much of the East Bay. The house's hand-hewn redwood frame was cut from the Berkeley hills, and the basement still contains the original wine cellar where the family stored homemade wine from their vineyard."},{"name":"Oakland Coliseum","county":"Alameda","emoji":"🏟","lat":37.7516,"lon":-122.2005,"cat":"Stadium","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Oakland-Alameda_County_Coliseum.jpg/320px-Oakland-Alameda_County_Coliseum.jpg","fact":"The Oakland Coliseum, opened in <em>1966</em>, was for decades home to three major professional sports teams simultaneously — a distinction shared only by Madison Square Garden. The stadium's 'Mount Davis' luxury seating addition, built for the 1995 Raiders return, permanently blocked the mountain view that gave the original stadium its character."},{"name":"Mills College — Historic Campus","county":"Alameda","emoji":"🏛","lat":37.7908,"lon":-122.1883,"cat":"Historic Campus","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Oakland_Museum_of_California.jpg/320px-Oakland_Museum_of_California.jpg","fact":"Mills College, founded in <em>1852</em>, is the oldest women's college west of the Rockies and its 135-acre campus contains the finest collection of Arts and Crafts architecture in the East Bay. When trustees voted to admit men in 1990, students organized a two-week strike that became national news — the board reversed the decision within days."},{"name":"Knowland Family Historic Site","county":"Alameda","emoji":"🌿","lat":37.7528,"lon":-122.1461,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Redwood_Regional_Park_Oakland.jpg/320px-Redwood_Regional_Park_Oakland.jpg","fact":"Joseph Knowland purchased the <em>Leona Heights hills</em> in the 1920s specifically to prevent their development, donating them to the City of Oakland as parkland. His son William served as U.S. Senator and ran unsuccessfully for Governor of California in 1958 — a loss that effectively ended the family's century of political dominance in Alameda County."},{"name":"Chabot Canal — Historic Water System","county":"Alameda","emoji":"💧","lat":37.815,"lon":-122.18,"cat":"Historic Infrastructure","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Redwood_Regional_Park_Oakland.jpg/320px-Redwood_Regional_Park_Oakland.jpg","fact":"Anthony Chabot built the <em>first piped water system</em> in the East Bay in 1875, constructing Lake Chabot and a gravity-fed pipeline to deliver water to Oakland — a project completed without any government funding, financed entirely by private capital. Chabot's engineering marvel is still operational today, over 140 years after it was built."},{"name":"Pleasanton Ridge Regional Park","county":"Alameda","emoji":"🦌","lat":37.6278,"lon":-121.9333,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Sunol_Regional_Wilderness.jpg/320px-Sunol_Regional_Wilderness.jpg","fact":"Pleasanton Ridge offers the <em>best unobstructed views</em> of the Livermore Valley wine country from above, with rows of vineyards visible stretching to the horizon. The ridge is crossed by the Contra Costa-Alameda county line, and the geological boundary between two different rock formations follows almost exactly the same line."},{"name":"Golden Gate Bridge","county":"San Francisco","emoji":"🌉","lat":37.8199,"lon":-122.4783,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/GoldenGateBridge-001.jpg/320px-GoldenGateBridge-001.jpg","fact":"When it opened in <em>1937</em>, the Golden Gate Bridge was the longest suspension bridge in the world, and its distinctive International Orange color was originally just a primer coat that the architect loved so much he made it permanent. The bridge's towers flex up to 16 feet in high winds, and the entire bridge expands and contracts nearly a foot with temperature changes."},{"name":"Alcatraz Island","county":"San Francisco","emoji":"🏝","lat":37.827,"lon":-122.423,"cat":"Historic Prison","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Alcatraz_Island_as_seen_from_above.jpg/320px-Alcatraz_Island_as_seen_from_above.jpg","fact":"Alcatraz held some of America's most notorious criminals including Al Capone and Machine Gun Kelly, but the <em>27-year federal prison era</em> is relatively recent — the island served as a military fort and prison for 80 years before that. In 1969, Native American activists occupied Alcatraz for 19 months under the 'Indians of All Tribes' movement, a landmark event in the American Indian rights movement."},{"name":"Fisherman's Wharf","county":"San Francisco","emoji":"🦀","lat":37.808,"lon":-122.4177,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Fishermans_Wharf_SF.jpg/320px-Fishermans_Wharf_SF.jpg","fact":"Fisherman's Wharf developed in the <em>1850s</em> when Italian immigrant fishermen, primarily from Genoa and Sicily, established a crab and shrimp fishing community along the northern waterfront. The Dungeness crab, still central to the wharf's identity, has been harvested in San Francisco Bay since the Gold Rush."},{"name":"Coit Tower","county":"San Francisco","emoji":"🗼","lat":37.8024,"lon":-122.4058,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Coit_Tower%2C_SF.jpg/320px-Coit_Tower%2C_SF.jpg","fact":"Coit Tower was built in <em>1933</em> with a bequest from eccentric socialite Lillie Hitchcock Coit, who was obsessed with San Francisco's fire department and left money specifically for a monument to firefighters. The tower's interior murals, painted by 25 artists during the Depression, caused a near-scandal for their communist imagery — the city tried to paint them over before public outrage stopped them."},{"name":"Lombard Street","county":"San Francisco","emoji":"🌺","lat":37.8021,"lon":-122.4186,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Lombard_street_in_SF_4.jpg/320px-Lombard_street_in_SF_4.jpg","fact":"Lombard Street's famous eight hairpin turns were added in <em>1922</em> to reduce the grade of a block that was simply too steep to drive straight — before the curves, only horse-drawn vehicles could navigate it. The block's hydrangeas are replanted every year by city workers, and residents of the street have periodically campaigned to charge admission to tourists."},{"name":"Painted Ladies — Alamo Square","county":"San Francisco","emoji":"🏘","lat":37.7762,"lon":-122.433,"cat":"Historic Buildings","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Painted_Ladies_San_Francisco_with_skyline.jpg/320px-Painted_Ladies_San_Francisco_with_skyline.jpg","fact":"The 'Painted Ladies' Victorian row houses facing Alamo Square were built in the <em>1890s</em> as middle-class housing and survived the 1906 earthquake because the fire that consumed downtown never reached this neighborhood. The houses' elaborate paint schemes are a modern innovation — Victorian San Franciscans actually considered bright paint in poor taste and used muted earth tones."},{"name":"Haight-Ashbury Historic District","county":"San Francisco","emoji":"☮","lat":37.7692,"lon":-122.4481,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Haight-Ashbury_street_sign.jpg/320px-Haight-Ashbury_street_sign.jpg","fact":"The Haight-Ashbury district became the epicenter of the <em>1967 Summer of Love</em>, when an estimated 100,000 young people converged on the neighborhood — overwhelming the city's infrastructure and establishing the hippie counterculture as a national phenomenon. The intersection of Haight and Ashbury Streets still draws tourists, though the neighborhood is now among San Francisco's most expensive."},{"name":"Castro District","county":"San Francisco","emoji":"🏳️‍🌈","lat":37.7609,"lon":-122.435,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Castro_district_san_francisco.jpg/320px-Castro_district_san_francisco.jpg","fact":"The Castro became the <em>world's first openly gay neighborhood</em> in the early 1970s, when Harvey Milk established his camera shop and political base on Castro Street. Milk's 1978 assassination by fellow supervisor Dan White, and the subsequent lenient manslaughter verdict, sparked the White Night Riots — events that galvanized the modern LGBT rights movement."},{"name":"Mission Dolores","county":"San Francisco","emoji":"⛪","lat":37.7651,"lon":-122.4269,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Mission_Dolores_Basilica.jpg/320px-Mission_Dolores_Basilica.jpg","fact":"Mission Dolores, founded in <em>1776</em> — just five days before the signing of the Declaration of Independence — is the oldest intact building in San Francisco and survived the 1906 earthquake while the adjacent basilica was destroyed. The mission cemetery contains the graves of over 5,000 Ohlone people who died of disease after conversion."},{"name":"Sutro Baths Ruins","county":"San Francisco","emoji":"🌊","lat":37.78,"lon":-122.5133,"cat":"Historic Ruins","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Sutro_Baths.jpg/320px-Sutro_Baths.jpg","fact":"Sutro Baths, opened in <em>1896</em>, was the world's largest indoor swimming complex — six glass-enclosed saltwater pools holding nearly 2 million gallons. The baths could accommodate 10,000 visitors simultaneously, but were never commercially successful; they burned in 1966 while being demolished for apartments, and their concrete ruins now sit in Golden Gate National Recreation Area."},{"name":"Cliff House","county":"San Francisco","emoji":"🏠","lat":37.7786,"lon":-122.5133,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Cliff_House_2018.jpg/320px-Cliff_House_2018.jpg","fact":"Three successive Cliff Houses have stood on this dramatic oceanfront bluff since <em>1863</em>, each one destroyed by fire, storm, or earthquake. The current building, dating to 1909, survived by being owned by Adolph Sutro, who rebuilt it in fireproof concrete after two earlier wooden structures burned — the ruins of the original Sutro Baths lie just below."},{"name":"Land's End Trail","county":"San Francisco","emoji":"🌊","lat":37.7833,"lon":-122.5119,"cat":"Trail","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Cliff_House_2018.jpg/320px-Cliff_House_2018.jpg","fact":"Land's End sits on the most treacherous stretch of the California coast north of Point Conception — over <em>200 ships have wrecked</em> on the rocks offshore since the Gold Rush, and ribs of wooden hulls are still visible at low tide. The trail hugs the cliff face through cypress groves planted by the same Adolph Sutro who built the Cliff House."},{"name":"Baker Beach","county":"San Francisco","emoji":"🏖","lat":37.7936,"lon":-122.4836,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Baker_Beach_San_Francisco.jpg/320px-Baker_Beach_San_Francisco.jpg","fact":"Baker Beach was the <em>birthplace of Burning Man</em> in 1986, when a small group built and burned a wooden figure on the sand — the event moved to the Black Rock Desert in Nevada after it outgrew the beach. The beach's northern end is clothing-optional and offers one of the most dramatic views of the Golden Gate Bridge from below."},{"name":"Fort Point National Historic Site","county":"San Francisco","emoji":"🏰","lat":37.8103,"lon":-122.4772,"cat":"Historic Fort","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Fort_Point_from_Golden_Gate_Bridge.jpg/320px-Fort_Point_from_Golden_Gate_Bridge.jpg","fact":"Fort Point, completed in <em>1861</em>, was a masterpiece of pre-Civil War military engineering — its 5-foot-thick brick walls were designed to withstand cannon fire and house 500 soldiers. When Strauss designed the Golden Gate Bridge, he built an arch over the fort to preserve it rather than demolish it, a decision that now allows visitors to stand beneath the bridge's south anchorage."},{"name":"Presidio of San Francisco","county":"San Francisco","emoji":"🌲","lat":37.7983,"lon":-122.4544,"cat":"Historic Military","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Presidio_of_San_Francisco.jpg/320px-Presidio_of_San_Francisco.jpg","fact":"The Presidio has been continuously operated as a military base since <em>1776</em> — first by Spain, then Mexico, then the United States — making it the oldest military installation in the American West by over 70 years. When the army left in 1994, it was transferred to the National Park Service and became a national park within a city, with residents paying market-rate rent to live inside."},{"name":"Crissy Field","county":"San Francisco","emoji":"🌊","lat":37.8047,"lon":-122.4661,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Crissy_Field_restored_tidal_marsh.jpg/320px-Crissy_Field_restored_tidal_marsh.jpg","fact":"Crissy Field was one of the most significant <em>early aviation sites</em> in the West — the Army's first air station on the Pacific Coast, where pilots trained for World War I and early air mail routes were inaugurated. The field was paved over as a parking lot in the 1970s before a massive restoration project in 2001 removed the asphalt and restored a mile of tidal marsh."},{"name":"Palace of Fine Arts","county":"San Francisco","emoji":"🏛","lat":37.8031,"lon":-122.4483,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Palace_of_Fine_Arts_San_Francisco.jpg/320px-Palace_of_Fine_Arts_San_Francisco.jpg","fact":"The Palace of Fine Arts was built as a <em>temporary structure</em> for the 1915 Panama-Pacific International Exposition out of plaster and burlap — and was never demolished because San Franciscans loved it too much. The building slowly crumbled for 50 years until a complete reconstruction in concrete in the 1960s, and again in the 2000s."},{"name":"Ghirardelli Square","county":"San Francisco","emoji":"🍫","lat":37.8058,"lon":-122.4228,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Ghirardelli_Square_SF.jpg/320px-Ghirardelli_Square_SF.jpg","fact":"Ghirardelli Square was the first major <em>adaptive reuse of an industrial building</em> in American history — a defunct chocolate factory transformed into a retail complex in 1964, pioneering a form of urban development that is now common worldwide. Domingo Ghirardelli started making chocolate in the building in 1852, and the factory produced chocolate continuously until 1962."},{"name":"Transamerica Pyramid","county":"San Francisco","emoji":"🏢","lat":37.7952,"lon":-122.4028,"cat":"Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Transamerica_Pyramid_San_Francisco.jpg/320px-Transamerica_Pyramid_San_Francisco.jpg","fact":"The Transamerica Pyramid, completed in <em>1972</em>, was deeply controversial when proposed — San Franciscans called it a 'dunce cap' and fought its construction for years. The building's unusual shape is actually a sophisticated structural solution: the tapered form reduces wind load at upper floors by 40% compared to a conventional skyscraper, making it more earthquake-resistant."},{"name":"Ferry Building","county":"San Francisco","emoji":"⛴","lat":37.7956,"lon":-122.3935,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/San_Francisco_Ferry_Building.jpg/320px-San_Francisco_Ferry_Building.jpg","fact":"The Ferry Building, opened in <em>1898</em>, processed 50 million passengers a year at its peak — the second busiest transit terminal in the world after Charing Cross in London — when it was the hub of the ferry system that was the Bay Area's only cross-bay transit. After the Bay Bridge opened in 1936, ferry use collapsed and the building was used as an office building, its famous clock tower hidden behind a freeway for 50 years."},{"name":"Embarcadero Historic Seawall","county":"San Francisco","emoji":"🌊","lat":37.8,"lon":-122.395,"cat":"Historic Infrastructure","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Embarcadero_San_Francisco.jpg/320px-Embarcadero_San_Francisco.jpg","fact":"The Embarcadero seawall was built between <em>1878 and 1916</em> by filling the bay with rubble from the city's many hills, extending the shoreline a quarter mile into the water. The 3-mile seawall is now dangerously undermined by liquefaction risk in earthquakes — the city is undertaking a $5 billion project to rebuild it before the next major quake."},{"name":"Chinatown, San Francisco","county":"San Francisco","emoji":"🏮","lat":37.7941,"lon":-122.4078,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Chinatown_San_Francisco.jpg/320px-Chinatown_San_Francisco.jpg","fact":"San Francisco's Chinatown, established in <em>1848</em>, is the oldest in North America and one of the most densely populated urban neighborhoods in the United States. After the 1906 earthquake destroyed it completely, city officials tried to relocate Chinatown to the industrial waterfront — the Chinese community rebuilt on the original site so quickly that their plan was thwarted within weeks."},{"name":"North Beach — City Lights Bookstore","county":"San Francisco","emoji":"📚","lat":37.7975,"lon":-122.4067,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/City_Lights_Booksellers.jpg/320px-City_Lights_Booksellers.jpg","fact":"City Lights Bookstore, opened by poet Lawrence Ferlinghetti in <em>1953</em>, was the first all-paperback bookstore in the United States and the heart of the Beat Generation literary movement. Ferlinghetti was arrested in 1956 for publishing Allen Ginsberg's 'Howl' on obscenity charges — his acquittal established a landmark precedent for freedom of literary expression."},{"name":"Telegraph Hill and Parrots","county":"San Francisco","emoji":"🦜","lat":37.8024,"lon":-122.4058,"cat":"Natural Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Coit_Tower_San_Francisco.jpg/320px-Coit_Tower_San_Francisco.jpg","fact":"Telegraph Hill is home to a wild flock of <em>50 cherry-headed conures</em> — South American parrots whose ancestors were released or escaped in the 1980s and established a self-sustaining wild population. The parrots became famous through the 2003 documentary 'The Wild Parrots of Telegraph Hill' and are now considered an unofficial city symbol."},{"name":"Nob Hill Historic District","county":"San Francisco","emoji":"🏰","lat":37.793,"lon":-122.4161,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Nob_Hill_San_Francisco.jpg/320px-Nob_Hill_San_Francisco.jpg","fact":"Nob Hill earned its name from the <em>nabobs</em> — the Big Four railroad tycoons Crocker, Hopkins, Huntington, and Stanford — who built their palatial mansions on the hill in the 1870s, reachable only after the cable car was invented. All four mansions were destroyed in the 1906 earthquake and fire; their sites are now occupied by the Fairmont and Mark Hopkins hotels."},{"name":"Twin Peaks","county":"San Francisco","emoji":"🏔","lat":37.7527,"lon":-122.4477,"cat":"Natural Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Twin_Peaks_San_Francisco.jpg/320px-Twin_Peaks_San_Francisco.jpg","fact":"Twin Peaks, rising 922 feet above sea level, offers the most <em>panoramic unobstructed view</em> of San Francisco from within the city limits — a 360-degree sweep from the bay to the ocean. The two peaks were called 'Los Pechos de la Chola' by the Spanish — a descriptive name that early American settlers hastily replaced with the more neutral 'Twin Peaks.'"},{"name":"Dolores Park","county":"San Francisco","emoji":"🌳","lat":37.7596,"lon":-122.4269,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Dolores_Park_San_Francisco.jpg/320px-Dolores_Park_San_Francisco.jpg","fact":"Dolores Park served as a <em>refugee camp</em> for 1,606 survivors of the 1906 earthquake for nearly two years — the largest of several refugee villages established across the city. The park's two small lakes were dug in the 1870s as reservoirs, and the water they held was critical in stopping the fire that consumed the Mission District after the earthquake."},{"name":"Cow Hollow — Octagon House","county":"San Francisco","emoji":"🏠","lat":37.7983,"lon":-122.4347,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Palace_of_Fine_Arts_MC.jpg/320px-Palace_of_Fine_Arts_MC.jpg","fact":"The Octagon House, built in <em>1861</em>, is one of only two surviving octagonal houses in San Francisco from a brief nationwide architectural fad based on the theory that eight-sided homes captured more sunlight and were healthier to live in. The fad's proponent, Orson Squire Fowler, published a 1848 book arguing that round houses had spiritual superiority over square ones."},{"name":"Sutro Forest — Mount Sutro","county":"San Francisco","emoji":"🌲","lat":37.7633,"lon":-122.4561,"cat":"Forest","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Cliff_House_2018.jpg/320px-Cliff_House_2018.jpg","fact":"Mount Sutro's 61-acre eucalyptus forest was planted in the <em>1880s</em> by Adolph Sutro as a private estate and urban lung for San Francisco — the forest is now so dense that its interior resembles a temperate rainforest, with almost no sunlight reaching the ground. The forest is controversial today as the non-native eucalyptus trees shade out native plants, and proposals to cut them trigger fierce community opposition."},{"name":"Divisadero Street — Historic Corridor","county":"San Francisco","emoji":"🛤","lat":37.7764,"lon":-122.4378,"cat":"Historic Street","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Haight-Ashbury_street_sign.jpg/320px-Haight-Ashbury_street_sign.jpg","fact":"Divisadero Street marks the original <em>western boundary of San Francisco</em> — the Spanish word means 'dividing line' — beyond which the city did not extend until the 1880s. The street runs in a perfectly straight line from bay to ocean, bisecting the city across its widest point, and was laid out by Jasper O'Farrell in his famous 1847 street grid."},{"name":"SoMa — South of Market Historic District","county":"San Francisco","emoji":"🏭","lat":37.7785,"lon":-122.4056,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Transamerica_Pyramid_San_Francisco.jpg/320px-Transamerica_Pyramid_San_Francisco.jpg","fact":"South of Market was the <em>working-class heart of Gold Rush San Francisco</em> — a district of boarding houses, factories, and small businesses that housed the laborers who built the city. The district was almost entirely destroyed in the 1906 earthquake and fire, as its shallow sand-filled ground amplified the shaking and made fires impossible to fight."},{"name":"Rincon Hill — Historic Neighborhood","county":"San Francisco","emoji":"🏠","lat":37.7844,"lon":-122.3927,"cat":"Historic Neighborhood","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Embarcadero_San_Francisco.jpg/320px-Embarcadero_San_Francisco.jpg","fact":"Rincon Hill was <em>San Francisco's most fashionable address</em> in the 1850s and 1860s, home to merchants and shipping magnates who built elaborate Italianate mansions on its summit. The hill was literally cut in half in 1869 to make Second Street grade easier — the fill was used to extend the waterfront — and the neighborhood never recovered its social status."},{"name":"Potrero Hill — Civil War Era Shipyard Site","county":"San Francisco","emoji":"⚓","lat":37.7594,"lon":-122.4003,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Bernal_Heights_Park.jpg/320px-Bernal_Heights_Park.jpg","fact":"The Potrero Hill shipyards built <em>wooden sailing ships</em> for the Pacific trade from the 1850s through the 1880s, when the neighborhood was the industrial heart of San Francisco. The hill's naturally sheltered position from bay winds and proximity to the waterfront made it ideal for heavy industry that has now been replaced by tech offices and restaurants."},{"name":"Bernal Heights Park","county":"San Francisco","emoji":"🌄","lat":37.7425,"lon":-122.4161,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Bernal_Heights_Park.jpg/320px-Bernal_Heights_Park.jpg","fact":"Bernal Heights summit offers <em>360-degree views</em> of the entire San Francisco peninsula, including a rare angle showing the bay, ocean, and all the city's major hills simultaneously. The hill's name comes from Californio soldier Joaquin Bernal, who grazed cattle here under a Mexican land grant in the 1820s."},{"name":"Glen Canyon Park","county":"San Francisco","emoji":"🌿","lat":37.7394,"lon":-122.4442,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Twin_Peaks_San_Francisco.jpg/320px-Twin_Peaks_San_Francisco.jpg","fact":"Glen Canyon is a <em>hidden natural gorge</em> in the middle of San Francisco — a 70-foot-deep canyon with a year-round creek and coastal scrub ecosystem surrounded on all sides by the city. The canyon's Islais Creek is one of the last free-flowing streams in San Francisco; all other creeks have been buried in underground pipes."},{"name":"Ocean Beach","county":"San Francisco","emoji":"🏄","lat":37.7594,"lon":-122.5103,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Ocean_Beach_San_Francisco.jpg/320px-Ocean_Beach_San_Francisco.jpg","fact":"Ocean Beach stretches for <em>3.5 miles</em> along the western edge of San Francisco and has the most powerful and dangerous surf on the California coast north of Santa Cruz — rip currents, sneaker waves, and cold water make swimming extremely hazardous. The beach has been the site of over 100 shipwrecks, and buried hulls regularly emerge after major storms erode the sand."},{"name":"San Francisco Botanical Garden","county":"San Francisco","emoji":"🌸","lat":37.7671,"lon":-122.4683,"cat":"Botanical Garden","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/San_Francisco_Botanical_Garden.jpg/320px-San_Francisco_Botanical_Garden.jpg","fact":"The San Francisco Botanical Garden contains the <em>finest collection of Chilean and New Zealand plants</em> in the Northern Hemisphere, thriving in San Francisco's fog climate that mimics their native conditions. The garden's ancient plant collection includes dawn redwoods and cycads — species unchanged from specimens found in 100-million-year-old fossils."},{"name":"Japanese Tea Garden, Golden Gate Park","county":"San Francisco","emoji":"🌸","lat":37.7705,"lon":-122.4699,"cat":"Historic Garden","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/San_Francisco_Japanese_Tea_Garden_2013.JPG/320px-San_Francisco_Japanese_Tea_Garden_2013.JPG","fact":"The Japanese Tea Garden, established in <em>1894</em> for the California Midwinter International Exposition, is the oldest public Japanese garden in the United States. The fortune cookie was invented here by the garden's Japanese-American curator Makoto Hagiwara in the 1890s — a fact disputed by a Los Angeles restaurant in a good-natured ongoing feud."},{"name":"de Young Museum","county":"San Francisco","emoji":"🎨","lat":37.7714,"lon":-122.4686,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/De_Young_Museum_San_Francisco.jpg/320px-De_Young_Museum_San_Francisco.jpg","fact":"The de Young Museum's <em>copper-clad tower</em> is designed to oxidize and match the surrounding trees of Golden Gate Park over decades — a building that literally changes color as it ages. The museum was destroyed in the 1906 earthquake, rebuilt and destroyed again in the 1989 earthquake, and the current building opened in 2005 with a foundation system that can withstand a magnitude 8.0 quake."},{"name":"Conservatory of Flowers","county":"San Francisco","emoji":"🌺","lat":37.7729,"lon":-122.46,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/San_Francisco_Conservatory_of_Flowers.jpg/320px-San_Francisco_Conservatory_of_Flowers.jpg","fact":"The Conservatory of Flowers, opened in <em>1879</em>, is the oldest existing public wood-and-glass conservatory in the Western Hemisphere — its design was copied from the great greenhouse at Kew Gardens in London. The Victorian greenhouse was badly damaged in a 1995 windstorm and closed for eight years of restoration before reopening in 2003 with its historic collection of tropical plants intact."},{"name":"Panhandle — Historic Squatters Community","county":"San Francisco","emoji":"🌳","lat":37.7722,"lon":-122.4483,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Haight-Ashbury_street_sign.jpg/320px-Haight-Ashbury_street_sign.jpg","fact":"The Panhandle was created when the city extended Golden Gate Park eastward to connect with downtown, and the strip of park was controversially carved through an <em>established working-class neighborhood</em> in the 1870s. During the Summer of Love in 1967, the Panhandle's free concerts organized by the Grateful Dead and Jefferson Airplane attracted crowds of thousands."},{"name":"Kezar Stadium","county":"San Francisco","emoji":"🏟","lat":37.7669,"lon":-122.4561,"cat":"Historic Stadium","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Kezar_Stadium_SF.jpg/320px-Kezar_Stadium_SF.jpg","fact":"Kezar Stadium, opened in <em>1925</em>, was home to the San Francisco 49ers for their first 26 seasons and hosted the Beatles during their final concert tour in 1966. The intimate 10,000-seat stadium that replaced the original 59,000-seat bowl is still used for high school football and amateur events — its location at the corner of Golden Gate Park makes it one of the most beautiful urban stadiums in the country."},{"name":"Buena Vista Park","county":"San Francisco","emoji":"🌳","lat":37.7706,"lon":-122.4416,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Haight-Ashbury_street_sign.jpg/320px-Haight-Ashbury_street_sign.jpg","fact":"Buena Vista Park, established in <em>1867</em>, is the oldest official park in San Francisco and its hillside paths were laid out by Frederick Law Olmsted. The park's summit at 569 feet offers a panoramic view of downtown, the bay, and the ocean, and its dense tree canopy creates a microclimate that can be 10 degrees cooler than the surrounding streets on sunny days."},{"name":"Corona Heights Park — Randall Museum","county":"San Francisco","emoji":"🦎","lat":37.7647,"lon":-122.4383,"cat":"Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Castro_district_san_francisco.jpg/320px-Castro_district_san_francisco.jpg","fact":"Corona Heights' exposed red chert outcroppings are <em>200 million years old</em> — ancient seafloor scraped off the Pacific Plate and plastered onto the North American continent as oceanic crust subducted. The Randall Museum's live animal collection, a neighborhood institution for 75 years, features native California species in an intimate, hands-on setting."},{"name":"Seward Street Slides","county":"San Francisco","emoji":"🛝","lat":37.7586,"lon":-122.4431,"cat":"Recreation","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Castro_district_san_francisco.jpg/320px-Castro_district_san_francisco.jpg","fact":"The Seward Street slides are <em>concrete slides built into a hillside</em> in the 1970s that have been a neighborhood secret for 50 years — visitors must bring their own cardboard to slide on, and the friction-worn concrete provides a remarkably fast ride. The slides were threatened with demolition several times but neighborhood pressure kept them open."},{"name":"Dolores Street Historic Palms","county":"San Francisco","emoji":"🌴","lat":37.7651,"lon":-122.4269,"cat":"Street","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Dolores_Park_San_Francisco.jpg/320px-Dolores_Park_San_Francisco.jpg","fact":"Dolores Street's <em>row of mature Canary Island date palms</em>, planted in the 1910s, is the longest continuous palm tree boulevard in San Francisco and frames one of the city's most photographed views, with the Mission Dolores campanile in the background. The palms were threatened by a street widening project in the 1960s; neighbors chained themselves to the trees to save them."},{"name":"Point Reyes National Seashore","county":"Marin","emoji":"🌊","lat":38.0599,"lon":-122.8742,"cat":"National Seashore","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Point_Reyes_National_Seashore.jpg/320px-Point_Reyes_National_Seashore.jpg","fact":"Point Reyes Peninsula sits on the <em>Pacific Plate</em> and is geologically moving northwest at 2 inches per year — during the 1906 earthquake, it lurched 20 feet northward in a single instant, offsetting fence lines that are still visible today. The seashore protects the southernmost breeding colony of elephant seals on the California coast, with over 2,000 animals hauling out on Drakes Beach each winter."},{"name":"Mount Tamalpais","county":"Marin","emoji":"🏔","lat":37.9238,"lon":-122.5969,"cat":"Mountain","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Mount_Tamalpais_West_Peak.jpg/320px-Mount_Tamalpais_West_Peak.jpg","fact":"Mount Tamalpais is the birthplace of <em>mountain biking</em> — in the late 1970s, a group of cyclists began riding converted cruiser bikes down its fire roads, a practice that evolved into a global sport. The mountain's 2,571-foot summit offers views of 7 of the San Francisco Bay Area's 9 counties on clear days."},{"name":"Muir Woods National Monument","county":"Marin","emoji":"🌲","lat":37.8914,"lon":-122.5808,"cat":"National Monument","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Muir_woods_cathedral_grove.jpg/320px-Muir_woods_cathedral_grove.jpg","fact":"Muir Woods contains the <em>closest old-growth coast redwood grove</em> to a major metropolitan area in the world — trees up to 1,200 years old grow just 12 miles from downtown San Francisco. The monument was created in 1908 when Congressman William Kent donated the land to prevent its logging, and President Roosevelt named it after John Muir over Kent's objections."},{"name":"Sausalito Waterfront Historic District","county":"Marin","emoji":"⛵","lat":37.8591,"lon":-122.4852,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Sausalito_waterfront.jpg/320px-Sausalito_waterfront.jpg","fact":"Sausalito's houseboats, now among the most expensive floating homes in the world, began as <em>improvised shelters for World War II shipyard workers</em> who couldn't find affordable housing on land. The houseboat community fought a famous battle against city authorities in the 1970s — the 'Houseboat Wars' — that ended in a negotiated settlement allowing the boats to remain."},{"name":"Bay Model Visitor Center, Sausalito","county":"Marin","emoji":"🌊","lat":37.8736,"lon":-122.5022,"cat":"Museum","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Bay_Model_Visitor_Center.jpg/320px-Bay_Model_Visitor_Center.jpg","fact":"The Bay Model is a <em>1.5-acre hydraulic scale model</em> of San Francisco Bay and the Sacramento-San Joaquin Delta, built by the Army Corps of Engineers in 1956 to study how proposed projects would affect bay tides and currents. The model predicted that a proposed freshwater dam across the bay would create a shallow, stagnant swamp — a finding that killed the project and helped inspire the modern bay conservation movement."},{"name":"Tiburon Historic Downtown","county":"Marin","emoji":"🏘","lat":37.8908,"lon":-122.4561,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Tiburon_California.jpg/320px-Tiburon_California.jpg","fact":"Tiburon's Main Street is built on <em>railroad car barges</em> that were permanently beached along the waterfront in the early 1900s — the historic buildings along the water are actually sitting on the hulls of converted ferry barges. The railroad terminal here was the transfer point where transcontinental trains from the east were loaded onto ferries to cross the bay to San Francisco."},{"name":"Angel Island State Park","county":"Marin","emoji":"🏝","lat":37.8608,"lon":-122.4317,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Angel_Island_aerial.jpg/320px-Angel_Island_aerial.jpg","fact":"Angel Island served as the '<em>Ellis Island of the West</em>' from 1910 to 1940, processing 1 million immigrants — mostly from China, Japan, and the Philippines — who were detained for days, months, or years while their cases were reviewed. Chinese detainees carved over 200 poems into the walls of the detention barracks, discovered during restoration in 1970."},{"name":"Stinson Beach","county":"Marin","emoji":"🏖","lat":37.9019,"lon":-122.6419,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Stinson_Beach_CA.jpg/320px-Stinson_Beach_CA.jpg","fact":"Stinson Beach is the <em>warmest swimming beach</em> accessible from San Francisco, sheltered from prevailing winds by the bulk of Mount Tamalpais which blocks the afternoon fog. The beach gained national attention when a great white shark attack in 1981 — the first fatality at Stinson Beach — inspired increased shark research that fundamentally changed our understanding of white shark behavior."},{"name":"Bolinas Lagoon","county":"Marin","emoji":"🦭","lat":37.9075,"lon":-122.6758,"cat":"Wildlife Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Bolinas_Lagoon_Marin.jpg/320px-Bolinas_Lagoon_Marin.jpg","fact":"Bolinas Lagoon is one of the most productive <em>harbor seal pupping beaches</em> in Northern California, with over 200 seals hauling out on a sandbar visible from Highway 1. The lagoon sits in a fault-controlled depression formed by the San Andreas Fault, and the water's edge has been slowly creeping inland as the lagoon fills with sediment."},{"name":"Bolinas — The Town That Removes Its Own Road Signs","county":"Marin","emoji":"🏘","lat":37.9086,"lon":-122.6856,"cat":"Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Bolinas_Lagoon_Marin.jpg/320px-Bolinas_Lagoon_Marin.jpg","fact":"The town of Bolinas has been removing the highway department's road signs pointing to the town for <em>over 50 years</em> in a deliberate effort to discourage tourists — the state replaces the signs, residents steal them again, in an ongoing standoff. The town's 1,600 residents include a higher concentration of poets, artists, and musicians per capita than any other California community."},{"name":"Tomales Bay","county":"Marin","emoji":"🦪","lat":38.1833,"lon":-122.9167,"cat":"Bay","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Tomales Bay occupies a linear valley carved by the <em>San Andreas Fault</em> — the bay's perfectly straight, 15-mile length follows the fault exactly, making it one of the most visible expressions of the fault anywhere on its 800-mile length. The bay's cold, clean water produces some of the finest oysters in the world — Hog Island Oyster Company has farmed here since 1983."},{"name":"Point Bonita Lighthouse","county":"Marin","emoji":"🔦","lat":37.8161,"lon":-122.5289,"cat":"Historic Lighthouse","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Point_Bonita_Lighthouse.jpg/320px-Point_Bonita_Lighthouse.jpg","fact":"Point Bonita Lighthouse, first lit in <em>1855</em>, guards one of the most treacherous approaches to a major American port — the narrow, fog-shrouded entrance to San Francisco Bay where currents run at 7 knots. The lighthouse, now accessible only by a 60-foot suspension bridge over a sea-stack, required its own tunnel blasted through solid rock for lighthouse keepers to reach it."},{"name":"Marin Headlands — GGNRA","county":"Marin","emoji":"🌊","lat":37.8325,"lon":-122.5033,"cat":"National Recreation Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/SF_from_Marin_Headlands_in_January_2013.jpg/320px-SF_from_Marin_Headlands_in_January_2013.jpg","fact":"The Marin Headlands were preserved from development through a <em>congressional bait-and-switch</em> in 1972 — developers had successfully lobbied for a highway through the headlands, and conservationists attached language to the bill that created a national recreation area instead. The headlands' Nike missile batteries from the Cold War are still intact, and one silo is operational for public demonstrations."},{"name":"Hawk Hill, Marin Headlands","county":"Marin","emoji":"🦅","lat":37.8319,"lon":-122.4994,"cat":"Wildlife Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Hawk_Hill_Marin_Headlands.jpg/320px-Hawk_Hill_Marin_Headlands.jpg","fact":"Hawk Hill is the <em>best raptor migration observation point</em> on the Pacific Coast — on a good October day, over 2,000 hawks, falcons, and eagles pass directly overhead as they funnel through the narrowest point of the Marin Headlands on their southward migration. The hill's count of over 100,000 raptors observed in a single season is the highest for any site west of the Mississippi."},{"name":"Kirby Cove","county":"Marin","emoji":"⛺","lat":37.8289,"lon":-122.4836,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Hawk_Hill_Marin_Headlands.jpg/320px-Hawk_Hill_Marin_Headlands.jpg","fact":"Kirby Cove is a <em>hidden campground</em> directly under the Golden Gate Bridge's north tower, accessible only by a mile-long trail and requiring a reservation made months in advance. The cove's camp sites are so close to the bridge that campers can hear the bridge humming in the wind overhead, and the view of the bridge from the beach at sunset is one of the most dramatic in the Bay Area."},{"name":"Tennessee Valley Beach","county":"Marin","emoji":"🏖","lat":37.8633,"lon":-122.5358,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Tennessee_Valley_Beach.jpg/320px-Tennessee_Valley_Beach.jpg","fact":"Tennessee Valley Beach takes its name from the <em>steamship Tennessee</em> that wrecked here in 1853 with 600 passengers aboard — all survived, but the ship's entire cargo of Gold Rush gold was lost. The valley's creek is one of the last undeveloped coastal watersheds in Marin County, and coho salmon still attempt to spawn in its short lower reach."},{"name":"Muir Beach","county":"Marin","emoji":"🌊","lat":37.8658,"lon":-122.575,"cat":"Beach","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Muir_Beach_CA.jpg/320px-Muir_Beach_CA.jpg","fact":"Muir Beach's lagoon behind the beach is a critical <em>resting and feeding stop</em> for coho salmon returning from the Pacific — the juvenile fish spend months in this lagoon before moving into Redwood Creek for their final journey to spawning grounds. The beach's sheltered position makes it the calmest swimming spot on the Marin coast."},{"name":"Cascade Canyon Open Space","county":"Marin","emoji":"💧","lat":37.9394,"lon":-122.5539,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Mill_Valley_downtown.jpg/320px-Mill_Valley_downtown.jpg","fact":"Cascade Canyon contains one of the few <em>permanent waterfalls</em> in Marin County, fed by a spring that flows year-round regardless of rainfall. The canyon's redwood grove, though second-growth, is dense enough to support a population of marbled murrelets — seabirds that fly 50 miles inland to nest in old-growth forests, using trees in second-growth groves when old-growth is unavailable."},{"name":"San Quentin State Prison","county":"Marin","emoji":"🏛","lat":37.9408,"lon":-122.4853,"cat":"Historic Building","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/San_Quentin_State_Prison.jpg/320px-San_Quentin_State_Prison.jpg","fact":"San Quentin, opened in <em>1852</em>, is the oldest prison in California and has been continuously operated for over 170 years — making it one of the longest-running penitentiaries in American history. The prison's death row has held some of the most notorious criminals in California history, and the current governor has proposed converting the site into a rehabilitation center."},{"name":"China Camp State Park","county":"Marin","emoji":"🦐","lat":38.0019,"lon":-122.4711,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"China Camp was a <em>Chinese immigrant fishing village</em> that thrived from the 1870s to the 1930s, sending dried shrimp by the ton to markets in China and throughout the Pacific. The village's last resident, Frank Quan, lived here alone for decades after everyone else left — continuing to fish from the same piers his grandfather built — and died in 2016 at age 93."},{"name":"McNears Beach County Park","county":"Marin","emoji":"🏖","lat":37.9894,"lon":-122.4703,"cat":"County Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"McNears Beach has operated as a public recreation area since <em>1926</em>, when George McNear opened his private quarry beach to the public. The park's heated saltwater pool, filled directly from the bay, is one of the last of its type in the Bay Area — a relic of early 20th-century spa culture that has somehow survived."},{"name":"San Pedro Mountain Open Space","county":"Marin","emoji":"🌿","lat":37.9919,"lon":-122.54,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/China_Camp_State_Park.jpg/320px-China_Camp_State_Park.jpg","fact":"San Pedro Mountain is the <em>highest point in southern Marin County</em> at 1,058 feet, offering views south to the San Francisco skyline and north to Point Reyes. The mountain's chaparral slopes are among the most botanically diverse in Marin County, supporting over 200 plant species in the unique combination of marine fog and summer drought."},{"name":"Corte Madera Marsh","county":"Marin","emoji":"🦩","lat":37.9258,"lon":-122.5325,"cat":"Marsh","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Sausalito_waterfront.jpg/320px-Sausalito_waterfront.jpg","fact":"Corte Madera Marsh is one of the <em>most restored tidal marshes</em> in the Bay Area, transformed from former dairy land back to functioning tidal wetland over 30 years of restoration work. The marsh is a critical nursery habitat for Dungeness crab, and researchers tracking crab populations use it as a baseline for measuring the health of the entire bay ecosystem."},{"name":"Larkspur Ferry Terminal","county":"Marin","emoji":"⛴","lat":37.9456,"lon":-122.5089,"cat":"Transit","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Tiburon_California.jpg/320px-Tiburon_California.jpg","fact":"The Larkspur Ferry Terminal, opened in <em>1976</em>, connects Marin County to San Francisco by a 30-minute ferry ride that is consistently rated among the most beautiful commutes in the world. The terminal's location adjacent to the former San Quentin Prison industrial zone required massive cleanup of contaminated soils from 19th-century industrial operations."},{"name":"Baltimore Canyon Open Space","county":"Marin","emoji":"🌲","lat":37.9336,"lon":-122.58,"cat":"Open Space","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Mill_Valley_downtown.jpg/320px-Mill_Valley_downtown.jpg","fact":"Baltimore Canyon's redwood grove includes trees estimated to be <em>over 1,000 years old</em> — among the oldest on the eastern slopes of Mount Tamalpais — that survived because the canyon was too steep and narrow for 19th-century logging equipment to operate efficiently. The canyon's year-round stream creates a microclimate cool enough to support plants normally found much further north."},{"name":"Mill Valley Historic Downtown","county":"Marin","emoji":"🏘","lat":37.9058,"lon":-122.5453,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Mill_Valley_downtown.jpg/320px-Mill_Valley_downtown.jpg","fact":"Mill Valley earned its name from a sawmill built in <em>1834</em> to cut redwood lumber for the construction of Mission Dolores across the bay. The town's bohemian character dates to the 1890s when artists and writers began building summer cottages in the redwoods, attracted by the new railroad that made the mountain accessible from San Francisco for a weekend escape."},{"name":"Fairfax — Downtown Historic District","county":"Marin","emoji":"🎸","lat":37.9872,"lon":-122.5889,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Mill_Valley_downtown.jpg/320px-Mill_Valley_downtown.jpg","fact":"Fairfax has been a center of <em>Northern California music and counterculture</em> since the 1960s — the town's small clubs hosted early performances by Jefferson Airplane, the Grateful Dead, and dozens of other Bay Area bands who lived in the surrounding hills. The town's single main street hosts an unusually high concentration of independent bookstores, music venues, and health food restaurants for a town of 7,500 people."},{"name":"Samuel P. Taylor State Park","county":"Marin","emoji":"🌲","lat":38.0122,"lon":-122.7247,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Samuel_P_Taylor_State_Park.jpg/320px-Samuel_P_Taylor_State_Park.jpg","fact":"Samuel P. Taylor State Park contains California's <em>first campground</em>, established by Taylor himself in the 1870s when he opened his paper mill site to San Francisco day-trippers who arrived by train. The Papermill Creek in the park's heart is one of the best coho salmon streams in the Bay Area, and fish can be watched spawning from bridges in December and January."},{"name":"Nicasio Reservoir","county":"Marin","emoji":"💧","lat":38.0608,"lon":-122.6881,"cat":"Reservoir","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Bolinas_Lagoon_Marin.jpg/320px-Bolinas_Lagoon_Marin.jpg","fact":"Nicasio Reservoir, completed in <em>1960</em>, flooded the historic valley of Nicasio — home to a dairy community founded by Portuguese Azorean immigrants in the 1850s. The old Nicasio town site, including its adobe church and cemetery, remains partially visible during drought years when water levels drop, emerging from the reservoir like a California Brigadoon."},{"name":"Lagunitas — Papermill Creek Restoration","county":"Marin","emoji":"🐟","lat":38.0256,"lon":-122.7125,"cat":"Environmental Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Samuel_P_Taylor_State_Park.jpg/320px-Samuel_P_Taylor_State_Park.jpg","fact":"Papermill Creek in Lagunitas contains the <em>last viable wild coho salmon population</em> in the San Francisco Bay watershed — a strain of fish isolated since the last Ice Age that has developed unique genetic adaptations to the local environment. Extraordinary conservation efforts by local volunteers, including hand-counting every spawning adult each winter, have kept the population from extinction."},{"name":"Olema Valley","county":"Marin","emoji":"🌾","lat":38.0433,"lon":-122.7986,"cat":"Valley","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Bear_Valley_Visitor_Center_Point_Reyes.jpg/320px-Bear_Valley_Visitor_Center_Point_Reyes.jpg","fact":"Olema Valley lies directly along the <em>San Andreas Fault</em>, and the valley's unusual linearity — straight as a ruler for miles — is a textbook example of how fault activity shapes landscapes. In 1906, the ground here offset so violently that a cow fell into a crack that opened beneath it, and researchers found the animal buried 8 feet underground in the fault scarp."},{"name":"Inverness — Historic Village","county":"Marin","emoji":"🏘","lat":38.1,"lon":-122.86,"cat":"Historic Village","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Tomales_Bay.jpg/320px-Tomales_Bay.jpg","fact":"Inverness was settled by <em>Scottish immigrants</em> who named it for Inverness, Scotland, finding the fog-shrouded hills above Tomales Bay eerily similar to the Scottish Highlands. The village's Scottish character — stone cottages, a Presbyterian church, and a local brewery — has been preserved largely because the surrounding Point Reyes National Seashore prevents suburban development."},{"name":"Abbotts Lagoon, Point Reyes","county":"Marin","emoji":"🦢","lat":38.1111,"lon":-122.9356,"cat":"Lagoon","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Bear_Valley_Visitor_Center_Point_Reyes.jpg/320px-Bear_Valley_Visitor_Center_Point_Reyes.jpg","fact":"Abbotts Lagoon is separated from the Pacific Ocean by a narrow dune barrier that is breached by storm waves every few years — allowing salt water to flood the freshwater lagoon in a <em>dramatic ecological reset</em> that resets the plant and animal communities. The lagoon is the best place in the Bay Area to see nesting western snowy plovers."},{"name":"Drake's Estero, Point Reyes","county":"Marin","emoji":"🦭","lat":38.0786,"lon":-122.8958,"cat":"Estuary","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Bear_Valley_Visitor_Center_Point_Reyes.jpg/320px-Bear_Valley_Visitor_Center_Point_Reyes.jpg","fact":"Drake's Estero is believed to be the location where <em>Francis Drake careened his ship</em> Golden Hind in 1579 to scrape barnacles during his circumnavigation of the globe — a stay of over a month documented in the ship's log as 'a convenient harbor.' Drake claimed the land for England as 'Nova Albion,' the first European territorial claim in what is now California."},{"name":"Chimney Rock, Point Reyes","county":"Marin","emoji":"🦭","lat":37.9983,"lon":-122.9656,"cat":"Natural Landmark","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Bear_Valley_Visitor_Center_Point_Reyes.jpg/320px-Bear_Valley_Visitor_Center_Point_Reyes.jpg","fact":"Chimney Rock at the tip of the Point Reyes headland is where <em>elephant seals began recolonizing</em> California in the 1980s after being hunted to near extinction — starting from zero seals in 1981, the population has grown to over 2,000. The point is also one of the best whale-watching spots on the California coast, with gray whales passing within a few hundred feet of the cliffs during migration."},{"name":"Bear Valley Visitor Center, Point Reyes","county":"Marin","emoji":"🌿","lat":38.0413,"lon":-122.7997,"cat":"Visitor Center","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Bear_Valley_Visitor_Center_Point_Reyes.jpg/320px-Bear_Valley_Visitor_Center_Point_Reyes.jpg","fact":"Bear Valley was the <em>last major Coast Miwok village</em> in the Point Reyes area, continuously occupied for over 5,000 years before the Spanish mission system disrupted indigenous society in the early 1800s. The trail from the visitor center to the coast follows the exact path of a Miwok trail documented by the Drake expedition in 1579."},{"name":"Sonoma Plaza — Bear Flag Republic Site","county":"Sonoma","emoji":"🐻","lat":38.2919,"lon":-122.4581,"cat":"Historic Plaza","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Sonoma_Plaza.jpg/320px-Sonoma_Plaza.jpg","fact":"Sonoma Plaza was the site of the <em>Bear Flag Revolt of 1846</em>, when American settlers captured Mexican General Vallejo and declared the short-lived California Republic — raising a homemade bear flag over the barracks. The republic lasted exactly 25 days before the U.S. Navy arrived and California was absorbed into the United States during the Mexican-American War."},{"name":"Mission San Francisco Solano de Sonoma","county":"Sonoma","emoji":"⛪","lat":38.2919,"lon":-122.4567,"cat":"Historic Mission","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Sonoma_Mission.JPG/320px-Sonoma_Mission.JPG","fact":"Mission Solano, founded in <em>1823</em>, was the last and northernmost of California's 21 missions, established just three years before Mexico won independence from Spain. It is also the only mission founded under Mexican rather than Spanish authority — built by a rogue Franciscan priest who acted without authorization from the church hierarchy."},{"name":"Jack London State Historic Park","county":"Sonoma","emoji":"📚","lat":38.3567,"lon":-122.5489,"cat":"Historic Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Wolf_House_Jack_London.jpg/320px-Wolf_House_Jack_London.jpg","fact":"Jack London's dream home, the <em>Wolf House</em>, burned to the ground in 1913 just days before he and his wife were to move in — a mysterious fire London suspected was arson. The roofless ruins of the massive stone mansion still stand in the park, while the adjacent 'House of Happy Walls' built by his widow after his death houses a museum of London's life and adventures."},{"name":"Armstrong Redwoods State Natural Reserve","county":"Sonoma","emoji":"🌲","lat":38.5344,"lon":-123.0039,"cat":"State Reserve","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Armstrong_Redwoods.jpg/320px-Armstrong_Redwoods.jpg","fact":"Armstrong Redwoods protects a grove of ancient coast redwoods that survived 19th-century logging because lumber baron Colonel Armstrong had the foresight to preserve them — creating one of the <em>first private forest preserves</em> in California in the 1870s. The Parson Jones Tree here is 310 feet tall and 1,400 years old — it was a mature tree when the Moors invaded Spain."},{"name":"Bodega Bay","county":"Sonoma","emoji":"🦅","lat":38.3336,"lon":-123.0533,"cat":"Bay","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Bodega_Bay_California.jpg/320px-Bodega_Bay_California.jpg","fact":"Bodega Bay was the filming location for Alfred Hitchcock's <em>'The Birds'</em> in 1963, and many of the original buildings used in the film still stand in the town. The bay's exposed position on the open Pacific and its cold, upwelling-fed waters make it one of the most productive fishing grounds on the California coast for Dungeness crab and salmon."},{"name":"Bodega Head","county":"Sonoma","emoji":"🌊","lat":38.3147,"lon":-123.0617,"cat":"Headland","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Bodega_Head_Sonoma.jpg/320px-Bodega_Head_Sonoma.jpg","fact":"Bodega Head was the proposed site of California's <em>first nuclear power plant</em> in the early 1960s — PG&E had already dug a 70-foot test pit for the reactor when geologists discovered the site sat directly on the San Andreas Fault. The resulting controversy helped establish the antinuclear movement in California and eventually led to the creation of the California Coastal Commission."},{"name":"Fort Ross State Historic Park","county":"Sonoma","emoji":"🏰","lat":38.5133,"lon":-123.2428,"cat":"Historic Fort","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Fort_Ross_state_historic_park.jpg/320px-Fort_Ross_state_historic_park.jpg","fact":"Fort Ross was a <em>Russian colonial settlement</em> established in 1812 — the southernmost permanent Russian outpost in North America, built to grow food for Russian Alaska and hunt sea otters. The Russians abandoned the fort in 1841 when the sea otter population had been hunted to near-extinction, selling the property to John Sutter, who would later discover gold at his mill in Coloma."},{"name":"Salt Point State Park","county":"Sonoma","emoji":"🦪","lat":38.5697,"lon":-123.3283,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Salt_Point_State_Park.jpg/320px-Salt_Point_State_Park.jpg","fact":"Salt Point State Park contains the first <em>underwater park in California</em>, established in 1969 to protect the abalone and other marine life of its rocky reefs from overharvesting. The park's dramatic sandstone formations, honeycombed with tafoni erosion, create an otherworldly landscape along the cliff tops that has been used as a setting in science fiction films."},{"name":"Gualala Point Regional Park","county":"Sonoma","emoji":"🌊","lat":38.7583,"lon":-123.5333,"cat":"Regional Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Bodega_Head_Sonoma.jpg/320px-Bodega_Head_Sonoma.jpg","fact":"Gualala takes its name from the Coast Miwok word meaning <em>'water coming down place'</em>, referring to the Gualala River that meets the Pacific here. The river mouth's lagoon, cut off from the ocean by a sandbar each summer, is a critical habitat for steelhead trout that wait in the lagoon for winter rains to open the bar before making their spawning run."},{"name":"Petaluma Adobe State Historic Park","county":"Sonoma","emoji":"🏚","lat":38.2539,"lon":-122.6086,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Petaluma_Adobe.jpg/320px-Petaluma_Adobe.jpg","fact":"General Mariano Vallejo's Petaluma Adobe, built in <em>1836</em>, was the largest private adobe structure in California and the headquarters of a rancho that ran 10,000 cattle and 10,000 sheep across 66,000 acres — the largest private ranch in California history. The two-story adobe with its surrounding workshops was essentially a self-contained town, employing over 2,000 Miwok and Pomo workers."},{"name":"Petaluma Historic Downtown","county":"Sonoma","emoji":"🏘","lat":38.2324,"lon":-122.6367,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Petaluma_downtown.jpg/320px-Petaluma_downtown.jpg","fact":"Petaluma was the <em>egg capital of the world</em> from the 1880s to the 1960s, producing over 600 million eggs per year at its peak and earning the title 'World's Egg Basket.' The town's Victorian commercial district along the river is one of the most intact 19th-century Main Streets in California — its cast-iron facades have been used as film sets for dozens of period movies."},{"name":"Petaluma River Historic District","county":"Sonoma","emoji":"🌊","lat":38.2325,"lon":-122.6392,"cat":"Historic Waterfront","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Petaluma_downtown.jpg/320px-Petaluma_downtown.jpg","fact":"The Petaluma River, navigable for 14 miles inland, made the city one of the most important <em>agricultural shipping ports</em> in Northern California from the 1850s through the railroad era. The river's reversing tidal current — it flows upstream twice a day — was used by farmers to float barges of butter, eggs, and poultry to San Francisco without any power."},{"name":"Sonoma Valley — Wine Country","county":"Sonoma","emoji":"🍷","lat":38.2919,"lon":-122.4581,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Sonoma_Valley_vineyards.jpg/320px-Sonoma_Valley_vineyards.jpg","fact":"Sonoma Valley was California's <em>first commercial wine region</em> — Count Agoston Haraszthy planted the first large-scale European varietal vineyard at Buena Vista in 1857, importing 100,000 cuttings from 300 European varieties. The valley's diverse geology — volcanic, alluvial, and marine sedimentary soils — produces wine grapes of extraordinary variety within a small geographic area."},{"name":"Buena Vista Winery, Sonoma","county":"Sonoma","emoji":"🍇","lat":38.2986,"lon":-122.4436,"cat":"Historic Winery","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Buena_Vista_Winery.jpg/320px-Buena_Vista_Winery.jpg","fact":"Buena Vista, founded in <em>1857</em>, is the oldest continuously operating winery in California — its limestone caves, hand-dug by Chinese laborers, are still used for barrel aging. Count Haraszthy, who founded the winery, disappeared in 1869 on a business trip to Nicaragua and was never found — his family believed he was eaten by alligators."},{"name":"Healdsburg Plaza","county":"Sonoma","emoji":"🌳","lat":38.611,"lon":-122.8697,"cat":"Historic Plaza","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Healdsburg's central plaza, surrounded by tasting rooms and restaurants, was laid out in <em>1857</em> on land donated by Harmon Heald, who platted the town as a real estate speculation. The town has transformed from a hop-growing agricultural center to one of the most visited wine destinations in California — Michelin-starred restaurants now occupy buildings that were once feed stores."},{"name":"Russian River Valley","county":"Sonoma","emoji":"🍷","lat":38.5,"lon":-122.9,"cat":"Wine Region","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Russian_River_Valley_vineyards.jpg/320px-Russian_River_Valley_vineyards.jpg","fact":"The Russian River Valley's unique climate, where <em>morning fog burns off by noon</em> then returns each evening, creates a natural refrigeration system that preserves acidity in Chardonnay and Pinot Noir grapes — varieties that fail in warmer climates. The valley was named for the Russian colonists from Fort Ross who used the river as a supply route in the early 1800s."},{"name":"Guerneville — Riverfront Historic District","county":"Sonoma","emoji":"🌲","lat":38.5022,"lon":-122.9989,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Russian_River_Valley_vineyards.jpg/320px-Russian_River_Valley_vineyards.jpg","fact":"Guerneville was the center of the Sonoma County <em>redwood lumber industry</em> in the 1870s-1890s, when it was known as 'Stumptown' for the massive clear-cut stumps surrounding the town. After logging moved north, the town reinvented itself as a summer resort for San Francisco vacationers and later became a center of LGBT culture in the 1970s."},{"name":"Monte Rio — Rio Nido Historic Summer Cabins","county":"Sonoma","emoji":"🏕","lat":38.4656,"lon":-123.005,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Russian_River_Valley_vineyards.jpg/320px-Russian_River_Valley_vineyards.jpg","fact":"The Russian River resort communities were built in the <em>1910s-1920s</em> as summer retreats for San Francisco working-class families who could afford a train ticket but not a hotel — the 'Poor Man's Riviera.' Hundreds of simple wooden cabins, some little changed in a century, cluster under the redwoods in a landscape of shaded swimming holes and old dancehalls."},{"name":"Bohemian Grove","county":"Sonoma","emoji":"🌲","lat":38.4706,"lon":-123.0175,"cat":"Historic Site","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Russian_River_Valley_vineyards.jpg/320px-Russian_River_Valley_vineyards.jpg","fact":"Bohemian Grove is a 2,700-acre private redwood retreat where the <em>Bohemian Club of San Francisco</em> has held its annual midsummer encampment since 1878, hosting every Republican president since Herbert Hoover. The grove's secretive 'Cremation of Care' ceremony, a theatrical ritual burning of an effigy, has fueled decades of conspiracy theories about what actually happens inside."},{"name":"Occidental — Historic Logging Town","county":"Sonoma","emoji":"🌲","lat":38.4058,"lon":-122.9536,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Annadel_State_Park.jpg/320px-Annadel_State_Park.jpg","fact":"Occidental sits in a valley that was completely <em>clear-cut of old-growth redwood</em> between 1876 and 1890, supplying lumber for the rebuilding of San Francisco after a series of fires. The current forest, now over 130 years old, has grown back so completely that the town appears to sit in a primeval forest — the scale of the original destruction is almost unimaginable today."},{"name":"Duncans Mills Historic Town","county":"Sonoma","emoji":"🏘","lat":38.4581,"lon":-123.0489,"cat":"Historic Town","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Russian_River_Valley_vineyards.jpg/320px-Russian_River_Valley_vineyards.jpg","fact":"Duncans Mills was the highest point navigable by steamboat on the Russian River, making it the <em>transfer point</em> between river and overland transportation during the logging era. The town's original 1870s buildings — a general store, hotel, and church — still stand along the river, preserved because the area's isolation prevented redevelopment."},{"name":"Jenner — Russian River Mouth","county":"Sonoma","emoji":"🦭","lat":38.4528,"lon":-123.1139,"cat":"Natural Feature","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Bodega_Head_Sonoma.jpg/320px-Bodega_Head_Sonoma.jpg","fact":"The Russian River's mouth at Jenner supports one of the <em>largest harbor seal pupping colonies</em> in the Bay Area — over 300 mothers and pups use the river mouth sandbars each spring. The river mouth is closed by a sandbar for most of the year, opening explosively when winter rains raise the river high enough to break through the barrier in a dramatic rush of water."},{"name":"Sonoma Coast State Park","county":"Sonoma","emoji":"🌊","lat":38.5333,"lon":-123.2,"cat":"State Park","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Bodega_Head_Sonoma.jpg/320px-Bodega_Head_Sonoma.jpg","fact":"Sonoma Coast's <em>'Pocket beaches'</em> between dramatic sea stacks are among the most photographed coastline in California, but their deceptive beauty hides some of the most dangerous surf conditions on the West Coast — sneaker waves and powerful backwash have killed hundreds of visitors over the decades. The coast's rocks are among the most geologically diverse on the Pacific Coast."},{"name":"Sea Ranch — Historic Architecture Community","county":"Sonoma","emoji":"🏠","lat":38.7047,"lon":-123.4736,"cat":"Historic Architecture","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Bodega_Head_Sonoma.jpg/320px-Bodega_Head_Sonoma.jpg","fact":"The Sea Ranch, developed in the 1960s by landscape architect Lawrence Halprin, established principles of <em>architecture in harmony with landscape</em> that influenced residential design worldwide. The community's design rules — no fences, weathered wood exteriors, buildings that follow terrain contours — sparked a legal battle that established public access to California's coast and led directly to the creation of the Coastal Commission."},{"name":"Cazadero — Stillwater Cove","county":"Sonoma","emoji":"🌲","lat":38.5117,"lon":-123.1467,"cat":"Natural Area","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Salt_Point_State_Park.jpg/320px-Salt_Point_State_Park.jpg","fact":"Stillwater Cove's protected waters were used by Russian colonists from Fort Ross as a <em>small boat harbor</em> in the early 1800s, sheltered from Pacific swells by a natural rock breakwater. The cove's underwater kelp forest is among the most intact on the Sonoma coast, supporting populations of rockfish and lingcod that have rebounded since the area became a reserve."},{"name":"Cloverdale Historic Downtown","county":"Sonoma","emoji":"🍊","lat":38.8025,"lon":-123.0186,"cat":"Historic District","photo":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Healdsburg_Plaza.jpg/320px-Healdsburg_Plaza.jpg","fact":"Cloverdale was the <em>northernmost stop on the Northwestern Pacific Railroad</em>, making it the gateway to the Mendocino and Humboldt lumber country — a rough railroad town that served loggers and ranchers heading north. The town's citrus orchards, planted in the 1880s, still produce oranges and lemons in the warm valley microclimate that is the northern
