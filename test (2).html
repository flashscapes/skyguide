<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eventbrite Search Test</title>
<style>
  body{font-family:monospace;background:#0a0f1a;color:#eef2ff;padding:20px;}
  h2{color:#c9a84c;}
  button{background:#c9a84c;color:#000;border:none;padding:12px 24px;
         font-size:15px;border-radius:8px;cursor:pointer;margin:6px 4px;display:block;width:100%;}
  #output{background:#111827;border:1px solid #333;border-radius:8px;
          padding:16px;margin-top:16px;white-space:pre-wrap;
          font-size:12px;line-height:1.8;min-height:80px;}
  .ok{color:#50c880;} .err{color:#e05555;} .dim{color:#888;}
</style>
</head>
<body>
<h2>🎟 Eventbrite Search Test</h2>

<button onclick="testSearch()">Search Events Near Lafayette CA (Direct)</button>
<button onclick="testSearchJsonp()">Search Events via JSONP</button>
<button onclick="clearOutput()">Clear</button>

<div id="output"><span class="dim">Click a button…</span></div>

<script>
var EB_TOKEN = '7FSOB4KXZTZ77ZREQ3F7';

function log(msg, cls) {
  var el = document.getElementById('output');
  var d  = document.createElement('div');
  d.className = cls || ''; d.textContent = msg;
  el.appendChild(d);
}
function clearOutput() {
  document.getElementById('output').innerHTML = '';
}

// Test: Direct fetch to event search (public endpoint)
function testSearch() {
  log('── Direct search near Lafayette CA…', 'dim');
  var url = 'https://www.eventbriteapi.com/v3/events/search/'
    + '?token=' + EB_TOKEN
    + '&location.address=' + encodeURIComponent('Lafayette, CA')
    + '&location.within=25mi'
    + '&expand=venue'
    + '&sort_by=distance'
    + '&page_size=5';

  log('URL: ' + url.replace(EB_TOKEN, '[TOKEN]'), 'dim');

  fetch(url)
    .then(function(r) {
      log('HTTP status: ' + r.status, r.ok ? 'ok' : 'err');
      return r.json();
    })
    .then(function(data) {
      if (data.error) {
        log('✗ Error: ' + data.error + ' — ' + (data.error_description || ''), 'err');
        log('Full response: ' + JSON.stringify(data), 'dim');
        return;
      }
      if (data.events && data.events.length) {
        log('✓ Found ' + data.events.length + ' events!', 'ok');
        data.events.forEach(function(e, i) {
          log((i+1) + '. ' + (e.name && e.name.text || 'untitled'), 'ok');
          log('   ' + (e.start && e.start.local || '') +
              (e.venue ? ' @ ' + (e.venue.name || e.venue.address && e.venue.address.city || '') : ''), 'dim');
        });
      } else {
        log('No events found. Response: ' + JSON.stringify(data).substring(0, 300), 'dim');
      }
    })
    .catch(function(e) {
      log('✗ Fetch error: ' + e.message, 'err');
    });
}

// Test: JSONP (bypasses CORS entirely — no fetch needed)
function testSearchJsonp() {
  log('── JSONP search near Lafayette CA…', 'dim');
  window._eb = function(data) {
    if (data.error) {
      log('✗ Error: ' + data.error + ' — ' + (data.error_description || ''), 'err');
      return;
    }
    if (data.events && data.events.length) {
      log('✓ JSONP works! Found ' + data.events.length + ' events', 'ok');
      data.events.forEach(function(e, i) {
        log((i+1) + '. ' + (e.name && e.name.text || 'untitled'), 'ok');
        log('   ' + (e.start && e.start.local || ''), 'dim');
      });
    } else {
      log('No events. Response: ' + JSON.stringify(data).substring(0, 200), 'dim');
    }
  };
  var s  = document.createElement('script');
  s.src  = 'https://www.eventbriteapi.com/v3/events/search/'
          + '?token=' + EB_TOKEN
          + '&location.address=' + encodeURIComponent('Lafayette, CA')
          + '&location.within=25mi'
          + '&page_size=5'
          + '&callback=_eb';
  s.onerror = function() { log('✗ JSONP script load failed', 'err'); };
  document.head.appendChild(s);
}
</script>
</body>
</html>
